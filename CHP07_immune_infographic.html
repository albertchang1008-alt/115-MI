NK 細胞表面的殺手免疫球蛋白樣受體（KIR）互動並阻止攻擊時，扮演了最關鍵的「踩煞車」阻斷角色？", "lock": "結合抑制性受體並傳遞「別開槍，是自己人」訊號的關鍵 HLA 亞型，究竟是 A、B、C、G 中的哪一個？", "explain": "同學們，NK 細胞（自然殺手細胞）就像是我們身體裡的「皇家殺手」，一看到不順眼的細胞（比如病毒感染或癌變細胞）就直接開槍送它上路！但是，殺手殺人也是有原則的，只要你向他出示「良民證」，他就會立刻收手。這個免死金牌，就是細胞表面的 MHC class I 分子（在人類身上稱為 HLA）。在這些 HLA 分子中，HLA-B（特別是帶有 Bw4 特徵的亞型）可以和 NK 細胞表面的抑制性受體（KIR3DL1）完美結合，就像一把鑰匙配一把鎖，只要一鎖上，NK 細胞內部的活化訊號就會被硬生生切斷，大喊一聲「啊！是自己人！」然後轉身離開。因此，HLA-B 能提供強大的保護力，避免正常細胞被 NK 細胞誤殺！", "what": "NK 細胞如何透過辨識人體細胞表面的 HLA-B 分子來傳遞抑制訊號，進而避免誤殺正常細胞的機制。", "trap": "很多考生容易把 HLA-G（在胎盤上防止母體免疫攻擊胚胎）或 HLA-C（也是經典的 KIR 配體）跟這題混淆。請記得，國考在探討 NK 細胞抑制性受體（如 KIR3DL1）的經典配體時，HLA-B（Bw4）是極為重要的考點，別看到一堆 HLA 字母就慌了手腳喔！"}, {"no": 6, "source": "105-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列那種溫度可破壞補體的作用？", "options": {"A": "25℃", "B": "37℃", "C": "40℃", "D": "56℃"}, "answer": "D", "ask": "補體這種在血清中幫忙作戰的蛋白質，到底怕熱怕到什麼程度，只要加熱到幾度就會讓它徹底結構變性、失去活性？", "compare": "體溫 37℃ 是補體最舒適的工作溫度，而 40℃ 只是人體發燒時的極限，那要達到讓蛋白質結構徹底摧毀的「去活化」狀態，需要更激烈的高溫還是微溫呢？", "lock": "在實驗室中為了排除血清中補體的干擾，我們通常會進行半小時的「熱去活化」程序，此時水浴槽最常設定的標準「殺手溫度」是多少度？", "explain": "同學們，想像一下「補體（Complement）」就像是我們血清裡的一群熱血青年兵，平時最喜歡在我們正常的體溫下（37℃）生龍活虎地幫忙抗體打壞人。但是，這群熱血青年有個致命的弱點——非常怕熱（熱不穩定性，heat-labile）！如果我們在實驗室裡要把這群補體「做掉」（去活化），不讓牠們干擾實驗，最經典的招式就是「56℃ 加熱 30 分鐘」。在這個溫度下，補體的蛋白質結構會像煎雞蛋一樣直接變性（denature），徹底失去活性。而 A 選項 25℃（室溫）和 B 選項 37℃（體溫）都是牠們活蹦亂跳的溫度；C 選項 40℃ 雖然是發燒的溫度，但還不足以把補體徹底熱死。所以，想要一擊必殺讓補體罷工，非 56℃ 莫屬啦！", "what": "考驗補體的物理特性，特別是其「熱不穩定性（heat-lability）」與血清去活化（inactivation）的標準溫度。", "trap": "很多同學會把「發燒（約 40℃）」誤認為足以破壞補體的溫度。其實發燒是免疫系統在加速運作，這時候補體還是活得很健康！真正要在實驗室裡將補體「斷捨離」，必須用到更高的 56℃ 才可以喔！"}, {"no": 7, "source": "105-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "透過古典途徑（classical pathway）活化補體時，需要以下那一種分子的參與？", "options": {"A": "IgE", "B": "IgA", "C": "IgD", "D": "IgM"}, "answer": "D", "ask": "補體古典途徑這台精密殺敵機器的啟動開關，究竟掌握在抗體家族中的哪位成員手裡？", "compare": "哪一種抗體在結構上擁有最多的結合手臂，最容易以單一分子的姿態就揪住補體 C1q 蛋白來啟動反應？", "lock": "排除掉不具備活化古典途徑能力的 IgA、IgD 和 IgE 後，剩下的哪一個選項才是那個實力堅強、效率最高的五聚體抗體？", "explain": "補體系統的「古典途徑（classical pathway）」就像是免疫界的一場精準打擊行動，而啟動這場行動的信號彈就是抗原與抗體的結合！在我們熟知的抗體大家庭中，只有 IgM 和 IgG 有資格擔任古典途徑的「啟動密鑰」。其中，IgM 是個由五個抗體分子連在一起的「五聚體」超大戰士，它光是靠自己一個人，就能提供足夠的抓地力（Fc 區域）來吸引並牢牢抓住補體系統的第一棒 C1q，因此活化效率極高！相對地，單體結構的 IgG 還需要找好朋友湊成一對（至少兩個）才能啟動。至於選項中的 IgA（主打黏膜防禦、走替代途徑）、IgE（專職過敏與寄生蟲）、IgD（主要當 B 細胞的感受器），它們在古典途徑中根本沒有活化補體的能力。所以，古典途徑的最佳代言人絕對是非 IgM 莫屬啦！", "what": "考驗對不同免疫球蛋白（抗體）在啟動補體古典途徑時的角色與結構差異之理解。", "trap": "考生常誤以為「只要是抗體就能活化所有補體途徑」。請死死記住：古典途徑只認 IgG 和 IgM，且 IgM 的活化效率因其五聚體結構而遠高於 IgG；而 IgA 則是參與替代途徑，千萬別傻傻分不清！"}, {"no": 17, "source": "106-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列那一種人類白血球抗原（human leukocyte antigen, HLA）專屬於抗原呈現細胞（antigen presenting cell），允許 CD4 輔助性 T 細胞辨識外來抗原，產生免疫反應？", "options": {"A": "HLA-A", "B": "HLA-B", "C": "HLA-C", "D": "HLA-D"}, "answer": "D", "ask": "當病原體入侵時，我們的免疫總指揮 CD4 T 細胞需要透過哪一種特定的 HLA 識別證，才能順利和專業的抗原呈現細胞完成情報交接？", "compare": "遍布全身所有有核細胞的 HLA-A、B、C，與只出現在專業免疫細胞表面的 HLA-D，在功能與防禦對象上有何本質上的不同？", "lock": "既然 CD4+ T 細胞只接受 MHC Class II 的訊號，那麼在 HLA-A、B、C、D 當中，哪一個家族成員才是代表 MHC Class II 的代號？", "explain": "嘿！各位同學，這題其實是在考我們免疫界的「身分證認證系統」！我們的 T 細胞非常龜毛，看人都要看身分證。其中，CD4+ 輔助性 T 細胞（T helper cells）是免疫系統的總指揮，它只跟「專業抗原呈現細胞（APC）」打交道。既然是專屬頻道，那這群 APC 身上就必須帶著特殊的標章，也就是 MHC Class II（在人類 HLA 系統中就是 HLA-D 區域，包含 DP, DQ, DR 等）。而 HLA-A、HLA-B、HLA-C 則是 MHC Class I 家族，這是所有有核細胞都有的「普及版身分證」，是用來跟 CD8+ 殺手 T 細胞對暗號的。所以啦，要找 CD4+ 的專屬對象，直接認明 HLA-D 就對了！", "what": "本題核心考點為人類白血球抗原（HLA）的分類，以及 MHC Class I（HLA-A/B/C）與 Class II（HLA-D）在細胞分布與 T 細胞辨識上的差異。", "trap": "考生最常在這裡把 CD4 和 CD8 的配對搞混！請牢記「乘積口訣」：4 x 2 = 8（CD4 結合 MHC Class II / HLA-D），8 x 1 = 8（CD8 結合 MHC Class I / HLA-A, B, C），兩者的乘積永遠是 8，這樣考試時就絕對不會連連看連錯囉！"}, {"no": 19, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "主要辨識革蘭氏陰性菌的脂多糖（lipopolysaccharide）的細胞受體是那一種？", "options": {"A": "Fc 受體", "B": "T 細胞受體", "C": "Toll-like receptor 4（TLR4）", "D": "抗體（Antibody）"}, "answer": "C", "ask": "革蘭氏陰性菌的外膜上有一種叫做「脂多糖（LPS）」的招牌毒素，我們細胞表面哪一個偵察兵是專門負責在第一時間盯上它的？", "compare": "T 細胞受體與 Toll 樣受體在胃口上有何不同，誰只吃 MHC 呈遞的蛋白質，誰又是專門大範圍搜捕病原體特徵的捕手？", "lock": "結合哪一個受體是學理上公認誘發內毒素休克（LPS-induced shock）最關鍵的細胞訊號傳遞起點？", "explain": "哈囉同學們！想像一下，當革蘭氏陰性菌這群壞蛋入侵人體時，牠們身上會帶著一張招牌名片，那就是「脂多糖（LPS）」。那我們體內的先天免疫守衛要怎麼抓到牠們呢？就是靠細胞表面上的「偵毒器」——Toll-like receptor 4（TLR4）！TLR4 就像是專門偵測 LPS 的雷達，一碰到就立馬拉警報。那我們來看看其他選項為什麼在狀況外：(A) Fc 受體是專門來抓抗體屁股（Fc 段）的，不是用來直接抓細菌的；(B) T 細胞受體（TCR）是個傲嬌的挑食鬼，牠只吃呈現在 MHC 上的蛋白質碎片，對 LPS 這種非蛋白質的脂多糖根本不屑一顧；(D) 抗體雖然可以結合 LPS，但它本身是分泌出來的蛋白質分子，不是題幹中主要扮演「辨識 LPS 並啟動先天免疫反應」的經典細胞受體。所以，記住「LPS 找 TLR4」這對天生一對的黃金組合就對啦！", "what": "考先天免疫系統中模式識別受體（PRR）與病原相關分子模式（PAMP）的配對關係，特別是 TLR4 專一性辨識 LPS 的經典知識點。", "trap": "很多同學會把「抗體」和「細胞受體」混淆，雖然抗體能結合 LPS，但題目強調的是細胞表面直接啟動先天免疫反應、辨識 LPS 的「細胞受體」，這時絕對要先想到先天免疫的明星家族——Toll 樣受體（TLR）！另外，千萬別把辨識鞭毛的 TLR5 或辨識單股 RNA 的 TLR7 跟辨識 LPS 的 TLR4 記混囉！"}, {"no": 21, "source": "106-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種細胞激素，可刺激嗜酸性白血球分泌媒介物，引起氣喘？", "options": {"A": "IL-1", "B": "IL-5", "C": "IL-15", "D": "IL-12"}, "answer": "B", "ask": "呼吸道裡面的嗜酸性白血球到底是聽到了哪一種化學訊號的召喚，才會失控釋放毒素、引爆氣喘的發炎反應？", "compare": "誘導 Th1 細胞分化的 IL-12，與專門促使嗜酸性白血球分化與活化的細胞激素，在免疫反應中各扮演什麼截然相反的角色？", "lock": "哪一個細胞激素是以「嗜酸性白血球的專屬生長與活化因子」聞名，且在臨床抗氣喘標靶藥物中被視為主要阻斷目標？", "explain": "嘿，各位未來的神醫們！這題我們來聊聊過敏性氣喘的幕後大黑手。當過敏原闖進呼吸道時，Th2（第二型輔助 T 細胞）就會開始暴走並分泌一堆細胞激素，其中最愛跟「嗜酸性白血球 (Eosinophil)」勾勾纏的就是 IL-5 啦！IL-5 簡直就是嗜酸性白血球的專屬興奮劑，不僅能促進它們在骨髓中發育成熟，還會把它們誘騙到呼吸道，刺激它們釋放毒性蛋白，把氣管搞得腫脹、痙攣，這就是氣喘發作的慘劇。我們來看看其他打醬油的選項：(A) IL-1 是發炎反應的「吹哨者」，主要引發全身性發炎和發燒；(C) IL-15 主要是負責幫忙 NK 細胞和 T 細胞茁壯的；(D) IL-12 則是 Th1 的好麻吉，專門用來對付細胞內病原體，跟引起氣喘的 Th2 路線剛好相反。所以，看到「嗜酸性白血球」與「氣喘」，腦中請自動連結 IL-5 喔！", "what": "考驗對「調控嗜酸性白血球活化與氣喘（Th2 免疫反應）的核心細胞激素」之掌握度。", "trap": "很多同學容易把 IL-4 和 IL-5 搞混。雖然它們都是 Th2 分泌的兄弟檔，但分工很細：IL-4 負責促使 B 細胞製造 IgE 抗體，而唯獨 IL-5 才是點名針對「嗜酸性白血球」的活化劑！"}, {"no": 22, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "人類血型為 A 型，其血中抗體為：", "options": {"A": "抗 A 抗體", "B": "抗 B 抗體", "C": "無抗體", "D": "抗 A 及抗 B 抗體"}, "answer": "B", "ask": "當一個人的紅血球上貼滿了 A 型抗原，為了避免免疫系統自相殘殺，他的血漿中絕對不能出現哪一種會攻擊自己的抗體？", "compare": "對於 A 型血的人來說，A 抗原與 B 抗原哪一個是「自己人」，哪一個是「外來入侵者」？免疫系統在製造武器時，只會針對自己人還是針對外來者？", "lock": "排除掉會殺死自己紅血球的抗 A 抗體，並保留針對外來 B 抗原的防禦力，此時血漿中應該只存在哪一種抗體？", "explain": "想像一下，你的身體是一座城堡，紅血球是城堡裡的居民。如果你的血型是 A 型，代表你的紅血球頭上都戴著「A 貼紙」（也就是 A 抗原）。既然「A」是自己人，你的免疫系統當然不會自相殘殺去製造「抗 A 抗體」，否則不就天天上演「大水沖倒退伍兵」的溶血悲劇了嗎？相反地，因為你這輩子沒看過戴「B 貼紙」的傢伙，身體自然會把 B 視為潛在威脅，因而備妥了「抗 B 抗體」隨時嚴陣以待。所以，A 型血的人血清中會有抗 B 抗體（答案選 B）。如果是 AB 型的人，因為 A 和 B 貼紙都有，所以血中什麼抗體都沒有（選項C）；而 O 型人則是什麼貼紙都沒戴，所以對 A 和 B 都保持戒備，血中同時有抗 A 及抗 B 抗體（選項D）喔！", "what": "考你 ABO 血型系統中，紅血球表面的「抗原」與血漿中的「自然抗體」互補且不自我攻擊的對應關係。", "trap": "考生最常把「紅血球上的抗原」和「血漿中的抗體」搞反！記住一個鐵律：抗體是拿來防禦「自己沒有的東西」，要是血中出現會攻擊自己抗原的抗體，人體就會發生嚴重的溶血反應！"}, {"no": 23, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者不是腸內桿菌的抗原？", "options": {"A": "O 抗原", "B": "H 抗原", "C": "莢膜", "D": "E 抗原"}, "answer": "D", "ask": "腸內桿菌這家子細菌在被我們的免疫系統通緝時，身上究竟會帶著哪些具有代表性的「通緝特徵」？", "compare": "鞭毛（H）、菌體表面（O）和最外層的糖蛋白保護罩（莢膜），與病毒界常聽到的 e 抗原（HBeAg），哪一個才是混入細菌陣營的冒牌貨？", "lock": "哪一個英文字母抗原其實是 B 型肝炎病毒用來評估複製活躍度的指標，而不是腸道細菌家族的成員？", "explain": "嘿，同學們！想像一下，腸內桿菌家族（Enterobacteriaceae）就像是個龐大的黑幫家族，而他們身上穿戴的「裝備」就是免疫系統用來認出他們的「抗原」身分證！最著名的身分證有三張：第一張是「O 抗原」，這是他們外衣（細胞壁脂多醣 LPS）的最外層，就像是他們的防彈衣；第二張是「H 抗原」，這存在於他們逃跑用的「鞭毛」上，負責提供動力；第三張是「K 抗原」（也就是「莢膜」Capsule，德文是 Kapsel），這是套在最外面的糖蛋白保護罩。那選項中的「E 抗原」是何方神聖？哈哈，那是 B 型肝炎病毒（HBV）的 HBeAg 啦！腸內桿菌根本不穿這件衣服，所以「E 抗原」完全是來湊熱鬧、走錯棚的病毒界臥底！", "what": "腸內桿菌（Enterobacteriaceae）常見的菌體結構抗原分類（O、H、K 抗原）。", "trap": "別把「莢膜」和「K 抗原」當成兩種不同的東西！「K」是源自德文的 Kapsel（莢膜），國考很喜歡用中文「莢膜」來代替「K 抗原」來混淆大家，看到它可別以為它不是抗原喔！"}, {"no": 24, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "關於病毒逃避免疫攻擊的機制，下列敘述何者錯誤？", "options": {"A": "流行性感冒病毒用抗原轉移（antigenic shift）來改變它的外套抗原", "B": "單純疱疹病毒以潛伏的方式，躲藏在神經細胞，以避免免疫系統的辨認", "C": "人類免疫不全病毒（Human immunodeficiency virus）是一種超級抗原（super antigen），可有效活 化 T 細胞免疫反應", "D": "有些病毒可抑制 MHC（major histocompatibility complex）第一類分子表達"}, "answer": "C", "ask": "病毒為了在宿主體內長期生存，會演化出哪些欺騙或躲避免疫細胞的絕招，而哪一個選項描述的機制與該病原體的真實特徵不符？", "compare": "大範圍非特異性綁架 T 細胞並誘發全身發炎反應的「超級抗原」，與專門壓制 MHC-I 表达、突變外套抗原或躲入神經細胞的「病毒免疫逃逸」，在對待免疫系統的策略上有何根本上的不同？", "lock": "哪一個選項將專門破壞、消耗 CD4+ T 細胞以瓦解免疫防線的愛滋病毒（HIV），錯誤地貼上了會「有效活化 T 細胞反應」的超級抗原標籤？", "explain": "哈囉，各位同學！今天我們來聊聊病毒這些「百變怪」是怎麼跟我們免疫系統玩躲貓貓的。這題要選 (C) 的原因很簡單：HIV（愛滋病毒）根本就不是「超級抗原（Superantigen）」！超級抗原是誰？那是某些細菌（像是金黃色葡萄球菌）派出的「瘋狂派對召集人」，強行把 T 細胞和 APC 綁在一起，引發毀滅性的免疫風暴；而 HIV 則是個陰險的「冷酷殺手」，專門潛伏並殺死 CD4+ T 細胞，它躲都來不及了，怎麼可能跑去「有效活化」T 細胞來給自己找麻煩呢？至於其他選項都是病毒界的逃避大師：(A) 流感病毒擅長「大變裝」（抗原轉移），直接換一套全新款的外套，讓去年的抗體通通認不出它；(B) 單純疱疹病毒是個「死宅男」，會躲在神經細胞裡「冬眠」（潛伏感染），神經細胞表面 MHC-I 極少，免疫大軍根本找不到它；(D) 許多病毒（如巨細胞病毒）會偷偷把細胞表面的 MHC-I 沒收，讓 CD8+ 毒殺型 T 細胞像瞎子一樣看不見受感染的細胞。", "what": "本題考查常見病毒（流感、疱疹、HIV等）逃避宿主免疫攻擊的分子機制，以及超級抗原的免疫學特徵。", "trap": "考生常因為 HIV 會造成嚴重的免疫系統混亂，就誤以為它是超級抗原。請記住，超級抗原通常是「細菌毒素」的專利，病毒主要的逃避策略是「隱身」和「變裝」，而非非特異性地瘋狂活化 T 細胞！"}, {"no": 27, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "以下那一種處理會破壞人類血清中補體溶解細胞的反應？", "options": {"A": "添加生理食鹽水", "B": "加熱 56℃，30 分鐘", "C": "以濾紙過濾", "D": "添加抗生素"}, "answer": "B", "ask": "補體在血清中要發揮溶解細胞的威力，最害怕遇到什麼外力干擾而會直接當機失去活性？", "compare": "濾紙過濾、加生理食鹽水或抗生素，真的有辦法動搖到補體這種微小蛋白質的化學結構嗎？還是要用物理高溫才能促使蛋白質變性失效？", "lock": "實驗室中為了去除血清補體的干擾，最常使用哪一個精確的溫度與時間組合來進行熱去活？", "explain": "嘿！同學們，今天我們要來聊聊免疫界的「熱血青年」——補體（Complement）！補體這傢伙在血清裡可是個狠角色，平時閒晃，一看到病原體就揪團去把人家的細胞膜戳個大洞，這就是所謂的「溶解細胞」作用。但是，這位英雄有個致命的弱點：他超級怕熱！補體是由一堆不耐熱的蛋白質組成的，只要放到 56℃ 的熱水澡裡泡個 30 分鐘，它們就會直接集體「中暑」變性，徹底失去戰鬥力。這招在實驗室裡超常用，叫做「熱去活（Heat inactivation）」，專門用來防止血清中的補體干擾其他實驗。那其他選項呢？(A)生理食鹽水只是稀釋它，補體活得好好的；(C)濾紙過濾只能擋住大細胞，補體是微小的蛋白質分子，會像隱形人一樣直接穿過去；(D)抗生素是拿來殺細菌的，對我們人體內的補體蛋白質完全沒輒。所以啦，想要補體乖乖罷工，直接送它去 56℃ 泡湯就對了！", "what": "考驗補體（Complement）不耐熱（熱敏感性）的經典物理化學特性與去活化條件。", "trap": "很多同學會把「不耐熱的補體」和「耐熱的抗體」混淆！記得，56℃、30 分鐘這個黃金組合，只會讓嬌弱的補體陣亡，但強壯的抗體依然老神在在、保活性喔！"}, {"no": 33, "source": "107-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "抗體辨識抗原的專一性由何者決定？", "options": {"A": "只由抗體重鏈的蛋白序列所形成的三度空間決定", "B": "只由抗體輕鏈的蛋白序列所形成的三度空間決定", "C": "由抗體重鏈與輕鏈的蛋白序列共同形成的三度空間所決定", "D": "由抗體蛋白本身結構的彎曲彈性而決定"}, "answer": "C", "ask": "抗體在茫茫人海中要精準認出特定的病原體，到底是靠它身上的哪一個關鍵部位來當作辨識的眼睛？", "compare": "單靠重鏈或單靠輕鏈的結構，真的有辦法獨立拼湊出那個能完美卡住抗原的 3D 立體口袋嗎？而結構的彎曲彈性，影響的到底是辨識的「精準度」還是活動的「靈活性」？", "lock": "哪一個選項完整描述了重鏈變異區與輕鏈變異區必須攜手合作、共同組成抗原結合部位的免疫學事實？", "explain": "同學們，想像一下抗體就像是個『雙手合十』的捕手，這雙手是由『重鏈』和『輕鏈』共同組成的！當抗原（球）飛過來時，抗體需要用這兩隻手合力圍成一個完美的『接球手套』（也就是由重鏈 VH 與輕鏈 VL 共同構成的三度空間結構），才能精準地把抗原死死抓住。如果只用重鏈（選項 A）或只用輕鏈（選項 B），就像單手接球一樣，根本無法形成那個完美的辨識口袋。至於選項 D 說的彎曲彈性，那是指抗體的『鉸鏈區（hinge region）』讓它可以靈活扭動身體，跟決定『要抓誰』的專一性完全是兩碼子事喔！所以，缺一不可，必須要重鏈與輕鏈攜手合作，答案非 C 莫屬！", "what": "抗體結合部位（Fab）的結構組成與抗原辨識專一性的決定機制。", "trap": "有些考生會誤以為重鏈比較大、比較重就決定了一切，而落入『只由重鏈決定』的陷阱；或者把抗體分子結構的『彈性（靈活性）』跟『辨識專一性』混為一談。"}, {"no": 34, "source": "107-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關抗體的敘述，下列何者錯誤？", "options": {"A": "IgM 可以透過 alternative pathway 活化補體", "B": "IgG 可通過胎盤，進到嬰兒體內", "C": "在黏膜層，IgA 雙體（dimer）中和微生物或微生物分泌的毒素", "D": "IgG 的半衰期大約三週"}, "answer": "A", "ask": "抗體家族成員們各有各的看家本領與物理特性，這四個描述中哪一個悄悄編造了不屬於該抗體的超能力？", "compare": "古典途徑與替代途徑在啟動時有何不同，IgM 這種大體積抗體究竟是在哪一條途徑中扮演關鍵的引路人？", "lock": "當你意識到替代途徑本身就是一條不需要抗體參與的免疫捷徑時，哪個選項將抗體與該途徑強行綁定的說法就露出了破綻？", "explain": "哈囉各位同學！今天我們來聊聊免疫界『五大家族』的抗體八卦，這題要揪出哪一個敘述在『說瞎話』！首先，答案 A 簡直胡說八道。IgM 雖然是抗體界的『巨無霸五聚體』，活化補體的能力超級強，但它走的是規規矩矩的『古典途徑（Classical pathway）』，也就是必須跟 C1 蛋白結合來啟動。而『替代途徑（Alternative pathway）』根本不需要抗體插手，病原體自己就能觸發，所以 IgM 跑去湊熱鬧還用替代途徑活化，完全是穿鑿附會！至於其他選項都是大實話：B 選項的 IgG 是唯一能穿過胎盤的溫柔媽媽，給新生兒最強的防護；C 選項的 IgA 雙體則是黏膜大軍的守護神，專門中和病毒與毒素；D 選項的 IgG 確實最長壽，半衰期長達三週，是我們體內最持久的保鏢！", "what": "考驗抗體五大分類（IgG、IgA、IgM等）的獨特生理功能，以及它們與補體活化途徑的配對關係。", "trap": "考生常被『IgM 活化補體能力最強』這句話洗腦，就誤以為它什麼途徑都能活化。請死死記住：只有古典途徑需要抗體（IgM、IgG）帶路，替代途徑和凝集素途徑都是『無抗體自理』的！"}, {"no": 36, "source": "107-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者是抗體的功能？", "options": {"A": "抗體由 T 細胞製造，直接殺死細胞", "B": "成功對抗感冒的疫苗藉由產生抗體，而抑制過敏反應", "C": "單一抗體有特異性（specificity），只結合一個或少數抗原", "D": "體內抗體總數跟染色體的多寡有關"}, "answer": "C", "ask": "在我們體內扮演精準防禦角色的抗體，它在免疫戰場上最核心的本領和天生特性是什麼？", "compare": "製造抗體的母細胞究竟是 B 細胞還是 T 細胞，而抗體的作用是像飛彈一樣直接炸毀敵人，還是像導航標籤一樣貼在敵人身上等盟友來消滅？", "lock": "哪一個描述最符合抗體「一把鑰匙開一把鎖」、只針對特定病原體進行精準打擊的免疫學金科玉律？", "explain": "哈囉同學們！我們來聊聊抗體這個人體內的「精準定位追蹤器」吧！正確答案是 (C)。抗體最引以為傲的超能力就是它的「特異性（specificity）」，這就像是愛情裡的專一，一把鑰匙配一把鎖，一個抗體基本上只會跟一個（或極少數結構超像的）特定抗原結合。那其他選項到底哪裡搞笑了呢？(A) 哎呀，抗體是 B 細胞（精確來說是漿細胞）含辛茹苦生出來的結晶，才不是 T 細胞製造的！而且抗體本身並不具備「直接殺死」細胞的能力，它主要是負責「抱住敵人（中和）」或是「在敵人臉上寫個慘字（調理作用）」，然後呼叫其他免疫細胞或補體來動手。(B) 疫苗產生的抗體是用來預防感染的，不是用來抑制過敏的；相反地，過敏反應常常就是因為特定抗體（如 IgE）玩得太過火才發生的！(D) 我們能產生幾億種抗體，是靠基因片段神奇的「V(D)J 重組」剪貼技術，跟染色體多寡毫無關係，不然染色體多一條的唐氏症患者，難道會變成免疫超人嗎？當然不會囉！", "what": "考抗體（Antibody）的基本生理特性，包括其分泌來源、功能機制、特異性以及多樣性的產生原理。", "trap": "最常見的陷阱就是誤以為抗體會像抗生素一樣「直接殺死」細菌。請記住，抗體只負責結合、中和、以及標記，真正動手行刑的是補體、吞噬細胞或 NK 細胞！另外，千萬別把 B 細胞與 T 細胞的職責記反囉！"}, {"no": 42, "source": "108-2", "cognitive": "理解/機轉", "difficulty": "易", "stem": "與未成熟的樹突細胞比較，下列何者是活化後的樹突細胞的主要免疫作用？", "options": {"A": "吞噬微生物", "B": "處理抗原蛋白並且呈現給 T 細胞", "C": "辨識病原體", "D": "活化補體反應"}, "answer": "B", "ask": "樹突細胞從第一線的菜鳥警衛（未成熟）升職成高階主管（活化後）時，牠的工作重點會產生什麼樣的根本轉變？", "compare": "吞噬病原體與將抗原呈現給 T 細胞，這兩項工作哪一個是第一線的初步防禦，哪一個又是需要細胞高度成熟後才能執行的進階戰略任務？", "lock": "哪一個選項精準描述了樹突細胞作為「最強專職抗原呈現細胞（APC）」，在活化後對 T 細胞施展的招牌核心技能？", "explain": "想像一下，樹突細胞（DC）就像是免疫界的工作狂！在「未成熟」階段，牠們是待在組織第一線的「大胃王兼偵探」，工作就是到處巡邏、吃掉（吞噬）微生物並辨識病原體（這也就是選項 A 和 C 的工作）。但是，一旦牠們吃飽並被「活化（成熟）」之後，牠們就會金盆洗手、打包行李，華麗轉身變成「超級簡報大師」！牠們會大老遠跑到淋巴結，把吃進去的病原體消化成精美的「抗原切片」，呈現給 T 細胞看，激發後續的適應性免疫反應（這就是選項 B 的神聖任務）。至於活化補體（選項 D），那是體液免疫或抗體的絕活，可不是樹突細胞成熟後的主秀喔！", "what": "考驗你對樹突細胞（DC）在「未成熟（負責吞噬與辨識）」與「活化成熟（負責抗原呈現）」兩個不同階段的功能轉變。", "trap": "很多同學看到樹突細胞，就直覺聯想到牠很會「吞噬微生物」，結果一頭撞進選項 A 的陷阱！一定要記住，活化成熟後的樹突細胞會「停止吞噬」，全心全意專注於「抗原呈現」，這才是牠升級後的終極大招！"}, {"no": 43, "source": "108-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "CD4 T 細胞活化後，可以依據其所分泌的細胞激素種類分成不同 T 亞群（subset）。下列敘述何者正確？", "options": {"A": "TH1 CD4 T 細胞主要分泌 IL-4", "B": "TH2 CD4 T 細胞主要分泌 IFN-γ", "C": "TH17 CD4 T 細胞能強化抗病毒免疫反應", "D": "Treg CD4 T 細胞能抑制其他 T 細胞的活性"}, "answer": "D", "ask": "當身為免疫大腦的 CD4+ T 細胞活化並分化成不同的「功能分組」後，哪一個小組的功能與它所分配到的任務描述是完全吻合的？", "compare": "負責對抗細胞內病毒的 Th1 和負責對抗寄生蟲的 Th2，它們各自釋放的招牌信號彈（細胞激素）到底有沒有被故意掉包？", "lock": "哪一個 T 細胞亞群天生就扮演著「和事佬」的角色，專門在免疫反應過頭時釋放抑制信號，阻止其他 T 細胞繼續暴走？", "explain": "來，同學們！我們把 CD4+ T 細胞想像成免疫系統裡的「總司令」。當總司令收到前線戰報（抗原呈遞）後，他會根據敵人的類型，派出不同專長的「特種分隊」（T 亞群）。我們先來看看這四個分隊的真實底細： - **Th1 分隊**（胞內菌與病毒殺手）：他們的招牌武器是 **IFN-γ**（干擾素-γ），用來激活巨噬細胞。選項 A 說 Th1 主要分泌 IL-4？大錯特錯，那是 Th2 的武器！ - **Th2 分隊**（寄生蟲剋星、過敏製造者）：他們的經典情書是 **IL-4**、IL-5。選項 B 把 Th2 和 IFN-γ 配在一起，根本是強行亂點鴛鴦譜！ - **Th17 分隊**（胞外菌與真菌清道夫）：他們主要分泌 IL-17 來召喚中性粒細胞，對付的是「胞外菌和真菌」。選項 C 說他們強化抗病毒反應，這其實是 Th1 和 CD8+ T 細胞的飯碗啦！ - **Treg 分隊**（免疫界的維和部隊 / 和事佬）：當大家都打紅了眼，Treg 就會站出來分泌 IL-10 或 TGF-β，溫柔地對其他 T 細胞說「好啦，收工了，別再打了」，以此抑制免疫反應、避免自體免疫疾病。所以，選項 D 的敘述完全正確，是個溫暖的存在！", "what": "CD4+ T 輔助細胞亞群（Th1、Th2、Th17、Treg）各自的核心細胞激素與生理免疫功能。", "trap": "國考最愛把 Th1 的 IFN-γ 和 Th2 的 IL-4 互相對調來騙你，看到選項時請在腦中畫個「交叉線」自我檢查！另外，千萬別把 Treg（調節型 T 細胞）跟 Tc（細胞毒性 T 細胞）搞混，一個是踩煞車的和平鴿，一個是拿鐮刀的死神！"}, {"no": 46, "source": "109-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列細胞何者通常不具抗原呈現細胞（Antigen-presenting cell）之功能？", "options": {"A": "樹狀細胞（Dendritic cell）", "B": "B 細胞（B cell）", "C": "平滑肌細胞（Smooth muscle cell）", "D": "巨噬細胞（Macrophage）"}, "answer": "C", "ask": "免疫系統中哪些細胞是領有執照、能把外來抗原「秀」給 T 細胞看的專業情報官，而誰又只是不務此業的普通路人細胞？", "compare": "樹狀細胞、B 細胞和巨噬細胞這三位經常在免疫前線聯手抗敵的常客，與負責身體結構收縮運動的平滑肌細胞相比，誰才擁有能裝載抗原的特殊分子裝備？", "lock": "當你回想哪一種細胞平日的職責只是默默在血管或內臟壁上負責舒張與收縮，而不是在淋巴結或免疫前線跟 T 細胞咬耳朵，是不是就能立刻揪出那個不具備 APC 功能的局外人了？", "explain": "各位同學！今天我們要來聊聊免疫界的「情報宣傳官」——也就是抗原呈現細胞（APC）。想像一下，當有外敵（抗原）入侵時，誰會負責把敵人的特徵畫成海報，到處貼給 T 細胞看？這就是 APC 的工作！我們免疫界的「三大職業情報官（Professional APC）」就是：樹狀細胞（最強巡邏兵，拿到抗原就跑去淋巴結報告）、巨噬細胞（一邊吃敵人一邊大喊『大家快來看這傢伙！』）、還有 B 細胞（利用它的抗體天線抓住壞人呈遞上去）。這三位都是拿了證照的專業廣播員。那平滑肌細胞（C）在幹嘛？人家只是默默在血管或內臟裡收縮、維持生理運作的勞工，根本沒有被賦予這種高階的免疫情報廣播功能啦！所以它「通常不具備」這個功能，選它就對了！", "what": "區分誰才是免疫系統中擁有 MHC class II、能向輔助型 T 細胞呈現抗原的「專業抗原呈現細胞（Professional APC）」。", "trap": "不要以為只有樹狀細胞和巨噬細胞這種會大口吞噬的細胞才是 APC，B 細胞雖然不擅長主動吞噬，但它可是能靠著「受體介導胞吞作用」精準呈現特定抗原的高級 APC 喔！"}, {"no": 47, "source": "109-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種細胞激素是活化巨噬細胞使其產生一氧化氮合成酶（inducible nitric oxide synthase）、一氧化氮 （NO）以及活性氧化物（ROS）的最佳因子？", "options": {"A": "第一型干擾素（IFNα/β）", "B": "第二型干擾素（IFNγ）", "C": "第三型干擾素（IFNλ）", "D": "腫瘤壞死因子-α（TNF-α）"}, "answer": "B", "ask": "巨噬細胞如果要拿到終極武器（NO 和 ROS）去前線殺敵，究竟需要哪一種細胞激素當作威力最強的「啟動鑰匙」？", "compare": "同樣都被稱為「干擾素」，第一型、第二型與第三型在免疫戰場上的分工有何不同，誰才是專職激怒巨噬細胞的教練？而腫瘤壞死因子（TNF-α）在巨噬細胞活化的路上，扮演的到底是主角還是強力配角？", "lock": "哪一個干擾素是活化巨噬細胞、促使其產生 iNOS 以進行殺菌反應的最經典指標性細胞激素？", "explain": "想像一下，巨噬細胞（Macrophage）就像是免疫界的大胃王兼保全，雖然平時會吞吞病原體，但有時候會進入「薪水小偷」模式，做事慢吞吞。這時候，就需要來一劑超強蠻牛！而這個能把巨噬細胞瞬間激怒、讓牠戰鬥力破表，開始瘋狂製造一氧化氮（NO）和活性氧化物（ROS）等化學武器的最強催化劑，就是由 T 細胞和 NK 細胞分泌的「第二型干擾素（IFN-γ）」啦！第一型干擾素（IFN-α/β）和第三型（IFN-λ）主要是抗病毒的小幫手，負責通知鄰居防範病毒；而 TNF-α 雖然也是個發炎大將，甚至能跟 IFN-γ 聯手，但要論單挑「活化巨噬細胞」的冠軍寶座，絕對還是 IFN-γ 穩坐第一名！", "what": "考驗對巨噬細胞最強活化因子——第二型干擾素（IFN-γ）生理功能的掌握度。", "trap": "很多同學看到「一氧化氮」或「活性氧化物」就聯想到發炎反應，結果誤選了同樣大名鼎鼎的發炎因子 TNF-α。記住，TNF-α 雖然常與 IFN-γ 協同作用，但「最佳活化因子」的皇冠永遠屬於 IFN-γ！此外，也要小心別把以抗病毒為主的第一型干擾素（IFN-α/β）與活化巨噬細胞的第二型干擾素（IFN-γ）混淆了。"}, {"no": 51, "source": "109-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列何種細胞可以對病原菌製造特異性抗體的免疫反應？", "options": {"A": "多形性白血球", "B": "B淋巴細胞", "C": "抗原呈獻細胞", "D": "樹突細胞"}, "answer": "B", "ask": "當病原菌入侵時，人體內究竟是哪一種超級戰士具備特異性武器研發能力，能專門針對敵人製造出客製化的「抗體導彈」？", "compare": "衝在第一線大口吞噬病原體的白血球，以及四處發送敵人通緝令的抗原呈獻細胞，與最終能合成抗體的 B 細胞，在免疫戰場上的職責分工有何本質上的不同？", "lock": "哪一個細胞在接受免疫訊號活化後，能進一步分化為漿細胞並源源不絕地釋放免疫球蛋白，成為體液免疫的最核心主力？", "explain": "嗨，同學們！今天我們來聊聊免疫界的「精準武器製造工廠」！題目問的是誰能製造「特異性抗體」。這就像是在問：是誰負責量身打造精準導彈來消滅特定的壞人？答案當然是我們的 B 淋巴細胞（B細胞）啦！B 細胞一旦被抗原刺激並活化後，會變身為「漿細胞（Plasma cell）」，開始瘋狂量產抗體，這些抗體就像是有導航系統的追蹤飛彈，專門鎖定特定的病原菌。那我們來看看其他陪榜的苦主：選項 A 的多形性白血球（主要是嗜中性白血球）是免疫界的第一線「吞噬細胞」，遇到敵人先吞再說，雖然勇猛，但走的是粗暴路線，不會製造抗體；選項 C 的抗原呈獻細胞（APC）與選項 D 的樹突細胞（DC，最強的 APC）則是戰場上的「情報員」，負責把敵人屍體（抗原）處理好並呈獻給 T 細胞看，大喊「有壞人入侵啦！」，牠們本身是無法製造抗體的喔！因此，看到「製造特異性抗體」，認準 B 細胞就對了！", "what": "考查適應性免疫（Adaptive Immunity）中，負責產生特異性抗體的免疫細胞類型（體液免疫的核心主角）。", "trap": "許多考生容易把「啟動免疫反應的情報員」與「真正製造武器的工廠」混淆。樹突細胞（DC）和抗原呈獻細胞（APC）雖然是抗體產生不可或缺的幕後推手（負責通風報信），但真正能捲起袖子生產抗體的，天底下只有 B 細胞（活化分化後的漿細胞）一家，千萬別被扮演前置作業的細胞給騙走囉！"}, {"no": 58, "source": "110-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "五大主要類型的免疫球蛋白（immunoglobulin）具有不同的性質與功能，下列敘述何者正確？", "options": {"A": "IgA 與造成全身性過敏反應有關", "B": "所有類型的免疫球蛋白都能通過胎盤", "C": "IgG 是半衰期最長的免疫球蛋白", "D": "IgE 是固定補體最有效率的免疫球蛋白"}, "answer": "C", "ask": "這五個抗體兄弟在人體內各司其職，誰的生命力最強韌、能在我們體內活得最久？", "compare": "哪一個抗體擁有專屬的通行證能穿過胎盤保護胎兒，而誰又是引發過敏反應以及活化補體的真正高手？", "lock": "結合上述各抗體的特性，哪一個選項描述的生理特性與抗體主角完全相符且毫無破綻？", "explain": "哈囉同學們！今天我們來點兵點將這五位「抗體特攻隊」成員！抗體五兄弟各有各的絕活。首先，看看選項 (C)「行事穩重」的 IgG，他是我們血液裡的大哥大，數量最多，而且非常耐操，半衰期長達大約 21 天，就像保鮮期最長的手搖飲，所以選 (C) 完全沒毛病！那其他兄弟錯在哪呢？選項 (A) 的 IgA 是黏膜大師，負責守護我們的口鼻呼吸道，才不是什麼過敏製造者呢！過敏大王其實是選項 (D) 的 IgE，他一遇到過敏原就會讓肥大細胞釋放組織胺，把人整得狂打噴嚏，而且他根本沒辦法活化補體（活化補體最有效率的其實是體型巨大的 IgM 隊長）。至於選項 (B)，天底下的媽媽都很偉大，但不是所有抗體都能分給寶寶。只有 IgG 擁有專屬的「穿牆術」（透過 FcRn 受體），能通過胎盤傳給胎兒，其他兄弟只能在外面乾瞪眼啦！", "what": "五大類免疫球蛋白（IgG、IgA、IgM、IgD、IgE）各自獨特的生理功能與物理化學特性。", "trap": "很多同學會把「胎盤傳遞」和「母乳傳遞」搞混。媽媽透過胎盤傳給胎兒的只有 IgG；而寶寶出生吸母乳得到的則主要是分泌型 IgA（尤其是初乳），千萬別把這兩種母愛防線的傳遞方式記反囉！"}, {"no": 61, "source": "110-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列何種補體的成分，可以活化吞噬細胞？", "options": {"A": "C1", "B": "C5a", "C": "C4", "D": "C5b-9"}, "answer": "B", "ask": "當病原體入侵時，是哪一個補體小碎片扮演「號角手」的角色，能夠把吞噬細胞吸引過來並讓牠們進入戰鬥狀態？", "compare": "負責在病原體表面打洞的終極武器 C5b-9，跟負責通風報信並激發免疫細胞活力的可溶性小片段 C5a，誰才具備調動與刺激吞噬大軍的化學能力？", "lock": "結合趨化作用與過敏毒素的雙重身分，哪一個補體裂解片段能與吞噬細胞表面的 G 蛋白偶聯受體結合，進而引發後續的呼吸爆發與吞噬作用？", "explain": "嗨，各位同學！想像一下，補體系統就像是人體內的「自動防禦地雷陣」。當外敵入侵，地雷引爆（補體活化）後，會產生一堆碎片。其中，C5a 是個超級明星！它不僅是強效的「趨化因子」（Chemoattractant），還是「過敏毒素」（Anaphylatoxin）。它就像是拿著擴音器大喊「這裡有免費自助餐！」的廣播員，能把吞噬細胞（如中性粒細胞、巨噬細胞）通通吸引過來，並激發牠們的吞噬與殺菌超能力！ 我們來看看其他倒楣的落選者：選項 A 的 C1 和選項 C 的 C4 只是補體古典路徑剛開始啟動時的「前置零件」，還沒被切成具有強大活化功能的小片段；而選項 D 的 C5b-9 則是著名的「膜攻擊複合物」（MAC），它的終極任務是直接在細菌身上鑽孔讓牠爆開，而不是負責去動員吞噬細胞。所以，真正能讓吞噬細胞熱血沸騰、動起來的，絕對是 C5a 啦！", "what": "補體活化裂解產物（特別是過敏毒素與趨化因子 C5a）的免疫生理功能。", "trap": "考生常把「促進吞噬作用（調理作用）」與「活化吞噬細胞」搞混！C3b 負責塗在細菌表面當作「美味調味料」（調理素），讓吞噬細胞好抓好咬；但真正能像警報器一樣「活化、吸引」吞噬細胞狂奔而來的，是游離的 C5a（和部分 C3a）。另外，千萬別選到負責物理攻擊打洞的 C5b-9 喔！"}, {"no": 68, "source": "111-1", "cognitive": "理解/機轉", "difficulty": "易", "stem": "補體活化後最終形成膜攻擊複合體（membrane attack complex, MAC）。下列何者較易受到這項防禦 機制的作用而死亡？", "options": {"A": "B 型肝炎病毒（Hepatitis B virus）", "B": "奈瑟氏菌（Neisseria）", "C": "葡萄球菌（Staphylococcus）", "D": "鏈球菌（Streptococcus）"}, "answer": "B", "ask": "補體系統辛辛苦苦組裝出來的「打洞神器」MAC，到底對哪一種病原體的殺傷力最致命、最能一擊斃命？", "compare": "革蘭氏陽性菌那層厚厚的肽聚醣盔甲，與革蘭氏陰性菌只有薄薄外膜的結構相比，誰更擋不住 MAC 的物理穿孔攻擊？", "lock": "臨床上缺乏 C5-C9 補體而無法形成 MAC 的患者，最容易反覆感染哪一種特別畏懼 MAC 的革蘭氏陰性雙球菌？", "explain": "想像一下，補體系統就像是我們體內的「武裝直升機」，而膜攻擊複合體（MAC）就是最後負責在敵人身上鑽孔的「終極打洞機」！這個打洞機要在哪裡發揮威力？答案是敵人的「細胞膜」。但是，有些敵人皮厚肉糙，比如「革蘭氏陽性菌」（選項 C 的葡萄球菌、選項 D 的鏈球菌），它們外面罩了一層超厚、超結實的「肽聚醣」盔甲，MAC 這台打洞機根本鑽不進去。那病毒（選項 A 的 B 肝病毒）呢？它們太小了，且主要是靠抗體或細胞免疫來對付，MAC 對它沒什麼用。這時候，只有「革蘭氏陰性菌」中的奈瑟氏菌（Neisseria），它的外膜直接暴露在外，簡直就是 MAC 的活靶子！所以，如果身體少了 MAC，最容易得的就是奈瑟氏菌引發的腦膜炎或淋病喔！", "what": "考驗你對「膜攻擊複合體（MAC）」的攻擊對象偏好，特別是哪種細菌的結構最容易被它「打洞」消滅。", "trap": "別看到「膜」字就覺得只要有膜的生物（像是有套膜的 B 肝病毒，或是有細胞膜的葡萄球菌）都會被 MAC 輕易解決！記住，革蘭氏陽性菌厚重的肽聚醣外衣是極佳的防彈衣，MAC 對它們根本英雄無用武之地！"}, {"no": 70, "source": "111-2", "cognitive": "理解/機轉", "difficulty": "易", "stem": "關於第 I 類 MHC 分子呈現經由內源性路徑產生的抗原，下列敘述何者正確？", "options": {"A": "細胞主要從吞噬作用獲得抗原", "B": "抗原在溶小體（lysosome）被降解成短胜肽", "C": "抗原在蛋白酶體（proteasome）被降解成短胜肽", "D": "是個體清除胞外菌相當重要的作用機制"}, "answer": "C", "ask": "當病毒在細胞內部作亂、產生內源性抗原時，細胞要用哪一個專屬的「分子碎紙機」把這些壞蛋白切碎，才能順利裝載到 MHC Class I 分子上？", "compare": "細胞透過吞噬作用吃進來的「外來客」與細胞自己製造的「內鬼」蛋白，在被降解時分別會被送往溶小體還是蛋白酶體處理？", "lock": "誰才是負責在細胞質中將內源性蛋白質切成適合 MHC Class I 結合長度的核心酵素複合物？", "explain": "同學們，我們來想像一下細胞內的「垃圾回收與安檢系統」！今天的主角是 MHC Class I（第 I 類 MHC），它就像是細胞的「內部眼線」，專門向免疫警察（CD8+ T 細胞）報告細胞內部有沒有藏污納垢。既然題目說是「內源性」路徑，代表這些抗原原本就在細胞內部（例如病毒在細胞內大量複製產生的邪惡蛋白，或是細胞自己癌變產生的怪異蛋白）。這些「家賊」蛋白在細胞質裡，會被推進一個叫蛋白酶體（proteasome）的巨大分子碎紙機，鉸成一小段一小段的短胜肽，這就是（選項 C）完全正確的原因！至於（選項 A）和（選項 B），它們描述的是「外源性路徑（MHC Class II）」，那是細胞把外面的東西「吞」進來，並在充滿強酸和消化酵素的溶小體（lysosome）裡消化的過程。而（選項 D）清除胞外菌主要靠的是抗體、補體以及 MHC II 引導的體液免疫，MHC I 可是專門對付胞內寄生蟲、病毒和癌細胞的斬刀，可別搞錯防線囉！", "what": "MHC Class I 呈現內源性抗原（Endogenous pathway）時，抗原降解的核心機制與胞器分類。", "trap": "考生最常把「MHC I ＝ 內源性 ＝ 蛋白酶體（Proteasome）」與「MHC II ＝ 外源性 ＝ 溶小體（Lysosome）」這兩套系統配對搞混。有個好記的口訣：家醜（內源）不可外揚，要用「蛋」白（蛋白酶體）砸；外人（外源）來犯，要用「水」（溶小、溶酶體）沖！"}, {"no": 71, "source": "111-2", "cognitive": "理解/機轉", "difficulty": "易", "stem": "補體活化啟動一系列的蛋白質水解產生次單位「a」、「b」與其他次單位，具備不同的生物活性。下列何者 是補體 C3b 主要的功能？", "options": {"A": "增加血管通透性", "B": "吸引吞噬細胞到感染部位", "C": "促進發炎反應", "D": "促進病原體被吞噬細胞辨識"}, "answer": "D", "ask": "當補體系統被激活並裂解出各種大小碎片時，那個黏在細菌表面的 C3b 碎片，在免疫大軍中主要負責執行什麼任務？", "compare": "游離在外的 C3a、C5a 所引發的血管擴張與趨化作用，跟緊貼在病原體身上的 C3b 所展現的「插旗標記」功能，兩者在免疫調控上有何不同？", "lock": "哪一個選項描述的生理現象，正是免疫學中著名的「調理作用（Opsonization）」，能讓吞噬細胞一眼認出並迅速吞食病原體？", "explain": "嗨，同學們！補體家族在活化時，會像切蛋糕一樣被切成「a」和「b」兩個碎片。通常小碎片「a」喜歡到處跑去通風報信（像是 C3a 和 C5a，它們是過敏毒素，負責增加血管通透性、促進發炎、招募白血球）；而大碎片「b」則很有責任感，喜歡留在戰場上「黏」在病原體表面（b 代表 binding）。C3b 最厲害的超能力就是「調理作用」（Opsonization）！它就像是給病原體塗上一層超美味的烤肉醬，讓吞噬細胞大老遠看到就口水直流，大大增加病原體被吞噬細胞辨識並一口吃掉的機率。因此，C3b 的主要功能是促進病原體被吞噬。至於選項 A、B、C，全都是 C3a 和 C5a 這類小碎片引發的發炎與趨化效果，可別被它們給誘惑囉！", "what": "補體活化後，不同裂解碎片（特別是負責發炎的 C3a/C5a 與負責調理的 C3b）在免疫反應中的功能區分。", "trap": "考生最常把「a」和「b」碎片的功能搞混。請記住好記的口訣：小碎片「a」代表 alarm/active（釋放警報、引發過敏發炎），大碎片「b」代表 binding（黏附在細菌表面，當作標記）。看到 C3b 就要反射性聯想到「調理作用」，千萬別選到屬於 a 碎片的發炎功能！"}, {"no": 72, "source": "112-1", "cognitive": "理解/機轉", "difficulty": "易", "stem": "補體活化路徑中所產生的膜攻擊複合體（membrane attack complex）包含了下列何者？", "options": {"A": "C1", "B": "C3", "C": "C5a", "D": "C5b-9"}, "answer": "D", "ask": "補體系統最後聯手在病原體身上穿孔、讓它滲透壓失衡而爆裂的「終極穿孔機」究竟是由哪些特定的補體成員所組裝出來的？", "compare": "在補體連鎖反應中，前期負責辨識的 C1 與中期扮演活化樞紐的 C3，比起後期直接進行「物理性破壞」細胞膜的效應分子，誰才具備真正穿透膜結構的物理配備？", "lock": "當 C5 蛋白質被酵素切割後，到底是會游離走開的 a 片段，還是錨定在膜上並召集 C6 至 C9 的 b 片段，才是構成這座致命「打洞圓圈」的起點？", "explain": "把補體系統想像成一場精彩的「生化防衛戰」，而膜攻擊複合體（MAC）就是這場戰役中的終極大絕招——「細胞打洞機」！當補體系統被活化到最後階段，任務就是要直接在敵人（細菌或病原體）的細胞膜上鑽出一個個大窟窿，讓水分猛灌進去，把敵人撐爆。這個打洞機是怎麼組裝的呢？首先，C5 被切開後，留在膜上的 C5b 會開始號召隊友 C6、C7、C8，最後再拉來一大群 C9 像插秧一樣插進細胞膜圍成一個大圓圈，這個致命的「鑽孔巨無霸組合」就是 C5b-9！至於其他選項：C1 是古典路徑的開路先鋒，這時候還在起跑線呢；C3 是中期的核心轉運站，負責幫忙標記敵人；而 C5a 則是切下來的小碎片，它不參與打洞，而是負責跑去大喊「救命啊～」吸引免疫細胞過來的過敏毒素。所以，要選打洞機，當然非 C5b-9 莫屬囉！", "what": "補體活化路徑中，最終發動溶菌作用的「膜攻擊複合體（MAC）」其分子組成成分。", "trap": "千萬不要把 C5a 和 C5b 搞混了！C5a 是游離的發炎介質（過敏毒素），會跑掉去通風報信；留下來在膜上揪團組裝打洞機的，才是大個子的 C5b！"}, {"no": 73, "source": "112-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "若 A 血型的人輸血給 B 血型的人，受血者因抗原刺激產生的抗體是屬於：", "options": {"A": "IgM", "B": "IgG", "C": "IgA", "D": "IgE"}, "answer": "A", "ask": "當 A 型血紅血球表面的醣類抗原突然闖入 B 型血人體內時，免疫系統會派出哪一種不需要 T 細胞協助、能直接由 B 細胞快速產生的代表性抗體來迎戰？", "compare": "醣類抗原與蛋白質抗原在刺激 B 細胞時有何本質上的差異，這又是如何限制了抗體進行類別轉換（Class switching）的能力？", "lock": "哪一個抗體選項是免疫學中不需經過 T 細胞輔助、由 B 細胞獨立應對胸腺非依賴型抗原時所製造的預設巨無霸武器？", "explain": "嘿，各位同學！想像一下，B 型血的人體內突然闖進了 A 型血的紅血球，這就像是敵軍帶著「A 抗原」的旗幟大舉入侵！因為 ABO 血型的抗原化學本質是「醣類」（Carbohydrate），這在免疫學上屬於「胸腺非依賴型抗原」（T-independent antigen, TI-antigen）。簡單來說，B 細胞自己看到這類醣類抗原就能直接開機戰鬥，不需要 T 幫手細胞（T helper cell）在身邊碎碎念。但代價就是，沒有 T 細胞發放的細胞激素來「蓋章批准」，B 細胞就無法進行基因重組與抗體分類轉換（Class switching），所以只能源源不絕地製造出最原始、體型最大的五聚體——IgM！至於 IgG、IgA 和 IgE，它們都需要 T 細胞的熱情協助才能產生，因此這題毫無疑問要選 IgM 啦！", "what": "本題考點為 ABO 血型抗原（醣類抗原）屬於非胸腺依賴型抗原，受其刺激後 B 細胞僅能分泌 IgM 抗體。", "trap": "很多考生常有「只要是後天免疫反應，最後一定會產生 IgG」的迷思。請記住，只有「蛋白質」抗原才能走 T 細胞輔助路線並轉換成 IgG；像 ABO 血型這種「醣類」抗原，是無法促成抗體類別轉換的，因此產生的抗體依然是 IgM！"}, {"no": 75, "source": "112-3", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "從胸腺發育而來，未曾受抗原刺激的 T 細胞，主要由下列何種細胞啟動第一步的活化？", "options": {"A": "B 細胞", "B": "巨噬細胞", "C": "嗜中性白血球細胞", "D": "樹突細胞"}, "answer": "D", "ask": "那些剛從胸腺出生、完全沒有抗原實戰經驗的「純情 T 細胞」，到底要靠哪一種免疫細胞來完成牠們的「第一次活化啟蒙」？", "compare": "巨噬細胞、B 細胞和樹突細胞同為專業抗原呈現細胞，誰才是那個最擅長攜帶抗原旅行到淋巴結、並專職喚醒「沒經驗 T 細胞」的超級捕手？", "lock": "尋找那種擁有最強共刺激分子表達能力、能給予初生 T 細胞雙重活化訊號的唯一王牌細胞是誰？", "explain": "想像一下，剛從胸腺畢業、還沒談過戀愛（沒遇過抗原）的「純情小白」naive T 細胞，它非常挑剔，可不是隨便路上一個路人搭訕就會心動的！要喚醒它、讓它獻出第一次的活化，必須由「最強、最專業的相親經紀人」來牽線。這個經紀人就是「樹突細胞 (DC)」。雖然 B 細胞和巨噬細胞也算專業的抗原呈現細胞 (APC)，但它們通常是去活化「已經有經驗」的效應 T 細胞。至於嗜中性白血球？它只是個去前線打架的粗魯大兵，根本不會這一套！所以，只有樹突細胞能讓 naive T 細胞獻出它的第一次。", "what": "考驗誰才是啟動「未活化/初生 (Naive) T 細胞」免疫反應的最強抗原呈現細胞 (APC)。", "trap": "很多同學會把「專業抗原呈現細胞 (APC)」跟「能活化 Naive T 細胞的細胞」混為一談；雖然 B 細胞和巨噬細胞也是 APC，但能專職去叫醒「沒經驗的 Naive T 細胞」的，全天下只有樹突細胞才是第一把交椅！"}, {"no": 80, "source": "113-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關抗體的敘述，下列何者錯誤？", "options": {"A": "IgG包含兩個輕鏈及兩個重鏈，由雙硫鍵連結", "B": "IgA以雙體（dimer）的結構，透過黏膜上皮細胞基底部位之poly-Ig receptor運送至管腔部位", "C": "大部分血清中的IgG半衰期大約三週", "D": "血清中濃度最高的是IgE"}, "answer": "D", "ask": "血液中各類抗體的特色與結構你都分得清楚嗎？我們要抓出哪一個敘述在造謠、胡說八道？", "compare": "每天引起過敏反應的 IgE，在血清中的濃度真的有資格稱王，還是其實它只是個稀有的邊緣人？平時在血液中數量最多、撐起免疫大局的抗體到底是哪一位？", "lock": "當你回想起課堂上提過「IgG 是血清老大，IgE 只是引發過敏的微量角色」時，哪一個選項的謊言會立刻不攻自破？", "explain": "同學們，這題根本是送分題，不准寫錯啊！我們要找的是「錯誤」的敘述。 先來看正確的模範生們： (A) IgG 是最經典的抗體，長得就像個標準的「Y」字型，由兩條重鏈和兩條輕鏈手拉手（透過雙硫鍵連結）組成，這結構完全正確！ (B) 黏膜守護神 IgA 在分泌時會兩兩結拜編成「雙體（dimer）」，想要穿過上皮細胞到管腔作戰，必須搭乘專屬的 poly-Ig receptor 交通車，這也是教科書等級的精準描述。 (C) IgG 是抗體界的「長壽馬拉松選手」，因為有 FcRn 的回收機制，半衰期長達大約三週（21天），在體內待得最久。 最後看看 (D)……等等，IgE 耶！這傢伙是專門負責過敏反應和對付寄生蟲的「戲劇化女王」，在血清中的濃度簡直是微乎其微。血清中濃度最高的霸主明明就是 IgG（佔了約 75~80%），IgE 居然想篡位當老大？這牛皮吹太大囉，所以 (D) 絕對是錯的！", "what": "五大類免疫球蛋白（IgG, IgA, IgM, IgD, IgE）的結構特徵、血清濃度高低以及生理運送機制。", "trap": "千萬別把「人體總產量最多」與「血清中濃度最高」搞混！人體每天在分泌黏膜製造的 IgA 總量最多，但留在血液（血清）中濃度最高的絕對是 IgG。此外，IgE 是血清中濃度最低的抗體，別因為過敏反應很常見就誤以為它在血中很多喔！"}, {"no": 84, "source": "113-3", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列那一種補體分子促進肥大細胞（mast cell）分化效果最佳？", "options": {"A": "C1a", "B": "C2a", "C": "C3a", "D": "C4b"}, "answer": "C", "ask": "當補體系統被活化並剪切出許多碎片時，哪一個特定的碎片最擅長跑去刺激肥大細胞，進而引發發炎與後續的反應？", "compare": "C1a 這種不存在的編號、忙著參與轉化酶組裝的 C2a 與 C4b，跟專職擔任發炎警報器的過敏毒素 C3a 相比，誰才具有與肥大細胞上受體結合的特殊本領？", "lock": "肥大細胞表面存在著哪一種過敏毒素的特異性受體，只要一與之結合，就能最有效地誘發肥大細胞活化與反應？", "explain": "嗨，同學們！今天我們來聊聊免疫界的過敏推手「補體系統」！補體家族在活化過程中會被剪刀（酵素）切成大碎片和小碎片，那些「小 a 碎片」（例如 C3a, C4a, C5a）可不是廢物，它們是超強的「過敏毒素（anaphylatoxins）」！它們最喜歡跑去「挑逗」肥大細胞（mast cell），讓肥大細胞脫顆粒並釋放組織胺，進而引發紅腫熱痛。在所有選項中，只有 C3a 是正宗的過敏毒素。至於 A 選項的 C1a 根本是來亂的（C1 只有 q、r、s 亞單位），B 選項的 C2a 和 D 選項的 C4b 則是忙著去組裝 C3 轉化酶，根本沒空理肥大細胞。所以，要找能讓肥大細胞興奮的補體，選 C3a 就對啦！", "what": "考補體活化裂解產物（過敏毒素）對肥大細胞的生理功能與活化作用。", "trap": "很多同學會把小碎片「a」與大碎片「b」的功能記反。請記住口訣：『小 a 跑去通風報信搞過敏（Anaphylatoxin），大 b 留在表面黏附搞調理（Binding/Opsonization）』。另外，C1 家族沒有 C1a 這種東西，別被選項騙了！"}, {"no": 89, "source": "114-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列何種自體抗體（autoantibody）與全身性紅斑性狼瘡（systemic lupus erythematosus）最相關？", "options": {"A": "抗核抗體（anti-nuclear antibody）", "B": "抗肌動蛋白抗體（anti-actin antibody）", "C": "抗粒線體抗體（anti-mitochondrial antibody）", "D": "抗嗜中性球細胞質抗體（anti-neutrophil cytoplasmic antibody）"}, "answer": "A", "ask": "全身性紅斑性狼瘡這個自體免疫疾病的「最佳代言人」是哪一個會攻擊自己細胞核的抗體？", "compare": "當抗體的攻擊目標分別鎖定在細胞核、肌動蛋白、粒線體和白血球細胞質時，哪一個才是臨床上診斷紅斑性狼瘡的首選篩檢指標？", "lock": "想一想在狼瘡病患體內高達九成以上都會呈現陽性反應，且抗體名稱直接挑明了是在對抗「細胞核」的核能級抗體是哪一個？", "explain": "各位同學，想像一下自體免疫疾病就像是身體的免疫軍隊發瘋了，開始攻打自家人！而全身性紅斑性狼瘡（SLE）就是這場內戰的「經典代表作」。在這場大混亂中，免疫系統甚至把腦袋動到了細胞的指揮總部——細胞核身上，製造出專門攻擊細胞核的「抗核抗體（anti-nuclear antibody, 簡稱 ANA）」。因此，ANA 成了篩檢 SLE 最敏感的黃金指標，將近 95% 以上的 SLE 患者體內都能驗出它，選 A 準沒錯！至於其他選項呢？B 選項的抗肌動蛋白抗體主要跟自體免疫性肝炎有關；C 選項的抗粒線體抗體則是原發性膽汁性膽管炎的招牌；D 選項的 ANCA 則是一群喜歡攻擊嗜中性球細胞質的抗體，常導致血管炎。所以，要找紅斑性狼瘡的靈魂伴侶，絕對非 ANA 莫屬啦！", "what": "考全身性紅斑性狼瘡（SLE）最具指標性與臨床篩檢價值的自體抗體（ANA）。", "trap": "別把「敏感性高」跟「特異性高」搞混了！雖然幾乎每個 SLE 患者都有 ANA（高敏感性），但有 ANA 的人不一定都是 SLE（低特異性，其他自體免疫疾病也可能陽性），真正對 SLE 具備高度特異性的是 Anti-dsDNA 或 Anti-Sm 抗體喔！"}, {"no": 90, "source": "114-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "關於 IgA 腎病變（IgA nephropathy）的敘述，下列何者最不適當？", "options": {"A": "又稱為 Berger 氏病（Berger disease），最好發於老年女性", "B": "IgA 主要沉積於腎絲球的膈細胞（mesangial cells）的區域", "C": "病人通常會有血尿（hematuria）及蛋白尿（proteinuria）", "D": "是目前世界上最常見的原發性腎病變，也是導致慢性腎病的主要原因之一"}, "answer": "A", "ask": "當看到「IgA 腎病變」這個關鍵字時，它的別名、最常堆積在腎臟的哪個部位，以及它特別偏愛找上哪一個年齡與性別的族群，你的腦海中浮現出哪些畫面？", "compare": "試想免疫球蛋白 IgA 跑到腎絲球膈細胞去「開派對」時，會對尿液成分造成什麼實質改變，而這個疾病在世界流行病學上的霸主地位又與哪一個特定性別與年齡層的患者最有關聯？", "lock": "既然這個疾病是年輕男性的大敵，那麼選項中提到好發於「老年女性」的敘述，是不是露出了最明顯的破綻？", "explain": "嗨，各位同學！今天我們要來聊聊這個在腎臟科跟免疫學界都超級有名的「超級大魔王」——IgA 腎病變。首先，這傢伙有個很帥氣的別名叫做「Berger 氏病」（波格氏病），它真的是全球最常被診斷出的原發性腎絲球腎炎（沒錯，選項 D 是百分之百的大實話！）。那它是怎麼作怪的呢？簡單來說，就是我們體內的 IgA 抗體突然變得很黏，跑去堆積在腎臟裡負責支撐和過濾的「膈細胞（mesangial cells）」區域（選項 B 也是對的）。這一堆積，免疫系統就以為有外敵入侵，開始瘋狂放火發炎，結果就導致了腎臟過濾功能受損，病人排尿時就會出現血尿和蛋白尿，也就是俗稱的紅尿和泡泡尿（選項 C 完全正確）。那選項 A 到底哪裡得罪人？Berger 氏病雖然名字好聽，但它最喜歡糾纏的對象可不是「老年女性」，而是「年輕男性」（通常是十幾歲到三十幾歲的年輕小鮮肉）。所以，把「小鮮肉」記成「老奶奶」，這誤會可就大啦！因此最不適當的就是 A 囉！", "what": "考驗考生對於 IgA 腎病變（Berger 氏病）的流行病學特徵（好發族群）及基本病理生理機轉的掌握度。", "trap": "考生容易把 IgA 腎病變（好發於年輕男性）與紅斑性狼瘡腎炎（好發於年輕女性）的好發族群搞混；另外，也要注意 Berger's disease 的中文譯名，千萬別跟別的罕見疾病混淆了！"}, {"no": 91, "source": "114-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者為正確的五大主要類型免疫球蛋白（immunoglobulin）？", "options": {"A": "IgA, IgD, IgK, IgG, IgM", "B": "IgA, IgD, IgE, IgG, IgM", "C": "IgA, IgK, IgE, IgG, IgM", "D": "IgA, IgD, IgE, IgK, IgM"}, "answer": "B", "ask": "我們身體裡的抗體防禦大軍，到底是由哪五位核心幹部所組成的？", "compare": "英文字母 kappa (κ) 究竟是代表抗體結構中的輕鏈，還是能用來命名獨立的重鏈免疫球蛋白大類？", "lock": "如果把「K」這個偽裝成主要類型的輕鏈干擾項全部剔除，哪一個組合才能完美拼出口訣「GAMED」？", "explain": "同學們！這題根本就是送分題，要是拿不到分數，老師可是會哭哭的喔！我們人體內的抗體家族有五大金剛，你只要記住一個好記的口訣：**「GAMED」（遊戲）**，就能輕鬆搞定！這五大金剛分別是 IgG、IgA、IgM、IgE 和 IgD。那選項中一直跑出來插花、企圖混淆大家的「IgK」到底是什麼鬼？原來，抗體的輕鏈（light chain）只有兩種，叫做 kappa (κ) 和 lambda (λ)；而選項裡的「K」其實是指 kappa 輕鏈，根本不是獨立的免疫球蛋白大類！所以 A、C、D 選項通通混入了這個冒牌貨，只有選項 B 才是血統純正的五大金剛！", "what": "考你能不能熟記人體免疫球蛋白（抗體）的五大主要分類。", "trap": "最容易讓人眼花的就是字母「K」，千萬別把代表輕鏈的 kappa (κ) 誤認成五大重鏈同種型（isotypes）之一喔！"}, {"no": 96, "source": "114-3", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列何種抗體常以雙聚體方式分泌？", "options": {"A": "IgA", "B": "IgG", "C": "IgM", "D": "IgE"}, "answer": "A", "ask": "守護黏膜大門、在各種分泌液中需要成雙成對才能發揮戰力的抗體是哪一位？", "compare": "血液中數量最多且習慣單打獨鬥的 IgG，和喜歡拉著四個同伴組成五星大陣的 IgM，在結構上與需要兩人同行守護黏膜的抗體有何不同？", "lock": "哪一種免疫球蛋白會利用 J 鏈將兩個單體連結，並伴隨分泌成分出現在唾液與腸道中？", "explain": "各位同學，想像一下抗體們的「社交生活」！大部分的抗體像 IgG、IgE 都是孤僻的「單身漢」（單體，Monomer），在血液裡單打獨鬥。但當我們要守護黏膜表面（像是口水、眼淚、腸胃道分泌液）時，就需要派特種部隊——IgA 出馬！為了在充滿消化酵素的惡劣環境中生存，IgA 決定找個好基友「手拉手」，透過 J 鏈（J chain）結合成「雙聚體」（Dimer），外面再套一件分泌成份（Secretory component）當雨衣，這就是分泌型 IgA（sIgA）的超強姿態！至於 IgM？它更誇張，是個喜歡五人集體行動的「五聚體」（Pentamer）；而 IgG 和 IgE 都是標準的單體。所以要找「雙聚體」分泌的，非 IgA 莫屬啦！", "what": "考查不同免疫球蛋白（抗體）在結構上（單體、雙聚體、五聚體）的分佈與功能特性。", "trap": "很多同學會把「分泌型 IgA（雙聚體）」和「血清中的 IgA（多為單體）」搞混，請記得只有在黏膜「分泌液」中，IgA 才會以雙聚體之姿現身。另外，別把結構最大、像雪花一樣由五個單體組成的 IgM（五聚體）跟雙聚體記反了！"}]}, {"title": "六、臨床檢驗與考前盲點", "stars": "★★★★", "intro": "最後把免疫概念收束到檢驗與臨床應用，適合考前快速定位題目到底在考哪個工具。", "cram": ["沉澱反應偏可溶性抗原；凝集反應偏顆粒性抗原。", "補體結合試驗陽性常表現為不溶血。", "單株抗體來自單一細胞株，辨認同一抗原決定位。"], "concepts": [{"title": "血清學反應", "plain": "血清學反應是利用抗原抗體專一性結合來檢測抗原、抗體或其含量的診斷方法。", "analogy": "建議比喻：血清學像用已知鑰匙或鎖去找未知配對。", "mechanism": "常見反應包含：沉澱反應用於可溶性抗原與抗體，如凝膠擴散、雙向擴散、沉澱環；凝集反應用於顆粒性抗原，如血球凝集、肥達氏、外斐氏；補體結合反應以不溶血為陽性；中和試驗檢測抗毒素或抗病毒抗體；免疫螢光可直接或間接標示抗原抗體；RIA 與 EIA/ELISA 可高靈敏定量。", "diagrams": [], "focus": "補體結合反應陽性是不溶血；EIA 操作簡便，RIA 靈敏但需放射性標記。", "confusion": "- 沉澱反應對可溶性抗原；凝集反應對顆粒性抗原。 - 補體結合反應的陽性結果不是「溶血」。", "table": {"title": "常見血清學反應對照", "headers": ["項目", "沉澱反應", "凝集反應", "補體結合反應", "中和試驗", "EIA"], "rows": [["抗原型態", "可溶性抗原", "顆粒性抗原", "抗原抗體消耗補體", "毒素或病毒功能", "酵素標記抗原抗體"], ["判讀重點", "出現沉澱線或環", "肉眼凝集", "陽性是不溶血", "功能被阻斷", "呈色或訊號定量"], ["常見用途", "凝膠擴散、沉澱環", "血球凝集、肥達、外斐", "抗體檢測", "抗毒素或抗病毒抗體", "ELISA 類檢驗"], ["方向性陷阱", "可溶不是顆粒", "凝集不是沉澱", "不溶血才陽性", "中和不是溶菌", "EIA 不是放射性標記"], ["國考文字陷阱", "沉澱對可溶性抗原", "凝集對顆粒性抗原", "補體結合陽性不溶血", "中和看功能阻斷", "EIA 看酵素訊號"]]}}, {"title": "單株抗體與融合瘤", "plain": "單株抗體是由單一融合瘤細胞株產生、特異性一致的抗體；融合瘤是 B 細胞與骨髓瘤細胞融合而成。", "analogy": "建議比喻：融合瘤像把精準設計圖與無限生產線結合。", "mechanism": "製備時先以目標抗原免疫老鼠，取脾臟 B 細胞與同品系骨髓瘤細胞培養，在 PEG 協助下融合，再篩選出能產生目標抗體的單一細胞株。B 細胞提供抗體特異性，骨髓瘤細胞提供持續分裂能力，因此融合瘤可大量穩定產生同一種抗體。", "diagrams": [], "focus": "融合瘤技術結合「B 細胞產生抗體」與「骨髓瘤細胞不斷分裂」兩種特性。", "confusion": "- 單株抗體不是單一抗體分子，而是同一細胞株產生的一群相同抗體。 - 多株抗體辨認多個 epitope，單株抗體辨認單一特異性。", "table": {"title": "單株抗體與多株抗體對照", "headers": ["項目", "單株抗體", "多株抗體"], "rows": [["來源", "單一融合瘤細胞株", "多個 B 細胞株"], ["辨識範圍", "單一 epitope", "多個 epitope"], ["一致性", "高，批次穩定", "較混合，批次變異較大"], ["典型用途", "精準檢驗、分型、標靶治療", "傳統抗血清、廣泛偵測"], ["國考文字陷阱", "單株不是單一顆抗體分子", "多株不是比較不專一，而是辨識多個位點"]]}}], "gameQuestions": [{"no": 14, "source": "106-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關免疫球蛋白 IgG 的敘述，下列何者正確？", "options": {"A": "主要表現在細胞表面，血清中的含量較 IgM 少", "B": "和補體結合的能力較 IgA 與補體結合的能力差", "C": "由一條重鏈和二條輕鏈組成", "D": "可以通過胎盤，由母體傳給胎兒"}, "answer": "D", "ask": "剛出生的小嬰兒在建立自己的免疫帝國前，究竟是靠著哪一種能穿透胎盤的偉大抗體來獲得媽媽的「御賜神盾」？", "compare": "為什麼標準的抗體單體非得對稱地由兩條重鏈與兩條輕鏈組成，而不能隨便配對？在血清含量與補體活化能力上，IgG 與 IgM、IgA 相比，誰才是真正的實力派領袖？", "lock": "哪一項生理特權是其他抗體羨慕不來、唯獨 IgG 才能擁有的「跨胎盤母體愛心快遞」？", "explain": "同學們，這題我們要來聊聊抗體家族裡的「全能明星」——IgG！首先，正確答案 D 簡直是滿滿的母愛！IgG 是唯一能夠穿過胎盤、從媽媽身體直接快遞給胎兒的免疫球蛋白，給寶寶最溫暖的「先天防禦力」。我們來看看其他選項錯在哪裡： 選項 A 說它含量比 IgM 少？太小看它了！IgG 可是我們血清中的「人氣王」，佔了總免疫球蛋白的 75% 到 80%，含量最多，而主要在細胞表面當受體的是單體 IgM 和 IgD。 選項 B 說它結合補體的能力比 IgA 差？這可不行！IgG（特別是 IgG1 和 IgG3）是活化補體的二把手（僅次於 IgM），而 IgA 根本不走傳統途徑來活化補體，兩者相比，IgG 強太多了！ 選項 C 的結構完全不符合人體工學。標準的抗體單體就像一個對稱的 Y 字型，必須由「兩條相同的重鏈」與「兩條相同的輕鏈」通過雙硫鍵手牽手組成，才不是一重二輕的畸形組合喔！", "what": "考查五大類免疫球蛋白中，最核心的「IgG」在結構（雙重雙輕）與生理功能（血清含量最高、能穿過胎盤、能活化補體）的關鍵特徵。", "trap": "考生常把活化補體的能力記反。請記住，活化補體能力的「冠亞軍」是 IgM（冠軍，因為是五聚體）和 IgG（亞軍），而 IgA 在補體活化上表現非常微弱，千萬別被選項的「較差」二字給動搖了！", "level": 1, "sectionTitle": "六、臨床檢驗與考前盲點"}, {"no": 22, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "人類血型為 A 型，其血中抗體為：", "options": {"A": "抗 A 抗體", "B": "抗 B 抗體", "C": "無抗體", "D": "抗 A 及抗 B 抗體"}, "answer": "B", "ask": "當一個人的紅血球上貼滿了 A 型抗原，為了避免免疫系統自相殘殺，他的血漿中絕對不能出現哪一種會攻擊自己的抗體？", "compare": "對於 A 型血的人來說，A 抗原與 B 抗原哪一個是「自己人」，哪一個是「外來入侵者」？免疫系統在製造武器時，只會針對自己人還是針對外來者？", "lock": "排除掉會殺死自己紅血球的抗 A 抗體，並保留針對外來 B 抗原的防禦力，此時血漿中應該只存在哪一種抗體？", "explain": "想像一下，你的身體是一座城堡，紅血球是城堡裡的居民。如果你的血型是 A 型，代表你的紅血球頭上都戴著「A 貼紙」（也就是 A 抗原）。既然「A」是自己人，你的免疫系統當然不會自相殘殺去製造「抗 A 抗體」，否則不就天天上演「大水沖倒退伍兵」的溶血悲劇了嗎？相反地，因為你這輩子沒看過戴「B 貼紙」的傢伙，身體自然會把 B 視為潛在威脅，因而備妥了「抗 B 抗體」隨時嚴陣以待。所以，A 型血的人血清中會有抗 B 抗體（答案選 B）。如果是 AB 型的人，因為 A 和 B 貼紙都有，所以血中什麼抗體都沒有（選項C）；而 O 型人則是什麼貼紙都沒戴，所以對 A 和 B 都保持戒備，血中同時有抗 A 及抗 B 抗體（選項D）喔！", "what": "考你 ABO 血型系統中，紅血球表面的「抗原」與血漿中的「自然抗體」互補且不自我攻擊的對應關係。", "trap": "考生最常把「紅血球上的抗原」和「血漿中的抗體」搞反！記住一個鐵律：抗體是拿來防禦「自己沒有的東西」，要是血中出現會攻擊自己抗原的抗體，人體就會發生嚴重的溶血反應！", "level": 2, "sectionTitle": "六、臨床檢驗與考前盲點"}, {"no": 73, "source": "112-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "若 A 血型的人輸血給 B 血型的人，受血者因抗原刺激產生的抗體是屬於：", "options": {"A": "IgM", "B": "IgG", "C": "IgA", "D": "IgE"}, "answer": "A", "ask": "當 A 型血紅血球表面的醣類抗原突然闖入 B 型血人體內時，免疫系統會派出哪一種不需要 T 細胞協助、能直接由 B 細胞快速產生的代表性抗體來迎戰？", "compare": "醣類抗原與蛋白質抗原在刺激 B 細胞時有何本質上的差異，這又是如何限制了抗體進行類別轉換（Class switching）的能力？", "lock": "哪一個抗體選項是免疫學中不需經過 T 細胞輔助、由 B 細胞獨立應對胸腺非依賴型抗原時所製造的預設巨無霸武器？", "explain": "嘿，各位同學！想像一下，B 型血的人體內突然闖進了 A 型血的紅血球，這就像是敵軍帶著「A 抗原」的旗幟大舉入侵！因為 ABO 血型的抗原化學本質是「醣類」（Carbohydrate），這在免疫學上屬於「胸腺非依賴型抗原」（T-independent antigen, TI-antigen）。簡單來說，B 細胞自己看到這類醣類抗原就能直接開機戰鬥，不需要 T 幫手細胞（T helper cell）在身邊碎碎念。但代價就是，沒有 T 細胞發放的細胞激素來「蓋章批准」，B 細胞就無法進行基因重組與抗體分類轉換（Class switching），所以只能源源不絕地製造出最原始、體型最大的五聚體——IgM！至於 IgG、IgA 和 IgE，它們都需要 T 細胞的熱情協助才能產生，因此這題毫無疑問要選 IgM 啦！", "what": "本題考點為 ABO 血型抗原（醣類抗原）屬於非胸腺依賴型抗原，受其刺激後 B 細胞僅能分泌 IgM 抗體。", "trap": "很多考生常有「只要是後天免疫反應，最後一定會產生 IgG」的迷思。請記住，只有「蛋白質」抗原才能走 T 細胞輔助路線並轉換成 IgG；像 ABO 血型這種「醣類」抗原，是無法促成抗體類別轉換的，因此產生的抗體依然是 IgM！", "level": 3, "sectionTitle": "六、臨床檢驗與考前盲點"}, {"no": 89, "source": "114-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列何種自體抗體（autoantibody）與全身性紅斑性狼瘡（systemic lupus erythematosus）最相關？", "options": {"A": "抗核抗體（anti-nuclear antibody）", "B": "抗肌動蛋白抗體（anti-actin antibody）", "C": "抗粒線體抗體（anti-mitochondrial antibody）", "D": "抗嗜中性球細胞質抗體（anti-neutrophil cytoplasmic antibody）"}, "answer": "A", "ask": "全身性紅斑性狼瘡這個自體免疫疾病的「最佳代言人」是哪一個會攻擊自己細胞核的抗體？", "compare": "當抗體的攻擊目標分別鎖定在細胞核、肌動蛋白、粒線體和白血球細胞質時，哪一個才是臨床上診斷紅斑性狼瘡的首選篩檢指標？", "lock": "想一想在狼瘡病患體內高達九成以上都會呈現陽性反應，且抗體名稱直接挑明了是在對抗「細胞核」的核能級抗體是哪一個？", "explain": "各位同學，想像一下自體免疫疾病就像是身體的免疫軍隊發瘋了，開始攻打自家人！而全身性紅斑性狼瘡（SLE）就是這場內戰的「經典代表作」。在這場大混亂中，免疫系統甚至把腦袋動到了細胞的指揮總部——細胞核身上，製造出專門攻擊細胞核的「抗核抗體（anti-nuclear antibody, 簡稱 ANA）」。因此，ANA 成了篩檢 SLE 最敏感的黃金指標，將近 95% 以上的 SLE 患者體內都能驗出它，選 A 準沒錯！至於其他選項呢？B 選項的抗肌動蛋白抗體主要跟自體免疫性肝炎有關；C 選項的抗粒線體抗體則是原發性膽汁性膽管炎的招牌；D 選項的 ANCA 則是一群喜歡攻擊嗜中性球細胞質的抗體，常導致血管炎。所以，要找紅斑性狼瘡的靈魂伴侶，絕對非 ANA 莫屬啦！", "what": "考全身性紅斑性狼瘡（SLE）最具指標性與臨床篩檢價值的自體抗體（ANA）。", "trap": "別把「敏感性高」跟「特異性高」搞混了！雖然幾乎每個 SLE 患者都有 ANA（高敏感性），但有 ANA 的人不一定都是 SLE（低特異性，其他自體免疫疾病也可能陽性），真正對 SLE 具備高度特異性的是 Anti-dsDNA 或 Anti-Sm 抗體喔！", "level": 4, "sectionTitle": "六、臨床檢驗與考前盲點"}, {"no": 90, "source": "114-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "關於 IgA 腎病變（IgA nephropathy）的敘述，下列何者最不適當？", "options": {"A": "又稱為 Berger 氏病（Berger disease），最好發於老年女性", "B": "IgA 主要沉積於腎絲球的膈細胞（mesangial cells）的區域", "C": "病人通常會有血尿（hematuria）及蛋白尿（proteinuria）", "D": "是目前世界上最常見的原發性腎病變，也是導致慢性腎病的主要原因之一"}, "answer": "A", "ask": "當看到「IgA 腎病變」這個關鍵字時，它的別名、最常堆積在腎臟的哪個部位，以及它特別偏愛找上哪一個年齡與性別的族群，你的腦海中浮現出哪些畫面？", "compare": "試想免疫球蛋白 IgA 跑到腎絲球膈細胞去「開派對」時，會對尿液成分造成什麼實質改變，而這個疾病在世界流行病學上的霸主地位又與哪一個特定性別與年齡層的患者最有關聯？", "lock": "既然這個疾病是年輕男性的大敵，那麼選項中提到好發於「老年女性」的敘述，是不是露出了最明顯的破綻？", "explain": "嗨，各位同學！今天我們要來聊聊這個在腎臟科跟免疫學界都超級有名的「超級大魔王」——IgA 腎病變。首先，這傢伙有個很帥氣的別名叫做「Berger 氏病」（波格氏病），它真的是全球最常被診斷出的原發性腎絲球腎炎（沒錯，選項 D 是百分之百的大實話！）。那它是怎麼作怪的呢？簡單來說，就是我們體內的 IgA 抗體突然變得很黏，跑去堆積在腎臟裡負責支撐和過濾的「膈細胞（mesangial cells）」區域（選項 B 也是對的）。這一堆積，免疫系統就以為有外敵入侵，開始瘋狂放火發炎，結果就導致了腎臟過濾功能受損，病人排尿時就會出現血尿和蛋白尿，也就是俗稱的紅尿和泡泡尿（選項 C 完全正確）。那選項 A 到底哪裡得罪人？Berger 氏病雖然名字好聽，但它最喜歡糾纏的對象可不是「老年女性」，而是「年輕男性」（通常是十幾歲到三十幾歲的年輕小鮮肉）。所以，把「小鮮肉」記成「老奶奶」，這誤會可就大啦！因此最不適當的就是 A 囉！", "what": "考驗考生對於 IgA 腎病變（Berger 氏病）的流行病學特徵（好發族群）及基本病理生理機轉的掌握度。", "trap": "考生容易把 IgA 腎病變（好發於年輕男性）與紅斑性狼瘡腎炎（好發於年輕女性）的好發族群搞混；另外，也要注意 Berger's disease 的中文譯名，千萬別跟別的罕見疾病混淆了！", "level": 5, "sectionTitle": "六、臨床檢驗與考前盲點"}], "questions": [{"no": 14, "source": "106-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關免疫球蛋白 IgG 的敘述，下列何者正確？", "options": {"A": "主要表現在細胞表面，血清中的含量較 IgM 少", "B": "和補體結合的能力較 IgA 與補體結合的能力差", "C": "由一條重鏈和二條輕鏈組成", "D": "可以通過胎盤，由母體傳給胎兒"}, "answer": "D", "ask": "剛出生的小嬰兒在建立自己的免疫帝國前，究竟是靠著哪一種能穿透胎盤的偉大抗體來獲得媽媽的「御賜神盾」？", "compare": "為什麼標準的抗體單體非得對稱地由兩條重鏈與兩條輕鏈組成，而不能隨便配對？在血清含量與補體活化能力上，IgG 與 IgM、IgA 相比，誰才是真正的實力派領袖？", "lock": "哪一項生理特權是其他抗體羨慕不來、唯獨 IgG 才能擁有的「跨胎盤母體愛心快遞」？", "explain": "同學們，這題我們要來聊聊抗體家族裡的「全能明星」——IgG！首先，正確答案 D 簡直是滿滿的母愛！IgG 是唯一能夠穿過胎盤、從媽媽身體直接快遞給胎兒的免疫球蛋白，給寶寶最溫暖的「先天防禦力」。我們來看看其他選項錯在哪裡： 選項 A 說它含量比 IgM 少？太小看它了！IgG 可是我們血清中的「人氣王」，佔了總免疫球蛋白的 75% 到 80%，含量最多，而主要在細胞表面當受體的是單體 IgM 和 IgD。 選項 B 說它結合補體的能力比 IgA 差？這可不行！IgG（特別是 IgG1 和 IgG3）是活化補體的二把手（僅次於 IgM），而 IgA 根本不走傳統途徑來活化補體，兩者相比，IgG 強太多了！ 選項 C 的結構完全不符合人體工學。標準的抗體單體就像一個對稱的 Y 字型，必須由「兩條相同的重鏈」與「兩條相同的輕鏈」通過雙硫鍵手牽手組成，才不是一重二輕的畸形組合喔！", "what": "考查五大類免疫球蛋白中，最核心的「IgG」在結構（雙重雙輕）與生理功能（血清含量最高、能穿過胎盤、能活化補體）的關鍵特徵。", "trap": "考生常把活化補體的能力記反。請記住，活化補體能力的「冠亞軍」是 IgM（冠軍，因為是五聚體）和 IgG（亞軍），而 IgA 在補體活化上表現非常微弱，千萬別被選項的「較差」二字給動搖了！"}]}], "questionCount": 66}</script>
<script>
const data=JSON.parse(document.getElementById('data').textContent);const analyticsMeta={chapter:'CHP07',chapter_name:'免疫學總論'};const $=s=>document.querySelector(s);const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const track=(name,params={})=>{if(typeof gtag==='function')gtag('event',name,{chapter:analyticsMeta.chapter,chapter_name:analyticsMeta.chapter_name,...params})};const storeKey='chp07_immune_game_v1';let star=0;let activeTabs={};let gameState=loadState();
function loadState(){try{return JSON.parse(localStorage.getItem(storeKey)||'{}')}catch{return {}}}
function saveState(){localStorage.setItem(storeKey,JSON.stringify(gameState))}
function stateFor(section){return gameState[section]||(gameState[section]={level:0,done:[],wrong:0,score:0})}
function table(t){if(!t)return'';return `<div class="table-wrap"><table><caption>${esc(t.title)}</caption><thead><tr>${t.headers.map(x=>`<th>${esc(x)}</th>`).join('')}</tr></thead><tbody>${t.rows.map(r=>`<tr>${t.headers.map((_,i)=>`<td>${esc(r[i]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function diagram(d){if(!d||!d.nodes?.length)return'';const edgeText=d.edges.map(e=>`${e.from}->${e.to}`).join(' ');return `<div class="diagram" role="img" aria-label="${esc(d.title)}：${esc(d.nodes.map(n=>n.label).join('，'))}"><div class="diagram-title">🧭 ${esc(d.title)}</div><div class="diagram-flow" data-edges="${esc(edgeText)}">${d.nodes.map((n,i)=>`<span class="diagram-node">${esc(n.label)}</span>${i<d.nodes.length-1?'<span class="diagram-arrow" aria-hidden="true">→</span>':''}`).join('')}</div></div>`}
function question(q){return `<details class="q"><summary>第 ${q.no} 題（${esc(q.source)}）</summary><div class="qbody" data-answer="${esc(q.answer)}" data-qno="${q.no}" data-source="${esc(q.source)}" data-qtype="quiz"><p>${esc(q.stem)}</p><div class="options">${Object.entries(q.options).map(([k,v])=>`<button class="option" type="button" data-choice="${k}"><b>${k}.</b> ${esc(v)}</button>`).join('')}</div><button class="submit" type="button" disabled>送出答案</button><div class="feedback" role="status"></div><div class="guide"><div class="hint"><b>🔍 題目在問啥？</b><br>${esc(q.ask)}</div><div class="hint"><b>⚖️ 概念 PK</b><br>${esc(q.compare)}</div><div class="hint"><b>🎯 鎖定答案</b><br>${esc(q.lock)}</div></div><button class="reveal" type="button" disabled>顯示引導與解析</button><div class="answer"><p><b>答案：</b>${esc(q.answer)}. ${esc(q.options[q.answer]||'')}</p><p><b>解析：</b>${esc(q.explain)}</p><p><b>這題考什麼：</b>${esc(q.what)}</p><div class="trap"><b>小心踩雷：</b>${esc(q.trap)}</div><button class="reset" type="button">重新作答</button></div></div></details>`}
function gamePanel(s){const st=stateFor(s.title),idx=Math.min(st.level||0,s.gameQuestions.length-1),q=s.gameQuestions[idx],pct=Math.round(((st.done||[]).length/s.gameQuestions.length)*100),finished=(st.done||[]).length>=s.gameQuestions.length;return `<div class="game-card" data-section="${esc(s.title)}"><div class="game-top"><div><b>🎮 ${esc(s.title)} 闖關遊戲</b><div>看完解析即可解鎖下一關；答錯可重試，重點是把思路校準。</div></div><div class="progress" aria-label="闖關進度 ${pct}%"><div class="bar" style="width:${pct}%"></div></div></div><div class="badges">${s.gameQuestions.map((g,i)=>`<span class="badge ${(st.done||[]).includes(g.no)?'done':''} ${i===idx&&!finished?'current':''}">第 ${g.level} 關</span>`).join('')}</div>${finished?`<div class="win" style="display:block"><b>🏆 本段完成！</b><br>得分 ${st.score||0}/${s.gameQuestions.length}，累計答錯 ${st.wrong||0} 次。可以去完整題庫補刀，或重設本段再玩一次。</div><div class="game-actions"><button class="retry" type="button" data-game-reset="1">重設本段</button></div>`:`<div class="qbody game-q" data-answer="${esc(q.answer)}" data-qno="${q.no}" data-level="${q.level}" data-source="${esc(q.source)}" data-qtype="game"><p><b>第 ${q.level} 關｜第 ${q.no} 題（${esc(q.source)}）</b></p><p>${esc(q.stem)}</p><div class="options">${Object.entries(q.options).map(([k,v])=>`<button class="option" type="button" data-choice="${k}"><b>${k}.</b> ${esc(v)}</button>`).join('')}</div><button class="submit" type="button" disabled>送出答案</button><div class="feedback" role="status"></div><div class="guide"><div class="hint"><b>🔍 題目在問啥？</b><br>${esc(q.ask)}</div><div class="hint"><b>⚖️ 概念 PK</b><br>${esc(q.compare)}</div><div class="hint"><b>🎯 鎖定答案</b><br>${esc(q.lock)}</div></div><button class="reveal" type="button" disabled>看解析並解鎖下一關</button><div class="answer"><p><b>答案：</b>${esc(q.answer)}. ${esc(q.options[q.answer]||'')}</p><p><b>解析：</b>${esc(q.explain)}</p><p><b>這題考什麼：</b>${esc(q.what)}</p><div class="trap"><b>小心踩雷：</b>${esc(q.trap)}</div><div class="game-actions"><button class="next" type="button" data-next-level="1">下一關</button><button class="retry" type="button" data-game-retry="1">本關重答</button><button class="retry" type="button" data-game-reset="1">重設本段</button></div></div></div>`}</div>`}
function render(){const key=$('#search').value.trim().toLowerCase();const list=data.sections.filter(s=>(!star||s.stars.length===star)&&(!key||JSON.stringify(s).toLowerCase().includes(key)));$('#sections').innerHTML=list.map(s=>{const active=activeTabs[s.title]||'concepts';return `<section class="section" id="sec-${data.sections.indexOf(s)}"><div class="section-head"><h2>${esc(s.title)} <span class="stars">${esc(s.stars)}</span></h2><p class="intro">${esc(s.intro)}</p></div><div class="tabs"><button class="tab ${active==='concepts'?'active':''}" data-tab="concepts">概念圖卡（${s.concepts.length}）</button><button class="tab ${active==='game'?'active':''}" data-tab="game">闖關遊戲（${s.gameQuestions.length} 關）</button><button class="tab ${active==='questions'?'active':''}" data-tab="questions">完整題庫（${s.questions.length}）</button></div><div class="panel concepts" ${active==='concepts'?'':'hidden'}><div class="cram"><b>🏁 考前只背這幾句</b><ul>${s.cram.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div><div class="concept-grid">${s.concepts.map(c=>`<article class="concept"><h3>${esc(c.title)}</h3><div class="label">⭐ 核心概念</div><p>${esc(c.plain)}</p><div class="label">🔍 機轉</div><p>${esc(c.mechanism)}</p>${(c.diagrams||[]).map(diagram).join('')}${c.analogy?`<div class="label">🧠 生活比喻</div><p>${esc(c.analogy)}</p>`:''}<div class="label">🎯 國考重點</div><p>${esc(c.focus)}</p><div class="trap"><b>⚠️ 易錯：</b>${esc(c.confusion)}</div>${table(c.table)}</article>`).join('')}</div></div><div class="panel game" ${active==='game'?'':'hidden'}>${gamePanel(s)}</div><div class="panel questions" ${active==='questions'?'':'hidden'}>${s.questions.map(question).join('')}</div></section>`}).join('')||'<div class="empty">沒有符合條件的內容</div>'}
function finishGameLevel(body,correct){const card=body.closest('.game-card');if(!card)return;const section=card.dataset.section,st=stateFor(section),qno=Number(body.dataset.qno),level=Number(body.dataset.level),picked=body.querySelector('.selected'),ans=body.dataset.answer;if(correct&&!st._counted){st.score=(st.score||0)+1;st._counted=true}else if(!correct){st.wrong=(st.wrong||0)+1}track('game_answer',{section_name:section,level,question_no:qno,question_source:body.dataset.source||'',question_type:body.dataset.qtype||'game',selected_answer:picked?.dataset.choice||'',correct_answer:ans,is_correct:correct});saveState()}
document.addEventListener('click',e=>{const tab=e.target.closest('.tab');if(tab){const sec=tab.closest('.section'),sectionName=sec.querySelector('h2')?.textContent.replace(/[★☆]/g,'').trim()||'';activeTabs[sectionName]=tab.dataset.tab;sec.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===tab));sec.querySelectorAll(':scope > .panel').forEach(x=>x.hidden=!x.classList.contains(tab.dataset.tab));track('content_tab_open',{tab_name:tab.dataset.tab,section_name:sectionName});if(tab.dataset.tab==='game')track('game_start',{section_name:sectionName})}const opt=e.target.closest('.option');if(opt){const body=opt.closest('.qbody');body.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));opt.classList.add('selected');body.querySelector('.submit').disabled=false}const submit=e.target.closest('.submit');if(submit){const body=submit.closest('.qbody'),picked=body.querySelector('.selected'),ans=body.dataset.answer;if(!picked)return;body.querySelectorAll('.option').forEach(x=>{x.disabled=true;x.classList.toggle('correct',x.dataset.choice===ans);x.classList.toggle('wrong',x===picked&&x.dataset.choice!==ans)});const fb=body.querySelector('.feedback');const correct=picked.dataset.choice===ans;fb.textContent=correct?`答對！答案是 ${ans}。`:`答錯了；你選 ${picked.dataset.choice}，正確答案是 ${ans}。`;fb.classList.add('show');submit.disabled=true;body.querySelector('.reveal').disabled=false;if(body.classList.contains('game-q'))finishGameLevel(body,correct);else{const q=body.closest('.q'),sectionName=body.closest('.section')?.querySelector('h2')?.textContent.replace(/[★☆]/g,'').trim()||'';track('quiz_answer',{section_name:sectionName,question_no:Number(body.dataset.qno),question_source:body.dataset.source||'',question_type:body.dataset.qtype||'quiz',selected_answer:picked.dataset.choice,correct_answer:ans,is_correct:correct,question_label:q?.querySelector('summary')?.textContent.trim()||''})}}const reveal=e.target.closest('.reveal');if(reveal&&!reveal.disabled){const body=reveal.closest('.qbody');body.classList.add('revealed');if(body.classList.contains('game-q'))track('game_level_complete',{section_name:body.closest('.game-card')?.dataset.section||'',level:Number(body.dataset.level),question_no:Number(body.dataset.qno),question_source:body.dataset.source||''});else{const q=body.closest('.q'),sectionName=body.closest('.section')?.querySelector('h2')?.textContent.replace(/[★☆]/g,'').trim()||'';track('answer_reveal',{section_name:sectionName,question_no:Number(body.dataset.qno),question_source:body.dataset.source||'',question_type:body.dataset.qtype||'quiz',question_label:q?.querySelector('summary')?.textContent.trim()||''})}}const next=e.target.closest('[data-next-level]');if(next){const card=next.closest('.game-card'),section=card.dataset.section,st=stateFor(section),body=next.closest('.qbody'),qno=Number(body.dataset.qno);activeTabs[section]='game';st.done=Array.from(new Set([...(st.done||[]),qno]));st.level=Math.min((st.level||0)+1,5);delete st._counted;saveState();if(st.done.length>=5)track('game_section_complete',{section_name:section,score:st.score||0,wrong:st.wrong||0});render()}const retry=e.target.closest('[data-game-retry]');if(retry){const card=retry.closest('.game-card'),section=card.dataset.section,st=stateFor(section);activeTabs[section]='game';delete st._counted;saveState();track('game_retry_wrong',{section_name:section,level:stateFor(section).level||0,question_no:Number(retry.closest('.game-card')?.querySelector('.game-q')?.dataset.qno||0)});render()}const resetGame=e.target.closest('[data-game-reset]');if(resetGame){const section=resetGame.closest('.game-card').dataset.section,body=resetGame.closest('.game-card')?.querySelector('.game-q'),st=stateFor(section);track('game_retry_wrong',{section_name:section,level:Number(body?.dataset.level||st.level||0),question_no:Number(body?.dataset.qno||0)});activeTabs[section]='game';delete gameState[section];saveState();render()}const reset=e.target.closest('.reset');if(reset){const body=reset.closest('.qbody');body.classList.remove('revealed');body.querySelectorAll('.option').forEach(x=>{x.disabled=false;x.classList.remove('selected','correct','wrong')});body.querySelector('.submit').disabled=true;body.querySelector('.reveal').disabled=true;body.querySelector('.feedback').classList.remove('show')}})
let searchTimer;$('#search').addEventListener('input',()=>{render();clearTimeout(searchTimer);searchTimer=setTimeout(()=>{const term=$('#search').value.trim();if(term)track('search',{search_term:term})},700)});document.querySelectorAll('[data-star]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-star]').forEach(x=>x.classList.remove('active'));b.classList.add('active');star=+b.dataset.star;track('star_filter',{star_level:star||'all'});render()}));
$('#title').textContent=data.title;$('#subtitle').textContent=data.subtitle;$('#metrics').innerHTML=`<span class="metric">${data.sections.length} 大段落</span><span class="metric">${data.questionCount} 題完整題庫</span><span class="metric">30 關闖關練習</span>`;$('#route').innerHTML=data.route.map((x,i)=>`<button type="button" data-route="${i}"><b>${i+1}</b>${esc(x)}</button>`).join('');$('#route').addEventListener('click',e=>{const b=e.target.closest('[data-route]');if(b){track('section_jump',{section_name:data.route[+b.dataset.route]});document.getElementById(`sec-${b.dataset.route}`)?.scrollIntoView()}});render();
</script>
</body></html>
