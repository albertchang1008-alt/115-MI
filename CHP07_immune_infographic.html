<script id="data" type="application/json">{"title": "第七章 免疫", "subtitle": "理解路線 × 必背比較 × 66 題互動練習", "route": ["免疫總論", "先天／後天防線", "淋巴器官", "免疫細胞", "抗原抗體與訊號", "臨床檢驗"], "sections": [{"title": "一、快速總覽", "stars": "★★★★★", "intro": "先建立免疫系統的地圖：它為什麼存在、哪一些防線先上場、哪些反應會留下記憶。", "cram": ["先天免疫反應快、非專一；後天免疫具專一性與記憶性。", "主動免疫由自己產生反應，慢但持久；被動免疫取得現成抗體，快但短暫。", "胎盤主要通過 IgG，母乳主要提供分泌型 IgA。"], "concepts": [{"title": "免疫", "plain": "免疫是宿主對外來微生物或外來物質所產生的抵抗作用，使病原被辨認、限制、清除，避免感染發展成疾病。", "analogy": "建議比喻：免疫系統像校園保全、監視器、通緝名單與特勤隊的組合。", "mechanism": "人體防線可分三層：第一道為皮膚、黏膜、胃酸、正常菌叢等屏障；第二道為吞噬作用、發炎、發燒、補體、干擾素等非專一性反應；第三道為後天性免疫，透過 B 細胞、T 細胞與抗體產生具專一性和記憶性的反應。", "diagrams": [], "focus": "常考「先天 vs 後天」、「主動 vs 被動」、「體液性 vs 細胞性」三組比較。", "confusion": "- 免疫不一定都是專一性；先天免疫多為非專一性。 - 抗體不是直接殺菌的唯一工具，常需補體或吞噬細胞協助。", "table": {"title": "免疫三道防線總覽對照", "headers": ["項目", "第一道防線", "第二道防線", "第三道防線"], "rows": [["反應速度", "最快，阻擋進入", "快，立即清除", "較慢，需活化擴增"], ["專一性", "非專一", "非專一", "抗原專一"], ["核心成員", "皮膚、黏膜、胃酸", "吞噬、發炎、補體、干擾素", "B 細胞、T 細胞、抗體"], ["記憶性", "無", "無典型記憶", "有記憶反應"], ["國考文字陷阱", "屏障不是抗體", "補體可在先天防線出現", "後天免疫不等於只有抗體"]]}}, {"title": "先天性免疫", "plain": "先天性免疫是出生即具有、不需先接觸特定病原即可發揮的抵抗力，又稱天然免疫。", "analogy": "建議比喻：先天免疫像不查身分的第一線門禁與巡邏隊。", "mechanism": "第一道防線包含皮膚、黏膜、纖毛、胃酸、膽汁、陰道酸性環境與正常菌叢，主要限制病原進入。第二道防線包含吞噬細胞、組織生化成分、干擾素、發炎與發燒，能快速處理已穿越屏障的病原。其反應速度快，但缺乏抗原專一性與長期記憶。", "diagrams": [], "focus": "先天性免疫不具長期記憶；成員包含吞噬細胞、NK 細胞、補體、屏障與發炎反應，不包含特異性抗體反應。", "confusion": "- 補體可參與先天防禦，也可被抗原抗體複合物活化。 - NK 細胞是淋巴球，但屬非專一性防禦。", "table": {"title": "先天性免疫與後天性免疫對照", "headers": ["項目", "先天性免疫", "後天性免疫"], "rows": [["反應速度", "快，立即啟動", "較慢，需抗原刺激"], ["專一性", "非專一性", "抗原專一性"], ["記憶性", "無典型記憶", "有記憶反應"], ["核心成員", "皮膚黏膜、吞噬細胞、NK、補體", "B 細胞、T 細胞、抗體"], ["國考文字陷阱", "NK 是淋巴球但屬先天防線", "抗體反應屬後天體液免疫"]]}}, {"title": "後天性免疫", "plain": "後天性免疫是個體接觸微生物或其產物後，由免疫系統產生的專一性防禦，又稱適應性或獲得性免疫。", "analogy": "建議比喻：後天免疫像建立病原通緝資料庫。", "mechanism": "後天性免疫是第三道防線，具抗原專一性與記憶性。主要分為體液性免疫與細胞性免疫：前者以 B 細胞、漿細胞、抗體清除細胞外病原或毒素；後者以 T 細胞、NK 細胞、巨噬細胞處理細胞內感染、腫瘤或移植物。依取得方式又分主動免疫與被動免疫。", "diagrams": [], "focus": "後天性免疫具有專一性與記憶性；初次反應較慢，二次反應較快且常以 IgG 為主。", "confusion": "- 被動免疫有專一性，但不是宿主自己產生記憶。 - 後天性免疫不等於只有抗體，T 細胞也屬後天免疫核心。"}, {"title": "主動免疫與被動免疫", "plain": "主動免疫是宿主受抗原刺激後自行產生免疫反應；被動免疫是直接取得現成抗體。", "analogy": "建議比喻：主動免疫像自己訓練軍隊；被動免疫像借外援。", "mechanism": "主動免疫可由自然感染或人工接種疫苗、類毒素產生，發展需數天至數週，但可維持數年甚至數十年並有記憶性。被動免疫可由胎盤 IgG、母乳 IgA 自然獲得，也可注射免疫球蛋白或抗毒素人工獲得；效果立即，但因抗體半衰期有限，通常只維持數日到數週。", "diagrams": [], "focus": "主動免疫慢但久、有記憶；被動免疫快但短、無記憶。胎盤通過的是 IgG，母乳主要提供 IgA。", "confusion": "- 被動人工免疫不是「疫苗」，而是給現成抗體。 - 初乳 IgA 保護黏膜，不等同於胎盤 IgG。", "table": {"title": "主動免疫與被動免疫對照", "headers": ["項目", "主動免疫", "被動免疫"], "rows": [["抗體來源", "自己產生", "外來給予"], ["啟動速度", "慢", "快"], ["維持時間", "較久，有記憶", "較短，無記憶"], ["典型例子", "疫苗、自然感染後免疫", "免疫球蛋白、母體 IgG"], ["國考文字陷阱", "疫苗通常是主動免疫", "立即保護常是被動免疫"]]}}], "gameQuestions": [{"no": 4, "source": "105-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種病毒感染後，可產生終身免疫？", "options": {"A": "腸病毒", "B": "腺病毒", "C": "流行感冒病毒", "D": "德國麻疹病毒"}, "answer": "D", "ask": "哪一種病毒在人體一次交手之後，就能讓免疫細胞一輩子記住它，再也不敢踏入身體半步？", "compare": "流感病毒那種每年都在變裝的「百變怪」，與結構穩定不變的德國麻疹病毒相比，哪一個才能讓抗體以不變應萬變地守候一生？", "lock": "腸病毒和腺病毒家族成員高達數十種，排除掉這些靠著「人多勢眾」或「快速變異」突破免疫防線的病毒後，誰才是那個終生不改容貌的唯一選項？", "explain": "同學們，想像一下免疫系統是在談戀愛！有些病毒是「百變渣男」，每天都在變裝（像是C選項的流感病毒，基因突變快到像換衣服，今年得過明年還會再來找你）；有些則是「多胞胎家族」（像是A選項腸病毒和B選項腺病毒，型別多達幾十種，你打敗了老大，老二老三還在後面排隊等著虐你）。只有D選項的德國麻疹病毒（Rubella virus），它是個「專情大仁哥」，血清型單一、結構穩定，這輩子就一張臉。只要你的免疫系統跟它交過一次手（不論是自然感染還是打疫苗），抗體就會記住它一輩子，提供你「執子之手，與子偕老」的終身免疫力！", "what": "考驗不同病毒的抗原變異性（血清型多寡與突變速度）如何影響人體免疫記憶的持久性。", "trap": "別把「感冒」跟「終身免疫」混為一談！很多人以為得過腸病毒或腺病毒就沒事了，其實你只是對「其中一種型號」免疫，它們龐大的家族成員隨時準備輪番上陣。至於流感病毒，則是靠著抗原漂移（Antigenic drift）年年大變身，根本沒辦法一勞永逸！", "level": 1, "sectionTitle": "一、快速總覽"}, {"no": 9, "source": "105-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列有關後天性免疫（adaptive immunity）的敘述，何者錯誤？", "options": {"A": "TH1 只能幫助細胞性免疫反應，不會幫助 B 細胞製造抗體", "B": "IgG 抗體可與自然殺手細胞（natural killer cell）表面的 CD16 結合，幫助自然殺手細胞毒殺標的細胞，稱為 ADCC（antibody-dependent cellular cytotoxicity）", "C": "TH17 細胞分泌 IL-17，活化上皮細胞與嗜中性細胞（neutrophil），促進發炎反應", "D": "IgG 與 IgM 抗體可活化補體，促進免疫反應"}, "answer": "A", "ask": "輔助型 T 細胞和抗體大軍在後天性免疫中扮演著不同角色，我們要如何揪出哪一個選項悄悄抹殺了它們之間的合作關係？", "compare": "輔助型 TH1 細胞難道真的是個只懂細胞免疫、完全不跟 B 細胞打交道的「邊緣人」嗎？相較之下，IgG、IgM 活化補體或協助 NK 細胞進行 ADCC 的機制是否符合它們一貫的作戰風格？", "lock": "試著想想 TH1 所分泌的干擾素-γ（IFN-γ），它除了活化巨噬細胞外，難道不會順便指揮 B 細胞製造特定種類的 IgG 抗體來共同抗敵嗎？", "explain": "同學們，這題我們要來拆解後天性免疫的「跨界聯手」大戲！大家常背「TH1 負責細胞免疫，TH2 負責體液（抗體）免疫」，就以為它們老死不相往來，這是大錯特錯的！TH1 雖然主導細胞免疫，但它分泌的干擾素-γ（IFN-γ）可是個厲害的角色，它會跑去跟 B 細胞咬耳朵，刺激 B 細胞進行抗體轉類（Class Switching），製造出更強力的 IgG 抗體來幫忙。所以選項 A 說它「不會幫助 B 細胞製造抗體」實在是太冤枉 TH1 了！至於其他選項都是百分之百的實話：B 選項的 ADCC 就是 IgG 用尾巴（Fc 段）抓住 NK 細胞表面的 CD16，手牽手去毒殺目標，這招超級經典；C 選項的 TH17 就是發炎界的號角手，狂吹 IL-17 來召喚嗜中性球大軍；D 選項的 IgG 和 IgM 則是補體經典路徑的啟動鑰匙。因此，只有 A 錯得離譜！", "what": "考後天性免疫中，各式 T 細胞亞群（TH1、TH17）與抗體（IgG、IgM）的功能與協同作戰機制。", "trap": "最容易踩到的雷就是把 TH1 與 TH2 的二分法記太死。切記，免疫系統是高度整合的網絡，TH1 的細胞因子一樣會影響 B 細胞的抗體生成類型，絕對不是互不干涉的獨立王國！", "level": 2, "sectionTitle": "一、快速總覽"}, {"no": 28, "source": "106-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "以下何者不是負擔先天性免疫作用的細胞？", "options": {"A": "自然殺手細胞（Natural killer cell）", "B": "巨噬細胞（Macrophage）", "C": "肥大細胞（Mast cell）", "D": "毒殺性 T 細胞（Cytotoxic T cell）"}, "answer": "D", "ask": "身體裡的免疫細胞哪些是天生自帶戰鬥技能的「即戰力」，哪些又是需要後天特訓才能上場的「特種部隊」？", "compare": "巨噬細胞、肥大細胞與 NK 細胞在面對病原體時，需要像 T 細胞一樣先經過抗原呈現與漫長的特訓分化階段嗎？", "lock": "哪一個細胞擁有高度特異性受體（TCR），必須依賴後天適應性免疫系統的激活才能發揮精準毒殺功能？", "explain": "嘿！各位同學，這題其實是在考我們免疫大軍的「兩大陣營」：不需要特訓、天生就超能打的「先天性免疫（Innate immunity）」，以及需要時間特訓、精準打擊的「後天性免疫（Adaptive immunity）」。我們來看看選項裡的細胞們： * **巨噬細胞 (B)** 和 **肥大細胞 (C)** 就像是身體裡的巡邏警衛和警報器，一看到外來入侵者就直接上去吞噬或釋放組織胺，屬於天生就有的「先天性免疫」基本班底。 * 那 **自然殺手細胞 (NK cell, A)** 呢？雖然它名字裡有「殺手」兩個字，但它其實是個不需經過特訓、天生就懂得消滅異常細胞的「先天性」猛將！ * 但 **毒殺性 T 細胞 (CD8+ T cell, D)** 就不一樣了。T 細胞和 B 細胞是「後天性（適應性）免疫」的超級菁英，它們必須經過胸腺（Thymus）的嚴格特訓，認得特定的抗原（就像是看過身分證編號）之後才能出動精準打擊。它絕對不是「天生」就會隨便攻擊的，而是後天特訓出來的專屬刺客！所以，它不屬於先天性免疫，答案選 D 啦！", "what": "區分「先天性（非特異性）免疫」與「後天性（特異性）免疫」所屬的細胞成員。", "trap": "很多人看到「自然殺手細胞（NK cell）」和「毒殺性 T 細胞（Cytotoxic T cell）」名字裡都有「殺手」或「毒殺」，就以為它們是一家人。請記住，NK 細胞是天生的「第一線殺手」（先天性），而 T 細胞則是需要特訓、認抗原的「後天特種部隊」（後天性），千萬別搞混囉！", "level": 3, "sectionTitle": "一、快速總覽"}, {"no": 29, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "有關後天性免疫（adaptive immunity），下列敘述何者錯誤？", "options": {"A": "T 淋巴細胞之完整活化需要仰賴抗原呈現細胞（antigen presenting cell）提供黏著因子（adhesion molecules）、MHC+抗原片段、協同刺激分子（co-stimulation molecules）及細胞激素（cytokines）", "B": "巨噬細胞（macrophage）、B 細胞（B lymphocyte）及樹突細胞（dendritic cell）都可以是抗原呈現 細胞（antigen presenting cell）", "C": "B 細胞受體及 T 細胞受體均可與抗原直接結合，啟動受體之活化", "D": "後天性免疫細胞的初始活化位置在二級淋巴器官（淋巴結或脾臟等）"}, "answer": "C", "ask": "T 細胞和 B 細胞在跟抗原「牽手成功」的活化條件上，到底有什麼本質上的不同？", "compare": "游離的抗原可以直接把 B 細胞給激活，但對 T 細胞來說，如果少了 MHC 分子在旁邊牽線搭橋，它有辦法自己去認識外面的抗原嗎？", "lock": "既然 T 細胞受體（TCR）必須高度依賴抗原呈現細胞（APC）上的 MHC 來「餵食」抗原，那麼哪一個選項把 T 細胞和 B 細胞的抗原結合能力混為一談了？", "explain": "嘿，同學們！這題我們來聊聊免疫界的兩大巨頭——T 細胞和 B 細胞的「擇偶條件」（也就是怎麼跟抗原結合啦）。B 細胞（BCR）是個不挑食的豪放派，只要抗原漂過去，它就可以張開雙臂直接跟抗原抱抱（結合）並啟動活化。但我們的 T 細胞（TCR）就傲嬌多了！它是個「重度依賴相親介面」的挑剔鬼，絕對不跟「裸露（游離）」的抗原直接勾搭，必須要靠「抗原呈現細胞（APC）」用 MHC 分子把抗原切成碎片、端到它面前，它才肯看一眼！所以選項 C 說「B 細胞受體及 T 細胞受體均可與抗原直接結合」，這完全是把 T 細胞當成隨便的人了，它哪有這麼容易直接結合？因此 C 是錯的。至於其他選項：A 選項非常完美，T 細胞活化就像求婚，除了 MHC 跟抗原（戒指），還需要黏著因子、協同刺激分子（雙方家長同意）和細胞激素（催化氣氛的音樂），缺一不可；B 選項提到的巨噬、B 細胞和樹突細胞，就是免疫界最專業的「抗原呈現三劍客（APC）」；D 選項也沒錯，未成熟的初始細胞們平時就在二級淋巴器官（像淋巴結、脾臟這個相親廣場）辦派對、等著被活化喔！", "what": "考驗你是否清楚 B 細胞與 T 細胞在認識、結合抗原時，本質上的決定性差異。", "trap": "很多同學會因為「B 細胞和 T 細胞都需要被活化」，就誤以為它們跟抗原接觸的方式一模一樣。請記住：T 細胞是盲目的，沒有 MHC 這個「拐杖」幫忙指引呈現抗原，它根本看不見抗原！", "level": 4, "sectionTitle": "一、快速總覽"}, {"no": 63, "source": "110-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "後天性免疫缺乏症候群（acquired immune deficiency syndrome, AIDS）是因為感染人類免疫缺乏病毒 （HIV），造成何種細胞減少？", "options": {"A": "B 細胞", "B": "CD4 T 細胞", "C": "巨噬細胞（macrophage）", "D": "自然殺手細胞（natural killer cell）"}, "answer": "B", "ask": "當愛滋病毒（HIV）大舉入侵人體時，它最喜歡挑哪一種免疫細胞當作宿主進行複製，並將其趕盡殺絕？", "compare": "巨噬細胞與 B 細胞雖然都參與免疫防禦，但誰才是調度整場免疫反應、且表面配有 HIV 專屬受體 CD4 的靈魂指揮官？", "lock": "哪一個細胞的崩潰會直接導致輔助性免疫功能癱瘓，從而定義了後天性免疫缺乏症候群（AIDS）的臨床診斷標準？", "explain": "哎呀，各位同學！這題可是免疫學界的「經典明星題」啊！想像一下，我們的免疫系統就像一支軍隊，而 CD4 T 細胞（也就是輔助型 T 細胞 Helper T cells）就是這支軍隊的「最高總司令」。HIV 病毒這個狡猾的間諜，它的表面蛋白 gp120 就像一把特製鑰匙，專門去配 CD4 T 細胞身上的鎖（CD4 受體）。一旦配對成功，HIV 就會入侵並瘋狂複製，最後把總司令給「撕票」了！總司令一死，B 細胞、巨噬細胞、NK 細胞這些小兵頓時群龍無首、自亂陣腳，這就是為什麼 AIDS 患者會面臨全面性的免疫崩潰。雖然巨噬細胞也會被感染，但真正被斬首、數量呈斷崖式下跌的，絕對是我們的 CD4 T 細胞！所以選 (B) 完全是送分題啦！", "what": "考核 HIV 病毒侵入人體時的主要靶細胞（Target Cell）及其造成的免疫缺陷核心機制。", "trap": "別因為聽到「免疫缺乏」就直覺選了負責製造抗體的 B 細胞！另外，HIV 雖然也會感染巨噬細胞，但真正被病毒大量摧毀、導致數量暴跌並引發 AIDS 典型病症的，依然是 CD4 T 細胞。", "level": 5, "sectionTitle": "一、快速總覽"}], "questions": [{"no": 4, "source": "105-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種病毒感染後，可產生終身免疫？", "options": {"A": "腸病毒", "B": "腺病毒", "C": "流行感冒病毒", "D": "德國麻疹病毒"}, "answer": "D", "ask": "哪一種病毒在人體一次交手之後，就能讓免疫細胞一輩子記住它，再也不敢踏入身體半步？", "compare": "流感病毒那種每年都在變裝的「百變怪」，與結構穩定不變的德國麻疹病毒相比，哪一個才能讓抗體以不變應萬變地守候一生？", "lock": "腸病毒和腺病毒家族成員高達數十種，排除掉這些靠著「人多勢眾」或「快速變異」突破免疫防線的病毒後，誰才是那個終生不改容貌的唯一選項？", "explain": "同學們，想像一下免疫系統是在談戀愛！有些病毒是「百變渣男」，每天都在變裝（像是C選項的流感病毒，基因突變快到像換衣服，今年得過明年還會再來找你）；有些則是「多胞胎家族」（像是A選項腸病毒和B選項腺病毒，型別多達幾十種，你打敗了老大，老二老三還在後面排隊等著虐你）。只有D選項的德國麻疹病毒（Rubella virus），它是個「專情大仁哥」，血清型單一、結構穩定，這輩子就一張臉。只要你的免疫系統跟它交過一次手（不論是自然感染還是打疫苗），抗體就會記住它一輩子，提供你「執子之手，與子偕老」的終身免疫力！", "what": "考驗不同病毒的抗原變異性（血清型多寡與突變速度）如何影響人體免疫記憶的持久性。", "trap": "別把「感冒」跟「終身免疫」混為一談！很多人以為得過腸病毒或腺病毒就沒事了，其實你只是對「其中一種型號」免疫，它們龐大的家族成員隨時準備輪番上陣。至於流感病毒，則是靠著抗原漂移（Antigenic drift）年年大變身，根本沒辦法一勞永逸！"}, {"no": 9, "source": "105-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列有關後天性免疫（adaptive immunity）的敘述，何者錯誤？", "options": {"A": "TH1 只能幫助細胞性免疫反應，不會幫助 B 細胞製造抗體", "B": "IgG 抗體可與自然殺手細胞（natural killer cell）表面的 CD16 結合，幫助自然殺手細胞毒殺標的細胞，稱為 ADCC（antibody-dependent cellular cytotoxicity）", "C": "TH17 細胞分泌 IL-17，活化上皮細胞與嗜中性細胞（neutrophil），促進發炎反應", "D": "IgG 與 IgM 抗體可活化補體，促進免疫反應"}, "answer": "A", "ask": "輔助型 T 細胞和抗體大軍在後天性免疫中扮演著不同角色，我們要如何揪出哪一個選項悄悄抹殺了它們之間的合作關係？", "compare": "輔助型 TH1 細胞難道真的是個只懂細胞免疫、完全不跟 B 細胞打交道的「邊緣人」嗎？相較之下，IgG、IgM 活化補體或協助 NK 細胞進行 ADCC 的機制是否符合它們一貫的作戰風格？", "lock": "試著想想 TH1 所分泌的干擾素-γ（IFN-γ），它除了活化巨噬細胞外，難道不會順便指揮 B 細胞製造特定種類的 IgG 抗體來共同抗敵嗎？", "explain": "同學們，這題我們要來拆解後天性免疫的「跨界聯手」大戲！大家常背「TH1 負責細胞免疫，TH2 負責體液（抗體）免疫」，就以為它們老死不相往來，這是大錯特錯的！TH1 雖然主導細胞免疫，但它分泌的干擾素-γ（IFN-γ）可是個厲害的角色，它會跑去跟 B 細胞咬耳朵，刺激 B 細胞進行抗體轉類（Class Switching），製造出更強力的 IgG 抗體來幫忙。所以選項 A 說它「不會幫助 B 細胞製造抗體」實在是太冤枉 TH1 了！至於其他選項都是百分之百的實話：B 選項的 ADCC 就是 IgG 用尾巴（Fc 段）抓住 NK 細胞表面的 CD16，手牽手去毒殺目標，這招超級經典；C 選項的 TH17 就是發炎界的號角手，狂吹 IL-17 來召喚嗜中性球大軍；D 選項的 IgG 和 IgM 則是補體經典路徑的啟動鑰匙。因此，只有 A 錯得離譜！", "what": "考後天性免疫中，各式 T 細胞亞群（TH1、TH17）與抗體（IgG、IgM）的功能與協同作戰機制。", "trap": "最容易踩到的雷就是把 TH1 與 TH2 的二分法記太死。切記，免疫系統是高度整合的網絡，TH1 的細胞因子一樣會影響 B 細胞的抗體生成類型，絕對不是互不干涉的獨立王國！"}, {"no": 28, "source": "106-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "以下何者不是負擔先天性免疫作用的細胞？", "options": {"A": "自然殺手細胞（Natural killer cell）", "B": "巨噬細胞（Macrophage）", "C": "肥大細胞（Mast cell）", "D": "毒殺性 T 細胞（Cytotoxic T cell）"}, "answer": "D", "ask": "身體裡的免疫細胞哪些是天生自帶戰鬥技能的「即戰力」，哪些又是需要後天特訓才能上場的「特種部隊」？", "compare": "巨噬細胞、肥大細胞與 NK 細胞在面對病原體時，需要像 T 細胞一樣先經過抗原呈現與漫長的特訓分化階段嗎？", "lock": "哪一個細胞擁有高度特異性受體（TCR），必須依賴後天適應性免疫系統的激活才能發揮精準毒殺功能？", "explain": "嘿！各位同學，這題其實是在考我們免疫大軍的「兩大陣營」：不需要特訓、天生就超能打的「先天性免疫（Innate immunity）」，以及需要時間特訓、精準打擊的「後天性免疫（Adaptive immunity）」。我們來看看選項裡的細胞們： * **巨噬細胞 (B)** 和 **肥大細胞 (C)** 就像是身體裡的巡邏警衛和警報器，一看到外來入侵者就直接上去吞噬或釋放組織胺，屬於天生就有的「先天性免疫」基本班底。 * 那 **自然殺手細胞 (NK cell, A)** 呢？雖然它名字裡有「殺手」兩個字，但它其實是個不需經過特訓、天生就懂得消滅異常細胞的「先天性」猛將！ * 但 **毒殺性 T 細胞 (CD8+ T cell, D)** 就不一樣了。T 細胞和 B 細胞是「後天性（適應性）免疫」的超級菁英，它們必須經過胸腺（Thymus）的嚴格特訓，認得特定的抗原（就像是看過身分證編號）之後才能出動精準打擊。它絕對不是「天生」就會隨便攻擊的，而是後天特訓出來的專屬刺客！所以，它不屬於先天性免疫，答案選 D 啦！", "what": "區分「先天性（非特異性）免疫」與「後天性（特異性）免疫」所屬的細胞成員。", "trap": "很多人看到「自然殺手細胞（NK cell）」和「毒殺性 T 細胞（Cytotoxic T cell）」名字裡都有「殺手」或「毒殺」，就以為它們是一家人。請記住，NK 細胞是天生的「第一線殺手」（先天性），而 T 細胞則是需要特訓、認抗原的「後天特種部隊」（後天性），千萬別搞混囉！"}, {"no": 29, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "有關後天性免疫（adaptive immunity），下列敘述何者錯誤？", "options": {"A": "T 淋巴細胞之完整活化需要仰賴抗原呈現細胞（antigen presenting cell）提供黏著因子（adhesion molecules）、MHC+抗原片段、協同刺激分子（co-stimulation molecules）及細胞激素（cytokines）", "B": "巨噬細胞（macrophage）、B 細胞（B lymphocyte）及樹突細胞（dendritic cell）都可以是抗原呈現 細胞（antigen presenting cell）", "C": "B 細胞受體及 T 細胞受體均可與抗原直接結合，啟動受體之活化", "D": "後天性免疫細胞的初始活化位置在二級淋巴器官（淋巴結或脾臟等）"}, "answer": "C", "ask": "T 細胞和 B 細胞在跟抗原「牽手成功」的活化條件上，到底有什麼本質上的不同？", "compare": "游離的抗原可以直接把 B 細胞給激活，但對 T 細胞來說，如果少了 MHC 分子在旁邊牽線搭橋，它有辦法自己去認識外面的抗原嗎？", "lock": "既然 T 細胞受體（TCR）必須高度依賴抗原呈現細胞（APC）上的 MHC 來「餵食」抗原，那麼哪一個選項把 T 細胞和 B 細胞的抗原結合能力混為一談了？", "explain": "嘿，同學們！這題我們來聊聊免疫界的兩大巨頭——T 細胞和 B 細胞的「擇偶條件」（也就是怎麼跟抗原結合啦）。B 細胞（BCR）是個不挑食的豪放派，只要抗原漂過去，它就可以張開雙臂直接跟抗原抱抱（結合）並啟動活化。但我們的 T 細胞（TCR）就傲嬌多了！它是個「重度依賴相親介面」的挑剔鬼，絕對不跟「裸露（游離）」的抗原直接勾搭，必須要靠「抗原呈現細胞（APC）」用 MHC 分子把抗原切成碎片、端到它面前，它才肯看一眼！所以選項 C 說「B 細胞受體及 T 細胞受體均可與抗原直接結合」，這完全是把 T 細胞當成隨便的人了，它哪有這麼容易直接結合？因此 C 是錯的。至於其他選項：A 選項非常完美，T 細胞活化就像求婚，除了 MHC 跟抗原（戒指），還需要黏著因子、協同刺激分子（雙方家長同意）和細胞激素（催化氣氛的音樂），缺一不可；B 選項提到的巨噬、B 細胞和樹突細胞，就是免疫界最專業的「抗原呈現三劍客（APC）」；D 選項也沒錯，未成熟的初始細胞們平時就在二級淋巴器官（像淋巴結、脾臟這個相親廣場）辦派對、等著被活化喔！", "what": "考驗你是否清楚 B 細胞與 T 細胞在認識、結合抗原時，本質上的決定性差異。", "trap": "很多同學會因為「B 細胞和 T 細胞都需要被活化」，就誤以為它們跟抗原接觸的方式一模一樣。請記住：T 細胞是盲目的，沒有 MHC 這個「拐杖」幫忙指引呈現抗原，它根本看不見抗原！"}, {"no": 63, "source": "110-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "後天性免疫缺乏症候群（acquired immune deficiency syndrome, AIDS）是因為感染人類免疫缺乏病毒 （HIV），造成何種細胞減少？", "options": {"A": "B 細胞", "B": "CD4 T 細胞", "C": "巨噬細胞（macrophage）", "D": "自然殺手細胞（natural killer cell）"}, "answer": "B", "ask": "當愛滋病毒（HIV）大舉入侵人體時，它最喜歡挑哪一種免疫細胞當作宿主進行複製，並將其趕盡殺絕？", "compare": "巨噬細胞與 B 細胞雖然都參與免疫防禦，但誰才是調度整場免疫反應、且表面配有 HIV 專屬受體 CD4 的靈魂指揮官？", "lock": "哪一個細胞的崩潰會直接導致輔助性免疫功能癱瘓，從而定義了後天性免疫缺乏症候群（AIDS）的臨床診斷標準？", "explain": "哎呀，各位同學！這題可是免疫學界的「經典明星題」啊！想像一下，我們的免疫系統就像一支軍隊，而 CD4 T 細胞（也就是輔助型 T 細胞 Helper T cells）就是這支軍隊的「最高總司令」。HIV 病毒這個狡猾的間諜，它的表面蛋白 gp120 就像一把特製鑰匙，專門去配 CD4 T 細胞身上的鎖（CD4 受體）。一旦配對成功，HIV 就會入侵並瘋狂複製，最後把總司令給「撕票」了！總司令一死，B 細胞、巨噬細胞、NK 細胞這些小兵頓時群龍無首、自亂陣腳，這就是為什麼 AIDS 患者會面臨全面性的免疫崩潰。雖然巨噬細胞也會被感染，但真正被斬首、數量呈斷崖式下跌的，絕對是我們的 CD4 T 細胞！所以選 (B) 完全是送分題啦！", "what": "考核 HIV 病毒侵入人體時的主要靶細胞（Target Cell）及其造成的免疫缺陷核心機制。", "trap": "別因為聽到「免疫缺乏」就直覺選了負責製造抗體的 B 細胞！另外，HIV 雖然也會感染巨噬細胞，但真正被病毒大量摧毀、導致數量暴跌並引發 AIDS 典型病症的，依然是 CD4 T 細胞。"}]}, {"title": "二、先天與後天防線", "stars": "★★★★★", "intro": "這一段把防線從快反應到專一反應串起來，讀的重點是「誰先、誰專一、誰有記憶」。", "cram": ["吞噬、發炎、發燒屬先天防線；抗體與專一性 T 細胞反應屬後天防線。", "體液性免疫以 B 細胞與抗體為主；細胞性免疫以 T 細胞效應為主。", "NK 細胞雖是淋巴球，仍屬先天免疫。"], "concepts": [{"title": "吞噬作用", "plain": "吞噬作用是吞噬細胞攝入、分解並清除外來微生物或細胞碎片的非專一性防禦機制。", "analogy": "建議比喻：吞噬細胞像清潔隊兼鑑識人員。", "mechanism": "微生物入侵後，趨化因子吸引嗜中性白血球、單核球與巨噬細胞聚集；調理素附著於病原表面，可增強吞噬。外來物被吞入後形成吞噬泡，與溶小體融合成吞噬溶小體，利用溶解酶、鹼性蛋白與氧化殺菌物質清除病原。部分病原如結核分枝桿菌可在吞噬細胞內存活。", "diagrams": [], "focus": "調理作用可增加吞噬效率；C3b 與 IgG 都可作為重要調理因子。", "confusion": "- 吞噬細胞不只吞病原，也可呈獻抗原。 - 被吞噬不一定等於病原已死亡。"}, {"title": "發炎與發燒", "plain": "發炎是組織受傷或感染後的局部防禦反應；發燒是感染或發炎引起的全身性體溫調節反應。", "analogy": "建議比喻：發炎像封鎖現場、調派人力與限制擴散。", "mechanism": "組織傷害、病原與吞噬細胞聚集會刺激肥大細胞釋放組織胺、前列腺素、白三烯等，造成紅、熱、腫、痛。微血管擴張與通透性增加使血漿外滲，纖維蛋白限制病原擴散，趨化因子吸引白血球。發燒則由內生性致熱原如 IL-1、IL-6、TNF-alpha、IFN-alpha 或外生性致熱原 LPS 促使下視丘提高控溫點。", "diagrams": [], "focus": "IL-1 是重要內生性致熱原；LPS 是典型外生性致熱原。", "confusion": "- 發炎是局部反應，發燒是全身性調溫反應。 - 發燒不等於病原被直接殺死。"}, {"title": "體液性免疫", "plain": "體液性免疫是以抗體等體液中分子為主要武器，清除細胞外病原、毒素或抗原的免疫反應。", "analogy": "建議比喻：第一次像建檔，第二次像直接叫出熟悉隊伍。", "mechanism": "抗原第一次進入體內後，B 細胞以 BCR 辨認抗原，將抗原內化、處理，並透過 MHC II 呈現給 Tfh／輔助型 T 細胞。T 細胞提供 CD40–CD40L 與細胞激素訊號，促使 B 細胞克隆增殖，分化為漿細胞與記憶 B 細胞，並進行抗體類別轉換。初次反應以 IgM 為主，較慢且短；相同抗原再次進入時，記憶 B 細胞快速活化，二次反應常以 IgG 為主，速度快、親和力高、維持久。", "diagrams": [{"title": "B 細胞活化與體液性免疫", "nodes": [{"id": "A", "label": "抗原進入"}, {"id": "B", "label": "BCR 辨認抗原"}, {"id": "C", "label": "B 細胞內化與處理抗原"}, {"id": "D", "label": "MHC II 呈現給 Tfh／輔助型 T 細胞"}, {"id": "E", "label": "CD40–CD40L＋細胞激素"}, {"id": "F", "label": "克隆增殖與類別轉換"}, {"id": "G", "label": "漿細胞分泌抗體"}, {"id": "H", "label": "記憶 B 細胞"}, {"id": "I", "label": "初次 IgM；二次常以 IgG 為主"}], "edges": [{"from": "A", "to": "B"}, {"from": "B", "to": "C"}, {"from": "C", "to": "D"}, {"from": "D", "to": "E"}, {"from": "E", "to": "F"}, {"from": "F", "to": "G"}, {"from": "F", "to": "H"}, {"from": "G", "to": "I"}]}], "focus": "初次反應 IgM 為主；二次反應 IgG 為主，快、強、久、親和力高。", "confusion": "- 體液性免疫主要處理細胞外目標，不適合單獨清除細胞內感染。 - 記憶細胞不等於短命漿細胞。", "table": {"title": "體液性免疫與細胞性免疫對照", "headers": ["項目", "體液性免疫", "細胞性免疫"], "rows": [["主要角色", "B 細胞、漿細胞、抗體", "T 細胞、巨噬細胞、NK"], ["主要目標", "細胞外病原、毒素", "細胞內病原、腫瘤、移植物"], ["效應方式", "中和、凝集、補體、調理", "細胞毒殺、細胞激素活化"], ["記憶來源", "記憶 B 細胞", "記憶 T 細胞"], ["國考文字陷阱", "抗體不是自己吞噬病原", "細胞性免疫不等於只有 CD8"]]}}, {"title": "細胞性免疫", "plain": "細胞性免疫是以 T 細胞、NK 細胞、巨噬細胞等效應細胞為主，攻擊細胞內病原或異常細胞的免疫反應。", "analogy": "建議比喻：抗體抓外面的敵人，T 細胞處理躲進細胞裡的敵人。", "mechanism": "細胞性免疫適合處理病毒、部分細胞內細菌或原蟲、腫瘤細胞與移植物。T 細胞無法直接辨識游離抗原決定位，需 APC 將抗原分解並以 MHC 呈獻後辨識。CD8+ T 細胞可直接毒殺感染細胞；CD4+ T 細胞分泌細胞激素調節巨噬細胞、B 細胞、T 細胞與其他效應細胞；NK 細胞則可非專一性毒殺異常細胞。", "diagrams": [], "focus": "體液性免疫處理細胞外目標；細胞性免疫處理細胞內感染、腫瘤與移植物。", "confusion": "- 細胞性免疫不是沒有細胞激素，反而高度依賴細胞激素調控。 - NK 細胞參與細胞毒殺，但不屬典型抗原專一性 T 細胞反應。", "table": {"title": "細胞性免疫主要效應細胞對照", "headers": ["項目", "CD4 輔助型 T 細胞", "CD8 毒殺型 T 細胞", "NK 細胞"], "rows": [["辨識方式", "MHC II 上抗原", "MHC I 上抗原", "非專一，常見低 MHC I"], ["主要功能", "指揮與調節", "直接毒殺感染細胞", "快速毒殺異常細胞"], ["典型武器", "細胞激素", "穿孔素、顆粒酶", "穿孔素、ADCC"], ["免疫歸屬", "後天細胞性免疫", "後天細胞性免疫", "先天免疫"], ["國考文字陷阱", "HIV 主要攻 CD4", "CD8 不是 HIV 主要結合目標", "NK 是淋巴球但不是典型 T 細胞"]]}}], "gameQuestions": [{"no": 8, "source": "105-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列那一種疫苗注射方式，可以最有效而快速的誘發抗體產生？", "options": {"A": "低濃度的抗原疫苗", "B": "高濃度的抗原疫苗", "C": "混合佐劑的抗原疫苗", "D": "高純度的蛋白疫苗"}, "answer": "C", "ask": "怎樣的疫苗配方才能像加裝了推進器一樣，讓我們的免疫系統瞬間警覺並瘋狂製造抗體？", "compare": "單純靠拉高抗原的量或純度，跟在抗原旁加入一個能持續敲鑼打鼓、刺激免疫細胞的「輔助角色」，哪一種更能在體內掀起強烈的免疫反應？", "lock": "哪一個選項中提到的疫苗配方，具備了刺激非特異性免疫、延緩抗原釋放以達到最強免疫效果的關鍵要素？", "explain": "同學們好！這題考的是疫苗學裡的超級巨星！想像一下，如果我們把抗原（疫苗的主角）單槍匹馬送進體內，免疫系統的警衛們（抗原呈現細胞）可能會覺得它太溫和，拍拍屁股就把它代謝掉、根本懶得理它。這時候，我們需要一個「神隊友」叫做「佐劑 (Adjuvant)」！佐劑就像是在抗原旁邊放鞭炮、大喊「這裡有壞人！」，它能延緩抗原在體內的釋放，還能狠狠刺激免疫細胞，讓免疫大軍瞬間警覺、迅速動員起來製造大量抗體！再看看其他選項：(A)低濃度根本激不起漣漪；(B)高濃度雖然抗原多，但沒有危險訊號，免疫細胞可能裝聾作啞，甚至導致免疫耐受性；(D)純化過頭的蛋白質太乾淨、太溫柔，沒有佐劑幫忙，免疫系統根本沒感覺。所以，混合佐劑的 (C) 才是最威猛的催化劑！", "what": "考疫苗中「佐劑 (Adjuvant)」能增強並加速免疫反應的核心生理機制。", "trap": "別看到「高濃度」或「高純度」就衝動選下去！免疫系統是非常現實的，光是抗原「多」或「純」沒用，如果沒有佐劑扮演「危險訊號」來敲鑼打鼓，免疫細胞只會把抗原當作無害物質默默清除，甚至可能產生免疫耐受。", "level": 1, "sectionTitle": "二、先天與後天防線"}, {"no": 20, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列分子可與 B7-1/B7-2（CD80/CD86）結合後，抑制 T 細胞活化的為：", "options": {"A": "CD28", "B": "CTLA-4（CD152）", "C": "CD4", "D": "CD2"}, "answer": "B", "ask": "當 T 細胞為了避免免疫過度活化而需要踩下煞車時，哪一個受體會主動去搶奪 B7 分子以傳遞抑制訊號？", "compare": "同樣是與 B7 結合，CD28 與 CTLA-4 傳遞給 T 細胞的指令分別是加速還是減速？", "lock": "結合上述油門與煞車的機制，哪一個受體擁有超越 CD28 的親和力，能成功搶走 B7 並徹底澆熄 T 細胞的怒火？", "explain": "各位同學，上課啦！想像一下，活化 T 細胞就像是開一台超級跑車。首先，你需要插鑰匙發動引擎（TCR 偵測到抗原）；接著，你得踩下油門，車子才會衝出去——這個「油門」就是 T 細胞上的 CD28 結合上 APC 上的 B7-1/B7-2。但是，車子一直狂飆是會出車禍的（免疫系統暴走會導致自體免疫疾病），所以我們需要一腳踩下「煞車」！這個超級煞車就是 CTLA-4（又叫 CD152）。它非常霸道，對 B7-1/B7-2 的親和力比 CD28 還要高，會直接把 B7 搶過來結合，並向 T 細胞發出「冷靜、停下！」的抑制訊號。至於選項中的 CD4 是輔助 T 細胞的共受體（負責認 MHC-II），CD2 則是負責黏附與協同活化的分子，跟這個煞車機制沒關係喔！所以這題選 B，CTLA-4 就是那塊最強煞車皮！", "what": "考 T 細胞活化調控中，負責踩煞車的「共抑制分子（Co-inhibitory receptor）」與其配體的結合關係。", "trap": "最容易搞混的就是 CD28 和 CTLA-4！它們兩個是情敵，爭奪的對象都是 B7（CD80/CD86），但 CD28 是發動活化的「油門」，CTLA-4 才是抑制活化的「煞車」。", "level": 2, "sectionTitle": "二、先天與後天防線"}, {"no": 39, "source": "108-1", "cognitive": "理解/機轉", "difficulty": "易", "stem": "T 細胞與 B 細胞的交互作用能增強宿主對抗微生物的防禦。下列何者不需要 T 細胞的參與？", "options": {"A": "B 細胞從產生 IgM 的反應轉變成 IgG", "B": "對細菌夾膜多醣快速產生抗體反應", "C": "刺激 B 細胞的增殖與分化", "D": "引起續發性、加強抗體反應"}, "answer": "B", "ask": "免疫系統中的 B 細胞在面對哪一種外來抗原時，不需要大兵 T 細胞的加持，自己就能單槍匹馬、快速分泌抗體出來應戰？", "compare": "蛋白質類的抗原與細菌莢膜這類重複性極高的多醣體抗原，在刺激 B 細胞活化時，對於 T 細胞輔助的需求與抗體種類有何不同？", "lock": "哪一個選項中的抗原化學成分根本不是蛋白質，導致 T 細胞完全無法辨識它，因而只能由 B 細胞獨自快速產生抗體？", "explain": "各位同學，這題其實在考免疫學界的「獨立宣言」！我們體內的 B 細胞平時就像個需要家長陪同的小朋友，要做大事（比如產生更強的 IgG 抗體、進行抗體類別轉換、或者變成有記憶力的細胞）都需要 T 細胞這位大哥哥（Helper T cell）在旁邊分泌細胞激素、給予刺激信號，這叫做「T細胞依賴型抗原（TD antigen）」反應，也就是選項 A、C、D 的狀況。 但偏偏有一種特例叫做「非T細胞依賴型抗原（TI antigen）」，最經典的代表就是**細菌莢膜上的多醣體**！這些多醣體就像一串重複排好、黏糊糊的糖葫蘆，可以直接把 B 細胞表面的抗原接受器（BCR）全部串聯並牢牢綁在一起（Cross-linking）。這時候 B 細胞會瞬間爽度破表、當場活化，不需要 T 細胞的甜言蜜語，自己就能「快速」暴走並分泌抗體（主要是 IgM）來禦敵！所以，細菌莢膜多醣引起的抗體反應是不需要 T 細胞參與的！", "what": "考「T細胞依賴型抗原（TD）」與「非T細胞依賴型抗原（TI）」的免疫反應機制差異。", "trap": "很多同學一看到「產生抗體」就以為一定要有 T-B 交互作用。要記住，T 細胞的 TCR 只能辨識由 MHC 呈現的「蛋白質/胜肽」片段。多醣體、脂多醣這類「非蛋白質」的抗原，T 細胞根本看不懂，因此它們只能透過直接交叉連結 BCR 來繞過 T 細胞，走「TI」路線！", "level": 3, "sectionTitle": "二、先天與後天防線"}, {"no": 92, "source": "114-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "效應 TH1 細胞可以提供那兩種訊號幫助巨噬細胞進一步活化？", "options": {"A": "PD1-PD-L1；TNF-α", "B": "CD40L-CD40；IFN-γ", "C": "CD28-B7；IL-10", "D": "TCR-MHC；IL-2"}, "answer": "B", "ask": "Th1 細胞要派出哪兩位特使（一個是手拉手的表面分子，一個是隔空喊話的細胞激素），才能把疲憊的巨噬細胞瞬間變身為無敵破壞王？", "compare": "當我們需要免疫戰力升級時，會選擇讓人踩煞車、想睡覺的 PD-1 或 IL-10，還是要挑選能吹起進攻號角的干擾素與活化受體？", "lock": "想想看，當巨噬細胞拿著抗原去找 Th1 訴苦時，Th1 該伸出哪一隻「配體之手」去握住巨噬細胞的 CD40 受體，並同時噴灑哪一種最經典的巨噬細胞活化劑？", "explain": "巨噬細胞雖然是免疫界的「大胃王」，但有時候光靠自己吞噬病原體還不夠，需要 Th1 細胞（效應 T Helper 1 細胞）來幫忙「開外掛」才能徹底消滅體內的細菌。這就像教練要激勵選手一樣，需要給予「雙重刺激」！第一重刺激是『親密接觸』：Th1 細胞表面會表達 CD40L（CD40 配體），去緊緊握住巨噬細胞上的 CD40。第二重刺激是『化學助攻』：Th1 細胞會分泌干擾素 IFN-γ，這可是巨噬細胞最強效的「蠻牛」提神飲料！當這兩個訊號同時到位，巨噬細胞就會瞬間暴走，殺菌力大增！至於其他選項：A 的 PD-1/PD-L1 是免疫煞車（會讓免疫細胞睡著）；C 的 IL-10 是抑制性細胞激素，而 CD28-B7 是用來活化 T 細胞，不是活化巨噬細胞的；D 的 IL-2 則是 T 細胞自己拿來促進分裂用的生長因子，沒辦法幫巨噬細胞開外掛喔！", "what": "考點在於 Th1 細胞活化巨噬細胞所需的雙重協同刺激訊號（細胞表面接觸與特定細胞激素）。", "trap": "考生最容易把「抗原呈現細胞（如巨噬細胞）去活化 T 細胞」的訊號（CD28-B7），跟「T 細胞回頭去活化巨噬細胞」的訊號（CD40L-CD40）給搞混了。另外，只要看到 IL-10 或 PD-1 這種免疫抑製性的分子，就要立刻排除在「活化」的選項之外！", "level": 4, "sectionTitle": "二、先天與後天防線"}, {"no": 97, "source": "114-3", "cognitive": "應用", "difficulty": "中", "stem": "面對胞外細菌感染時，下列那種效應 CD4+ T 細胞對強化嗜中性球驅化反應貢獻較大？", "options": {"A": "TH1", "B": "TH2", "C": "TH17", "D": "Treg"}, "answer": "C", "ask": "當身體遭到游離在細胞外的細菌入侵時，哪一種 CD4+ T 細胞能發出強大訊號，把擅長吞噬的嗜中性球大軍瘋狂吸引到戰場第一線？", "compare": "防禦胞內病毒與細菌的 Th1、負責寄生蟲與過敏的 Th2、負責踩煞車的 Treg，以及分泌介白素-17 的 Th17，誰才是召募嗜中性球的專業大戶？", "lock": "哪一個輔助型 T 細胞亞群的名稱，正好暗示了它能分泌與動員嗜中性球密切相關的關鍵介白素（IL-17）？", "explain": "哈囉同學們！今天我們來聊聊 CD4+ T 細胞這群「免疫界的神盾局局長」！當身體遇到敵人時，局長會根據敵情分化成不同的「特遣隊」來指揮作戰。這次的敵人是「胞外細菌」，而防禦胞外細菌最厲害的武器就是「嗜中性球（Neutrophil）」。那麼，是誰負責把這群嗜中性球大軍「驅化（召喚）」過來的呢？答案就是 Th17（選項 C）！Th17 就像是熱血的警報器，它會分泌介白素-17（IL-17），刺激局部組織釋放趨化因子，把嗜中性球通通吸過來吃掉細菌。至於其他特遣隊：Th1（選項 A）主要去對付「胞內」病原體（如結核菌或病毒），召喚的是巨噬細胞；Th2（選項 B）是去對付寄生蟲與搞出過敏的，召喚的是嗜酸性球；Treg（選項 D）則是「和事佬」，負責叫大家收兵不要再打了。所以，要找對付胞外菌並呼喚嗜中性球的盟友，絕對要選 Th17 啦！", "what": "考查 CD4+ 輔助型 T 細胞（Th1、Th2、Th17、Treg）的功能分工，特別是 Th17 在胞外細菌感染中召喚嗜中性球的角色。", "trap": "考生最容易看到「細菌」兩個字就衝動選了 Th1！請一定要看清楚是「胞內」還是「胞外」。胞內菌感染找 Th1（激活巨噬細胞），胞外菌與真菌感染則是找 Th17（召喚嗜中性球），這兩個哥們的分工千萬別搞混囉！", "level": 5, "sectionTitle": "二、先天與後天防線"}], "questions": [{"no": 8, "source": "105-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列那一種疫苗注射方式，可以最有效而快速的誘發抗體產生？", "options": {"A": "低濃度的抗原疫苗", "B": "高濃度的抗原疫苗", "C": "混合佐劑的抗原疫苗", "D": "高純度的蛋白疫苗"}, "answer": "C", "ask": "怎樣的疫苗配方才能像加裝了推進器一樣，讓我們的免疫系統瞬間警覺並瘋狂製造抗體？", "compare": "單純靠拉高抗原的量或純度，跟在抗原旁加入一個能持續敲鑼打鼓、刺激免疫細胞的「輔助角色」，哪一種更能在體內掀起強烈的免疫反應？", "lock": "哪一個選項中提到的疫苗配方，具備了刺激非特異性免疫、延緩抗原釋放以達到最強免疫效果的關鍵要素？", "explain": "同學們好！這題考的是疫苗學裡的超級巨星！想像一下，如果我們把抗原（疫苗的主角）單槍匹馬送進體內，免疫系統的警衛們（抗原呈現細胞）可能會覺得它太溫和，拍拍屁股就把它代謝掉、根本懶得理它。這時候，我們需要一個「神隊友」叫做「佐劑 (Adjuvant)」！佐劑就像是在抗原旁邊放鞭炮、大喊「這裡有壞人！」，它能延緩抗原在體內的釋放，還能狠狠刺激免疫細胞，讓免疫大軍瞬間警覺、迅速動員起來製造大量抗體！再看看其他選項：(A)低濃度根本激不起漣漪；(B)高濃度雖然抗原多，但沒有危險訊號，免疫細胞可能裝聾作啞，甚至導致免疫耐受性；(D)純化過頭的蛋白質太乾淨、太溫柔，沒有佐劑幫忙，免疫系統根本沒感覺。所以，混合佐劑的 (C) 才是最威猛的催化劑！", "what": "考疫苗中「佐劑 (Adjuvant)」能增強並加速免疫反應的核心生理機制。", "trap": "別看到「高濃度」或「高純度」就衝動選下去！免疫系統是非常現實的，光是抗原「多」或「純」沒用，如果沒有佐劑扮演「危險訊號」來敲鑼打鼓，免疫細胞只會把抗原當作無害物質默默清除，甚至可能產生免疫耐受。"}, {"no": 10, "source": "106-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "人類免疫不全病毒（Human Immunodeficiency Virus）主要是藉由結合淋巴球細胞表面何種目標物進 入淋巴球細胞？", "options": {"A": "CD4", "B": "CD8", "C": "CD20", "D": "CD23"}, "answer": "A", "ask": "當 HIV 準備入侵我們免疫系統的指揮中心時，它必須在淋巴球表面找到哪一個特定的「迎賓大門」才能順利通關？", "compare": "輔助型 T 細胞（CD4+）與毒殺型 T 細胞（CD8+）在免疫防禦中各司其職，哪一個才是會被 HIV 盯上並導致免疫缺陷的關鍵細胞標記？", "lock": "回想一下愛滋病（AIDS）患者臨床上最常被監控、且數量會直直落的那種 T 細胞亞群，其表面最指標性的分化群（CD）編號是幾號？", "explain": "嗨，各位同學！今天我們來聊聊大名鼎鼎、讓人聞之色變的 HIV（愛滋病毒）。這傢伙根本是個「愛情騙子」，它在進入人體後，最喜歡找我們的 T 淋巴球調情。但它不是隨便亂敲門的，它身上帶著一把特製的鑰匙（gp120），專門用來開特定淋巴球表面上的那一副鎖。這副關鍵的「鎖鎖」就是 CD4！只要一結合，HIV 就能順利滑進輔助型 T 細胞（Helper T cells）內部開始大搞破壞。至於其他選項呢？CD8 是毒殺型 T 細胞的標記，雖然也是 T 細胞，但不是 HIV 的真愛；CD20 是 B 細胞的經典身分證，跟 B 細胞活化有關（也是臨床藥物常用的靶點）；CD23 則是跟 IgE 結合的低親和力受體。所以囉，HIV 認準的就是 CD4，這就是為什麼愛滋病患者的 CD4 T 細胞會被榨乾、數量崩跌的原因啦！", "what": "考你 HIV 病毒入侵免疫細胞時，所辨識的關鍵宿主細胞表面受體（CD 分子）。", "trap": "很多同學常把 T 細胞表面的 CD4（輔助型）和 CD8（毒殺型）搞混。請記住，HIV 摧毀的是我們免疫系統的「指揮官」，所以它綁架的絕對是 CD4，別看到 T 細胞就興奮地亂選 CD8 喔！"}, {"no": 13, "source": "106-1", "cognitive": "理解/機轉", "difficulty": "易", "stem": "關於經過多次疫苗注射後，所產生的免疫反應下列敘述何者正確？", "options": {"A": "所產生的抗體以 IgM 為主", "B": "誘發的免疫反應比較快", "C": "抗體的親合力變低", "D": "抗體的濃度低"}, "answer": "B", "ask": "當身體被同一個疫苗刺激好幾次之後，我們的免疫大軍在反應速度、抗體種類和戰鬥力上會出現什麼奇妙的升級變化？", "compare": "初次見面派出的新手兵器 IgM，和身經百戰、經過親和力熟成後的精銳部隊相比，誰的反應更神速、黏得更牢？", "lock": "哪一個選項精準描述了免疫記憶被喚醒時，抗體源源不絕且瞬間爆發的「天下武功，唯快不破」特質？", "explain": "把你的免疫系統想像成一家公司的保全。當第一劑疫苗進來時，保全們手忙腳亂，花了一兩個禮拜才搞清楚狀況，勉強丟出一些新手級的武器「IgM」來應戰。但當我們注射多次疫苗後，免疫系統早就把這張通緝犯的臉刻在腦海裡了！一看到老對手再度上門，記憶型 B 細胞會瞬間甦醒，立刻大量生產升級版的重裝武器「IgG」。這時候的反應不僅快如閃電，抗體濃度也是高到破表，甚至連抓取抗原的緊密度（親合力）也經過「親合力成熟（affinity maturation）」而變得極高、黏得超緊！因此，選項B說誘發的反應比較快是完全正確的；而這時主要抗體會是 IgG 而非 IgM（A錯）、親合力會變高（C錯）、抗體濃度會很高（D錯）。", "what": "考的是二次免疫反應（Secondary immune response）與初次免疫反應相比，所具有的「快、狠、準（高濃度、IgG為主、高親和力）」特徵。", "trap": "考生最常把初次免疫反應（Primary）和二次免疫反應（Secondary）的抗體類型搞混。請牢記：初次見面用 IgM 打招呼，再次相遇就用升級版 IgG 痛擊！"}, {"no": 20, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列分子可與 B7-1/B7-2（CD80/CD86）結合後，抑制 T 細胞活化的為：", "options": {"A": "CD28", "B": "CTLA-4（CD152）", "C": "CD4", "D": "CD2"}, "answer": "B", "ask": "當 T 細胞為了避免免疫過度活化而需要踩下煞車時，哪一個受體會主動去搶奪 B7 分子以傳遞抑制訊號？", "compare": "同樣是與 B7 結合，CD28 與 CTLA-4 傳遞給 T 細胞的指令分別是加速還是減速？", "lock": "結合上述油門與煞車的機制，哪一個受體擁有超越 CD28 的親和力，能成功搶走 B7 並徹底澆熄 T 細胞的怒火？", "explain": "各位同學，上課啦！想像一下，活化 T 細胞就像是開一台超級跑車。首先，你需要插鑰匙發動引擎（TCR 偵測到抗原）；接著，你得踩下油門，車子才會衝出去——這個「油門」就是 T 細胞上的 CD28 結合上 APC 上的 B7-1/B7-2。但是，車子一直狂飆是會出車禍的（免疫系統暴走會導致自體免疫疾病），所以我們需要一腳踩下「煞車」！這個超級煞車就是 CTLA-4（又叫 CD152）。它非常霸道，對 B7-1/B7-2 的親和力比 CD28 還要高，會直接把 B7 搶過來結合，並向 T 細胞發出「冷靜、停下！」的抑制訊號。至於選項中的 CD4 是輔助 T 細胞的共受體（負責認 MHC-II），CD2 則是負責黏附與協同活化的分子，跟這個煞車機制沒關係喔！所以這題選 B，CTLA-4 就是那塊最強煞車皮！", "what": "考 T 細胞活化調控中，負責踩煞車的「共抑制分子（Co-inhibitory receptor）」與其配體的結合關係。", "trap": "最容易搞混的就是 CD28 和 CTLA-4！它們兩個是情敵，爭奪的對象都是 B7（CD80/CD86），但 CD28 是發動活化的「油門」，CTLA-4 才是抑制活化的「煞車」。"}, {"no": 25, "source": "106-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "後天免疫缺乏症候群（acquired immunodeficiency syndrome, AIDS）主要是那一種免疫細胞被病毒破 壞所造成？", "options": {"A": "CD4 陽性 T 淋巴球細胞", "B": "CD8 陽性 T 淋巴球細胞", "C": "CD20 陽性 B 淋巴球細胞", "D": "CD30 陽性淋巴球細胞"}, "answer": "A", "ask": "愛滋病毒（HIV）在入侵人體時，究竟是找哪一種免疫細胞當作它的秘密基地，並將其摧毀導致免疫系統癱瘓？", "compare": "負責指揮免疫大軍的輔助型 T 細胞，與負責直接殺敵的殺手 T 細胞，它們表面上用來辨識身份的 CD 抗原標記有何不同？", "lock": "哪一個 CD 分子是 HIV 病毒上的糖蛋白 gp120 最完美的「鎖孔」，能讓病毒順利結合並入侵細胞？", "explain": "愛滋病毒（HIV）這傢伙挑剔得很，它在挑選寄生對象時，就像拿著鑰匙找鎖一樣！它身上的糖蛋白 gp120 偏偏對 CD4 分子一見鐘情，而 CD4 正好是輔助型 T 細胞（Helper T cell）的專屬招牌。當 HIV 把 CD4 陽性 T 細胞當作宿主、拼命複製並無情摧毀後，我們免疫系統的「總司令」就倒下了。沒有了總司令的指揮，B 細胞不知道怎麼製造抗體，CD8 殺手 T 細胞也失去活性，整個免疫大軍瞬間潰不成軍，這就是愛滋病（AIDS）的悲慘由來。 我們來看看其他陪榜選項： (B) CD8 陽性 T 細胞是負責直接殺敵的「殺手細胞」，它身上沒有 CD4 這個鎖孔，所以不是 HIV 的首要目標。 (C) CD20 是 B 細胞的標記，雖然免疫崩潰後 B 細胞也會失能，但它不是病毒直接攻擊的對象。 (D) CD30 則與特定淋巴瘤或活化淋巴細胞有關，跟這題沒關係。所以，記住 HIV 就是專門暗殺我們 CD4+ 總司令的刺客！", "what": "愛滋病毒（HIV）主要藉由結合 CD4 受體，特異性地侵犯並破壞 CD4+ T 淋巴球（輔助型 T 細胞）。", "trap": "雖然愛滋病患者最終是「全身免疫力崩潰」，但病毒直接寄生與破壞的「元兇靶細胞」只有帶有 CD4 的 T 細胞，千萬不要把 CD4（輔助型）與 CD8（胞毒型/殺手）這兩個 T 細胞雙子星記反了喔！"}, {"no": 30, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列有關人類免疫缺陷病毒（human immunodeficiency virus）的敘述，何者錯誤？", "options": {"A": "屬 RNA 病毒", "B": "以 gp120 與 T 細胞表面的 CD4 分子結合", "C": "潛伏期中，CD4 陽性 T 細胞的數量不會減少", "D": "患者死亡原因主要是因為伺機性感染及腫瘤"}, "answer": "C", "ask": "當 HIV 病毒入侵並潛伏在人體內時，我們的免疫大軍真的能安然無恙、毫髮無傷嗎？", "compare": "無症狀的「臨床潛伏期」是指病人外表沒有發病症狀，但體內病毒與 T 細胞的戰爭會因此按暫停鍵，還是其實依然在進行殘酷的消耗戰？", "lock": "哪一個選項完全忽略了 HIV 即使在無症狀期間，依然會持續暗中摧毀免疫大軍，導致 CD4+ T 細胞數量逐年下滑的醫學事實？", "explain": "同學們，這題考的是大名鼎鼎的愛滋病毒（HIV）！我們用輕鬆的邏輯來拆解它： 首先，HIV 確實是個「逆轉錄 RNA 病毒」（選項 A 沒錯），它的基因組就是 RNA。這傢伙非常挑剔，它要入侵人體，必須拿著表面的 gp120 這把「鑰匙」，精準地去插在輔助型 T 細胞表面的 CD4 「鎖孔」上（選項 B 正確）。 那感染之後呢？千萬別被「潛伏期」這三個字騙了！在臨床潛伏期（無症狀期）時，病毒其實根本沒在睡覺，它正在瘋狂跟免疫系統打消耗戰。雖然外表看起來沒事，但體內的 CD4 陽性 T 細胞其實是以「每天都在緩慢減少」的速度在陣亡（所以選項 C 說『不會減少』完全是鬼扯，這就是錯誤選項、我們的正確答案！）。 最後，當 CD4+ T 細胞被消耗殆盡，人體免疫防線徹底崩潰，原本不起眼的小感冒、黴菌，甚至腫瘤就會乘虛而入，這就是所謂的「伺機性感染」，也是患者不幸離世的主因（選項 D 正確）。", "what": "考查 HIV 病毒的結構特性、致病機轉（與 CD4 結合），以及在潛伏期時 CD4 陽性 T 細胞數量的動態減少趨勢。", "trap": "最容易踩雷的地方就是「潛伏期」三個字！很多人會誤以為潛伏期就是病毒在冬眠、免疫細胞放假，所以數量不變。記住，這是一場無聲的割喉戰，CD4+ T 細胞一直在默默陣亡！"}, {"no": 39, "source": "108-1", "cognitive": "理解/機轉", "difficulty": "易", "stem": "T 細胞與 B 細胞的交互作用能增強宿主對抗微生物的防禦。下列何者不需要 T 細胞的參與？", "options": {"A": "B 細胞從產生 IgM 的反應轉變成 IgG", "B": "對細菌夾膜多醣快速產生抗體反應", "C": "刺激 B 細胞的增殖與分化", "D": "引起續發性、加強抗體反應"}, "answer": "B", "ask": "免疫系統中的 B 細胞在面對哪一種外來抗原時，不需要大兵 T 細胞的加持，自己就能單槍匹馬、快速分泌抗體出來應戰？", "compare": "蛋白質類的抗原與細菌莢膜這類重複性極高的多醣體抗原，在刺激 B 細胞活化時，對於 T 細胞輔助的需求與抗體種類有何不同？", "lock": "哪一個選項中的抗原化學成分根本不是蛋白質，導致 T 細胞完全無法辨識它，因而只能由 B 細胞獨自快速產生抗體？", "explain": "各位同學，這題其實在考免疫學界的「獨立宣言」！我們體內的 B 細胞平時就像個需要家長陪同的小朋友，要做大事（比如產生更強的 IgG 抗體、進行抗體類別轉換、或者變成有記憶力的細胞）都需要 T 細胞這位大哥哥（Helper T cell）在旁邊分泌細胞激素、給予刺激信號，這叫做「T細胞依賴型抗原（TD antigen）」反應，也就是選項 A、C、D 的狀況。 但偏偏有一種特例叫做「非T細胞依賴型抗原（TI antigen）」，最經典的代表就是**細菌莢膜上的多醣體**！這些多醣體就像一串重複排好、黏糊糊的糖葫蘆，可以直接把 B 細胞表面的抗原接受器（BCR）全部串聯並牢牢綁在一起（Cross-linking）。這時候 B 細胞會瞬間爽度破表、當場活化，不需要 T 細胞的甜言蜜語，自己就能「快速」暴走並分泌抗體（主要是 IgM）來禦敵！所以，細菌莢膜多醣引起的抗體反應是不需要 T 細胞參與的！", "what": "考「T細胞依賴型抗原（TD）」與「非T細胞依賴型抗原（TI）」的免疫反應機制差異。", "trap": "很多同學一看到「產生抗體」就以為一定要有 T-B 交互作用。要記住，T 細胞的 TCR 只能辨識由 MHC 呈現的「蛋白質/胜肽」片段。多醣體、脂多醣這類「非蛋白質」的抗原，T 細胞根本看不懂，因此它們只能透過直接交叉連結 BCR 來繞過 T 細胞，走「TI」路線！"}, {"no": 40, "source": "108-1", "cognitive": "理解/機轉", "difficulty": "易", "stem": "下列何者與 CD8 T 細胞的作用較無關？", "options": {"A": "清除腫瘤細胞", "B": "清除病毒感染的細胞", "C": "分泌多種細胞激素幫助產生抗體", "D": "誘發標的細胞（target cells）的細胞凋亡"}, "answer": "C", "ask": "CD8+ T 細胞在免疫系統中扮演的角色是冷酷的殺手還是熱心的協調者？我們需要找出哪一個功能不屬於這位「胞毒戰士」的守備範圍。", "compare": "殺死腫瘤、消滅被病毒入侵的細胞，以及逼迫壞細胞自我毀滅，這些直接動手的活是誰的工作？而負責在幕後發號施令、拉攏 B 細胞產生抗體的，又是哪一類細胞的看家本領？", "lock": "當我們把「直接動手殺敵」與「動口協調作戰」的功能區分開來時，哪一個選項明顯跑錯棚，屬於輔助型 T 細胞（CD4+）的專屬業務？", "explain": "同學們，把 CD8+ T 細胞想像成我們免疫界的「冷酷殺手」（Cytotoxic T cell, CTL）就對了！殺手的本分是什麼？當然就是「殺」！不管是長歪的腫瘤細胞（選項 A），還是被病毒寄生、無藥可救的宿主細胞（選項 B），CD8+ T 細胞都會毫不留情地衝上去，用穿孔素（perforin）和顆粒酶（granzyme）逼迫這些壞細胞「切腹自殺」，也就是誘發細胞凋亡（選項 D）。這三件事都是殺手在第一線幹的髒活。那選項 C 呢？「分泌細胞激素幫助產生抗體」這需要極強的社交與協調能力，這是「幕後軍師」CD4+ 輔助型 T 細胞（Helper T cell, Th）在幹的事（特別是 Th2 或 Tfh 細胞去跟 B 細胞咬耳朵）。殺手才沒空在那邊幫忙拉皮條、輔助產生抗體呢！所以選項 C 顯然跑錯棚了，與 CD8+ T 細胞最無關。", "what": "考取 CD8+ 胞毒性 T 細胞（負責細胞免疫、直接殺傷）與 CD4+ 輔助性 T 細胞（負責體液免疫、協助產生抗體）的功能分工。", "trap": "不要看到「細胞激素」就覺得所有 T 細胞都通用！雖然 CD8+ T 細胞也會分泌干擾素（IFN-γ）等細胞激素，但其主要功能絕非「幫助產生抗體」。協助 B 細胞製造抗體是 CD4+ T 細胞的專屬特權，千萬別把殺手與軍師的角色搞混了！"}, {"no": 45, "source": "109-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "小鼠如果在出生後，立即切除胸腺（thymectomy），主要會影響那一種免疫反應？", "options": {"A": "補體的作用", "B": "毒殺 T 細胞的產生", "C": "樹狀突細胞呈現抗原的能力", "D": "巨噬細胞的吞噬作用"}, "answer": "B", "ask": "剛出生的幼嫩小鼠被奪走了胸腺，這會直接導致哪一種特定免疫細胞的「育嬰室」當場熄燈？", "compare": "補體、樹狀突細胞和巨噬細胞的起源與發育，跟負責訓練 T 細胞的胸腺有任何不可分割的淵源嗎？", "lock": "哪一個選項中所提到的免疫要角，其英文字母縮寫正好揭示了它與胸腺有著百分之百的血緣關係？", "explain": "各位同學，想像一下「胸腺（Thymus）」就是 T 細胞專屬的「特種部隊軍事學校」。這題說小鼠一出生就被切除了胸腺，那會發生什麼慘劇？沒錯，就是 T 細胞們連入學的機會都沒有，直接被滅校！因此，所有跟 T 細胞有關的免疫反應都會慘遭滑鐵盧。選項中，只有「毒殺 T 細胞（Cytotoxic T cell）」是貨真價實的 T 細胞，沒了胸腺，它們根本無法發育成熟。至於補體（選項 A）是肝臟製造的蛋白質，而樹狀突細胞（選項 C）與巨噬細胞（選項 D）則屬於先天免疫系統，在骨髓就已經發育完成了，根本不需要去胸腺上學，所以它們完全不受影響喔！", "what": "本題考查胸腺作為 T 細胞發育與成熟關鍵器官的生理功能。", "trap": "很多同學一看到免疫反應受阻，就容易把所有免疫細胞混為一談。請牢記，只有 T 細胞的發育跟「胸腺（Thymus）」死死綁定，其他像是 B 細胞、巨噬細胞、樹狀突細胞等都有各自的發育路線，胸腺被切除並不會影響它們喔！"}, {"no": 54, "source": "109-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "人類免疫不全病毒（HIV）可感染何種細胞，而造成免疫不全症候群？", "options": {"A": "CD4 T細胞", "B": "CD8 T細胞", "C": "CD20 B細胞", "D": "CD22 B細胞"}, "answer": "A", "ask": "HIV 病毒在人體內到底需要對接哪一把特定的細胞表面鑰匙，才能成功潛入並摧毀我們的免疫中樞？", "compare": "輔助型 T 細胞與胞毒型 T 細胞在免疫戰場上各司其職，它們各自擁有的 CD4 與 CD8 標記中，哪一個才是愛滋病毒鎖定的唯一入侵標靶？", "lock": "聯想一下愛滋病患最常被監測、用來評估免疫力存亡的細胞數量指標，哪一個細胞標記與這個關鍵防線息息相關？", "explain": "哎呀，同學們！講到 HIV（愛滋病毒），它可是個非常狡猾的「心機角色」！它進入人體後，不找別人，偏偏就盯上了我們免疫系統的「總指揮官」——也就是表面有 CD4 蛋白質的輔助型 T 細胞（CD4+ T cell）。HIV 表面的套膜蛋白 gp120 就像一把精密的鑰匙，剛好能插進 CD4 這把鎖。一旦這個指揮官被攻陷、甚至被大量消滅，整個免疫大軍（包括 B 細胞、巨噬細胞等）就會群龍無首、瞬間癱瘓，這就是為什麼會造成嚴重的「後天免疫缺乏症候群（AIDS）」啦！至於其他選項：CD8 是殺手 T 細胞的標記，而 CD20 和 CD22 則是 B 細胞的身份證，HIV 根本看不上眼。所以擒賊先擒王，HIV 專挑 CD4 T 細胞下手，選 (A) 完全沒懸念！", "what": "考的是 HIV 病毒入侵人體時，所專一性結合的宿主細胞表面受體（CD4）。", "trap": "很多同學會把 T 細胞與 B 細胞的表面標記（CD marker）混淆。請死死記住，CD4 和 CD8 是 T 細胞的招牌，而 CD20 和 CD22 是 B 細胞的專屬代號，考試時千萬別把兩大陣營的身份證給貼錯了！"}, {"no": 62, "source": "110-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "如果在出生後立即切除胸腺，主要會影響下列何種免疫反應？", "options": {"A": "補體的作用", "B": "樹突細胞（dendritic cell）的抗原呈現", "C": "T 淋巴細胞的成熟分化", "D": "B 淋巴細胞產生 IgM 的能力"}, "answer": "C", "ask": "胸腺這個器官一旦在剛出生時就被摘除，我們體內哪一種免疫細胞會立刻面臨「無校可讀」而無法長大成人的窘境？", "compare": "骨髓出身的 B 細胞、肝臟製造的補體，以及到處巡邏的樹突細胞，有哪一個像 T 細胞一樣，必須把「胸腺」當作唯一的修煉升級基地？", "lock": "既然 T 細胞的「T」就是代表胸腺（Thymus），那麼失去胸腺這所關鍵學校，哪一個選項描寫的細胞會直接面臨「無法畢業、無法成熟」的毀滅性打擊？", "explain": "嘿！各位同學，想像一下，「胸腺」（Thymus）就是 T 細胞的「魔法戰鬥學校」，這也就是為什麼它被命名為「T」細胞的原因。如果小寶寶一出生，我們就把這所學校給拆了，那這些本來要去上學的 T 細胞，不就集體失學、沒辦法畢業變成合格的戰士（成熟分化）了嗎？所以最直接、最主要受害的絕對是 (C)。那我們來看看其他無辜的旁觀者：(A) 補體是肝臟製造的一群血清蛋白質，跟胸腺無關；(B) 樹突細胞是骨髓出身的「情報員」，不需要去胸腺受訓；(D) B 細胞是在骨髓（Bone marrow）發育的，雖然沒有 T 細胞幫忙會影響後續某些抗體分泌，但 B 細胞自己還是能勉强產生基礎款的 IgM（不需 T 細胞幫忙的抗原反應）。所以最慘的苦主，絕對是 T 細胞本人！", "what": "考驗對中樞免疫器官「胸腺」是 T 淋巴細胞發育與成熟專屬大本營的認知。", "trap": "容易想太多的同學可能會糾結在 B 細胞產生抗體需要 T 細胞輔助，因而猶豫要不要選 D。請記住，沒有 T 細胞雖然會影響 B 細胞的「抗體類型轉換」，但初階的 IgM 依然可以透過非 T 細胞依賴途徑產生，而 T 細胞本身則是連「成熟的機會」都沒有，所以影響最直接、最主要的一定是 T 細胞！"}, {"no": 82, "source": "113-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列何種細胞具有抑制 CD4 與 CD8 T 細胞活性的功能？", "options": {"A": "T 細胞", "B": "TH1、TH2 細胞", "C": "濾泡輔助 T 細胞（Tfh）", "D": "調節型 T 細胞（Treg）"}, "answer": "D", "ask": "當免疫反應過度囂張、需要踩煞車來保護身體時，哪一種 T 細胞會挺身而出，扮演冷酷的免疫糾察隊來壓制其他 T 細胞的怒火？", "compare": "負責在前方搖旗吶喊、活化免疫反應的輔助型 T 細胞，與專門負責調停、避免自體免疫攻擊的調節型 T 細胞，在功能上有何根本性的對立？", "lock": "尋找哪一個 T 細胞亞群在英文名稱或縮寫中，直接帶有代表「調節（Regulatory）」的字樣，它就是我們在尋找的免疫系統安全氣囊？", "explain": "想像一下，我們的免疫系統就像是一支熱血沸騰的軍隊，而 CD4 和 CD8 T 細胞就是前線衝鋒陷陣的超猛戰士。但是，如果戰事結束了，或者這群戰士殺紅了眼開始攻擊自己人（自體免疫反應），那該怎麼辦？這時候就需要「免疫界的神盾局糾察隊」——調節型 T 細胞（Treg）出來維持秩序！Treg 會透過分泌抑制性細胞激素（例如 IL-10 和 TGF-β）或直接接觸，對 CD4 和 CD8 T 細胞大喊「冷靜！退下！」，把免疫反應壓制下來。至於其他選項：A 的 Th 是輔助型 T 細胞的總稱；B 的 Th1 和 Th2 分別負責對抗胞內病原與寄生蟲，都是負責放火（促進發炎）的；C 的 Tfh（濾泡輔助 T 細胞）則是專門跑到淋巴濾泡去幫忙 B 細胞製造抗體的「專職推銷員」。大家都在忙著踩油門，只有 Treg 是那個冷酷踩煞車的和平使者！", "what": "考驗對不同 T 細胞亞群（T cell subsets）功能分工的掌握度，特別是負責踩煞車的免疫抑制機制。", "trap": "很多考生一看到「T 細胞」就只聯想到「攻擊與活化」，容易忽略了免疫系統必須「有油門（Th1/Th2）也一定要有煞車（Treg）」的動態平衡，才不會導致嚴重的自體免疫疾病喔！"}, {"no": 92, "source": "114-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "效應 TH1 細胞可以提供那兩種訊號幫助巨噬細胞進一步活化？", "options": {"A": "PD1-PD-L1；TNF-α", "B": "CD40L-CD40；IFN-γ", "C": "CD28-B7；IL-10", "D": "TCR-MHC；IL-2"}, "answer": "B", "ask": "Th1 細胞要派出哪兩位特使（一個是手拉手的表面分子，一個是隔空喊話的細胞激素），才能把疲憊的巨噬細胞瞬間變身為無敵破壞王？", "compare": "當我們需要免疫戰力升級時，會選擇讓人踩煞車、想睡覺的 PD-1 或 IL-10，還是要挑選能吹起進攻號角的干擾素與活化受體？", "lock": "想想看，當巨噬細胞拿著抗原去找 Th1 訴苦時，Th1 該伸出哪一隻「配體之手」去握住巨噬細胞的 CD40 受體，並同時噴灑哪一種最經典的巨噬細胞活化劑？", "explain": "巨噬細胞雖然是免疫界的「大胃王」，但有時候光靠自己吞噬病原體還不夠，需要 Th1 細胞（效應 T Helper 1 細胞）來幫忙「開外掛」才能徹底消滅體內的細菌。這就像教練要激勵選手一樣，需要給予「雙重刺激」！第一重刺激是『親密接觸』：Th1 細胞表面會表達 CD40L（CD40 配體），去緊緊握住巨噬細胞上的 CD40。第二重刺激是『化學助攻』：Th1 細胞會分泌干擾素 IFN-γ，這可是巨噬細胞最強效的「蠻牛」提神飲料！當這兩個訊號同時到位，巨噬細胞就會瞬間暴走，殺菌力大增！至於其他選項：A 的 PD-1/PD-L1 是免疫煞車（會讓免疫細胞睡著）；C 的 IL-10 是抑制性細胞激素，而 CD28-B7 是用來活化 T 細胞，不是活化巨噬細胞的；D 的 IL-2 則是 T 細胞自己拿來促進分裂用的生長因子，沒辦法幫巨噬細胞開外掛喔！", "what": "考點在於 Th1 細胞活化巨噬細胞所需的雙重協同刺激訊號（細胞表面接觸與特定細胞激素）。", "trap": "考生最容易把「抗原呈現細胞（如巨噬細胞）去活化 T 細胞」的訊號（CD28-B7），跟「T 細胞回頭去活化巨噬細胞」的訊號（CD40L-CD40）給搞混了。另外，只要看到 IL-10 或 PD-1 這種免疫抑製性的分子，就要立刻排除在「活化」的選項之外！"}, {"no": 97, "source": "114-3", "cognitive": "應用", "difficulty": "中", "stem": "面對胞外細菌感染時，下列那種效應 CD4+ T 細胞對強化嗜中性球驅化反應貢獻較大？", "options": {"A": "TH1", "B": "TH2", "C": "TH17", "D": "Treg"}, "answer": "C", "ask": "當身體遭到游離在細胞外的細菌入侵時，哪一種 CD4+ T 細胞能發出強大訊號，把擅長吞噬的嗜中性球大軍瘋狂吸引到戰場第一線？", "compare": "防禦胞內病毒與細菌的 Th1、負責寄生蟲與過敏的 Th2、負責踩煞車的 Treg，以及分泌介白素-17 的 Th17，誰才是召募嗜中性球的專業大戶？", "lock": "哪一個輔助型 T 細胞亞群的名稱，正好暗示了它能分泌與動員嗜中性球密切相關的關鍵介白素（IL-17）？", "explain": "哈囉同學們！今天我們來聊聊 CD4+ T 細胞這群「免疫界的神盾局局長」！當身體遇到敵人時，局長會根據敵情分化成不同的「特遣隊」來指揮作戰。這次的敵人是「胞外細菌」，而防禦胞外細菌最厲害的武器就是「嗜中性球（Neutrophil）」。那麼，是誰負責把這群嗜中性球大軍「驅化（召喚）」過來的呢？答案就是 Th17（選項 C）！Th17 就像是熱血的警報器，它會分泌介白素-17（IL-17），刺激局部組織釋放趨化因子，把嗜中性球通通吸過來吃掉細菌。至於其他特遣隊：Th1（選項 A）主要去對付「胞內」病原體（如結核菌或病毒），召喚的是巨噬細胞；Th2（選項 B）是去對付寄生蟲與搞出過敏的，召喚的是嗜酸性球；Treg（選項 D）則是「和事佬」，負責叫大家收兵不要再打了。所以，要找對付胞外菌並呼喚嗜中性球的盟友，絕對要選 Th17 啦！", "what": "考查 CD4+ 輔助型 T 細胞（Th1、Th2、Th17、Treg）的功能分工，特別是 Th17 在胞外細菌感染中召喚嗜中性球的角色。", "trap": "考生最容易看到「細菌」兩個字就衝動選了 Th1！請一定要看清楚是「胞內」還是「胞外」。胞內菌感染找 Th1（激活巨噬細胞），胞外菌與真菌感染則是找 Th17（召喚嗜中性球），這兩個哥們的分工千萬別搞混囉！"}]}, {"title": "三、淋巴器官架構", "stars": "★★★", "intro": "先知道免疫細胞在哪裡生成、成熟、集合與發動反應，後面讀 B 細胞與 T 細胞才不會飄在空中。", "cram": ["骨髓與胸腺是初級淋巴器官；淋巴結、脾臟與 MALT 是次級淋巴器官。", "B 細胞在骨髓成熟，T 細胞在胸腺成熟。", "淋巴結過濾淋巴；脾臟過濾血液。"], "concepts": [{"title": "淋巴組織與器官", "plain": "淋巴組織與器官是淋巴細胞生成、成熟、聚集與發生免疫反應的場所。", "analogy": "建議比喻：初級器官像訓練中心，次級器官像任務集合站。", "mechanism": "中央淋巴組織又稱初級淋巴器官，包含骨髓與胸腺，是淋巴細胞分化成熟的場所；B 細胞主要在骨髓與周邊淋巴器官成熟，T 細胞需經胸腺教育。周邊淋巴組織又稱次級淋巴器官，包含淋巴結、脾臟與黏膜相關淋巴組織，是抗原與淋巴細胞互動、免疫反應啟動的重要區域。", "diagrams": [], "focus": "初級淋巴器官：骨髓、胸腺。次級淋巴器官：淋巴結、脾臟、扁桃腺、Peyer patches 等。", "confusion": "- 骨髓是初級淋巴器官，不是次級淋巴器官。 - 脾臟的白髓與免疫反應相關，紅髓與血球清除相關。", "table": {"title": "初級與次級淋巴器官對照", "headers": ["項目", "初級淋巴器官", "次級淋巴器官"], "rows": [["主要任務", "淋巴細胞生成與成熟", "抗原相遇與免疫反應啟動"], ["代表器官", "骨髓、胸腺", "淋巴結、脾臟、MALT"], ["B 細胞重點", "骨髓成熟", "周邊活化分化"], ["T 細胞重點", "胸腺成熟", "周邊受抗原刺激"], ["國考文字陷阱", "胸腺是 T 細胞成熟地點", "淋巴結不是初級成熟場所"]]}}, {"title": "骨髓", "plain": "骨髓是免疫細胞的生產基地，也是 B 細胞成熟的重要地方。", "analogy": "像免疫系統的人才工廠：先把不同角色的細胞生產出來。", "mechanism": "多潛能造血幹細胞在骨髓中分化出淋巴球、單核球、顆粒球等免疫相關細胞。B 細胞主要在骨髓成熟；T 細胞前驅細胞則由骨髓產生後移往胸腺成熟。", "diagrams": [], "focus": "常問 B 細胞成熟在哪裡，以及骨髓和胸腺哪個是初級淋巴器官。", "confusion": "不要把骨髓當成抗原反應主要啟動的次級淋巴器官。"}, {"title": "胸腺", "plain": "胸腺是 T 細胞受訓和篩選的地方。", "analogy": "像軍校加考場：訓練合格者留下，不合格或太危險者淘汰。", "mechanism": "骨髓來源的 T 細胞前驅細胞進入胸腺後，經過篩選與分化，形成能辨識 MHC 且避免強烈攻擊自體抗原的成熟 T 細胞。成熟 T 細胞再進入周邊淋巴組織參與細胞性免疫。", "diagrams": [], "focus": "看到 T 細胞成熟、胸腺教育、初級淋巴器官，要想到胸腺。", "confusion": "不要把 T 細胞「源自骨髓」和「在胸腺成熟」混成同一件事。"}, {"title": "淋巴結", "plain": "淋巴結是免疫細胞在淋巴路線上的集合站。", "analogy": "像路上的檢查站：把流過來的資訊攔下來檢查，必要時召集人手處理。", "mechanism": "組織中的抗原與抗原呈獻細胞可隨淋巴液進入淋巴結；B 細胞與 T 細胞在淋巴結內被活化、增生與分化，啟動適應性免疫反應。", "diagrams": [], "focus": "常問次級淋巴器官、淋巴液過濾、感染時淋巴結腫大。", "confusion": "不要把淋巴結和脾臟的過濾對象混淆：淋巴結偏淋巴液，脾臟偏血液。"}, {"title": "脾臟", "plain": "脾臟是血液路線上的免疫過濾器。", "analogy": "像血液高速公路上的大型安檢站，檢查通過血液的可疑物。", "mechanism": "脾臟白髓與免疫反應相關，可讓抗原與淋巴細胞互動；紅髓則與清除老化紅血球、血小板及血中微生物有關。脾臟對清除莢膜菌尤其重要。", "diagrams": [], "focus": "常問脾臟切除後哪些感染風險增加，以及脾臟屬於哪一類淋巴器官。", "confusion": "不要把脾臟和淋巴結的過濾對象混淆。"}, {"title": "黏膜相關淋巴組織", "plain": "MALT 是守在黏膜入口附近的免疫組織。", "analogy": "像機場、車站入口旁的安檢區，在人流進入身體前先檢查。", "mechanism": "黏膜是病原常見入口，MALT 可讓黏膜抗原與免疫細胞互動，啟動局部免疫反應。腸道 Peyer patches 是典型例子，黏膜免疫也常與 IgA 防禦相關。", "diagrams": [], "focus": "常問 MALT、Peyer patches、次級淋巴組織與 IgA 黏膜防禦的關聯。", "confusion": "不要把 MALT 當成單一器官；它是多處黏膜相關淋巴組織的總稱。"}], "gameQuestions": [{"no": 16, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "小腸上具備有免疫功能的細胞位在何處？", "options": {"A": "派亞氏結區（Peyer's patches）", "B": "乳糜管（lacteal）", "C": "腸上皮細胞（enterocyte）", "D": "杯狀細胞（goblet cell）"}, "answer": "A", "ask": "當我們把目光投向小腸壁時，哪一個特定的解剖構造才是專門用來駐紮大量淋巴球、發揮主動免疫防禦作用的「免疫軍事基地」？", "compare": "負責吸收營養的上皮細胞、分泌黏液的杯狀細胞，以及運輸脂肪的乳糜管，它們的主力功能與專職抗原呈現、產生抗體的免疫淋巴組織有何本質上的不同？", "lock": "哪一個選項所指的構造富含微皺褶細胞（M cell），能夠捕捉腸道抗原並將其傳遞給底下的T細胞與B細胞，從而啟動小腸特異性的免疫反應？", "explain": "嘿，各位同學！想像一下你的小腸是一條超級繁忙的高速公路，每天都有成千上萬的食物分子和潛在的細菌壞蛋在裡面奔馳。那誰來當這條高速公路的「派出所兼防衛總部」呢？答案就是**派亞氏結區（Peyer's patches）**！這傢伙是小腸粘膜下的一群淋巴組織，裡面擠滿了B細胞、T細胞和樹突細胞，簡直就是免疫大軍的駐紮大本營。 我們來看看其他落榜的選項： (B) **乳糜管（lacteal）**：人家是專門吸收與運輸脂肪的小幫手，雖然是淋巴管的一種，但本職是物流業，不是國防部。 (C) **腸上皮細胞（enterocyte）**：這是小腸壁的主力「吸收工兵」，專門吸收營養。雖然它們排在一起形成屏障，但並不是免疫細胞。 (D) **杯狀細胞（goblet cell）**：它們是「黏液噴射機」，專門分泌黏液來潤滑跟保護腸道，屬於物理與化學屏障，本身也不是免疫細胞。所以，要找真正的「免疫細胞大本營」，絕對是非派亞氏結區莫屬啦！", "what": "考驗對腸道相關淋巴組織（GALT）中，核心局部免疫構造「派亞氏結區（Peyer's patches）」的定位與認識。", "trap": "很多考生容易把「具有保護、屏障功能」的普通上皮細胞（如分泌黏液的杯狀細胞），跟真正駐紮了「淋巴球等免疫細胞」的免疫器官混淆。記得，要找主動執行免疫防禦、充滿淋巴球的構造，才是正解！", "level": 1, "sectionTitle": "三、淋巴器官架構"}, {"no": 32, "source": "107-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關淋巴結的敘述，下列何者錯誤？", "options": {"A": "其內沒有巨噬細胞", "B": "輸出淋巴管數目較輸入淋巴管數目少", "C": "具有生發中心（germinal center），可製造淋巴球", "D": "構造上可區分為皮質及髓質"}, "answer": "A", "ask": "如果要把淋巴結當作人體防禦病原體的前線要塞，它內部應該具備哪些基本的構造與免疫防衛細胞？", "compare": "為什麼輸入和輸出淋巴管的數量不對等，這種漏斗狀的流速控制對淋巴結的過濾功能有何影響？", "lock": "負責吞噬、清理戰場的巨噬細胞，有可能在淋巴結這個防禦前線中缺席嗎？", "explain": "同學們！淋巴結可是我們免疫系統的「安檢收費站」啊！每天有一堆淋巴液帶著各路牛鬼蛇神（病原體）路過這裡，既然是安檢站，裡面怎麼可能沒有「保安」呢？巨噬細胞就是最盡職的保安大叔，每天在淋巴結裡面巡邏，看到可疑分子就直接一口吞掉，所以選項A說「沒有巨噬細胞」簡直是睜眼說瞎話！至於其他選項：淋巴結為了要把淋巴液流速變慢，好讓免疫細胞有時間慢慢檢查，特別設計成「多個入口（輸入淋巴管）進，極少出口（輸出淋巴管）出」的漏斗構造，所以B是對的；它的構造也確實分為外側皮質與內側髓質（D是對的）；而裡面的生發中心（germinal center）就像是B細胞的魔鬼訓練營，它們在那裡瘋狂分裂、變身成抗體工廠（C是對的）。", "what": "考驗對外周免疫器官「淋巴結」的組織構造、細胞分佈與生理運作機制的理解。", "trap": "很多同學會把「輸入與輸出淋巴管的數量多寡」記反，記得「入口多、出口少」才能在淋巴結內造成「大塞車」，爭取時間讓免疫細胞好好消滅病原體！", "level": 2, "sectionTitle": "三、淋巴器官架構"}, {"no": 52, "source": "109-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者具有過濾血液中病原體以及清除衰老的血球細胞和血小板的功能？", "options": {"A": "扁桃腺（tonsils）", "B": "盲腸（appendix）", "C": "脾臟（spleen）", "D": "培氏斑（Peyer’s patches）"}, "answer": "C", "ask": "是哪一個器官既要像海關一樣幫整條血管進行病原體「安檢」，又要像回收場一樣天天清除壞掉的紅血球和血小板？", "compare": "守護消化道與呼吸道黏膜的扁桃腺、盲腸及培氏斑，跟負責掌管全身血液巡邏過濾的器官在工作地點與守備範圍上有什麼本質上的不同？", "lock": "哪一個選項是體內唯一富含紅髓與白髓，能同時進行老舊血球拆解回收並攔截血中病菌的「血液過濾大師」？", "explain": "嘿，同學們！想像一下，如果我們身體裡有一家超大型的「血液資源回收兼安檢中心」，那絕對非「脾臟」莫屬啦！脾臟分工很細，它的「紅髓」就像是嚴格的資源回收阿姨，專門把那些活太久、老化沒力氣的紅血球和血小板抓出來資源回收，把裡面的鐵質好好存起來再利用；而它的「白髓」則住滿了精銳的免疫細胞，像極了海關安檢人員，專門過濾和消滅血液中跑進來的病原體。至於扁桃腺、盲腸和培氏斑（Peyer’s patches）呢？這三位是「黏膜防衛隊」（MALT）的成員，駐守在呼吸道和消化道的門口，防堵的是空氣和食物裡的壞人，手根本伸不到全身血液裡面去。所以，過濾血液、清理老弱殘兵的重責大任，只有脾臟能完美勝任！", "what": "考查次級淋巴器官的功能分工，特別是脾臟在血液過濾與老舊血球回收中的獨特角色。", "trap": "很多同學會把「淋巴結」和「脾臟」的功能搞混。請務必記住，淋巴結過濾的是「淋巴液」，而脾臟才是全身上下唯一負責過濾「血液」的淋巴器官！", "level": 3, "sectionTitle": "三、淋巴器官架構"}, {"no": 65, "source": "111-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者不是淋巴組織？", "options": {"A": "扁桃體", "B": "腮腺", "C": "淋巴結", "D": "胸腺"}, "answer": "B", "ask": "人體的免疫大軍需要駐紮在特定的防衛基地，這裡面哪一個地方其實不負責免疫，而是專門幫我們分泌口水的消化構造？", "compare": "胸腺、淋巴結和扁桃體在淋巴防禦系統中各自擔任什麼樣的兵力駐紮角色？而被排除在免疫系統之外的那位選手，其主要生理功能又是什麼？", "lock": "當你把「淋巴免疫防衛」與「唾液消化分泌」這兩種截然不同的生理功能區分開來後，哪一個選項會因為跟免疫系統完全無關而立刻現出原形？", "explain": "同學們，這題其實是我們認識免疫系統「軍事基地」的送分題喔！人體的淋巴組織就像是國防部與大小軍營。胸腺（Thymus）是T細胞的「黃埔軍校」（中樞淋巴器官），負責魔鬼訓練新兵；淋巴結（Lymph nodes）是遍布全身的「派出所」，負責攔截並消滅壞人；扁桃體（Tonsils）則是守衛在咽喉要道的「前線崗哨」（黏膜相關淋巴組織）。那「腮腺」是幹嘛的？腮腺（Parotid gland）其實是我們吃美食時，負責分泌口水（唾液）的最大外分泌腺啦！雖然它同樣位於頭頸部，但它屬於消化系統，跟淋巴防禦系統可不是同一個朋友圈喔！", "what": "區分人體免疫防禦的「淋巴組織」與一般消化腺體的功能差異。", "trap": "容易因為腮腺、扁桃體與淋巴結都位於頭頸部，就直覺地把它們歸為同一類，要記得腮腺的工作是分泌唾液（消化），而不是訓練或駐紮免疫細胞！", "level": 4, "sectionTitle": "三、淋巴器官架構"}, {"no": 67, "source": "111-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "在淋巴結的濾泡（follicle）所聚集的細胞，會產生什麼特殊蛋白質？", "options": {"A": "肝素（heparin）", "B": "抗體（antibody）", "C": "穿孔素／顆粒溶解酶（perforin／granzyme）", "D": "纖維分解酶（cellulase）"}, "answer": "B", "ask": "淋巴結中的「濾泡」主要是哪一種淋巴細胞聚集的根據地，而這群細胞被活化後會大量釋放什麼化學武器？", "compare": "濾泡中的B細胞與副皮質區的T細胞，在分泌產物上究竟是遠程投射的免疫球蛋白，還是近身破壞細胞膜的酵素？", "lock": "哪一個選項是B細胞分化為漿細胞後，最經典、最具有抗原特異性，且能游離在體液中專職標記敵人的防禦性蛋白質？", "explain": "嗨，各位同學！想像一下，我們的淋巴結就像是一座防衛森嚴的軍事基地，而裡面的「濾泡（follicle）」就是「B細胞（B cells）」專屬的VIP特訓營兼兵工廠！當B細胞在濾泡裡接收到抗原的刺激後，就會變身為終極形態——「漿細胞（plasma cells）」，開始瘋狂量產「抗體（antibody）」這款遠程追蹤飛彈來消滅敵人，所以答案選B。至於其他選項呢？(A)肝素主要是肥大細胞分泌的抗凝血劑，跟濾泡無關；(C)穿孔素與顆粒溶解酶是殺手T細胞和NK細胞拿來近身肉搏、把敵人打穿超渡的武器，而T細胞的大本營是在淋巴結的「副皮質區（paracortex）」，跑錯棚囉！(D)纖維分解酶則是植物或某些細菌用來分解纖維素的，我們人體根本做不出來，這選項是出題老師派來搞笑的啦！", "what": "考驗淋巴結內特定解剖區域（濾泡）所聚集的免疫細胞種類（B細胞）及其主要分泌的免疫球蛋白（抗體）。", "trap": "考生最容易把「B細胞（在濾泡區）」與「T細胞（在副皮質區）」的地盤記反，導致把T細胞釋放的穿孔素（C）誤選為濾泡細胞的產物，記住「B濾 T副」口訣就不會踩雷囉！", "level": 5, "sectionTitle": "三、淋巴器官架構"}], "questions": [{"no": 16, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "小腸上具備有免疫功能的細胞位在何處？", "options": {"A": "派亞氏結區（Peyer's patches）", "B": "乳糜管（lacteal）", "C": "腸上皮細胞（enterocyte）", "D": "杯狀細胞（goblet cell）"}, "answer": "A", "ask": "當我們把目光投向小腸壁時，哪一個特定的解剖構造才是專門用來駐紮大量淋巴球、發揮主動免疫防禦作用的「免疫軍事基地」？", "compare": "負責吸收營養的上皮細胞、分泌黏液的杯狀細胞，以及運輸脂肪的乳糜管，它們的主力功能與專職抗原呈現、產生抗體的免疫淋巴組織有何本質上的不同？", "lock": "哪一個選項所指的構造富含微皺褶細胞（M cell），能夠捕捉腸道抗原並將其傳遞給底下的T細胞與B細胞，從而啟動小腸特異性的免疫反應？", "explain": "嘿，各位同學！想像一下你的小腸是一條超級繁忙的高速公路，每天都有成千上萬的食物分子和潛在的細菌壞蛋在裡面奔馳。那誰來當這條高速公路的「派出所兼防衛總部」呢？答案就是**派亞氏結區（Peyer's patches）**！這傢伙是小腸粘膜下的一群淋巴組織，裡面擠滿了B細胞、T細胞和樹突細胞，簡直就是免疫大軍的駐紮大本營。 我們來看看其他落榜的選項： (B) **乳糜管（lacteal）**：人家是專門吸收與運輸脂肪的小幫手，雖然是淋巴管的一種，但本職是物流業，不是國防部。 (C) **腸上皮細胞（enterocyte）**：這是小腸壁的主力「吸收工兵」，專門吸收營養。雖然它們排在一起形成屏障，但並不是免疫細胞。 (D) **杯狀細胞（goblet cell）**：它們是「黏液噴射機」，專門分泌黏液來潤滑跟保護腸道，屬於物理與化學屏障，本身也不是免疫細胞。所以，要找真正的「免疫細胞大本營」，絕對是非派亞氏結區莫屬啦！", "what": "考驗對腸道相關淋巴組織（GALT）中，核心局部免疫構造「派亞氏結區（Peyer's patches）」的定位與認識。", "trap": "很多考生容易把「具有保護、屏障功能」的普通上皮細胞（如分泌黏液的杯狀細胞），跟真正駐紮了「淋巴球等免疫細胞」的免疫器官混淆。記得，要找主動執行免疫防禦、充滿淋巴球的構造，才是正解！"}, {"no": 32, "source": "107-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關淋巴結的敘述，下列何者錯誤？", "options": {"A": "其內沒有巨噬細胞", "B": "輸出淋巴管數目較輸入淋巴管數目少", "C": "具有生發中心（germinal center），可製造淋巴球", "D": "構造上可區分為皮質及髓質"}, "answer": "A", "ask": "如果要把淋巴結當作人體防禦病原體的前線要塞，它內部應該具備哪些基本的構造與免疫防衛細胞？", "compare": "為什麼輸入和輸出淋巴管的數量不對等，這種漏斗狀的流速控制對淋巴結的過濾功能有何影響？", "lock": "負責吞噬、清理戰場的巨噬細胞，有可能在淋巴結這個防禦前線中缺席嗎？", "explain": "同學們！淋巴結可是我們免疫系統的「安檢收費站」啊！每天有一堆淋巴液帶著各路牛鬼蛇神（病原體）路過這裡，既然是安檢站，裡面怎麼可能沒有「保安」呢？巨噬細胞就是最盡職的保安大叔，每天在淋巴結裡面巡邏，看到可疑分子就直接一口吞掉，所以選項A說「沒有巨噬細胞」簡直是睜眼說瞎話！至於其他選項：淋巴結為了要把淋巴液流速變慢，好讓免疫細胞有時間慢慢檢查，特別設計成「多個入口（輸入淋巴管）進，極少出口（輸出淋巴管）出」的漏斗構造，所以B是對的；它的構造也確實分為外側皮質與內側髓質（D是對的）；而裡面的生發中心（germinal center）就像是B細胞的魔鬼訓練營，它們在那裡瘋狂分裂、變身成抗體工廠（C是對的）。", "what": "考驗對外周免疫器官「淋巴結」的組織構造、細胞分佈與生理運作機制的理解。", "trap": "很多同學會把「輸入與輸出淋巴管的數量多寡」記反，記得「入口多、出口少」才能在淋巴結內造成「大塞車」，爭取時間讓免疫細胞好好消滅病原體！"}, {"no": 52, "source": "109-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者具有過濾血液中病原體以及清除衰老的血球細胞和血小板的功能？", "options": {"A": "扁桃腺（tonsils）", "B": "盲腸（appendix）", "C": "脾臟（spleen）", "D": "培氏斑（Peyer’s patches）"}, "answer": "C", "ask": "是哪一個器官既要像海關一樣幫整條血管進行病原體「安檢」，又要像回收場一樣天天清除壞掉的紅血球和血小板？", "compare": "守護消化道與呼吸道黏膜的扁桃腺、盲腸及培氏斑，跟負責掌管全身血液巡邏過濾的器官在工作地點與守備範圍上有什麼本質上的不同？", "lock": "哪一個選項是體內唯一富含紅髓與白髓，能同時進行老舊血球拆解回收並攔截血中病菌的「血液過濾大師」？", "explain": "嘿，同學們！想像一下，如果我們身體裡有一家超大型的「血液資源回收兼安檢中心」，那絕對非「脾臟」莫屬啦！脾臟分工很細，它的「紅髓」就像是嚴格的資源回收阿姨，專門把那些活太久、老化沒力氣的紅血球和血小板抓出來資源回收，把裡面的鐵質好好存起來再利用；而它的「白髓」則住滿了精銳的免疫細胞，像極了海關安檢人員，專門過濾和消滅血液中跑進來的病原體。至於扁桃腺、盲腸和培氏斑（Peyer’s patches）呢？這三位是「黏膜防衛隊」（MALT）的成員，駐守在呼吸道和消化道的門口，防堵的是空氣和食物裡的壞人，手根本伸不到全身血液裡面去。所以，過濾血液、清理老弱殘兵的重責大任，只有脾臟能完美勝任！", "what": "考查次級淋巴器官的功能分工，特別是脾臟在血液過濾與老舊血球回收中的獨特角色。", "trap": "很多同學會把「淋巴結」和「脾臟」的功能搞混。請務必記住，淋巴結過濾的是「淋巴液」，而脾臟才是全身上下唯一負責過濾「血液」的淋巴器官！"}, {"no": 65, "source": "111-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者不是淋巴組織？", "options": {"A": "扁桃體", "B": "腮腺", "C": "淋巴結", "D": "胸腺"}, "answer": "B", "ask": "人體的免疫大軍需要駐紮在特定的防衛基地，這裡面哪一個地方其實不負責免疫，而是專門幫我們分泌口水的消化構造？", "compare": "胸腺、淋巴結和扁桃體在淋巴防禦系統中各自擔任什麼樣的兵力駐紮角色？而被排除在免疫系統之外的那位選手，其主要生理功能又是什麼？", "lock": "當你把「淋巴免疫防衛」與「唾液消化分泌」這兩種截然不同的生理功能區分開來後，哪一個選項會因為跟免疫系統完全無關而立刻現出原形？", "explain": "同學們，這題其實是我們認識免疫系統「軍事基地」的送分題喔！人體的淋巴組織就像是國防部與大小軍營。胸腺（Thymus）是T細胞的「黃埔軍校」（中樞淋巴器官），負責魔鬼訓練新兵；淋巴結（Lymph nodes）是遍布全身的「派出所」，負責攔截並消滅壞人；扁桃體（Tonsils）則是守衛在咽喉要道的「前線崗哨」（黏膜相關淋巴組織）。那「腮腺」是幹嘛的？腮腺（Parotid gland）其實是我們吃美食時，負責分泌口水（唾液）的最大外分泌腺啦！雖然它同樣位於頭頸部，但它屬於消化系統，跟淋巴防禦系統可不是同一個朋友圈喔！", "what": "區分人體免疫防禦的「淋巴組織」與一般消化腺體的功能差異。", "trap": "容易因為腮腺、扁桃體與淋巴結都位於頭頸部，就直覺地把它們歸為同一類，要記得腮腺的工作是分泌唾液（消化），而不是訓練或駐紮免疫細胞！"}, {"no": 67, "source": "111-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "在淋巴結的濾泡（follicle）所聚集的細胞，會產生什麼特殊蛋白質？", "options": {"A": "肝素（heparin）", "B": "抗體（antibody）", "C": "穿孔素／顆粒溶解酶（perforin／granzyme）", "D": "纖維分解酶（cellulase）"}, "answer": "B", "ask": "淋巴結中的「濾泡」主要是哪一種淋巴細胞聚集的根據地，而這群細胞被活化後會大量釋放什麼化學武器？", "compare": "濾泡中的B細胞與副皮質區的T細胞，在分泌產物上究竟是遠程投射的免疫球蛋白，還是近身破壞細胞膜的酵素？", "lock": "哪一個選項是B細胞分化為漿細胞後，最經典、最具有抗原特異性，且能游離在體液中專職標記敵人的防禦性蛋白質？", "explain": "嗨，各位同學！想像一下，我們的淋巴結就像是一座防衛森嚴的軍事基地，而裡面的「濾泡（follicle）」就是「B細胞（B cells）」專屬的VIP特訓營兼兵工廠！當B細胞在濾泡裡接收到抗原的刺激後，就會變身為終極形態——「漿細胞（plasma cells）」，開始瘋狂量產「抗體（antibody）」這款遠程追蹤飛彈來消滅敵人，所以答案選B。至於其他選項呢？(A)肝素主要是肥大細胞分泌的抗凝血劑，跟濾泡無關；(C)穿孔素與顆粒溶解酶是殺手T細胞和NK細胞拿來近身肉搏、把敵人打穿超渡的武器，而T細胞的大本營是在淋巴結的「副皮質區（paracortex）」，跑錯棚囉！(D)纖維分解酶則是植物或某些細菌用來分解纖維素的，我們人體根本做不出來，這選項是出題老師派來搞笑的啦！", "what": "考驗淋巴結內特定解剖區域（濾泡）所聚集的免疫細胞種類（B細胞）及其主要分泌的免疫球蛋白（抗體）。", "trap": "考生最容易把「B細胞（在濾泡區）」與「T細胞（在副皮質區）」的地盤記反，導致把T細胞釋放的穿孔素（C）誤選為濾泡細胞的產物，記住「B濾 T副」口訣就不會踩雷囉！"}, {"no": 93, "source": "114-3", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者不屬於淋巴器官（lymphoid organs），無法製造免疫細胞？", "options": {"A": "松果腺（pineal gland）", "B": "胸腺（thymus）", "C": "脾臟（spleen）", "D": "扁桃腺（tonsil）"}, "answer": "A", "ask": "在我們身體的防衛軍隊中，哪些基地是負責訓練與駐紮免疫細胞的，而哪一個器官其實只是個負責調控睡眠的內分泌角色？", "compare": "胸腺、脾臟和扁桃腺在免疫防禦中各自扮演了訓練營和前線戰場的角色，但松果腺分泌的褪黑激素，跟對抗病原體有直接關係嗎？", "lock": "排除掉那些充滿淋巴球、拼命保護我們的免疫重鎮後，哪一個選項其實是大腦裡控制生理時鐘的內分泌腺體？", "explain": "嘿，各位同學！這題簡直是送分題，但我們還是要優雅地把它拿下！題目問哪個「不屬於」淋巴器官。答案 A 的「松果腺」其實是我們大腦裡負責分泌「褪黑激素（melatonin）」的內分泌腺體，專門管你什麼時候該睡覺、什麼時候該起床，跟免疫系統的打打殺殺完全不沾邊！而其他的選項：胸腺（Thymus）是 T 細胞的魔鬼訓練營（初級淋巴器官）；脾臟（Spleen）是過濾血液、充滿 B 與 T 細胞的超級戰場（次級淋巴器官）；扁桃腺（Tonsils）則是守護我們咽喉的第一道防線（次級淋巴組織）。所以，松果腺在這裡根本是走錯棚了啦！", "what": "區分人體淋巴器官（免疫系統）與內分泌器官的功能差異。", "trap": "考生容易把名字裡帶有「腺」字的器官搞混，記住「胸腺」與「扁桃腺」是免疫大將，而「松果腺」或「甲狀腺」則是內分泌系統的成員，別看到「腺」字就以為都是同一家人喔！"}]}, {"title": "四、免疫細胞大軍", "stars": "★★★★★", "intro": "把每一類細胞當成不同職務：偵察、呈獻、指揮、製造抗體、直接毒殺與快速巡邏。", "cram": ["CD4 T 細胞負責協調，CD8 T 細胞辨識 MHC I 並直接毒殺。", "B 細胞可分化為漿細胞與記憶 B 細胞。", "巨噬細胞兼具吞噬與抗原呈獻；NK 不需特異性 TCR 即可快速毒殺。", "TH1、TH2、TH17、Treg 的細胞激素與功能要用對照方式記憶。"], "concepts": [{"title": "淋巴細胞", "plain": "淋巴細胞 是第七章免疫學必須能查到的索引詞，先把它放回「淋巴組織與器官、B 細胞、T 細胞」這條知識線上理解。", "analogy": "像把地圖上的小站名補上：不一定每一站都很大，但少了站名就容易坐錯路線。", "mechanism": "淋巴細胞負責專一性辨認；B 細胞可分化為漿細胞與記憶細胞，T 細胞負責細胞性免疫與免疫調節。", "diagrams": [], "focus": "國考常把這類詞放在題幹線索、選項或配對題中，要求辨認它的上位概念、作用方向或易混淆對象。", "confusion": "淋巴細胞不是單一細胞角色，而是一群免疫細胞的總稱；讀它時要連到 B 細胞、T 細胞與 NK 細胞的分工。", "table": {"title": "淋巴細胞三大角色對照", "headers": ["項目", "B 細胞", "T 細胞", "NK 細胞"], "rows": [["主要免疫類型", "體液性免疫", "細胞性免疫與調節", "先天快速毒殺"], ["成熟重點", "骨髓", "胸腺", "不需胸腺教育"], ["表面辨識", "表面免疫球蛋白", "TCR", "CD16 等受體"], ["主要產物或功能", "抗體、記憶 B 細胞", "細胞激素、毒殺、調節", "殺病毒感染細胞與腫瘤"], ["國考文字陷阱", "B 細胞不是抗體本身", "T 細胞不能直接辨識游離抗原", "NK 是淋巴球但屬先天免疫"]]}}, {"title": "巨噬細胞與抗原呈獻", "plain": "巨噬細胞是重要吞噬細胞，也是抗原呈獻細胞，可將抗原處理後提供給 T 細胞辨識。", "analogy": "建議比喻：APC 像把犯罪證物夾在識別證上交給 T 細胞判讀。", "mechanism": "巨噬細胞先吞噬外來物，分解出抗原胜肽，再與 MHC 分子結合呈現在細胞表面，讓 TCR 辨識並活化 T 細胞。它也可分泌多種介質與細胞激素，調節發炎與免疫反應。APC 包含樹狀突細胞、巨噬細胞與 B 細胞，其中樹狀突細胞最能活化 naive T 細胞。", "diagrams": [{"title": "機轉流程", "nodes": [{"id": "A", "label": "病原或抗原"}, {"id": "B", "label": "巨噬細胞吞噬"}, {"id": "C", "label": "抗原處理成胜肽"}, {"id": "D", "label": "MHC-II 呈獻"}, {"id": "E", "label": "CD4+ T 細胞 TCR 辨識"}, {"id": "F", "label": "T 細胞活化與細胞激素分泌"}], "edges": [{"from": "A", "to": "B"}, {"from": "B", "to": "C"}, {"from": "C", "to": "D"}, {"from": "D", "to": "E"}, {"from": "E", "to": "F"}]}], "focus": "APC 以 MHC-II 呈獻給 CD4+ T 細胞；樹狀突細胞是活化 naive T 細胞最強的 APC。", "confusion": "- 巨噬細胞不只是吞噬，也會呈獻與調節。 - B 細胞也可作 APC，但主責仍是體液性免疫。"}, {"title": "自然殺手細胞", "plain": "自然殺手細胞是大型淋巴球，屬非專一性防禦，可毒殺腫瘤細胞與病毒感染細胞。", "analogy": "建議比喻：NK 細胞像巡邏時直接處理異常細胞的快速反應隊。", "mechanism": "NK 細胞約佔血液淋巴球 5-10%，表面缺乏專一性抗原受體，不需胸腺再教育即可具有毒殺能力，且不受 MHC 限制。其可透過細胞毒殺作用清除異常細胞，也可藉由 CD16 與抗體 Fc 段結合，執行抗體依賴性細胞毒殺反應 ADCC。NK 細胞也參與免疫調節。", "diagrams": [], "focus": "NK 細胞無 MHC 限制、不需胸腺教育、無 TCR 基因重組，可殺病毒感染細胞與癌細胞。", "confusion": "- NK 細胞是淋巴球，但不是典型專一性 T/B 細胞。 - ADCC 需要抗體參與，但執行毒殺的是效應細胞。"}, {"title": "B 細胞", "plain": "B 細胞是負責體液性免疫的淋巴細胞，受抗原刺激後可分化為漿細胞與記憶 B 細胞。", "analogy": "建議比喻：B 細胞像可被訓練成抗體工廠的候選細胞。", "mechanism": "B 細胞源自骨髓多潛能幹細胞，在骨髓與周邊淋巴器官成熟。其表面免疫球蛋白可直接結合抗原，並在輔助型 T 細胞與細胞激素協助下活化、增生、分化。漿細胞分泌大量抗體，記憶 B 細胞則保留對相同抗原的快速反應能力。成熟 B 細胞表面可見 sIg、MHC-II、CD19、CD20、CD21、CD40、B7 等標記。", "diagrams": [], "focus": "B 細胞不需要 APC 才能直接辨識抗原，但多數有效抗體反應需要 T 細胞協助。", "confusion": "- B 細胞成熟地點不是胸腺。 - 記憶 B 細胞不是主要分泌抗體的細胞，漿細胞才是。"}, {"title": "T 細胞", "plain": "T 細胞是在胸腺成熟、以細胞性免疫與免疫調節為主的淋巴細胞。", "analogy": "建議比喻：T 細胞要看「細胞身分證 MHC 上夾的證物」。", "mechanism": "T 細胞源自骨髓前驅細胞，進入胸腺後經分化與篩選，成熟後進入周邊循環。T 細胞不能產生抗體，必須透過 TCR 辨識 APC 以 MHC 呈獻的抗原胜肽後活化。CD4+ T 細胞多為輔助與調節功能；CD8+ T 細胞多為細胞毒殺功能。所有 T 細胞有 CD2、CD3，CD4 與 CD8 通常二擇一。", "diagrams": [], "focus": "T 細胞需要抗原呈獻；CD4 對 MHC-II，CD8 對 MHC-I。", "confusion": "- T 細胞不直接辨識游離抗原表面決定位。 - CD8 毒殺細胞仍需辨識 MHC-I 呈獻的抗原。"}, {"title": "輔助型 T 細胞分化", "plain": "輔助型 T 細胞是 CD4+ T 細胞，透過細胞接觸與細胞激素調節 B 細胞、T 細胞、巨噬細胞與發炎反應。", "analogy": "建議比喻：CD4 T 細胞像指揮官，依敵人類型派不同兵種。", "mechanism": "TH0 可依刺激分化為不同亞群。IL-12 或 IFN-gamma 促進 TH1，主要對抗細胞內細菌與原蟲，活化巨噬細胞並參與遲發型過敏。IL-4 促進 TH2，幫助 B 細胞合成抗體、IgE 反應與嗜酸性球，對抗多細胞寄生蟲。IL-6 與 TGF-beta 促進 TH17，對抗細胞外細菌與黴菌並活化上皮與嗜中性球。", "diagrams": [{"title": "機轉流程", "nodes": [{"id": "B", "label": "B"}, {"id": "E", "label": "巨噬細胞活化/細胞內病原"}, {"id": "C", "label": "C"}, {"id": "F", "label": "B 細胞/IgE/寄生蟲"}, {"id": "D", "label": "D"}, {"id": "G", "label": "嗜中性球/細胞外細菌與黴菌"}], "edges": [{"from": "B", "to": "E"}, {"from": "C", "to": "F"}, {"from": "D", "to": "G"}]}], "focus": "IL-12 促 TH1；IL-4 促 TH2；IL-6/TGF-beta 促 TH17；IL-10 抑制 TH1 細胞激素合成。", "confusion": "- TH1 不只「細胞性」，也可間接影響 B 細胞。 - TH17 與嗜中性球和細胞外細菌/黴菌反應相關。", "table": {"title": "輔助型 T 細胞亞群對照", "headers": ["項目", "TH1", "TH2", "TH17", "Treg"], "rows": [["誘導方向", "IL-12、IFN-gamma", "IL-4", "發炎訊號", "免疫抑制訊號"], ["主要功能", "活化巨噬細胞、細胞免疫", "幫助 B 細胞、IgE", "促發炎與嗜中性球", "抑制過度免疫"], ["常見對象", "細胞內病原", "寄生蟲、過敏", "細菌與黴菌發炎", "自體耐受"], ["代表細胞激素", "IFN-gamma", "IL-4、IL-5", "IL-17", "IL-10、TGF-beta"], ["國考文字陷阱", "TH1 不是完全不幫 B 細胞", "TH2 與 IgE 過敏常連在一起", "Treg 是抑制不是促發炎"]]}}, {"title": "CD8 毒殺型 T 細胞", "plain": "CD8 毒殺型 T 細胞是辨識 MHC-I 呈獻抗原後，殺死病毒感染細胞、腫瘤細胞或外來細胞的效應 T 細胞。", "analogy": "建議比喻：CD8 像拆除被佔領據點的特勤隊。", "mechanism": "CD8+ T 細胞接受 MHC-I 抗原胜肽與共刺激訊號後活化、增殖，成為 effector T 細胞。它可釋放穿孔素在標的細胞膜打洞，並以 granzymes 誘發細胞死亡；也可透過 FasL 與標的細胞 Fas 結合傳遞死亡訊號。目標清除後多數效應細胞減少，保留記憶 CD8+ T 細胞以利再感染快速反應。", "diagrams": [{"title": "機轉流程", "nodes": [{"id": "A", "label": "感染細胞 MHC-I 呈獻抗原"}, {"id": "B", "label": "CD8+ TCR 辨識"}, {"id": "C", "label": "效應 CD8+ T 細胞"}, {"id": "D", "label": "perforin 打洞"}, {"id": "E", "label": "granzymes 誘發死亡"}, {"id": "F", "label": "FasL-Fas 凋亡訊號"}], "edges": [{"from": "A", "to": "B"}, {"from": "B", "to": "C"}, {"from": "C", "to": "D"}, {"from": "C", "to": "E"}, {"from": "C", "to": "F"}]}], "focus": "CD8 對 MHC-I；毒殺機制包括 perforin、granzymes、FasL-Fas。", "confusion": "- CD8 T 細胞不辨識 MHC-II。 - 毒殺目標是帶有對應抗原的細胞，不是游離抗原本身。"}], "gameQuestions": [{"no": 15, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "正常情形下，白血球中數量最多與直徑最大的分別是：", "options": {"A": "嗜中性球與嗜酸性球", "B": "嗜中性球與單核球", "C": "淋巴球與嗜酸性球", "D": "淋巴球與單核球"}, "answer": "B", "ask": "在我們體內的免疫大軍中，誰是人數最龐大的基層小兵，而誰又是體型最魁梧的重量級巨無霸？", "compare": "嗜中性球與淋巴球在數量爭霸戰中誰才是真正的多數黨，而單核球與嗜酸性球放在顯微鏡下比拼，誰能奪下尺寸冠軍？", "lock": "結合「佔比高達六成以上」與「未來會變身為巨噬細胞」這兩個決定性的生理特徵，哪一個選項能同時完美對應這兩大細胞巨星？", "explain": "同學們，想像一下我們的免疫系統是一支軍隊！既然是軍隊，就一定要有天天站哨、人數最多的「基層步兵」，還有體型魁梧、負責清理戰場的「巨無霸泰坦」。這群「基層步兵」就是**嗜中性球（Neutrophils）**！它們佔了所有白血球的 50% 到 70%，數量絕對是壓倒性的第一名，只要身體哪裡有細菌入侵，它們總是第一個衝過去當砲灰。而那位「巨無霸泰坦」就是**單核球（Monocytes）**！它是白血球裡面體積最大的角色（直徑高達 12-20 微米）。單核球在血管裡巡邏時就已經很大隻了，等它鑽出血管進入組織，還會「大變身」成吞噬能力更驚人的巨噬細胞（Macrophage），簡直就是免疫界的綠巨人浩克！至於淋巴球（Lymphocytes），雖然數量排第二，但它們通常小巧玲瓏；而嗜酸性球（Eosinophils）數量少、體型也比不上單核球。所以，「數量最多」派嗜中性球出馬，「體型最大」派單核球站台，答案當然選 B 囉！", "what": "考驗對各類白血球在正常生理狀態下的「數量比例（由多到少）」與「細胞大小（直徑）」的基本形態學特徵。", "trap": "考生最容易把「淋巴球」跟「嗜中性球」的人數順序記反。請務必牢記經典的數量口訣：Never Let Monkeys Eat Bananas（Neutrophils > Lymphocytes > Monocytes > Eosinophils > Basophils），這樣不只這題，連帶其他數量的考題也能一網打盡！", "level": 1, "sectionTitle": "四、免疫細胞大軍"}, {"no": 35, "source": "107-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "當細菌侵入體內，何種血球細胞會轉變成巨噬細胞以吞噬細菌？", "options": {"A": "巨核細胞", "B": "肥胖細胞", "C": "B 淋巴球", "D": "單核球"}, "answer": "D", "ask": "當病原體入侵組織時，哪一種在血液中巡邏的免疫細胞會收到訊號，並穿出血管「變身」為專職吞噬的猛將？", "compare": "同樣名字裡都有「巨」或「單」，負責生成血小板的骨髓細胞與會分化為吞噬細胞的白血球，兩者在功能上有何本質上的不同？", "lock": "哪一個選項是屬於單核吞噬細胞系統（MPS），且在血液中成熟後會游走到組織轉化為巨噬細胞？", "explain": "嗨，同學們！想像一下，我們的免疫系統就像是一支精銳部隊。今天的主角「巨噬細胞」就像是戰場上的超級大胃王兼清道夫，專門把入侵的細菌一口吞掉。但你知道嗎？巨噬細胞平常在血管裡巡邏時，其實是低調的「單核球（Monocyte）」！一旦某處組織被細菌入侵、發出求救訊號，單核球就會立刻穿過血管壁，變身（就像神奇寶貝進化一樣！）成體型更大、食量驚人的巨噬細胞來大開殺戒。至於其他選項：(A) 巨核細胞是「血小板」的媽媽，不負責吞噬；(B) 肥大細胞（考題寫肥胖細胞）是引發過敏反應的元凶；(C) B 淋巴球則是生產抗體的「遠程射手」。所以，單核球就是巨噬細胞的前身，選 (D) 準沒錯！", "what": "考驗考生是否清楚巨噬細胞在血液中的前身細胞（Precursor cell）是哪一種白血球。", "trap": "千萬不要因為「巨核細胞」名字裡有個「巨」字，就把它跟「巨噬細胞」聯想在一起！巨核細胞住在骨髓裡，是負責分裂成血小板的，跟免疫吞噬完全無關喔！", "level": 2, "sectionTitle": "四、免疫細胞大軍"}, {"no": 81, "source": "113-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "對抗病菌後死亡的嗜中性白血球（neutrophil），會由何種細胞清除，以維持組織恆定？", "options": {"A": "巨噬細胞（macrophage）", "B": "肥大細胞（mast cell）", "C": "樹突細胞（dendritic cell）", "D": "漿細胞（plasma cell）"}, "answer": "A", "ask": "戰場上英勇殉職的嗜中性白血球遺體，需要哪種細胞來扮演「禮儀師兼清潔工」將其妥善清理，以防身體繼續發炎？", "compare": "負責「大口吞噬垃圾」的巨噬細胞，與忙著「製造抗體武器」的漿細胞或「到處通風報信」的樹突細胞，在功能定位上有何本質上的不同？", "lock": "哪一個細胞的名字聽起來就像是個「超級大胃王」，天生就具備強大的吞噬與清除廢棄物能力，能完美勝任這場戰後大掃除？", "explain": "想像一下，嗜中性白血球（neutrophil）就像是免疫系統裡的「拋棄式免洗筷」，它們衝到前線跟病菌同歸於盡後，現場會留下一堆細胞殘骸（這也就是我們常看到的「膿」）。這時候，誰要來當清潔工打掃戰場呢？當然是我們免疫界的「大胃王」兼「專業吸塵器」——巨噬細胞（macrophage）啦！巨噬細胞會透過胞吞作用把這些死掉的同伴吃乾淨，順便釋放抑炎因子讓發炎反應降溫，維持組織的和平。至於其他選項：(B) 肥大細胞主要是引發過敏與發炎的「警報器」；(C) 樹突細胞是負責傳遞抗原資訊的「情報官」；(D) 漿細胞則是專職生產抗體的「兵工廠」，它們通通都不負責收垃圾喔！", "what": "考驗對各類免疫細胞主要生理功能與分工的認識，特別是誰負責執行「清除細胞殘骸」以維持組織恆定的職責。", "trap": "千萬不要把巨噬細胞和樹突細胞的功能搞混！雖然兩者都會吞噬，但樹突細胞吞噬是為了「獲取情報（呈遞抗原）」，而巨噬細胞才是真正負責「戰後大掃除」的環保局清潔車！", "level": 3, "sectionTitle": "四、免疫細胞大軍"}, {"no": 87, "source": "114-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關嗜中性白血球的敘述，下列何者錯誤？", "options": {"A": "屬於後天性免疫細胞", "B": "產生氧化活性物質能殺死病菌", "C": "具有吞噬微生物的能力", "D": "可藉由特殊的死亡方式釋放網狀結構捕捉微生物"}, "answer": "A", "ask": "身體裡數量最多、總是衝在最前線與病原體拼命的「嗜中性白血球」，它到底是屬於哪一個免疫陣營，又有哪些厲害的殺敵絕技呢？", "compare": "那些一出生就配備好武器、不論敵人是誰先打再說的防禦部隊，跟需要時間特訓、能記住特定敵人長相的特種部隊，在免疫學分類上到底有何本質上的不同？", "lock": "既然嗜中性球是發炎反應時最先抵達戰場的無名英雄，那它應該歸類在「一視同仁」的先天性防線，還是「精準打擊」的後天防線？", "explain": "同學們，這題我們要來聊聊免疫界的「熱血敢死隊」——嗜中性白血球（Neutrophils）！它們是我們身體裡數量最多、跑得最快的白血球。只要身體一發炎，它們二話不說，立刻衝到第一線跟病原體拼命。既然是這種「不分青紅皂白、看到敵人先打再說」的先鋒部隊，它們當然是屬於「先天性免疫（Innate Immunity）」的成員，而不是需要時間特訓、具有專一性與記憶力的「後天性免疫（Adaptive Immunity）」（那是 T 細胞和 B 細胞的天下啦！），所以選項 A 是錯的，也就是本題的正確答案。 那其他選項呢？它們可都是嗜中性球的超強大招喔！選項 B 的「產生氧化活性物質」，就是它們體內特有的「活性氧（ROS）化學武器」，能把細菌燒得體無完膚；選項 C 的「吞噬能力」則是基本功，看到細菌直接吞進肚子裡消化掉；最酷的是選項 D，當它們快戰死時，會使出終極自爆大招（NETosis），把自己的 DNA 像蜘蛛網一樣吐出來（嗜中性球胞外陷阱），把周圍的細菌通通黏住、一網打盡！是不是超悲壯、超帥氣的呢？", "what": "區分先天性免疫與後天性免疫的細胞成員，以及掌握嗜中性白血球的關鍵殺敵與防禦機制。", "trap": "千萬不要被選項 D 的「特殊死亡方式釋放網狀結構」嚇到了！這可不是科幻小說，而是真實存在的「NETosis（胞外陷阱）」，是嗜中性球非常代表性的悲壯大招，絕對不能選它當錯誤選項喔！", "level": 4, "sectionTitle": "四、免疫細胞大軍"}, {"no": 88, "source": "114-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "巨噬細胞是由下列何者分化而成？", "options": {"A": "嗜酸性球", "B": "嗜鹼性球", "C": "單核球", "D": "淋巴球"}, "answer": "C", "ask": "巨噬細胞在發炎組織裡威風凜凜地大吃特吃，但牠在血管裡巡邏時是以什麼樣的「未成熟形態」示人呢？", "compare": "嗜酸性球、嗜鹼性球和淋巴球在免疫系統中各司其職，牠們有哪一個具備穿透血管後「變身」成組織大胃王的潛力，還是牠們根本屬於完全不同的發育支系？", "lock": "哪一種白血球在骨髓誕生後會先在血管裡當個「單核心」的巡邏兵，一旦踏入組織就會「登大人」變成吞噬能力超強的巨噬細胞？", "explain": "各位同學，這題其實是在考巨噬細胞（Macrophage）的「前世今生」啦！巨噬細胞在組織裡就像是個超級大胃王，負責把外來病原體通通吃掉。但是，牠可不是一出生就在組織裡當老大的。牠的「童年時期」是在血液中度過的，那時候的牠叫做「單核球」（Monocyte）。單核球在骨髓出生後，會先在血管裡巡邏，這時牠們還比較溫和；一旦身體某個組織發炎，單核球就會像聽到召喚一樣，擠出血管、鑽進組織裡，這時牠們就會「轉職爆發」，體積變大、食量變驚人，正式改名為「巨噬細胞」！至於其他選項：嗜酸性球（A）和嗜鹼性球（B）屬於顆粒球，主要對付寄生蟲和過敏反應；淋巴球（D）則是特種部隊（T細胞、B細胞、NK細胞）的天下，跟我們這位大胃王巨噬細胞是完全不同的發育路線喔！", "what": "考驗你對白血球「發育與分化學」的認識，特別是單核球在血管內外身份轉換的核心概念。", "trap": "千萬不要被「淋巴球」給誘惑了！雖然淋巴球和巨噬細胞常在慢性發炎現場聯手作戰，但牠們在發育圖譜上是「淋巴系」與「骨髓系」分道揚鑣的遠親，巨噬細胞唯一的親生骨肉只有單核球！", "level": 5, "sectionTitle": "四、免疫細胞大軍"}], "questions": [{"no": 15, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "正常情形下，白血球中數量最多與直徑最大的分別是：", "options": {"A": "嗜中性球與嗜酸性球", "B": "嗜中性球與單核球", "C": "淋巴球與嗜酸性球", "D": "淋巴球與單核球"}, "answer": "B", "ask": "在我們體內的免疫大軍中，誰是人數最龐大的基層小兵，而誰又是體型最魁梧的重量級巨無霸？", "compare": "嗜中性球與淋巴球在數量爭霸戰中誰才是真正的多數黨，而單核球與嗜酸性球放在顯微鏡下比拼，誰能奪下尺寸冠軍？", "lock": "結合「佔比高達六成以上」與「未來會變身為巨噬細胞」這兩個決定性的生理特徵，哪一個選項能同時完美對應這兩大細胞巨星？", "explain": "同學們，想像一下我們的免疫系統是一支軍隊！既然是軍隊，就一定要有天天站哨、人數最多的「基層步兵」，還有體型魁梧、負責清理戰場的「巨無霸泰坦」。這群「基層步兵」就是**嗜中性球（Neutrophils）**！它們佔了所有白血球的 50% 到 70%，數量絕對是壓倒性的第一名，只要身體哪裡有細菌入侵，它們總是第一個衝過去當砲灰。而那位「巨無霸泰坦」就是**單核球（Monocytes）**！它是白血球裡面體積最大的角色（直徑高達 12-20 微米）。單核球在血管裡巡邏時就已經很大隻了，等它鑽出血管進入組織，還會「大變身」成吞噬能力更驚人的巨噬細胞（Macrophage），簡直就是免疫界的綠巨人浩克！至於淋巴球（Lymphocytes），雖然數量排第二，但它們通常小巧玲瓏；而嗜酸性球（Eosinophils）數量少、體型也比不上單核球。所以，「數量最多」派嗜中性球出馬，「體型最大」派單核球站台，答案當然選 B 囉！", "what": "考驗對各類白血球在正常生理狀態下的「數量比例（由多到少）」與「細胞大小（直徑）」的基本形態學特徵。", "trap": "考生最容易把「淋巴球」跟「嗜中性球」的人數順序記反。請務必牢記經典的數量口訣：Never Let Monkeys Eat Bananas（Neutrophils > Lymphocytes > Monocytes > Eosinophils > Basophils），這樣不只這題，連帶其他數量的考題也能一網打盡！"}, {"no": 35, "source": "107-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "當細菌侵入體內，何種血球細胞會轉變成巨噬細胞以吞噬細菌？", "options": {"A": "巨核細胞", "B": "肥胖細胞", "C": "B 淋巴球", "D": "單核球"}, "answer": "D", "ask": "當病原體入侵組織時，哪一種在血液中巡邏的免疫細胞會收到訊號，並穿出血管「變身」為專職吞噬的猛將？", "compare": "同樣名字裡都有「巨」或「單」，負責生成血小板的骨髓細胞與會分化為吞噬細胞的白血球，兩者在功能上有何本質上的不同？", "lock": "哪一個選項是屬於單核吞噬細胞系統（MPS），且在血液中成熟後會游走到組織轉化為巨噬細胞？", "explain": "嗨，同學們！想像一下，我們的免疫系統就像是一支精銳部隊。今天的主角「巨噬細胞」就像是戰場上的超級大胃王兼清道夫，專門把入侵的細菌一口吞掉。但你知道嗎？巨噬細胞平常在血管裡巡邏時，其實是低調的「單核球（Monocyte）」！一旦某處組織被細菌入侵、發出求救訊號，單核球就會立刻穿過血管壁，變身（就像神奇寶貝進化一樣！）成體型更大、食量驚人的巨噬細胞來大開殺戒。至於其他選項：(A) 巨核細胞是「血小板」的媽媽，不負責吞噬；(B) 肥大細胞（考題寫肥胖細胞）是引發過敏反應的元凶；(C) B 淋巴球則是生產抗體的「遠程射手」。所以，單核球就是巨噬細胞的前身，選 (D) 準沒錯！", "what": "考驗考生是否清楚巨噬細胞在血液中的前身細胞（Precursor cell）是哪一種白血球。", "trap": "千萬不要因為「巨核細胞」名字裡有個「巨」字，就把它跟「巨噬細胞」聯想在一起！巨核細胞住在骨髓裡，是負責分裂成血小板的，跟免疫吞噬完全無關喔！"}, {"no": 79, "source": "113-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種構造通常是由多醣組成，對於幫助細菌抵抗免疫細胞的吞噬作用（phagocytosis）極為重要？", "options": {"A": "莢膜（capsule）", "B": "鞭毛（flagellum）", "C": "線毛（pilus）", "D": "芽孢（spore）"}, "answer": "A", "ask": "細菌身上穿了哪一件由「多醣」織成、滑溜溜的防禦外衣，能讓前來圍剿的吞噬細胞手滑、完全抓不住它？", "compare": "負責推動細菌游走的「螺旋槳」與負責黏附宿主的「小鉤子」，在功能和材質上，與能夠包裹住整顆細菌、阻擋免疫細胞接觸的「多醣防護層」有何不同？", "lock": "哪一個選項所代表的構造，在臨床上最常被提及是細菌逃避免疫系統吞噬的「黏液外殼」？", "explain": "想像一下，細菌要入侵人體，就像小偷要闖進警局一樣。人體的吞噬細胞（警察）一看到細菌就會想衝上去把它吃掉！這時候，聰明的肺炎鏈球菌等壞蛋就會在外面套上一件滑溜溜的「超大雨衣」，這件雨衣通常是由「多醣（Polysaccharide）」組成的，叫做「莢膜（Capsule）」。因為太滑了，吞噬細胞的手根本抓不住它，只能眼睜睜看它溜走！至於其他選項：(B) 鞭毛就像是細菌的小螺旋槳，用來游泳前進的；(C) 線毛則是細菌的小鉤子，用來黏在細胞表面或談戀愛（接合）用的；(D) 芽孢則是細菌遇到天災人禍時的「防空洞（休眠構造）」，不是平時用來抗吞噬的。所以，抗吞噬多醣神裝，絕對是非「莢膜」莫屬啦！", "what": "考驗細菌表面特殊構造（莢膜）的化學組成，及其在免疫逃逸（抗吞噬作用）中所扮演的角色。", "trap": "很多同學會把「莢膜」和「芽孢」搞混，以為只要是「保護」功能都一樣。請記住，芽孢是細菌為了應付惡劣環境（如高溫、乾燥）而產生的休眠體，含有大量雙吡啶酸鈣而非單純多醣，且主要功能不是用來平時抵抗吞噬細胞的喔！"}, {"no": 81, "source": "113-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "對抗病菌後死亡的嗜中性白血球（neutrophil），會由何種細胞清除，以維持組織恆定？", "options": {"A": "巨噬細胞（macrophage）", "B": "肥大細胞（mast cell）", "C": "樹突細胞（dendritic cell）", "D": "漿細胞（plasma cell）"}, "answer": "A", "ask": "戰場上英勇殉職的嗜中性白血球遺體，需要哪種細胞來扮演「禮儀師兼清潔工」將其妥善清理，以防身體繼續發炎？", "compare": "負責「大口吞噬垃圾」的巨噬細胞，與忙著「製造抗體武器」的漿細胞或「到處通風報信」的樹突細胞，在功能定位上有何本質上的不同？", "lock": "哪一個細胞的名字聽起來就像是個「超級大胃王」，天生就具備強大的吞噬與清除廢棄物能力，能完美勝任這場戰後大掃除？", "explain": "想像一下，嗜中性白血球（neutrophil）就像是免疫系統裡的「拋棄式免洗筷」，它們衝到前線跟病菌同歸於盡後，現場會留下一堆細胞殘骸（這也就是我們常看到的「膿」）。這時候，誰要來當清潔工打掃戰場呢？當然是我們免疫界的「大胃王」兼「專業吸塵器」——巨噬細胞（macrophage）啦！巨噬細胞會透過胞吞作用把這些死掉的同伴吃乾淨，順便釋放抑炎因子讓發炎反應降溫，維持組織的和平。至於其他選項：(B) 肥大細胞主要是引發過敏與發炎的「警報器」；(C) 樹突細胞是負責傳遞抗原資訊的「情報官」；(D) 漿細胞則是專職生產抗體的「兵工廠」，它們通通都不負責收垃圾喔！", "what": "考驗對各類免疫細胞主要生理功能與分工的認識，特別是誰負責執行「清除細胞殘骸」以維持組織恆定的職責。", "trap": "千萬不要把巨噬細胞和樹突細胞的功能搞混！雖然兩者都會吞噬，但樹突細胞吞噬是為了「獲取情報（呈遞抗原）」，而巨噬細胞才是真正負責「戰後大掃除」的環保局清潔車！"}, {"no": 87, "source": "114-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關嗜中性白血球的敘述，下列何者錯誤？", "options": {"A": "屬於後天性免疫細胞", "B": "產生氧化活性物質能殺死病菌", "C": "具有吞噬微生物的能力", "D": "可藉由特殊的死亡方式釋放網狀結構捕捉微生物"}, "answer": "A", "ask": "身體裡數量最多、總是衝在最前線與病原體拼命的「嗜中性白血球」，它到底是屬於哪一個免疫陣營，又有哪些厲害的殺敵絕技呢？", "compare": "那些一出生就配備好武器、不論敵人是誰先打再說的防禦部隊，跟需要時間特訓、能記住特定敵人長相的特種部隊，在免疫學分類上到底有何本質上的不同？", "lock": "既然嗜中性球是發炎反應時最先抵達戰場的無名英雄，那它應該歸類在「一視同仁」的先天性防線，還是「精準打擊」的後天防線？", "explain": "同學們，這題我們要來聊聊免疫界的「熱血敢死隊」——嗜中性白血球（Neutrophils）！它們是我們身體裡數量最多、跑得最快的白血球。只要身體一發炎，它們二話不說，立刻衝到第一線跟病原體拼命。既然是這種「不分青紅皂白、看到敵人先打再說」的先鋒部隊，它們當然是屬於「先天性免疫（Innate Immunity）」的成員，而不是需要時間特訓、具有專一性與記憶力的「後天性免疫（Adaptive Immunity）」（那是 T 細胞和 B 細胞的天下啦！），所以選項 A 是錯的，也就是本題的正確答案。 那其他選項呢？它們可都是嗜中性球的超強大招喔！選項 B 的「產生氧化活性物質」，就是它們體內特有的「活性氧（ROS）化學武器」，能把細菌燒得體無完膚；選項 C 的「吞噬能力」則是基本功，看到細菌直接吞進肚子裡消化掉；最酷的是選項 D，當它們快戰死時，會使出終極自爆大招（NETosis），把自己的 DNA 像蜘蛛網一樣吐出來（嗜中性球胞外陷阱），把周圍的細菌通通黏住、一網打盡！是不是超悲壯、超帥氣的呢？", "what": "區分先天性免疫與後天性免疫的細胞成員，以及掌握嗜中性白血球的關鍵殺敵與防禦機制。", "trap": "千萬不要被選項 D 的「特殊死亡方式釋放網狀結構」嚇到了！這可不是科幻小說，而是真實存在的「NETosis（胞外陷阱）」，是嗜中性球非常代表性的悲壯大招，絕對不能選它當錯誤選項喔！"}, {"no": 88, "source": "114-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "巨噬細胞是由下列何者分化而成？", "options": {"A": "嗜酸性球", "B": "嗜鹼性球", "C": "單核球", "D": "淋巴球"}, "answer": "C", "ask": "巨噬細胞在發炎組織裡威風凜凜地大吃特吃，但牠在血管裡巡邏時是以什麼樣的「未成熟形態」示人呢？", "compare": "嗜酸性球、嗜鹼性球和淋巴球在免疫系統中各司其職，牠們有哪一個具備穿透血管後「變身」成組織大胃王的潛力，還是牠們根本屬於完全不同的發育支系？", "lock": "哪一種白血球在骨髓誕生後會先在血管裡當個「單核心」的巡邏兵，一旦踏入組織就會「登大人」變成吞噬能力超強的巨噬細胞？", "explain": "各位同學，這題其實是在考巨噬細胞（Macrophage）的「前世今生」啦！巨噬細胞在組織裡就像是個超級大胃王，負責把外來病原體通通吃掉。但是，牠可不是一出生就在組織裡當老大的。牠的「童年時期」是在血液中度過的，那時候的牠叫做「單核球」（Monocyte）。單核球在骨髓出生後，會先在血管裡巡邏，這時牠們還比較溫和；一旦身體某個組織發炎，單核球就會像聽到召喚一樣，擠出血管、鑽進組織裡，這時牠們就會「轉職爆發」，體積變大、食量變驚人，正式改名為「巨噬細胞」！至於其他選項：嗜酸性球（A）和嗜鹼性球（B）屬於顆粒球，主要對付寄生蟲和過敏反應；淋巴球（D）則是特種部隊（T細胞、B細胞、NK細胞）的天下，跟我們這位大胃王巨噬細胞是完全不同的發育路線喔！", "what": "考驗你對白血球「發育與分化學」的認識，特別是單核球在血管內外身份轉換的核心概念。", "trap": "千萬不要被「淋巴球」給誘惑了！雖然淋巴球和巨噬細胞常在慢性發炎現場聯手作戰，但牠們在發育圖譜上是「淋巴系」與「骨髓系」分道揚鑣的遠親，巨噬細胞唯一的親生骨肉只有單核球！"}]}, {"title": "五、抗原抗體與訊號武器", "stars": "★★★★★", "intro": "這一段處理國考最愛的配對：抗原如何被看見，抗體如何作用，MHC/TCR、補體與細胞激素如何接力。", "cram": ["抗原決定位是被辨認的小區域；半抗原需接上載體才容易誘發完整免疫反應。", "MHC I 對 CD8；MHC II 對 CD4。", "IgM 是初次反應先鋒，IgG 可過胎盤，IgA 守黏膜，IgE 與過敏及寄生蟲相關。", "補體三條活化路徑最後匯入 C3、C5 與膜攻擊複合體。"], "concepts": [{"title": "抗原", "plain": "抗原是可被免疫系統辨認並引發專一性免疫反應的分子；真正與抗體或受體結合的部位稱抗原決定位或 epitope。", "analogy": "建議比喻：epitope 像鑰匙齒痕，抗體辨認的是關鍵形狀。", "mechanism": "良好抗原通常需被宿主視為外來物，且分子較大、結構複雜、表面粗糙、帶電荷多、決定位暴露。完全抗原同時具免疫力與作用力；半抗原分子小，需接上 carrier 才能誘發抗體，但形成抗體後可直接反應。抗原可分自體抗原、同種抗原、異種抗原、型特異性抗原、異嗜性抗原與腫瘤相關抗原。", "diagrams": [], "focus": "半抗原只有作用力無免疫力；epitope 決定抗體專一性。", "confusion": "- 抗原性不等於免疫原性。 - 核酸與脂質通常不是良好免疫原，但與蛋白結合後可引發反應。"}, {"title": "抗原決定位", "plain": "抗原決定位 是第七章免疫學必須能查到的索引詞，先把它放回「抗原」這條知識線上理解。", "analogy": "像把地圖上的小站名補上：不一定每一站都很大，但少了站名就容易坐錯路線。", "mechanism": "此類名詞通常用來拆解抗原的來源、免疫原性、抗原性、決定位或臨床標記意義。", "diagrams": [], "focus": "國考常把這類詞放在題幹線索、選項或配對題中，要求辨認它的上位概念、作用方向或易混淆對象。", "confusion": "抗原決定位不是另一種抗原，而是抗原表面真正被抗體或 T 細胞受體辨認的關鍵小區域。讀這個概念時，要把它放回「抗原如何被免疫系統辨認」來理解。"}, {"title": "半抗原", "plain": "半抗原 是第七章免疫學必須能查到的索引詞，先把它放回「抗原」這條知識線上理解。", "analogy": "像把地圖上的小站名補上：不一定每一站都很大，但少了站名就容易坐錯路線。", "mechanism": "此類名詞通常用來拆解抗原的來源、免疫原性、抗原性、決定位或臨床標記意義。", "diagrams": [], "focus": "國考常把這類詞放在題幹線索、選項或配對題中，要求辨認它的上位概念、作用方向或易混淆對象。", "confusion": "半抗原不是完整抗原。它本身太小，通常要接上較大的載體蛋白後，才比較能誘發完整免疫反應。"}, {"title": "抗體", "plain": "抗體是外來物刺激後，由 B 細胞分化成的漿細胞分泌之專一性免疫分子，屬免疫球蛋白。", "analogy": "建議比喻：抗體像貼在目標上的精準標籤。", "mechanism": "抗體為醣蛋白，可存在於血漿或 B 細胞膜上，主要功能是辨認抗原、協助活化補體、促進吞噬與中和毒素或病毒。典型抗體由兩條重鏈與兩條輕鏈以雙硫鍵連接而成；Fab 負責抗原結合，Fc 負責與補體或細胞受體互動。V 區決定抗原專一性，C 區決定抗體類別與效應功能。", "diagrams": [], "focus": "Fab 結合抗原，Fc 連結補體或細胞；重鏈決定 IgG、IgM、IgA、IgD、IgE 類別。", "confusion": "- 抗體是導航與標記工具，常需補體或細胞協助清除目標。 - 免疫球蛋白不只存在血清，也可作為 B 細胞受體。"}, {"title": "免疫球蛋白五大類", "plain": "免疫球蛋白依重鏈不同分為 IgG、IgM、IgA、IgD、IgE 五大類，各有不同分布與功能。", "analogy": "建議比喻：五種 Ig 像五種不同任務的標籤工具。", "mechanism": "IgG 為血清最多、半衰期長、唯一可通過胎盤者，感染晚期與二次反應常見，可中和病毒與活化補體。IgM 為五聚體、分子量最大、初次反應最早出現，ABO 抗體多屬之，不能過胎盤。IgA 主要在黏膜與分泌液，分泌型為雙體。IgD 主要是 B 細胞成熟標記。IgE 與第一型過敏與寄生蟲感染相關，結合肥大細胞與嗜鹼性球 Fc 受體。", "diagrams": [], "focus": "IgG 過胎盤；IgM 最早、最大、ABO；IgA 黏膜；IgE 過敏與寄生蟲；IgD 是 B 細胞標記。", "confusion": "- 新生兒最多的抗體常是來自母體的 IgG，不是 IgM。 - IgA 可在黏膜防禦，但活化補體能力弱。", "table": {"title": "免疫球蛋白五大類對照", "headers": ["項目", "IgG", "IgM", "IgA", "IgE", "IgD"], "rows": [["血清地位", "最多", "初次最早", "分泌液主力", "最少但過敏關鍵", "B 細胞標記"], ["結構特色", "單體", "五聚體", "分泌型雙體", "單體", "單體"], ["胎盤通過", "可通過", "不可通過", "不可通過", "不可通過", "不可通過"], ["典型功能", "二次反應、中和、補體", "ABO、初次反應、補體", "黏膜保護", "第一型過敏、寄生蟲", "成熟 B 細胞受體"], ["國考文字陷阱", "唯一可過胎盤是 IgG", "最大且最早是 IgM", "黏膜不是 IgG 主場", "過敏想到 IgE", "IgD 常考 B 細胞標記"]]}}, {"title": "ABO 與 Rh 血型", "plain": "ABO 與 Rh 是臨床輸血最重要的紅血球抗原系統，抗原抗體反應強，輸血前需配對。", "analogy": "建議比喻：血型抗原像紅血球表面的識別貼紙。", "mechanism": "ABO 血型由紅血球表面 A、B 抗原決定；血清中不能有與自身紅血球抗原相同的凝集素。A 型有 A 抗原與 anti-B，B 型有 B 抗原與 anti-A，AB 型有 A、B 抗原但無 anti-A/anti-B，O 型無 A/B 抗原但有 anti-A/anti-B。ABO 抗體多為 IgM。Rh 陰性者接受 Rh 陽性血後可產生 IgG 抗 Rh 抗體，再次暴露可嚴重溶血。", "diagrams": [], "focus": "O 型常稱萬能供血者，AB 型常稱萬能受血者；大量輸血仍以同型為宜。Rh 抗體是 IgG，可過胎盤。", "confusion": "- ABO 抗體多為 IgM，不易過胎盤；Rh 抗體為 IgG，可過胎盤。 - 萬能供血者概念不代表大量輸血可忽略同型配對。"}, {"title": "MHC 與抗原呈獻", "plain": "MHC 是細胞表面醣蛋白，可呈獻抗原胜肽給 T 細胞，是辨識敵我與啟動 T 細胞反應的核心。", "analogy": "建議比喻：MHC 像細胞身分證上的展示夾。", "mechanism": "MHC-I 出現在所有有核細胞，主要將內源性抗原呈獻給 CD8+ 毒殺型 T 細胞；紅血球無細胞核，因此無 MHC-I。MHC-II 主要出現在樹狀突細胞、巨噬細胞、B 細胞等 APC，呈獻抗原給 CD4+ 輔助型 T 細胞。MHC-III 為分泌性蛋白，包含部分補體、發炎相關細胞激素、TNF 與熱休克蛋白。", "diagrams": [{"title": "機轉流程", "nodes": [{"id": "A", "label": "有核細胞 MHC-I"}, {"id": "B", "label": "CD8+ T 細胞"}, {"id": "C", "label": "APC MHC-II"}, {"id": "D", "label": "CD4+ T 細胞"}, {"id": "E", "label": "MHC-III"}, {"id": "F", "label": "補體/發炎蛋白/TNF"}], "edges": [{"from": "A", "to": "B"}, {"from": "C", "to": "D"}, {"from": "E", "to": "F"}]}], "focus": "MHC-I 對 CD8；MHC-II 對 CD4；人類 MHC 稱 HLA。", "confusion": "- MHC-I 不是只有免疫細胞有，而是所有有核細胞都有。 - MHC-III 不負責典型抗原呈獻。", "table": {"title": "MHC I 與 MHC II 對照", "headers": ["項目", "MHC I", "MHC II"], "rows": [["表現細胞", "幾乎所有有核細胞", "專業 APC"], ["呈現抗原", "內源性抗原", "外源性抗原"], ["對應 T 細胞", "CD8 毒殺型 T 細胞", "CD4 輔助型 T 細胞"], ["臨床意義", "病毒感染細胞被毒殺", "啟動免疫指揮與抗體反應"], ["國考文字陷阱", "紅血球無細胞核，非典型 MHC I 目標", "CD4 看 MHC II，不是 MHC I"]]}}, {"title": "T 細胞受體", "plain": "T 細胞受體是 T 細胞辨識 MHC-抗原胜肽複合物的受體，常與 CD3 形成訊息傳遞複合物。", "analogy": "建議比喻：TCR 是細胞表面的讀卡機，CD3 是把讀到的訊號送進細胞的線路。", "mechanism": "TCR 由 alpha/beta 或 gamma/delta 鏈組成，周邊血液多數 T 細胞為 alpha/beta TCR。TCR 與 CD3 非共價結合成 TCR-CD3 複合物；TCR 負責辨識抗原，CD3 負責將訊號傳入細胞。TCR 基因經 V(D)J 重組、片段連接不精確性、N 區域多樣性等形成高度多形性，使 T 細胞可辨識多樣抗原，但單一 T 細胞通常只有一種受體。", "diagrams": [], "focus": "TCR 辨識的是 MHC 加抗原，不是單獨游離抗原；CD3 負責訊息傳遞。", "confusion": "- TCR 沒有免疫球蛋白五大 class 分類。 - 一個 T 細胞通常只表現一種特異性 TCR。"}, {"title": "補體系統", "plain": "補體是血清中一群需被活化後才發揮功能的蛋白質與因子，可加強免疫反應。", "analogy": "建議比喻：補體像一串被啟動的連鎖陷阱。", "mechanism": "補體活化有三路徑：傳統路徑由抗原抗體複合物，特別是 IgM、IgG1、IgG2、IgG3 啟動；凝集素路徑由 MBL 結合病原表面甘露糖後啟動；替代路徑可由 LPS、寄生蟲或 IgA 等非抗原抗體方式啟動。三者最後匯入 C3/C5 活化，形成 C5b-9 攻膜複合物，造成溶菌或溶血。", "diagrams": [{"title": "機轉流程", "nodes": [{"id": "A", "label": "抗原抗體複合物 IgM/IgG"}, {"id": "B", "label": "傳統路徑"}, {"id": "C", "label": "MBL 結合甘露糖"}, {"id": "D", "label": "凝集素路徑"}, {"id": "E", "label": "LPS/病原表面/IgA"}, {"id": "F", "label": "替代路徑"}, {"id": "G", "label": "C3 轉化酶"}, {"id": "H", "label": "C3b 調理作用"}, {"id": "I", "label": "C5b-9 MAC"}, {"id": "J", "label": "細胞溶解"}], "edges": [{"from": "A", "to": "B"}, {"from": "C", "to": "D"}, {"from": "E", "to": "F"}, {"from": "B", "to": "G"}, {"from": "D", "to": "G"}, {"from": "F", "to": "G"}, {"from": "G", "to": "H"}, {"from": "G", "to": "I"}, {"from": "I", "to": "J"}]}], "focus": "C3b 調理；C3a/C5a 趨化與過敏毒素，C5a 較強；C5b-9 為 MAC。", "confusion": "- 補體濃度不因接種而增加，活化狀態才是關鍵。 - 替代路徑不需抗原抗體複合物。", "table": {"title": "補體三條活化路徑對照", "headers": ["項目", "傳統路徑", "替代路徑", "凝集素路徑"], "rows": [["啟動因子", "抗原抗體複合物", "微生物表面", "MBL 結合甘露糖"], ["是否需抗體", "需要 IgG 或 IgM", "不需要", "不需要"], ["免疫歸屬", "連接後天與補體", "偏先天快速防禦", "偏先天快速防禦"], ["共同結果", "C3 活化、調理、發炎、MAC", "C3 活化、調理、發炎、MAC", "C3 活化、調理、發炎、MAC"], ["國考文字陷阱", "IgM 很會啟動傳統路徑", "替代路徑不是靠抗體", "凝集素路徑不是抗原抗體反應"]]}}, {"title": "細胞激素", "plain": "細胞激素是水溶性醣蛋白，作為細胞間訊息傳遞者，調節免疫與發炎反應。", "analogy": "建議比喻：細胞激素像免疫系統的群組訊息，有催促也有煞車。", "mechanism": "細胞激素濃度極低也能透過目標細胞表面受體誘導反應，通常不具抗原專一性。主要類別包含介白素 IL、干擾素 IFN、腫瘤壞死因子 TNF、群落刺激因子 CSF、生長因子與趨化激素。它們可刺激或抑制免疫細胞活化、分化、增生，促進發炎、造血或抗病毒反應，也可形成網絡互相調控。", "diagrams": [], "focus": "IL-1 發炎與發燒；IL-2 促 T 細胞增殖；IL-4/5/6 幫助 B 細胞；IL-8 趨化嗜中性球；IL-10 抗發炎。", "confusion": "- 細胞激素是訊息分子，不是抗體。 - 不同 IL 編號代表不同來源與功能，不能只背「都活化免疫」。", "table": {"title": "常考細胞激素功能對照", "headers": ["項目", "IL-1", "IL-2", "IL-4、IL-5、IL-6", "IL-8", "IL-10", "IFN"], "rows": [["核心功能", "發炎、發燒", "促 T 細胞增殖", "幫助 B 細胞抗體反應", "趨化嗜中性球", "抗發炎調節", "抗病毒、活化巨噬細胞"], ["方向性", "促發炎", "促增殖", "促抗體", "促趨化", "抑制過度發炎", "抑制病毒複製"], ["常見陷阱", "發燒不只病原本身", "IL-2 不只作用 T 細胞", "B 細胞幫助常見於 TH2 訊號", "IL-8 不是抗體", "IL-10 是煞車", "IFN 不是抗體"], ["國考文字陷阱", "IL-1 發燒", "IL-2 T cell growth", "IL-4/5/6 B cell help", "IL-8 neutrophil chemotaxis", "IL-10 anti-inflammatory", "IFN antiviral"]]}}, {"title": "IL-2", "plain": "IL-2 是由輔助型 T 細胞分泌的重要介白素，又稱 T 細胞生長因子。", "analogy": "建議比喻：IL-2 像 T 細胞收到作戰命令後的擴編訊號。", "mechanism": "IL-2 可刺激 B 細胞與 T 細胞生長分化，活化 NK 細胞，尤其是促進輔助型 T 細胞與毒殺型 T 細胞大量增生，是 T 細胞最強的增殖與活化因子之一。它也常與其他細胞激素共同塑造 T 細胞反應，例如與 IL-12 促進毒殺型 T 細胞分化。", "diagrams": [{"title": "機轉流程", "nodes": [{"id": "A", "label": "抗原刺激 T 細胞"}, {"id": "B", "label": "分泌 IL-2"}, {"id": "C", "label": "T 細胞增殖"}, {"id": "D", "label": "毒殺型 T 細胞活化"}, {"id": "E", "label": "NK 細胞活化"}], "edges": [{"from": "A", "to": "B"}, {"from": "B", "to": "C"}, {"from": "B", "to": "D"}, {"from": "B", "to": "E"}]}], "focus": "IL-2 = T cell growth factor；促 T 細胞與毒殺型 T 細胞大量增生。", "confusion": "- IL-1 是發燒與發炎重要因子；IL-2 主要記成 T 細胞生長。 - IL-2 不只作用於 T 細胞，也可活化 NK 細胞。"}, {"title": "干擾素", "plain": "干擾素是由白血球或組織細胞製造的小蛋白質，可對抗病毒感染並調節免疫。", "analogy": "建議比喻：IFN 像被感染細胞向鄰居發出的防災警報。", "mechanism": "病毒感染後，細胞可在抗體產生前先製造 IFN，誘導鄰近細胞產生抗病毒蛋白，抑制病毒複製並提升未感染細胞抵抗力。IFN 具種專一性但非抗原專一性。IFN-alpha 主要由白血球、樹狀突細胞產生；IFN-beta 由纖維母細胞產生；IFN-gamma 由 T 細胞與 NK 細胞產生，可活化巨噬細胞並增強 MHC 表現。", "diagrams": [{"title": "機轉流程", "nodes": [{"id": "A", "label": "病毒感染細胞"}, {"id": "B", "label": "產生 IFN"}, {"id": "C", "label": "鄰近細胞受體"}, {"id": "D", "label": "抗病毒蛋白"}, {"id": "E", "label": "抑制病毒核酸複製"}], "edges": [{"from": "A", "to": "B"}, {"from": "B", "to": "C"}, {"from": "C", "to": "D"}, {"from": "D", "to": "E"}]}], "focus": "IFN 是非專一性抗病毒因子；IFN-gamma 活化巨噬細胞，協助清除細胞內病原。", "confusion": "- IFN 有種專一性，不等於抗原專一性。 - IFN 在抗體出現前即可參與抗病毒防禦。", "table": {"title": "干擾素 IFN-alpha、IFN-beta、IFN-gamma 對照", "headers": ["項目", "IFN-alpha", "IFN-beta", "IFN-gamma"], "rows": [["主要來源", "白血球、樹狀突細胞", "纖維母細胞、病毒感染組織細胞", "T 細胞、NK 細胞"], ["免疫定位", "第一型干擾素", "第一型干擾素", "第二型干擾素"], ["主要功能", "抗病毒、提高鄰近細胞防禦", "抗病毒、抑制病毒複製", "活化巨噬細胞、增強 MHC 表現"], ["臨床聯想", "部分病毒感染、B/C 型肝炎、部分癌症", "多發性硬化等免疫調節情境", "細胞性免疫、清除細胞內病原"], ["國考文字陷阱", "IFN-alpha 不是抗體", "IFN-beta 不是 B 細胞專屬", "IFN-gamma 常和 TH1、巨噬細胞連在一起"]]}}, {"title": "抗體作用方式", "plain": "抗體作用方式是抗體與抗原結合後，透過中和、凝集、沉澱、補體活化與調理等機制清除目標。", "analogy": "建議比喻：抗體像貼標、封口、聚集與呼叫支援。", "mechanism": "抗體通常不是直接破壞抗原，而是標記與引導其他效應系統。沉澱素使可溶性抗原形成沉澱；凝集素使顆粒性抗原凝集，IgM 凝集能力強；抗毒素與中和性抗體可中和外毒素或病毒感染力；IgG 與 IgM 可活化補體；IgG 可吸附細菌表面作為調理素，增強吞噬；IgG、IgA、IgE 可透過 Fc 段與吞噬細胞受體結合。", "diagrams": [], "focus": "IgM 凝集強；IgG 可調理與通過胎盤；IgG/IgM 可活化補體；IgG、IgA 可中和。", "confusion": "- 中和不是溶菌，而是阻止毒素或病毒作用。 - 調理作用是「讓吞噬更容易」，不是抗體自己吞噬。"}], "gameQuestions": [{"no": 7, "source": "105-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "透過古典途徑（classical pathway）活化補體時，需要以下那一種分子的參與？", "options": {"A": "IgE", "B": "IgA", "C": "IgD", "D": "IgM"}, "answer": "D", "ask": "補體古典途徑這台精密殺敵機器的啟動開關，究竟掌握在抗體家族中的哪位成員手裡？", "compare": "哪一種抗體在結構上擁有最多的結合手臂，最容易以單一分子的姿態就揪住補體 C1q 蛋白來啟動反應？", "lock": "排除掉不具備活化古典途徑能力的 IgA、IgD 和 IgE 後，剩下的哪一個選項才是那個實力堅強、效率最高的五聚體抗體？", "explain": "補體系統的「古典途徑（classical pathway）」就像是免疫界的一場精準打擊行動，而啟動這場行動的信號彈就是抗原與抗體的結合！在我們熟知的抗體大家庭中，只有 IgM 和 IgG 有資格擔任古典途徑的「啟動密鑰」。其中，IgM 是個由五個抗體分子連在一起的「五聚體」超大戰士，它光是靠自己一個人，就能提供足夠的抓地力（Fc 區域）來吸引並牢牢抓住補體系統的第一棒 C1q，因此活化效率極高！相對地，單體結構的 IgG 還需要找好朋友湊成一對（至少兩個）才能啟動。至於選項中的 IgA（主打黏膜防禦、走替代途徑）、IgE（專職過敏與寄生蟲）、IgD（主要當 B 細胞的感受器），它們在古典途徑中根本沒有活化補體的能力。所以，古典途徑的最佳代言人絕對是非 IgM 莫屬啦！", "what": "考驗對不同免疫球蛋白（抗體）在啟動補體古典途徑時的角色與結構差異之理解。", "trap": "考生常誤以為「只要是抗體就能活化所有補體途徑」。請死死記住：古典途徑只認 IgG 和 IgM，且 IgM 的活化效率因其五聚體結構而遠高於 IgG；而 IgA 則是參與替代途徑，千萬別傻傻分不清！", "level": 1, "sectionTitle": "五、抗原抗體與訊號武器"}, {"no": 33, "source": "107-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "抗體辨識抗原的專一性由何者決定？", "options": {"A": "只由抗體重鏈的蛋白序列所形成的三度空間決定", "B": "只由抗體輕鏈的蛋白序列所形成的三度空間決定", "C": "由抗體重鏈與輕鏈的蛋白序列共同形成的三度空間所決定", "D": "由抗體蛋白本身結構的彎曲彈性而決定"}, "answer": "C", "ask": "抗體在茫茫人海中要精準認出特定的病原體，到底是靠它身上的哪一個關鍵部位來當作辨識的眼睛？", "compare": "單靠重鏈或單靠輕鏈的結構，真的有辦法獨立拼湊出那個能完美卡住抗原的 3D 立體口袋嗎？而結構的彎曲彈性，影響的到底是辨識的「精準度」還是活動的「靈活性」？", "lock": "哪一個選項完整描述了重鏈變異區與輕鏈變異區必須攜手合作、共同組成抗原結合部位的免疫學事實？", "explain": "同學們，想像一下抗體就像是個『雙手合十』的捕手，這雙手是由『重鏈』和『輕鏈』共同組成的！當抗原（球）飛過來時，抗體需要用這兩隻手合力圍成一個完美的『接球手套』（也就是由重鏈 VH 與輕鏈 VL 共同構成的三度空間結構），才能精準地把抗原死死抓住。如果只用重鏈（選項 A）或只用輕鏈（選項 B），就像單手接球一樣，根本無法形成那個完美的辨識口袋。至於選項 D 說的彎曲彈性，那是指抗體的『鉸鏈區（hinge region）』讓它可以靈活扭動身體，跟決定『要抓誰』的專一性完全是兩碼子事喔！所以，缺一不可，必須要重鏈與輕鏈攜手合作，答案非 C 莫屬！", "what": "抗體結合部位（Fab）的結構組成與抗原辨識專一性的決定機制。", "trap": "有些考生會誤以為重鏈比較大、比較重就決定了一切，而落入『只由重鏈決定』的陷阱；或者把抗體分子結構的『彈性（靈活性）』跟『辨識專一性』混為一談。", "level": 2, "sectionTitle": "五、抗原抗體與訊號武器"}, {"no": 43, "source": "108-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "CD4 T 細胞活化後，可以依據其所分泌的細胞激素種類分成不同 T 亞群（subset）。下列敘述何者正確？", "options": {"A": "TH1 CD4 T 細胞主要分泌 IL-4", "B": "TH2 CD4 T 細胞主要分泌 IFN-γ", "C": "TH17 CD4 T 細胞能強化抗病毒免疫反應", "D": "Treg CD4 T 細胞能抑制其他 T 細胞的活性"}, "answer": "D", "ask": "當身為免疫大腦的 CD4+ T 細胞活化並分化成不同的「功能分組」後，哪一個小組的功能與它所分配到的任務描述是完全吻合的？", "compare": "負責對抗細胞內病毒的 Th1 和負責對抗寄生蟲的 Th2，它們各自釋放的招牌信號彈（細胞激素）到底有沒有被故意掉包？", "lock": "哪一個 T 細胞亞群天生就扮演著「和事佬」的角色，專門在免疫反應過頭時釋放抑制信號，阻止其他 T 細胞繼續暴走？", "explain": "來，同學們！我們把 CD4+ T 細胞想像成免疫系統裡的「總司令」。當總司令收到前線戰報（抗原呈遞）後，他會根據敵人的類型，派出不同專長的「特種分隊」（T 亞群）。我們先來看看這四個分隊的真實底細： - **Th1 分隊**（胞內菌與病毒殺手）：他們的招牌武器是 **IFN-γ**（干擾素-γ），用來激活巨噬細胞。選項 A 說 Th1 主要分泌 IL-4？大錯特錯，那是 Th2 的武器！ - **Th2 分隊**（寄生蟲剋星、過敏製造者）：他們的經典情書是 **IL-4**、IL-5。選項 B 把 Th2 和 IFN-γ 配在一起，根本是強行亂點鴛鴦譜！ - **Th17 分隊**（胞外菌與真菌清道夫）：他們主要分泌 IL-17 來召喚中性粒細胞，對付的是「胞外菌和真菌」。選項 C 說他們強化抗病毒反應，這其實是 Th1 和 CD8+ T 細胞的飯碗啦！ - **Treg 分隊**（免疫界的維和部隊 / 和事佬）：當大家都打紅了眼，Treg 就會站出來分泌 IL-10 或 TGF-β，溫柔地對其他 T 細胞說「好啦，收工了，別再打了」，以此抑制免疫反應、避免自體免疫疾病。所以，選項 D 的敘述完全正確，是個溫暖的存在！", "what": "CD4+ T 輔助細胞亞群（Th1、Th2、Th17、Treg）各自的核心細胞激素與生理免疫功能。", "trap": "國考最愛把 Th1 的 IFN-γ 和 Th2 的 IL-4 互相對調來騙你，看到選項時請在腦中畫個「交叉線」自我檢查！另外，千萬別把 Treg（調節型 T 細胞）跟 Tc（細胞毒性 T 細胞）搞混，一個是踩煞車的和平鴿，一個是拿鐮刀的死神！", "level": 3, "sectionTitle": "五、抗原抗體與訊號武器"}, {"no": 58, "source": "110-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "五大主要類型的免疫球蛋白（immunoglobulin）具有不同的性質與功能，下列敘述何者正確？", "options": {"A": "IgA 與造成全身性過敏反應有關", "B": "所有類型的免疫球蛋白都能通過胎盤", "C": "IgG 是半衰期最長的免疫球蛋白", "D": "IgE 是固定補體最有效率的免疫球蛋白"}, "answer": "C", "ask": "這五個抗體兄弟在人體內各司其職，誰的生命力最強韌、能在我們體內活得最久？", "compare": "哪一個抗體擁有專屬的通行證能穿過胎盤保護胎兒，而誰又是引發過敏反應以及活化補體的真正高手？", "lock": "結合上述各抗體的特性，哪一個選項描述的生理特性與抗體主角完全相符且毫無破綻？", "explain": "哈囉同學們！今天我們來點兵點將這五位「抗體特攻隊」成員！抗體五兄弟各有各的絕活。首先，看看選項 (C)「行事穩重」的 IgG，他是我們血液裡的大哥大，數量最多，而且非常耐操，半衰期長達大約 21 天，就像保鮮期最長的手搖飲，所以選 (C) 完全沒毛病！那其他兄弟錯在哪呢？選項 (A) 的 IgA 是黏膜大師，負責守護我們的口鼻呼吸道，才不是什麼過敏製造者呢！過敏大王其實是選項 (D) 的 IgE，他一遇到過敏原就會讓肥大細胞釋放組織胺，把人整得狂打噴嚏，而且他根本沒辦法活化補體（活化補體最有效率的其實是體型巨大的 IgM 隊長）。至於選項 (B)，天底下的媽媽都很偉大，但不是所有抗體都能分給寶寶。只有 IgG 擁有專屬的「穿牆術」（透過 FcRn 受體），能通過胎盤傳給胎兒，其他兄弟只能在外面乾瞪眼啦！", "what": "五大類免疫球蛋白（IgG、IgA、IgM、IgD、IgE）各自獨特的生理功能與物理化學特性。", "trap": "很多同學會把「胎盤傳遞」和「母乳傳遞」搞混。媽媽透過胎盤傳給胎兒的只有 IgG；而寶寶出生吸母乳得到的則主要是分泌型 IgA（尤其是初乳），千萬別把這兩種母愛防線的傳遞方式記反囉！", "level": 4, "sectionTitle": "五、抗原抗體與訊號武器"}, {"no": 71, "source": "111-2", "cognitive": "理解/機轉", "difficulty": "易", "stem": "補體活化啟動一系列的蛋白質水解產生次單位「a」、「b」與其他次單位，具備不同的生物活性。下列何者 是補體 C3b 主要的功能？", "options": {"A": "增加血管通透性", "B": "吸引吞噬細胞到感染部位", "C": "促進發炎反應", "D": "促進病原體被吞噬細胞辨識"}, "answer": "D", "ask": "當補體系統被激活並裂解出各種大小碎片時，那個黏在細菌表面的 C3b 碎片，在免疫大軍中主要負責執行什麼任務？", "compare": "游離在外的 C3a、C5a 所引發的血管擴張與趨化作用，跟緊貼在病原體身上的 C3b 所展現的「插旗標記」功能，兩者在免疫調控上有何不同？", "lock": "哪一個選項描述的生理現象，正是免疫學中著名的「調理作用（Opsonization）」，能讓吞噬細胞一眼認出並迅速吞食病原體？", "explain": "嗨，同學們！補體家族在活化時，會像切蛋糕一樣被切成「a」和「b」兩個碎片。通常小碎片「a」喜歡到處跑去通風報信（像是 C3a 和 C5a，它們是過敏毒素，負責增加血管通透性、促進發炎、招募白血球）；而大碎片「b」則很有責任感，喜歡留在戰場上「黏」在病原體表面（b 代表 binding）。C3b 最厲害的超能力就是「調理作用」（Opsonization）！它就像是給病原體塗上一層超美味的烤肉醬，讓吞噬細胞大老遠看到就口水直流，大大增加病原體被吞噬細胞辨識並一口吃掉的機率。因此，C3b 的主要功能是促進病原體被吞噬。至於選項 A、B、C，全都是 C3a 和 C5a 這類小碎片引發的發炎與趨化效果，可別被它們給誘惑囉！", "what": "補體活化後，不同裂解碎片（特別是負責發炎的 C3a/C5a 與負責調理的 C3b）在免疫反應中的功能區分。", "trap": "考生最常把「a」和「b」碎片的功能搞混。請記住好記的口訣：小碎片「a」代表 alarm/active（釋放警報、引發過敏發炎），大碎片「b」代表 binding（黏附在細菌表面，當作標記）。看到 C3b 就要反射性聯想到「調理作用」，千萬別選到屬於 a 碎片的發炎功能！", "level": 5, "sectionTitle": "五、抗原抗體與訊號武器"}], "questions": [{"no": 1, "source": "105-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "巨噬細胞（Macrophages）殺死外來病原的過程機制中，不包括下列那一種？", "options": {"A": "利用抗體來加速吞噬作用（phagocytosis）", "B": "形成補體膜攻擊複合體（membrane attack complex）來溶解病原", "C": "會產生一氧化氮（NO）", "D": "會分泌腫瘤壞死因子（tumor necrosis factor）"}, "answer": "B", "ask": "巨噬細胞是個「大胃王」細胞，它在消滅敵人時，是把敵人「吞進肚子裡用毒氣毒死」，還是「在外面用導彈把敵人的皮打穿」？", "compare": "活性氧 (ROS) 和活性氮 (RNS) 是肚子裡的化學毒氣，但「膜攻擊複合體 (MAC)」是在膜上打洞的溶菌大砲，這台大砲是由細胞自己組裝，還是由血清中的補體系統組裝？", "lock": "既然 MAC 是補體系統的專利武器，那麼哪一個機制「不屬於」巨噬細胞的個人技能包？", "explain": "這題考巨噬細胞怎麼殺死病原體。 巨噬細胞是一個免疫細胞（大胃王），它主要是把細菌「吃進肚子裡（吞噬作用）」，然後在肚子裡釋放強烈的化體毒氣（例如 反應性氧分子 ROS 和 反應性氮分子 RNS）來毒死細菌。而選項中的「補體膜攻擊複合體 (MAC)」，並非巨噬細胞分泌 of 武器，而是血清中有一群叫「補體」的蛋白質，它們自己游過去在細菌的皮上組裝、打洞。這是補體系統的絕活，不是巨噬細胞親自動手的。", "what": "巨噬細胞的殺菌機制 vs 補體系統 of 防禦機制。", "trap": "看到巨噬細胞是免疫大將，就以為所有殺菌方法它都會。要注意「補體膜攻擊複合體 (MAC)」是體液免疫（補體系統）的特權，巨噬細胞是吞噬細胞，做不出這種穿孔器。"}, {"no": 2, "source": "105-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "當細胞表面之組織相容性抗原（Major histocompatibility complex, MHC）之表現被抑制後，與下列何種疾 病之發生較有相關？", "options": {"A": "氣喘", "B": "失智", "C": "癌症", "D": "甲狀腺亢進"}, "answer": "C", "ask": "細胞表面的 MHC 分子就像是它的「身份證」或「公告欄」，用來跟免疫細胞證明自己是不是「良民」。如果細胞突然把身分證藏起來，它可能在打什麼壞主意？", "compare": "在什麼疾病中，體內的異端細胞最想「隱形」以躲避 T 細胞的追殺？是免疫系統自殘，還是那些想無限繁殖卻不想被抓的癌細胞？", "lock": "癌細胞利用「調降 MHC」來裝作看不見，這種現象被稱為免疫逃逸。那麼這與哪一種疾病的發生最息息相關？", "explain": "這題考的是細胞表面 MHC 的重要性。 MHC 就像是細胞表面的「身分證」，細胞會把體內的蛋白質碎片放在 MHC 上展示，讓巡邏的 T 細胞（免疫警察）過來檢查。如果細胞壞掉了或變成了癌細胞，為了不被 T 細胞抓到，癌細胞最常用的一招就是「把 MHC 身分證藏起來（抑制 MHC 表現）」，這樣 T 細胞走過去就會當作沒看到，成功躲過追殺（稱為免疫逃逸）。所以，MHC 被抑制跟癌症的發生最有關聯。", "what": "MHC 分子在免疫監視（特別是抗癌）中的角色。", "trap": "阻覺想到 MHC 跟免疫、排斥有關，容易亂猜自我免疫或免疫缺乏。要記住，細胞如果不把 MHC 拿出來展示，T 細胞就看不見它，這正是「癌細胞逃避追殺」的常見避敵手段。"}, {"no": 3, "source": "105-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列那一個人類白血球組織抗原（human leukocyte antigen, HLA）可避免 NK 細胞之攻擊？", "options": {"A": "HLA-A", "B": "HLA-B", "C": "HLA-C", "D": "HLA-G"}, "answer": "B", "ask": "正常細胞要向殘暴的自然殺手（NK）細胞出示哪一種特定的身分證分子，才能成功啟動抑制訊號並保住小命？", "compare": "雖然 HLA-A、B、C 都是第一型 MHC 分子，但哪一個在跟
