function table(t){if(!t)return'';return `<div class="table-wrap"><table><caption>${esc(t.title)}</caption><thead><tr>${t.headers.map(x=>`<th>${esc(x)}</th>`).join('')}</tr></thead><tbody>${t.rows.map(r=>`<tr>${t.headers.map((_,i)=>`<td>${esc(r[i]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function question(q){return `<details class="q"><summary>第 ${q.no} 題（${esc(q.source)}）</summary><div class="qbody" data-answer="${esc(q.answer)}"><p>${esc(q.stem)}</p><div class="options">${Object.entries(q.options).map(([k,v])=>`<button class="option" type="button" data-choice="${k}"><b>${k}.</b> ${esc(v)}</button>`).join('')}</div><button class="submit" type="button" disabled>送出答案</button><div class="feedback" role="status"></div><div class="guide"><div class="hint"><b>🔍 題目在問啥？</b><br>${esc(q.ask)}</div><div class="hint"><b>⚖️ 概念 PK</b><br>${esc(q.compare)}</div><div class="hint"><b>🎯 鎖定答案</b><br>${esc(q.lock)}</div></div><button class="reveal" type="button" disabled>顯示引導與解析</button><div class="answer"><p><b>答案：</b>${esc(q.answer)}. ${esc(q.options[q.answer]||'')}</p><p><b>解析：</b>${esc(q.explain)}</p><p><b>這題考什麼：</b>${esc(q.what)}</p><div class="trap"><b>小心踩雷：</b>${esc(q.trap)}</div><button class="reset" type="button">重新作答</button></div></div></details>`}
function gamePanel(s){if(!s.gameQuestions.length)return `<div class="empty">這一區目前沒有獨立主考題；先讀概念圖卡，完整題庫重心在前兩區。</div>`;const st=stateFor(s.title),idx=Math.min(st.level||0,s.gameQuestions.length-1),q=s.gameQuestions[idx],pct=Math.round(((st.done||[]).length/s.gameQuestions.length)*100),finished=(st.done||[]).length>=s.gameQuestions.length;return `<div class="game-card" data-section="${esc(s.title)}"><div class="game-top"><div><b>🎮 ${esc(s.title)} 題庫闖關</b><div>每題先作答，看完解析即可解鎖下一關。</div></div><div class="progress" aria-label="闖關進度 ${pct}%"><div class="bar" style="width:${pct}%"></div></div></div><div class="badges">${s.gameQuestions.map((g,i)=>`<span class="badge ${(st.done||[]).includes(g.no)?'done':''} ${i===idx&&!finished?'current':''}">第 ${g.level} 關</span>`).join('')}</div>${finished?`<div class="win" style="display:block"><b>🏆 本區完成！</b><br>得分 ${st.score||0}/${s.gameQuestions.length}，累計答錯 ${st.wrong||0} 次。</div><button class="retry" type="button" data-game-reset="1">重設本區</button>`:`<div class="qbody game-q" data-answer="${esc(q.answer)}" data-qno="${q.no}" data-level="${q.level}"><p><b>第 ${q.level} 關｜第 ${q.no} 題（${esc(q.source)}）</b></p><p>${esc(q.stem)}</p><div class="options">${Object.entries(q.options).map(([k,v])=>`<button class="option" type="button" data-choice="${k}"><b>${k}.</b> ${esc(v)}</button>`).join('')}</div><button class="submit" type="button" disabled>送出答案</button><div class="feedback" role="status"></div><div class="guide"><div class="hint"><b>🔍 題目在問啥？</b><br>${esc(q.ask)}</div><div class="hint"><b>⚖️ 概念 PK</b><br>${esc(q.compare)}</div><div class="hint"><b>🎯 鎖定答案</b><br>${esc(q.lock)}</div></div><button class="reveal" type="button" disabled>看解析並解鎖下一關</button><div class="answer"><p><b>答案：</b>${esc(q.answer)}. ${esc(q.options[q.answer]||'')}</p><p><b>解析：</b>${esc(q.explain)}</p><p><b>這題考什麼：</b>${esc(q.what)}</p><div class="trap"><b>小心踩雷：</b>${esc(q.trap)}</div><button class="next" type="button" data-next-level="1">下一關</button><button class="retry" type="button" data-game-retry="1">本關重答</button><button class="retry" type="button" data-game-reset="1">重設本區</button></div></div>`}</div>`}
function render(){const key=$('#search').value.trim().toLowerCase();const list=data.sections.filter(s=>(!star||s.stars.length===star)&&(!key||JSON.stringify(s).toLowerCase().includes(key)));$('#sections').innerHTML=list.map(s=>{const active=activeTabs[s.title]||'concepts';return `<section class="section" id="sec-${data.sections.indexOf(s)}"><div class="section-head"><h2>${esc(s.title)} <span class="stars">${esc(s.stars)}</span></h2><p class="intro">${esc(s.intro)}</p></div><div class="tabs"><button class="tab ${active==='concepts'?'active':''}" data-tab="concepts">概念圖卡（${s.concepts.length}）</button><button class="tab ${active==='game'?'active':''}" data-tab="game">題庫闖關（${s.gameQuestions.length} 關）</button><button class="tab ${active==='questions'?'active':''}" data-tab="questions">完整題庫（${s.questions.length}）</button></div><div class="panel concepts" ${active==='concepts'?'':'hidden'}><div class="cram"><b>🏁 考前只背這幾句</b><ul>${s.cram.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div><div class="concept-grid">${s.concepts.map(c=>`<article class="concept"><h3>${esc(c.title)}</h3><div class="label">⭐ 核心概念</div><p>${esc(c.plain)}</p><div class="label">🔍 機轉</div><p>${esc(c.mechanism)}</p>${c.analogy?`<div class="label">🧠 生活比喻</div><p>${esc(c.analogy)}</p>`:''}<div class="label">🎯 國考重點</div><p>${esc(c.focus)}</p><div class="trap"><b>⚠️ 易錯：</b>${esc(c.confusion)}</div>${table(c.table)}</article>`).join('')}</div></div><div class="panel game" ${active==='game'?'':'hidden'}>${gamePanel(s)}</div><div class="panel questions" ${active==='questions'?'':'hidden'}>${s.questions.length?s.questions.map(question).join(''):'<div class="empty">本區目前沒有獨立主考題。</div>'}</div></section>`}).join('')||'<div class="empty">沒有符合條件的內容</div>'}
function finishGameLevel(body,correct){const card=body.closest('.game-card');if(!card)return;const section=card.dataset.section,st=stateFor(section),qno=Number(body.dataset.qno),level=Number(body.dataset.level);if(correct&&!st._counted){st.score=(st.score||0)+1;st._counted=true}else if(!correct){st.wrong=(st.wrong||0)+1}track('game_answer',{section_name:section,level,question_no:qno,is_correct:correct});saveState()}
document.addEventListener('click',e=>{const tab=e.target.closest('.tab');if(tab){const sec=tab.closest('.section'),sectionName=sec.querySelector('h2')?.textContent.replace(/[★☆]/g,'').trim()||'';activeTabs[sectionName]=tab.dataset.tab;sec.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===tab));sec.querySelectorAll(':scope > .panel').forEach(x=>x.hidden=!x.classList.contains(tab.dataset.tab));track(tab.dataset.tab==='game'?'game_start':'content_tab_open',{tab_name:tab.dataset.tab,section_name:sectionName})}const opt=e.target.closest('.option');if(opt){const body=opt.closest('.qbody');body.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));opt.classList.add('selected');body.querySelector('.submit').disabled=false}const submit=e.target.closest('.submit');if(submit){const body=submit.closest('.qbody'),picked=body.querySelector('.selected'),ans=body.dataset.answer;if(!picked)return;body.querySelectorAll('.option').forEach(x=>{x.disabled=true;x.classList.toggle('correct',x.dataset.choice===ans);x.classList.toggle('wrong',x===picked&&x.dataset.choice!==ans)});const fb=body.querySelector('.feedback');const correct=picked.dataset.choice===ans;fb.textContent=correct?`答對！答案是 ${ans}。`:`答錯了；你選 ${picked.dataset.choice}，正確答案是 ${ans}。`;fb.classList.add('show');submit.disabled=true;body.querySelector('.reveal').disabled=false;if(body.classList.contains('game-q'))finishGameLevel(body,correct);else track('quiz_answer',{question_label:body.closest('.q')?.querySelector('summary')?.textContent.trim()||'',is_correct:correct})}const reveal=e.target.closest('.reveal');if(reveal&&!reveal.disabled){const body=reveal.closest('.qbody');body.classList.add('revealed');if(body.classList.contains('game-q'))track('game_level_complete',{section_name:body.closest('.game-card')?.dataset.section||'',level:Number(body.dataset.level),question_no:Number(body.dataset.qno)});else track('answer_reveal',{question_label:body.closest('.q')?.querySelector('summary')?.textContent.trim()||''})}const next=e.target.closest('[data-next-level]');if(next){const card=next.closest('.game-card'),section=card.dataset.section,st=stateFor(section),body=next.closest('.qbody'),qno=Number(body.dataset.qno);activeTabs[section]='game';st.done=Array.from(new Set([...(st.done||[]),qno]));st.level=Math.min((st.level||0)+1,card.querySelectorAll('.badge').length);delete st._counted;saveState();if(st.done.length>=card.querySelectorAll('.badge').length)track('game_section_complete',{section_name:section,score:st.score||0,wrong:st.wrong||0});render()}const retry=e.target.closest('[data-game-retry]');if(retry){const section=retry.closest('.game-card').dataset.section;activeTabs[section]='game';delete stateFor(section)._counted;saveState();track('game_retry_wrong',{section_name:section});render()}const resetGame=e.target.closest('[data-game-reset]');if(resetGame){const section=resetGame.closest('.game-card').dataset.section;activeTabs[section]='game';delete gameState[section];saveState();render()}const reset=e.target.closest('.reset');if(reset){const body=reset.closest('.qbody');body.classList.remove('revealed');body.querySelectorAll('.option').forEach(x=>{x.disabled=false;x.classList.remove('selected','correct','wrong')});body.querySelector('.submit').disabled=true;body.querySelector('.reveal').disabled=true;body.querySelector('.feedback').classList.remove('show')}})
let searchTimer;$('#search').addEventListener('input',()=>{render();clearTimeout(searchTimer);searchTimer=setTimeout(()=>{const term=$('#search').value.trim();if(term)track('search',{search_term:term})},700)});document.querySelectorAll('[data-star]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-star]').forEach(x=>x.classList.remove('active'));b.classList.add('active');star=+b.dataset.star;track('star_filter',{star_level:star||'all'});render()}));
$('#title').textContent=data.title;$('#subtitle').textContent=data.subtitle;$('#metrics').innerHTML=`<span class="metric">${data.sections.length} 大段落</span><span class="metric">${data.questionCount} 題完整題庫</span><span class="metric">${data.gameCount} 關題庫闖關</span>`;$('#route').innerHTML=data.route.map((x,i)=>`<button type="button" data-route="${i}"><b>${i+1}</b>${esc(x)}</button>`).join('');$('#route').addEventListener('click',e=>{const b=e.target.closest('[data-route]');if(b){track('section_jump',{section_name:data.route[+b.dataset.route]});document.getElementById(`sec-${b.dataset.route}`)?.scrollIntoView()}});render();
</script>
</body></html>
