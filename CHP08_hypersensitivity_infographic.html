<script id="data" type="application/json">{"title": "第八章 免疫反應與過敏症", "subtitle": "架構理解 × 四型過敏 × 27 題題庫闖關｜版本 2026.07.13-r2", "version": "2026.07.13-r2", "route": ["四型過敏", "移植與自體免疫", "免疫缺陷", "腫瘤免疫"], "sections": [{"title": "第一區：先看懂過敏反應總地圖", "stars": "★★★★★", "intro": "先把四型過敏反應放在同一張地圖裡：第一型看 IgE，第二型看細胞表面抗原，第三型看免疫複合物，第四型看 T 細胞。", "cram": ["第一型：IgE、肥大細胞、組織胺、立即反應。", "第二型：IgG/IgM 對細胞表面或基底膜抗原，造成細胞破壞或受體功能改變。", "第三型：可溶性抗原抗體形成免疫複合物，沉積後引發補體與發炎。", "第四型：T 細胞主導，延遲出現，不靠抗體。"], "concepts": [{"title": "過敏反應", "plain": "過敏反應是免疫系統對抗原產生過度或不適當反應，造成組織傷害或疾病表現。", "analogy": "生活比喻：建議先用「誰發動攻擊」帶學生分類：IgE、IgG/IgM、免疫複合物、T 細胞。", "mechanism": "過敏反應依主要免疫機轉分為四型：第一型為 IgE 與肥大細胞主導的即發型反應；第二型為 IgG 或 IgM 對細胞表面抗原引起的細胞毒殺；第三型為免疫複合物沉積造成發炎；第四型為 T 細胞主導的遲發型反應。", "focus": "國考常考四型過敏的「抗體或細胞」、「補體是否參與」、「發生時間」與代表疾病。", "confusion": "第一、二、三型多與抗體有關；第四型主要是 T 細胞。\n補體不是每一型都必然參與，第一型與第四型通常不是補體主導。", "table": {"title": "過敏反應四型總覽", "headers": ["項目", "第一型即發型", "第二型細胞毒殺型", "第三型免疫複合物型", "第四型遲發型"], "rows": [["主要媒介", "IgE、肥大細胞", "IgG 或 IgM", "IgG 或 IgM 免疫複合物", "T 細胞、巨噬細胞"], ["反應速度", "最快、常數分鐘內", "較快、依抗體作用而定", "較慢、沉積後發炎", "慢、常 24-48 小時"], ["傷害位置", "肥大細胞所在組織", "細胞或組織表面", "血管壁、腎絲球、關節", "皮膚、移植物、肉芽腫部位"], ["代表疾病", "氣喘、蕁麻疹、全身性過敏", "輸血反應、新生兒溶血症、Graves disease", "血清病、Arthus reaction、SLE", "接觸性皮膚炎、PPD test、移植排斥"], ["國考文字陷阱", "IgE 不是 IgG", "第二型抗原在細胞表面", "第三型是複合物沉積", "第四型不是抗體主導"]]}}, {"title": "第一型即發型過敏反應", "plain": "第一型過敏反應是由 IgE、肥大細胞與嗜鹼性球主導的快速過敏反應，通常在再次接觸抗原後數分鐘內發生。", "analogy": "建議比喻：肥大細胞像裝滿警報物質的警報器，IgE 是插在表面的感應器。", "mechanism": "第一次接觸過敏原時，個體產生特異性 IgE，IgE 以 Fc 區結合肥大細胞或嗜鹼性球表面的 FcεRI。再次接觸同一過敏原時，過敏原交聯細胞表面 IgE，促使細胞去顆粒，釋放組織胺、白三烯、前列腺素等介質，引起血管擴張、通透性增加、平滑肌收縮與黏液分泌。", "focus": "IgE、肥大細胞、嗜鹼性球、FcεRI、組織胺與「5-30 分鐘內發生」是第一型的關鍵提示。", "confusion": "第一型不是 IgG 或 IgM 主導。\n第一型通常不以補體活化作為主要機轉。\nIgE 也和寄生蟲防禦有關，不只出現在過敏。", "table": {"title": "第一型過敏反應臨床型態對照", "headers": ["項目", "局部過敏反應", "全身性過敏反應", "減敏治療"], "rows": [["主要位置", "鼻、眼、皮膚、支氣管", "全身血管與呼吸道", "免疫治療過程"], ["典型表現", "過敏性鼻炎、蕁麻疹、氣喘", "低血壓、喉頭水腫、休克", "逐步降低過敏反應"], ["核心媒介", "IgE、肥大細胞、組織胺", "IgE、肥大細胞、大量介質", "調整 IgE 或阻斷性抗體反應"], ["處置聯想", "避免過敏原、抗組織胺", "腎上腺素、維持呼吸循環", "長期、低劑量、逐步暴露"], ["國考文字陷阱", "局部不等於輕忽", "全身性過敏可致命", "減敏不是一次大量給過敏原"]]}}, {"title": "第二型抗體依賴型細胞毒殺過敏反應", "plain": "第二型過敏反應是 IgG 或 IgM 針對細胞表面或組織表面抗原引發的細胞傷害反應。", "analogy": "建議比喻：第二型像把標籤貼在細胞表面，讓補體或免疫細胞把該細胞當目標處理。", "mechanism": "抗體結合目標細胞表面抗原後，可透過補體活化造成細胞溶解，也可藉由調理作用促進吞噬，或透過 NK 細胞、巨噬細胞等引發抗體依賴型細胞媒介毒殺作用。若抗體結合受體並改變受體功能，也可造成刺激或阻斷型疾病。", "focus": "題幹出現 IgG/IgM、細胞表面抗原、補體活化、溶血或 Coombs test 時，常指向第二型過敏。", "confusion": "第二型的抗原通常在細胞或組織表面；第三型的抗原抗體複合物多為可溶性複合物沉積。\nGraves disease 是抗體刺激受體，不是單純細胞被殺死。", "table": {"title": "第二型過敏反應作用方式對照", "headers": ["項目", "補體媒介溶解", "調理吞噬", "受體功能改變"], "rows": [["抗體類型", "IgG 或 IgM", "IgG 或 IgM", "多為 IgG"], ["目標位置", "細胞表面抗原", "細胞表面抗原", "細胞表面受體"], ["主要結果", "細胞溶解、發炎", "被吞噬細胞清除", "受體被刺激或阻斷"], ["代表例子", "輸血反應、新生兒溶血症", "自體免疫溶血性貧血", "Graves disease、重症肌無力"], ["國考文字陷阱", "第二型不一定只靠補體", "抗體貼在細胞上不是第三型", "Graves 是刺激受體不是破壞甲狀腺"]]}}, {"title": "第三型免疫複合物過敏反應", "plain": "第三型過敏反應是抗原與抗體形成免疫複合物後，沉積在組織或血管壁，引發補體活化與發炎傷害。", "analogy": "建議比喻：免疫複合物像清不掉的小顆粒，卡在濾網或血管壁後引起發炎。", "mechanism": "可溶性抗原與 IgG 或 IgM 形成複合物，若無法有效清除，會沉積於腎絲球、關節、血管壁等處。補體活化後產生 C3a、C5a 等發炎訊號，吸引嗜中性球釋放酵素與活性物質，造成組織傷害。", "focus": "免疫複合物、補體活化、嗜中性球、血管炎、腎絲球腎炎、SLE 常是第三型提示。", "confusion": "第三型不是抗體直接貼在細胞表面，而是複合物沉積造成傷害。\nSLE 常歸在全身性自體免疫疾病，機轉多與第三型有關。", "table": {"title": "第三型過敏反應代表病變對照", "headers": ["項目", "Arthus reaction", "血清病", "SLE 與腎絲球腎炎"], "rows": [["發生範圍", "局部", "全身性", "全身性或特定器官"], ["抗原來源", "局部注入抗原", "外來血清或藥物抗原", "自體抗原或感染後抗原"], ["核心機轉", "免疫複合物局部沉積", "免疫複合物循環沉積", "免疫複合物沉積後補體活化"], ["常見位置", "注射部位血管壁", "血管、關節、腎臟", "腎絲球、皮膚、關節"], ["國考文字陷阱", "Arthus 是第三型不是第一型", "血清病不是血清檢驗", "SLE 常考第三型複合物沉積"]]}}, {"title": "第四型遲發型過敏反應", "plain": "第四型過敏反應是由 T 細胞主導的細胞媒介免疫反應，典型反應較慢，常在 24-48 小時後明顯出現。", "analogy": "建議比喻：第四型像 T 細胞召集施工隊到現場，反應需要時間才明顯。", "mechanism": "抗原被抗原呈獻細胞呈現後，活化 Th1、Th17 或 CD8 毒殺型 T 細胞。T 細胞釋放細胞激素，活化巨噬細胞與其他發炎細胞，或直接殺傷目標細胞。此型反應不以抗體或補體為主要機轉。", "focus": "T 細胞、細胞媒介免疫、24-48 小時、接觸性皮膚炎、PPD test、肉芽腫與移植排斥常指向第四型。", "confusion": "第四型不是抗體主導，所以看到 IgE、IgG 或 IgM 應先排除。\n「遲發」是相對於第一型即發反應，不代表一定要很多天才發生。", "table": {"title": "第四型遲發型過敏反應型態對照", "headers": ["項目", "接觸性過敏", "結核菌素型", "肉芽腫型", "細胞毒殺型"], "rows": [["主要細胞", "Th1、巨噬細胞", "Th1、巨噬細胞", "Th1、巨噬細胞", "CD8 T 細胞"], ["反應時間", "約 24-48 小時", "約 48-72 小時", "慢性、持續刺激", "依目標細胞暴露而定"], ["代表情境", "接觸性皮膚炎", "PPD test", "結核肉芽腫", "移植排斥、病毒感染細胞"], ["主要傷害", "局部皮膚發炎", "硬結與紅腫", "巨噬細胞聚集成肉芽腫", "目標細胞被殺傷"], ["國考文字陷阱", "接觸性皮膚炎不是 IgE", "PPD 是 T 細胞反應", "肉芽腫不是抗體沉積", "CD8 是細胞性不是體液性"]]}}], "gameQuestions": [{"no": 2, "source": "105-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者屬於細胞型過敏免疫反應（cell-mediated hypersensitivity）？", "options": {"A": "花粉熱（hay fever）", "B": "古德巴斯德症候群（Goodpasture syndrome）", "C": "血清病（serum sickness）", "D": "結核病（tuberculosis）"}, "answer": "D", "ask": "當我們看到「細胞型過敏反應」這個關鍵詞時，腦海中應該要立刻浮現哪一種免疫細胞，以及它對應的是第幾型的過敏反應？", "compare": "花粉熱、古德巴斯德症候群與血清病這三者在免疫反應的發動上，分別是由哪些抗體主導，這與不需要抗體參與的結核病免疫機轉有何本質上的不同？", "lock": "哪一個疾病在進行臨床皮膚免疫試驗時，需要等待 48 至 72 小時，且現場只會看到 T 細胞和巨噬細胞聚集而成的浸潤紅腫，而非抗體引起的即時紅疹？", "explain": "嘿，各位同學！看到『過敏』可別只想到打噴嚏和流鼻涕喔！過敏反應（Hypersensitivity）一共分為四型，前三型（I、II、III）都是抗體（Antibody）在背後搞鬼，只有第四型是完全不需要抗體、靠 T 細胞親自出馬的『細胞型（Cell-mediated）過敏反應』！我們來一一拆解選項：\n(A) 花粉熱：這是一碰就發作的『第一型（速發型）』，是 IgE 抓著肥大細胞狂噴組織胺的結果。\n(B) 古德巴斯德症候群：這是『第二型（抗體依賴型）』，自體抗體直接跑去攻擊腎臟和肺部的基底膜，屬於定點轟炸。\n(C) 血清病：這是『第三型（免疫複合物型）』，抗體跟抗原在血液裡抱成一團形成複合物，到處亂塞血管引發全身發炎。\n(D) 結核病：恭喜答對！結核桿菌非常頑強，巨噬細胞搞不定它，只好召喚 Th1 細胞與 CD8+ T 細胞來發動遲發性超敏反應，甚至形成肉芽腫把它關起來。這就是標準的第四型細胞型過敏反應，我們常做的結核菌素測驗（PPD test）也是這個原理喔！", "what": "區分四種過敏反應（Hypersensitivity）的免疫機制，特別是辨識出由 T 細胞介導（而非抗體介導）的第四型過敏反應臨床實例。", "trap": "考生最容易一看到『過敏』就直覺聯想到 IgE、花粉熱或抗體，而忽略了『細胞型過敏反應』其實是『第四型（遲發性）過敏反應』的別稱，這類型反應完全不需要抗體參與！", "level": 1}, {"no": 8, "source": "106-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列那一種致病機制為第四型細胞媒介型過敏反應（type IV cell mediated hypersensitivity）？", "options": {"A": "第一型糖尿病（type I diabetes mellitus）", "B": "血清病（serum sickness）", "C": "重症肌無力（myasthenia gravis）", "D": "惡性貧血（pernicious anemia）"}, "answer": "A", "ask": "當我們看到「第四型細胞媒介型過敏反應」時，免疫系統中哪一個不靠抗體、只靠自己動手搞破壞的細胞才是這場災難的主角？", "compare": "胰島 β 細胞被 T 細胞直接精準消滅，與抗體跑去亂綁受器、或是抗原抗體結合成垃圾到處亂塞血管，這三種破壞模式在免疫學上有何本質上的不同？", "lock": "排除掉那些由抗體大軍（自體抗體或免疫複合物）在背後搞鬼的選項後，哪一個疾病才是真正由 T 細胞親自出馬痛扁自體細胞的苦主？", "explain": "來，同學們坐好，我們今天不背死書，用聽故事的心情來搞懂過敏反應！這題要找的是「第四型（細胞媒介型）過敏反應」，它的核心主角是『T細胞』，而且是個「慢郎中」（延遲型過敏反應，需要2~3天反應時間）。我們來看看選項中的四個疾病到底是誰在搗亂：\n\n(A) 第一型糖尿病：這是「T細胞」大軍（主要是CD8+ 毒殺型T細胞和Th1細胞）跑去胰臟，把製造胰島素的 β 細胞給集體超渡了！因為是T細胞親自出手，所以它是不折不扣的「第四型過敏反應」。恭喜，標準答案就是它！\n(B) 血清病：這是因為抗原和抗體在血液中結合，形成了「免疫複合物（Immune Complex）」，這些複合物像垃圾一樣到處亂塞，卡在血管、關節或腎臟引起發炎，這是經典的「第三型過敏反應」。\n(C) 重症肌無力：這是抗體直接跑去綁架神經肌肉接合處的「乙醯膽鹼受體」，阻礙訊號傳導，這是抗體直接搞鬼的「第二型過敏反應」。\n(D) 惡性貧血：這是自體抗體跑去攻擊胃壁細胞或內在因子，導致維生素 B12 沒辦法被吸收，一樣是抗體作祟的「第二型過敏反應」。\n\n所以，只有第一型糖尿病是 T 細胞親自下場的第四型喔！", "what": "區分四種過敏反應（Hypersensitivity）的致病機制（抗體媒介 vs. T細胞媒介）與經典臨床臨床疾病。", "trap": "千萬不要看到「第一型」糖尿病，大腦就自動導航去選「第一型」過敏反應！那是命名上的巧合，「第一型糖尿病」是 T 細胞去搞破壞的，屬於「第四型過敏反應」！而第一型過敏反應的代表是過敏性休克和氣喘（IgE媒介），差很多喔！", "level": 2}, {"no": 9, "source": "106-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何者非第二型過敏反應（Type II hypersensitivity）引起之疾病？", "options": {"A": "Rh 血型陰性的母體所製造的 IgG 抗體，透過胎盤進到 Rh 陽性胎兒造成紅血球破壞", "B": "將 AB 型血輸給 O 型血的人，引起溶血性輸血反應", "C": "小分子藥物或代謝產物引發自體免疫溶血性貧血", "D": "巨量免疫複合體沉積引發血清病（serum sickness）"}, "answer": "D", "ask": "免疫系統中的抗體如果像殺手一樣，直接瞄準並消滅特定的「單一細胞靶點」，這種反應不包含哪一種疾病？", "compare": "抗體直接黏在紅血球表面導致細胞被破壞，與抗原抗體結合後形成整坨複合體到處沉積，這兩種破壞機制有什麼本質上的不同？", "lock": "哪一個選項描述的是「免疫複合體」沉積所引起的全身性發炎，而非針對特定細胞的直接毒殺？", "explain": "哈囉各位同學！今天我們要來聊聊過敏反應中的「第二型過敏反應」（又叫抗體媒介型細胞毒殺）。簡單來說，這型過敏反應就像是「精準導彈誤炸事件」！我們的抗體（IgG 或 IgM）認錯了人，直接黏在「我們自己特定細胞」的表面（最常見的就是紅血球），然後引導補體或吞噬細胞去把這個無辜的細胞給炸了。來看看選項：選項 A，Rh 陰性的媽媽產生 IgG 穿過胎盤去攻擊 Rh 陽性寶寶的紅血球；選項 B，O 型血的人體內有抗 A 與抗 B 抗體，一看到輸入的 AB 型紅血球就立刻貼上去發動溶血攻擊；選項 C，藥物分子調皮地黏在紅血球表面，結果抗體為了打藥物，連帶把紅血球一起摧毀。這三個選項都是抗體「一對一」直接鎖定細胞表面抗原進行毒殺，通通屬於標準的第二型！那選項 D 呢？巨量免疫複合體沉積引起的血清病，是抗原和抗體在血液中結合，形成一坨一坨的「垃圾（免疫複合體）」到處亂飄，最後卡在血管壁、關節或腎臟引發發炎。這可是典型的「第三型過敏反應」喔！所以，非第二型的當然就是 D 啦！", "what": "區分不同類型過敏反應的致病機制，特別是第二型（抗體直接攻擊細胞表面）與第三型（免疫複合體沉積）的差別。", "trap": "很多同學一看到「血清病」或「新生兒溶血」都有個『血』字，就通通直覺歸類到同一型。請務必記住：只要關鍵字出現「免疫複合體沉積」，那就是第三型，千萬別跟直接咬住細胞膜的第二型搞混囉！", "level": 3}, {"no": 11, "source": "107-1", "cognitive": "理解/機轉", "difficulty": "易", "stem": "第一型過敏反應是因 IgE 與抗原結合後，造成肥大細胞的去顆粒化作用，下列何者是所釋出最重要 的原發性介質（primary mediator）？", "options": {"A": "肝素（heparin）", "B": "補體（complement）", "C": "組織胺（histamine）", "D": "前列腺素（prostaglandin）"}, "answer": "C", "ask": "當肥大細胞被 IgE 激活並瞬間「洩洪」時，哪一個早就預先合成好、封裝在顆粒裡的關鍵發炎物質會首當其衝地被釋放出來？", "compare": "組織胺與前列腺素雖然都會參與發炎反應，但誰是早就準備妥當的「現成兵力（原發性）」，誰又是接到警報才開始動工的「後備民兵（次發性）」？", "lock": "結合上述分類，在所有選項中，哪一個化學介質是臨床上最常使用抗過敏藥物去對抗、且屬於肥大細胞顆粒內最重要的原發性成分？", "explain": "想像一下，肥大細胞（mast cell）就像是一個裝滿「發炎物質水氣球」的防衛基地。當過敏原跑進身體跟肥大細胞表面的 IgE 結合時，等於拉開了手榴彈引信，肥大細胞立刻把倉庫裡「早就醃好、存貨最多」的「原發性介質（primary mediator）」一口氣倒出來！這之中最猛、名氣最大、讓你馬上流鼻水和皮膚紅腫癢的巨星，就是「組織胺（histamine）」啦！那其他選項呢？A 肝素（heparin）雖然也在顆粒裡，但它是抗凝血用的，並非造成過敏症狀的主角；B 補體（complement）是血漿裡的蛋白質，不是肥大細胞釋放的；D 前列腺素（prostaglandin）則是事情發生後才現炒現賣、當場合成的「次發性介質（secondary mediator）」。所以，要找第一時間衝出來的第一男主角，絕對非組織胺莫屬！", "what": "考第一型過敏反應中，肥大細胞去顆粒釋放的「預存/原發性介質」與「新合成/次發性介質」的區分與代表物質。", "trap": "很多考生容易把「原發性（已經做好存在顆粒中，隨時可發射）」跟「次發性（受到刺激才利用細胞膜脂質現場製造）」的介質搞混。前列腺素（prostaglandin）和白三烯素（leukotriene）都是現做的，只有組織胺才是預存好、一呼即出的最主要元老！", "level": 4}, {"no": 13, "source": "107-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何者不屬於第三型過敏反應（Type III hypersensitivity）引起之疾病或反應？", "options": {"A": "血清病（serum sickness）", "B": "亞都司氏現象（Arthus reaction）", "C": "肺出血－腎炎綜合症（Goodpasture's syndrome）", "D": "系統性紅斑狼瘡之腎絲球腎炎（glomerulonephritis of lupus erythematosus）"}, "answer": "C", "ask": "看到「不屬於第三型過敏反應」時，大腦要立刻聯想到哪一個疾病的致病機制並非源於「抗原抗體複合物到處流動並沈積」？", "compare": "血清病、亞都司氏現象與紅斑性狼瘡腎炎，和肺出血－腎炎綜合症相比，哪一個的抗體是直接去認特定組織（如基底膜）上的抗原，而不是在血液中先跟抗原結合才卡在血管壁上？", "lock": "結合上述線索，既然 Goodpasture's syndrome 的自體抗體是專門對抗肺泡與腎絲球的基底膜，這不就完美符合了第二型過敏反應的定點特異性特徵，讓我們能輕鬆秒殺這題嗎？", "explain": "哈囉同學們！今天我們來聊聊「過敏反應」這個國考大熱門。第三型過敏反應（Type III）的外號叫做「免疫複合物媒介型」。簡單來說，就是抗原和抗體在血液中「抱在一起」形成了分子垃圾（免疫複合物），但因為沒被清除乾淨而隨波逐流，最後卡在微血管壁、關節或腎絲球，引來補體和白血球一陣亂打，導致發炎。選項中的 (A) 血清病和 (B) 亞都司氏現象，是教科書上最經典的第三型過敏代表（一個全身性，一個局部性，必考！）。而 (D) 系統性紅斑狼瘡之腎絲球腎炎，也是自體抗體跟抗原結合後，像垃圾一樣卡在腎臟微血管造成的損傷。但 (C) 肺出血－腎炎綜合症（Goodpasture's syndrome）可就不一樣了，它是第二型（Type II）過敏反應！它的自體抗體像導彈一樣，精準瞄準肺泡和腎絲球的「基底膜」進行定點打擊，這不是垃圾卡住，而是精準刺殺，所以它不屬於第三型喔！", "what": "區分第二型（抗體直接攻擊細胞或組織表面）與第三型（免疫複合物沈積）過敏反應的臨床代表疾病。", "trap": "很多同學一看到「腎炎」或「腎絲球」就通通無腦歸類到第三型，但 Goodpasture's syndrome 攻擊的是基底膜上的特定膠原蛋白，屬於「定點攻擊」的第二型，千萬不要因為它影響到腎臟就跟紅斑性狼瘡腎炎混淆囉！", "level": 5}, {"no": 14, "source": "107-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "在治療過敏性氣喘（allergic asthma）的藥物中，生物製劑之抗體藥物 omalizumab 其主要作用為何？", "options": {"A": "結合免疫球蛋白 IgE", "B": "結合免疫球蛋白 IgG", "C": "結合淋巴激素 IL-2", "D": "結合腫瘤壞死因子 TNF-α"}, "answer": "A", "ask": "氣喘發作時，身體裡哪一種免疫球蛋白是引發肥大細胞釋放組織胺、導致支氣管收縮的幕後黑手？", "compare": "誘發第一型過敏反應的關鍵抗體，與引發全身性發炎反應的細胞激素（如 TNF-α）或促進 T 細胞增殖的 IL-2，在氣喘的致病機轉中扮演的角色有何本質上的不同？", "lock": "既然 omalizumab 是專門用來精準攔截、不讓過敏原啟動後續免疫風暴的生物製劑，哪一個選項的分子才是它最該「緊緊擁抱」並使其失效的目標？", "explain": "哈囉各位同學！這題其實是在考我們過敏界的大魔王是誰！當我們遇到過敏性氣喘時，身體裡那群容易激動的肥大細胞（Mast cells）之所以會大噴發（脫顆粒），釋放一堆組織胺害我們喘不過氣，就是因為它們表面吸附了滿滿的 IgE 抗體。而 Omalizumab 這個帥氣的生物製劑，就是專門設計來當「IgE 攔截機」的單株抗體。它會在 IgE 還沒黏上肥大細胞之前，就先在半路把 IgE 死死抱住，讓它無法作怪！至於其他選項：IgG 是一般免疫的主力，不是第一型過敏的元凶；IL-2 是 T 細胞的生長因子，跟氣喘直接關係較小；TNF-α 則是發炎反應的縱火狂，雖然很壞，但不是 Omalizumab 的標靶（抗 TNF-α 的代表是 Adalimumab 等藥物）。所以，看到 Omalizumab，大聲喊出「IgE 退散」就對啦！", "what": "考第一型立即型過敏反應的核心關鍵分子（IgE）以及針對該分子設計的標靶生物製劑（Omalizumab）之作用機轉。", "trap": "看到字尾是 -mab 的單株抗體藥物別慌張！可以用「O-mali-zumab」的「O」聯想到「喔！我的 IgE 被綁架了！」來記憶，千萬別跟治療自體免疫疾病（如類風濕性關節炎）的抗 TNF-α 藥物（如 Adalimumab）混淆囉！", "level": 6}, {"no": 15, "source": "107-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "IgE 抗體會與其高親和力受體 FcεRI 相結合來誘發過敏反應，而 FcεRI 受體不表現在下列何種細胞表面？", "options": {"A": "肥大細胞（mast cell）", "B": "嗜鹼性球（basophil）", "C": "T 細胞", "D": "活化的嗜酸性球（activated eosinophil）"}, "answer": "C", "ask": "當 IgE 想要找個好位置坐下來引發過敏時，哪一種免疫細胞根本沒有準備好專屬的 FcεRI 貴賓席給牠？", "compare": "肥大細胞、嗜鹼性球與活化後的嗜酸性球，在面對過敏原時，與 T 細胞在第一線釋放發炎介質的角色有何本質上的不同？", "lock": "哪一個細胞屬於適應性免疫的指揮官，不需要像顆粒球一樣透過 FcεRI 結合 IgE 來進行去顆粒作用？", "explain": "同學們，想像一下，IgE 抗體就像是個「過敏警報器」，而 FcεRI 就是警報器的「專屬底座」（高親和力受體）。當過敏原跑進身體，IgE 必須牢牢插在這些底座上，才能觸發細胞釋放組織胺等發炎物質，把身體搞得一把鼻涕一把眼淚。那麼，誰最需要這些底座呢？當然是第一線的「過敏特攻隊」！肥大細胞（A）和嗜鹼性球（B）一出生就自帶滿滿的底座，隨時準備大鬧一場。而嗜酸性球（D）雖然平時比較冷靜，但一旦被「活化」後，也會趕緊裝上底座來幫忙打寄生蟲。反觀我們大名鼎鼎的 T 細胞（C），人家可是免疫系統的「高階指揮官」，負責運籌帷幄、發號施令，才不屑跟這些小兵一樣親自去抓 IgE 來搞立即型過敏呢！所以，T 細胞表面是絕對找不到 FcεRI 底座的喔！", "what": "考驗在第一型過敏反應中，高親和力 IgE 受體（FcεRI）在不同免疫細胞上的分佈特異性。", "trap": "很多考生會卡在「嗜酸性球（eosinophil）」，記住，嗜酸性球在一般狀態下不一定表現此受體，但題目特別寫了「活化的（activated）」嗜酸性球，這時候牠確實是會表現 FcεRI 的，千萬別被牠騙了！", "level": 7}, {"no": 16, "source": "108-1", "cognitive": "應用", "difficulty": "中", "stem": "鏈球菌感染後腎小球腎炎（post-streptoccocal glomerulonephritis）是屬於那一型過敏反應（hypersensitivity reaction）？", "options": {"A": "第一型", "B": "第二型", "C": "第三型", "D": "第四型"}, "answer": "C", "ask": "鏈球菌感染過後，腎臟的小球濾網居然莫名其妙發炎受損，這背後到底是哪一種免疫病理機制在搗亂？", "compare": "游離的抗原抗體複合物流動並卡在血管壁造成發炎，與抗體直接鎖定並攻擊特定細胞表面的抗原，這兩者分別屬於哪一型的過敏反應？", "lock": "當我們看到「鏈球菌抗原與抗體在血中結合後，沉積於腎小球並引發補體活化」這個關鍵致病機轉時，可以直接聯想到哪一型經典的過敏反應？", "explain": "想像一下，鏈球菌入侵後，身體的免疫大軍（抗體）興奮地衝上去跟細菌抗原「抱在一起」，形成了一坨一坨的「抗原抗體複合物」（Immune complex）。這群複合物在血管裡隨波逐流，沒想到流到腎臟微血管網（腎小球）時，因為那裡的濾網太細，它們就被卡住卡死了！卡住就算了，它們還會在那裡呼叫補體系統和中性白血球來「大鬧天宮」，結果就是把無辜的腎小球給砸壞了，這就是經典的第三型（免疫複合物型）過敏反應！\n\n其餘選項：\n- 第一型是速發型（像是塵蟎過敏、氣喘，由 IgE 主導）。\n- 第二型是抗體直接去攻擊特定細胞表面的抗原（像敲錯門打自己人，如血型不合輸血）。\n- 第四型則是遲緩型（不靠抗體，而是由 T 細胞主導，像是接觸性皮膚炎）。\n\n所以腎臟被流動垃圾堵住的悲劇，非第三型莫屬啦！", "what": "考查常見臨床疾病與四種過敏反應（Hypersensitivity）分型的對應關係。", "trap": "考生最容易把第二型（Type II）和第三型（Type III）搞混。請記住最關鍵的差別：第二型的抗體是直接去黏在「固定細胞或組織表面」上發動攻擊；而第三型則是抗體與抗原在「血液中自由結合」形成流動複合物，最後像垃圾一樣「卡」在某些地方（如腎小球、關節）引起發炎。PSGN 是因為「卡住」才發炎的喔！", "level": 8}, {"no": 18, "source": "108-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "有關第一型過敏反應（Type I hypersensitivity），下列敘述何者錯誤？", "options": {"A": "肥大細胞（mast cell）被過敏原刺激後，釋出組織胺（histamine）、前列腺素（prostaglandins）、 白三烯素（leukotrienes）等物質造成氣管擴張，血管收縮", "B": "過敏性鼻炎以減敏療法（desensitization）治療可降低 IgE 但增加 IgG 的製造，以達到減少肥大 細胞被過敏原刺激，所需時間長達一至兩年", "C": "避免接觸過敏原是最直接避免發生第一型過敏反應最好的方法", "D": "皮膚敏感測試（skin test）及測量血中總 IgE 與各過敏原專一性 IgE 是常用之檢測病患是否有第 一型過敏疾病的方法"}, "answer": "A", "ask": "當氣喘或過敏性休克大暴走時，患者體內的氣管與血管會經歷怎樣的病理生理變化？", "compare": "肥大細胞釋放的組織胺與白三烯素，究竟會讓氣管像套了緊箍咒一樣死命收縮，還是會寬敞地大開大放？", "lock": "回想一下過敏性氣喘發作時，患者因為呼吸道阻塞而拼命喘氣的畫面，這代表他們的氣管此時到底是處於收縮還是擴張狀態？", "explain": "哈囉各位同學！今天我們來聊聊讓人狂包水餃、皮膚癢到不行的「第一型過敏反應」。這題的考點非常經典，就是在考你肥大細胞（mast cell）釋放的那堆「化學兵器」（組織胺、前列腺素、白三烯素）到底在身體裡幹了什麼壞事。當過敏原跟肥大細胞上的 IgE 結合後，細胞會大崩潰（脫顆粒），釋放出這些介質。這時，你的氣管平滑肌會劇烈「收縮」（讓你喘不過氣、氣喘發作），而微血管則會「擴張」且通透性增加（導致局部紅腫、水分滲出，嚴重時甚至血壓下降）。選項 A 居然說會造成「氣管擴張，血管收縮」，這完全寫反了！這其實是我們用來救命的「腎上腺素（epinephrine）」的作用，而不是過敏反應本身的慘況。至於其他選項：(B) 減敏療法就是要誘導身體產生 IgG（阻斷抗體）來搶走過敏原，不讓 IgE 有機會跟肥大細胞通風報信，這場持久戰確實要打一到兩年；(C) 惹不起還躲不起嗎？避開過敏原絕對是最直接的預防法；(D) 皮膚測試和驗血中總 IgE / 專一性 IgE 都是臨床超常見的抓過敏原武器。所以，錯得離譜的選項 A 就是我們要選的正確答案啦！", "what": "第一型過敏反應（Type I hypersensitivity）的病理生理機轉（肥大細胞介質的生理效應）與臨床診斷治療原則。", "trap": "最容易搞混的就是過敏反應「本身造成的生理變化」與「臨床搶救藥物（腎上腺素）的作用」！過敏發作時氣管是收縮的（呼吸困難）、血管是擴張的（血壓下降）；而搶救用的腎上腺素才是用來擴張氣管、收縮血管的喔！", "level": 9}, {"no": 22, "source": "110-1", "cognitive": "應用", "difficulty": "中", "stem": "病人突然發生呼吸短促、呼吸困難。顯微鏡下可見支氣管壁的平滑肌肥大，黏膜下腺體增生，伴有炎 症反應，特別是嗜酸性白血球（eosinophils）增多。上列敘述最可能是那一種病症的組織反應？", "options": {"A": "急性肺炎", "B": "支氣管擴大症", "C": "肺氣腫", "D": "過敏性氣喘"}, "answer": "D", "ask": "呼吸道裡出現了平滑肌變厚、黏液腺變多，還伴隨大批「嗜酸性白血球」聚集，這代表病人的肺部正因哪一種免疫機制在鬧脾氣？", "compare": "細菌入侵引發的急性肺炎，與過敏原誘發的第一型過敏反應，在現場召喚的白血球「主戰兵種」有何不同？", "lock": "哪一個病症會同時展現「支氣管強烈收縮（平滑肌肥大）」與「嗜酸性白血球大軍進駐」這兩個第一型過敏反應的標誌性病理特徵？", "explain": "哎呀，看到病理切片裡「支氣管平滑肌肥大」、「黏膜下腺體增生」（代表分泌了一堆痰），還有最關鍵的「嗜酸性白血球（eosinophils）大量進駐」，這根本就是第一型過敏反應（Type I hypersensitivity）在肺部鬧事的經典犯罪現場啊！當過敏原被吸入時，肥大細胞釋放的化學介質會召喚大批嗜酸性白血球前來開派對，搞得支氣管又腫又窄，這就是典型的「過敏性氣喘」（D）。我們來瞧瞧其他想魚目混珠的選項：(A) 急性肺炎主要是細菌或病毒感染，現場主角通常是清除細菌的「嗜中性白血球（neutrophils）」，而不是嗜酸性白血球；(B) 支氣管擴大症是支氣管壁結構被慢性發炎破壞，導致管腔永久性像爛水管一樣「擴張」；(C) 肺氣腫則是肺泡壁被破壞失去彈性，像吹太大的氣球回彈不來，這兩者都跟嗜酸性白血球的過敏反應無關。所以，認明嗜酸性白血球與氣道重塑特徵，答案絕對是過敏性氣喘！", "what": "考驗考生能否透過病理切片的微觀特徵（特別是嗜酸性白血球浸潤與氣道平滑肌肥大），精準診斷出第一型過敏反應引起的「過敏性氣喘」。", "trap": "看到「呼吸困難」和「發炎」時，千萬別衝動盲選肺炎或肺氣腫！本題的終極通關密碼在於「嗜酸性白血球（eosinophils）」，只要它在呼吸道大量現身，十之八九就是過敏反應或寄生蟲感染的訊號，這是與一般感染性肺炎最重要的區別！", "level": 10}, {"no": 24, "source": "111-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "因為 IgG 和可溶性抗原形成免疫複合物（immune complex）造成的過敏反應， 屬於那一型過敏反應？", "options": {"A": "第一型過敏反應", "B": "第二型過敏反應", "C": "第三型過敏反應", "D": "第四型過敏反應"}, "answer": "C", "ask": "當看到「IgG」、「可溶性抗原」和「免疫複合物」這三個關鍵字合體時，這是在描述哪一種由抗體引起的免疫災難現場？", "compare": "同樣有抗體參與，第二型針對固定靶點的攻擊，與第三型在血管中到處漂流並卡在組織的複合物，在抗原狀態上有何本質上的不同？", "lock": "哪一個過敏類型是以「免疫複合物沉積在組織」並激活補體系統造成發炎，作為其最具代表性的致病機制？", "explain": "嘿！各位同學，我們來聊聊這四個「過敏天王」。想像一下，抗體（IgG）和身體裡到處游蕩的「可溶性抗原」談戀愛，手拉手黏在一起，就變成了「免疫複合物（Immune Complex）」。這群小情侶在血管裡到處亂晃，最後卡在微血管壁、關節或腎臟。卡住就算了，他們還會揪補體系統和中性白血球來開派對，結果把周圍的無辜組織炸得面目全非！這就是標準的**第三型過敏反應**（又稱免疫複合物型）。那我們來看看其他落榜的選手：(A) 第一型是 IgE 主導的「即時型過敏」，像是氣喘、鼻子過敏，速度超快，就像閃電戰；(B) 第二型則是抗體去攻擊「細胞表面」或「組織上」的固定抗原，這叫細胞毒性型，是定點狙擊，不是這種到處游蕩的複合物；(D) 第四型是 T 細胞主導的「遲緩型過敏」，人家根本不靠抗體出來混。所以，只要看到「IgG + 可溶性抗原 = 免疫複合物沉積」，閉著眼睛都要選 (C) 第三型啦！", "what": "考驗 Coombs and Gell 四型過敏反應分類中，各型別免疫機制（特別是第三型免疫複合物）的辨識能力。", "trap": "考生最容易把第二型和第三型搞混！記住關鍵密碼：第二型抗衡的是「細胞表面固定不動」的抗原（像輸血反應）；而第三型則是抗體與「游離、可溶性」的抗原結合，形成會隨血流到處漂流並沉積的「免疫複合物」。", "level": 11}, {"no": 25, "source": "112-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "引發第一型過敏反應主要是那一種抗體？", "options": {"A": "IgD", "B": "IgE", "C": "IgG", "D": "IgA"}, "answer": "B", "ask": "當花粉吸進鼻腔讓你瞬間噴嚏連連時，是哪一個免疫球蛋白在背後搞鬼，啟動了這場急性的第一型過敏風暴？", "compare": "守護黏膜防線的 IgA、防禦感染的主力 IgG，以及專門與肥大細胞聯手釋放組織胺的 IgE，這三者在人體免疫戰場上的職責分工有何不同？", "lock": "哪一種抗體最喜歡與肥大細胞上的受體緊密結合，一旦偵測到過敏原就會引發細胞脫顆粒反應，從而指引我們找出正確的選項？", "explain": "嘿！各位未來的神醫們！說到過敏，大家腦海中是不是立刻浮現擤不完的鼻涕和癢到不行的蕁麻疹？這都要怪我們免疫界的「衝動派代表」—— IgE 抗體！第一型過敏反應（又叫立即型過敏反應）根本就是一場「美麗的誤會」。當你第一次遇到花粉或塵蟎時，B 細胞會偷偷做出 IgE。這些 IgE 就像瘋狂粉絲一樣，迫不及待地把自己黏在肥大細胞（Mast cells）和嗜鹼性球表面。等過敏原第二次上門，IgE 立刻拉響警報，讓肥大細胞大釋放組織胺，搞得你一把鼻涕一把眼淚！至於其他兄弟呢？IgG 是免疫界數量最多的「正義使者」；IgA 是駐守在黏膜表面的「守門員」；IgD 則是默默待在 B 細胞表面的「接收器」，存在感極低。所以，只要看到第一型過敏，直接指名「IgE」就對啦！", "what": "考驗你對五大類抗體中，誰才是引發急性過敏反應（第一型過敏）的幕後黑手。", "trap": "別把體內數量最多、負責二三型過敏的 IgG，跟專職引發第一型過敏的 IgE 搞混了！雖然 IgG 聽起來最威風，但講到氣喘和花粉過敏，只有 IgE 才是真正的「始作俑者」。", "level": 12}, {"no": 26, "source": "112-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種自體免疫疾病，病人體內會有 IgG 抗體對抗腎臟基底膜上第四型膠原蛋白，引起腎組織內的發炎 反應？", "options": {"A": "全身性紅斑狼瘡（Systemic Lupus Erythematosus, SLE）", "B": "古德帕斯丘氏症候群（Goodpasture’s syndrome）", "C": "類風溼關節炎（Rheumatoid arthritis）", "D": "多發性硬化症（Multiple sclerosis）"}, "answer": "B", "ask": "哪一種自體免疫疾病會產生針對腎絲球基底膜第四型膠原蛋白的 IgG 抗體，造成腎臟發炎？", "compare": "Goodpasture syndrome 是抗 GBM 抗體直接攻擊第四型膠原蛋白；SLE 腎炎則以免疫複合物沉積引起發炎為主要機轉。", "lock": "看到『抗腎絲球基底膜』與『第四型膠原蛋白』，應優先鎖定 Goodpasture syndrome。", "explain": "正確答案為 B，古德帕斯丘氏症候群（Goodpasture syndrome）。此病的 IgG 自體抗體主要針對腎絲球與肺泡基底膜第四型膠原蛋白的 α3 鏈非膠原區域，可造成快速進行性腎絲球腎炎，並可能合併肺出血。SLE 雖可造成狼瘡腎炎，但主要機轉是免疫複合物沉積，並非本題所描述的抗 GBM 抗體直接辨認第四型膠原蛋白。", "what": "辨認抗腎絲球基底膜抗體與第四型膠原蛋白的疾病配對，並區分 Goodpasture syndrome 與 SLE 腎炎機轉。", "trap": "不要因為 SLE 也會造成腎炎就選 SLE；題幹指定抗體直接對抗第四型膠原蛋白，這是 Goodpasture syndrome 的典型線索。", "level": 13}, {"no": 28, "source": "112-3", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種過敏反應主要是由 IgE 抗體所引起？", "options": {"A": "第一型過敏反應", "B": "第二型過敏反應", "C": "第三型過敏反應", "D": "第四型過敏反應"}, "answer": "A", "ask": "當我們的免疫系統派出 IgE 這種「一有風吹草動就大放煙火」的敏感抗體時，究竟會引發哪一種速度最快的過敏反應？", "compare": "靠 IgE 結合肥大細胞來釋放組織胺的立即反應，與利用 IgG/IgM 殺死細胞、形成複合物到處亂塞，或是慢吞吞由 T 細胞主導的機制，在抗體類型上有何本質上的差異？", "lock": "哪一個型別的過敏反應，在免疫學定義上就是以 IgE 介導肥大細胞去顆粒化為其最標誌性的啟動特徵？", "explain": "嗨，同學們！說到過敏，大家腦海中是不是立刻浮現「哈啾！流鼻水、眼睛癢」的畫面？沒錯，這就是最經典、發生速度像高鐵一樣快的「第一型過敏反應」（又叫立即型過敏）。這背後的幕後大黑手，就是我們免疫界最愛大驚小怪的「IgE 抗體」！IgE 平常沒事幹，就喜歡黏在肥大細胞（mast cells）和嗜鹼性白血球上。一旦你吸入花粉或吃了花生，IgE 一看到抗原就當場「起肖」，逼肥大細胞把肚子裡的組織胺通通倒出來，這就讓你開始流鼻水、皮膚癢啦！至於其他兄弟：第二型是 IgG 或 IgM 直接去找細胞算帳；第三型是抗原抗體抱成一團卡在血管壁引起發炎；第四型則是慢吞吞的 T 細胞個人秀，根本沒用抗體。所以，講到 IgE，毫不猶豫直接選第一型就對了！", "what": "考驗四種過敏反應（Gell & Coombs classification）的免疫媒介物質與分類機制。", "trap": "千萬不要把同樣有抗體參與的第二型、第三型與第一型混淆！記住，IgE 專職負責第一型（立即型），而第二、三型主要是 IgG 或 IgM 的地盤，第四型更是完全不靠抗體、只靠 T 細胞的「遲緩型」過敏！", "level": 14}, {"no": 29, "source": "113-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者屬於第二型過敏反應？", "options": {"A": "阿圖斯氏反應（Arthus reaction）", "B": "全身性過敏反應（systemic anaphylaxis）", "C": "結核菌素反應", "D": "ABO血型不合造成的溶血與輸血反應"}, "answer": "D", "ask": "當免疫系統的抗體直接對抗自體細胞表面抗原，導致細胞被無情摧毀時，這是屬於哪一型的過敏防衛機制？", "compare": "局部發炎的阿圖斯氏反應、驚心動魄的全身過敏性休克、慢郎中 T 細胞引起的結核菌素反應，以及抗體直接爆破紅血球的輸血溶血，這四種臨床症狀背後的致病主角分別是誰？", "lock": "哪一個選項完美符合了抗體與紅血球表面抗原結合，進而啟動補體系統將細胞直接溶血殺死（Cytotoxic）的病理特徵？", "explain": "嘿！各位未來的神醫們！過敏反應（Hypersensitivity）可是國考超愛考的送分題，我們用四個英文字母來秒記它：**ACID**！\n- **A** (Anaphylactic) -> 第一型：立即型/過敏性反應。像選項B的全身性過敏反應（休克），就是肥大細胞大釋放組織胺，跑太快了！\n- **C** (Cytotoxic) -> 第二型：細胞毒殺型。抗體（IgG/IgM）跑去黏在我們自己的細胞表面，然後叫補體或吞噬細胞去把這顆細胞給炸了！選項D的「ABO血型不合輸血反應」就是最典型的例子。你給A型的人輸B型的血，B抗體馬上黏上去「標記」它們，接著紅血球就被體內的補體「啪！沒了！」直接在血管裡溶血，這就是第二型！\n- **I** (Immune complex) -> 第三型：免疫複合物型。抗體和抗原在血液裡手拉手跳舞，形成一坨一坨的「抗原抗體複合物」，卡在微血管壁、腎臟、關節等地方引起發炎。選項A的「阿圖斯氏反應（Arthus reaction）」就是這種局部第三型反應喔！\n- **D** (Delayed) -> 第四型：遲緩型。這不關抗體的事，是 T 細胞（特別是 Th1）和巨噬細胞在搞鬼，通常要過24-72小時才慢吞吞出現。選項C的「結核菌素反應」就是經典的第四型！\n\n所以這題問第二型（C - Cytotoxic），當然就是找那個細胞直接被爆掉的「血型不合溶血反應」囉！", "what": "快速區分四種過敏反應（Type I 至 IV）的致病機制與經典臨床範例。", "trap": "很多人容易把「阿圖斯氏反應」和「全身性過敏反應」搞混。記住，阿圖斯氏反應是「第三型」（免疫複合物沉積），而全身性過敏反應是「第一型」（IgE 介導的休克），千萬別因為名字看起來很像就亂選喔！", "level": 15}, {"no": 30, "source": "113-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者與即發型過敏反應關聯性最小？", "options": {"A": "T 細胞", "B": "IgE 抗體", "C": "肥大細胞（mast cells）", "D": "嗜酸性球（eosinophils）"}, "answer": "A", "ask": "當過敏原一入侵，哪一個免疫角色最不需要在第一時間跳出來，端著化學武器直接引發急性紅腫癢的症狀？", "compare": "肥大細胞配上 IgE 是引爆急性過敏的完美搭檔，嗜酸性球則負責在後期為發炎反應火上加油，那主要負責細胞免疫、需要好幾天才能召集群眾的 T 細胞，在這種「幾分鐘內」就開火的戰場上是否顯得格格不入？", "lock": "結合對過敏分類的理解，哪一個細胞其實是第四型遲發型過敏反應的靈魂人物，因而在急性的第一型過敏中關聯性最低？", "explain": "嘿，各位同學！想像一下，你吸入了一口花粉，結果在短短幾分鐘之內就開始瘋狂打噴嚏、流鼻水，這就是大名鼎鼎的「第一型（即發型）過敏反應」！在這場過敏警報中，有三個角色是黃金鐵三角：首先是「IgE 抗體」負責通風報信，接著是「肥大細胞（Mast cells）」收到信號後立刻釋放組織胺等化學武器，最後是「嗜酸性球（Eosinophils）」在後期加入戰局擴大發炎。那 T 細胞呢？雖然 Th2 細胞在幕後幫忙促成 IgE 的產生，但它並不直接參與這場即時的現場作戰。更重要的是，T 細胞其實是「第四型（遲發型）過敏反應」的絕對主角（那個需要 24 到 72 小時才會慢吞吞發作的反應）。所以在這場要求「即時、快速」的過敏派對裡，T 細胞關聯性最小，只能在旁邊玩沙啦！", "what": "考驗第一型（即發型）過敏反應的核心參與分子與細胞，並區分其與第四型（細胞介導遲發型）過敏反應的差異。", "trap": "很多同學會卡在「T 細胞（Th2）會分泌細胞激素幫忙 B 細胞製造 IgE 啊，怎麼會無關？」這個死胡同裡。請記住，題目的重點在於「即發型（Immediate）」的直接關聯。比起直接釋放物質引發症狀的肥大細胞、嗜酸性球以及橋樑 IgE，T 細胞屬於上游的免疫調節者，更何況 T 細胞是第四型過敏反應的代言人，相較之下它與即發型的直接關聯性確實最小！", "level": 16}, {"no": 31, "source": "113-3", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "血液中何種白血球增多與過敏性疾病（allergic diseases）最相關？", "options": {"A": "嗜中性球（neutrophil）", "B": "嗜酸性球（eosinophil）", "C": "單核球（monocyte）", "D": "淋巴球（lymphocyte）"}, "answer": "B", "ask": "當人體不幸吸入花粉或接觸到過敏原時，哪一種免疫細胞會因為接到警報而大舉動員，導致我們在抽血報告中看到它的數量異常飆升？", "compare": "面對化膿性的細菌感染與慢性的過敏性氣喘，身體派出的先遣部隊（嗜中性球）與後續的特種作戰部隊（嗜酸性球），在功能與應對的病原體上有什麼根本的不同？", "lock": "臨床上醫生在診斷氣喘或過敏性鼻炎時，通常會特別關注血液報告中哪一類顆粒球的比例上升，進而將其作為過敏性疾病的指標？", "explain": "同學們，想像一下你的身體是一座城堡。當過敏原（比如花粉、塵蟎）來鬧事，或是寄生蟲大軍入侵時，誰會衝上第一線釋放強效的化學武器？就是我們的「嗜酸性球（eosinophil）」啦！這傢伙平常在血液裡低調得很，但只要過敏反應一被觸發，它就像追星的瘋狂粉絲一樣成群結隊出現，數量暴增。那我們來看看其他守衛：A選項「嗜中性球」是急性發炎的先鋒，專門對付細菌感染，像是城堡的巡邏憲兵；C選項「單核球」是巡邏兵，長大後會變成巨噬細胞來清理戰場；D選項「淋巴球」則是特種部隊（T、B細胞），負責更高級的專一性免疫。所以，看到「過敏」與「白血球增多」，閉著眼睛都要選我們粉紅粉紅的嗜酸性球啦！", "what": "考驗對各類白血球在免疫反應與過敏性疾病中主要分工的掌握度。", "trap": "很多同學會把「肥大細胞（mast cell）」和「嗜酸性球（eosinophil）」混淆。雖然肥大細胞是釋放組織胺、引發過敏的「始作俑者」，但題目問的是「血液中增多的白血球」，在臨床抽血檢查中，過敏患者最常被驗出顯著增加的白血球就是嗜酸性球喔！", "level": 17}, {"no": 32, "source": "114-3", "cognitive": "理解/機轉", "difficulty": "中", "stem": "全身性紅斑性狼瘡（systemic lupus erythematosus, SLE）所造成的血球數目低下（cytopenia）病變，主要與 下列何種過敏反應有關？", "options": {"A": "第一型過敏反應", "B": "第二型過敏反應", "C": "第三型過敏反應", "D": "第四型過敏反應"}, "answer": "B", "ask": "紅斑性狼瘡患者體內的血球無端被消滅而導致數量變少，這種直接針對細胞本體進行攻擊的免疫破壞，是由哪一種過敏機制所主導？", "compare": "抗體結合游離抗原形成複合物到處亂塞（第三型），與抗體直接黏在血球表面並呼叫補體來爆破（第二型），這兩種攻擊手段在抗原的位置上有何不同？", "lock": "既然病變是特定「血球細胞」被直接摧毀，那麼哪一種過敏反應的核心定義就是抗體與細胞表面抗原結合並導致該細胞死亡？", "explain": "嘿，同學們！這題可是個超經典的「披著狼皮的羊」陷阱題啊！一看到「全身性紅斑性狼瘡 (SLE)」，大家腦中是不是馬上反射性大喊：「第三型過敏反應（免疫複合物沉積）！」？逼逼——（吹哨子）先冷靜！這題問的不是腎炎，也不是關節炎，而是「血球數目低下（cytopenia）」。當 SLE 患者體內產生了直接針對自己紅血球、白血球或血小板表面抗原的自體抗體（IgG 或 IgM）時，這些抗體就像黏在血球上的「美味標籤」，會引來補體系統或巨噬細胞把血球吞掉、破壞掉。這種「抗體直接對準靶細胞表面抗原下手」的破壞方式，正是標準的「第二型過敏反應（抗體媒介型/細胞毒性型）」！所以千萬要看清楚，雖然 SLE 引起的腎絲球腎炎、血管炎屬於第三型，但只要提到「血球低下」，就是第二型在作怪喔！", "what": "區分全身性紅斑性狼瘡（SLE）在不同臨床病變（如血球低下與腎炎）中，所涉及的不同過敏反應機制。", "trap": "考生最容易看到「SLE」就反射性秒選「第三型過敏反應」。一定要記得區分：若是可溶性免疫複合物沉積在血管、腎臟是第三型；但若是抗體直接攻擊「特定細胞（如血球）表面」導致其死亡，則是第二型！", "level": 18}, {"no": 33, "source": "114-3", "cognitive": "理解/機轉", "difficulty": "易", "stem": "有關過敏反應，下列何者不是由抗體引起？", "options": {"A": "異位性皮膚炎", "B": "青黴素所引起的過敏反應", "C": "接觸常春藤植物葉片造成的皮膚炎", "D": "RhD 血型不同所造成的新生兒溶血"}, "answer": "C", "ask": "四種過敏反應的分類中，哪一種在發生的時候不需要派出抗體當兵器，而是直接靠細胞兵團進行攻擊？", "compare": "同樣都是皮膚發炎，異位性皮膚炎和接觸常春藤後的皮膚紅腫，兩者在免疫大軍的動員機制（抗體介導 vs. T細胞介導）上有何不同？", "lock": "哪一個選項屬於經典的第四型（遲發型）過敏反應，也就是不需要任何免疫球蛋白參與的細胞免疫過程？", "explain": "嘿，同學們！過敏反應可不是只有一種喔，我們在免疫學上將它分為四種類型。這題問的是「誰不需要抗體（Antibody）參與」？答案就是 (C) 接觸常春藤植物葉片造成的皮膚炎！這其實是「第四型過敏反應」（又稱遲發型過敏反應），它的主角是我們的「T細胞」（主要是 Th1 和胞毒 T 細胞），它們在接觸到常春藤的化學物質（漆酚）後會生氣地召集巨噬細胞來引發發炎，整個過程完全「不需要抗體」出來攪局。那其他選項呢？(A) 異位性皮膚炎是標準的第一型過敏反應，由 IgE 抗體主導；(B) 青黴素過敏可以引起第一型、第二型或第三型過敏，通通跟抗體脫不了關係；(D) RhD 新生兒溶血則是 IgG 抗體去攻擊寶寶紅血球的第二型過敏反應。所以啦，只有常春藤造成的接觸性皮膚炎是純純的「T細胞熱血群毆」，沒有抗體的事情！", "what": "區分四種過敏反應中，哪一種是由「T細胞（細胞免疫）」介導，而非「抗體（體液免疫）」介導。", "trap": "很多同學一看到「皮膚炎」就覺得是同一類！「異位性皮膚炎」（第一型，IgE抗體主導）和接觸常春藤的「接觸性皮膚炎」（第四型，T細胞主導）在免疫學上的機制完全不同，千萬別傻傻分不清！", "level": 19}], "questions": [{"no": 2, "source": "105-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者屬於細胞型過敏免疫反應（cell-mediated hypersensitivity）？", "options": {"A": "花粉熱（hay fever）", "B": "古德巴斯德症候群（Goodpasture syndrome）", "C": "血清病（serum sickness）", "D": "結核病（tuberculosis）"}, "answer": "D", "ask": "當我們看到「細胞型過敏反應」這個關鍵詞時，腦海中應該要立刻浮現哪一種免疫細胞，以及它對應的是第幾型的過敏反應？", "compare": "花粉熱、古德巴斯德症候群與血清病這三者在免疫反應的發動上，分別是由哪些抗體主導，這與不需要抗體參與的結核病免疫機轉有何本質上的不同？", "lock": "哪一個疾病在進行臨床皮膚免疫試驗時，需要等待 48 至 72 小時，且現場只會看到 T 細胞和巨噬細胞聚集而成的浸潤紅腫，而非抗體引起的即時紅疹？", "explain": "嘿，各位同學！看到『過敏』可別只想到打噴嚏和流鼻涕喔！過敏反應（Hypersensitivity）一共分為四型，前三型（I、II、III）都是抗體（Antibody）在背後搞鬼，只有第四型是完全不需要抗體、靠 T 細胞親自出馬的『細胞型（Cell-mediated）過敏反應』！我們來一一拆解選項：\n(A) 花粉熱：這是一碰就發作的『第一型（速發型）』，是 IgE 抓著肥大細胞狂噴組織胺的結果。\n(B) 古德巴斯德症候群：這是『第二型（抗體依賴型）』，自體抗體直接跑去攻擊腎臟和肺部的基底膜，屬於定點轟炸。\n(C) 血清病：這是『第三型（免疫複合物型）』，抗體跟抗原在血液裡抱成一團形成複合物，到處亂塞血管引發全身發炎。\n(D) 結核病：恭喜答對！結核桿菌非常頑強，巨噬細胞搞不定它，只好召喚 Th1 細胞與 CD8+ T 細胞來發動遲發性超敏反應，甚至形成肉芽腫把它關起來。這就是標準的第四型細胞型過敏反應，我們常做的結核菌素測驗（PPD test）也是這個原理喔！", "what": "區分四種過敏反應（Hypersensitivity）的免疫機制，特別是辨識出由 T 細胞介導（而非抗體介導）的第四型過敏反應臨床實例。", "trap": "考生最容易一看到『過敏』就直覺聯想到 IgE、花粉熱或抗體，而忽略了『細胞型過敏反應』其實是『第四型（遲發性）過敏反應』的別稱，這類型反應完全不需要抗體參與！", "level": 1}, {"no": 8, "source": "106-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列那一種致病機制為第四型細胞媒介型過敏反應（type IV cell mediated hypersensitivity）？", "options": {"A": "第一型糖尿病（type I diabetes mellitus）", "B": "血清病（serum sickness）", "C": "重症肌無力（myasthenia gravis）", "D": "惡性貧血（pernicious anemia）"}, "answer": "A", "ask": "當我們看到「第四型細胞媒介型過敏反應」時，免疫系統中哪一個不靠抗體、只靠自己動手搞破壞的細胞才是這場災難的主角？", "compare": "胰島 β 細胞被 T 細胞直接精準消滅，與抗體跑去亂綁受器、或是抗原抗體結合成垃圾到處亂塞血管，這三種破壞模式在免疫學上有何本質上的不同？", "lock": "排除掉那些由抗體大軍（自體抗體或免疫複合物）在背後搞鬼的選項後，哪一個疾病才是真正由 T 細胞親自出馬痛扁自體細胞的苦主？", "explain": "來，同學們坐好，我們今天不背死書，用聽故事的心情來搞懂過敏反應！這題要找的是「第四型（細胞媒介型）過敏反應」，它的核心主角是『T細胞』，而且是個「慢郎中」（延遲型過敏反應，需要2~3天反應時間）。我們來看看選項中的四個疾病到底是誰在搗亂：\n\n(A) 第一型糖尿病：這是「T細胞」大軍（主要是CD8+ 毒殺型T細胞和Th1細胞）跑去胰臟，把製造胰島素的 β 細胞給集體超渡了！因為是T細胞親自出手，所以它是不折不扣的「第四型過敏反應」。恭喜，標準答案就是它！\n(B) 血清病：這是因為抗原和抗體在血液中結合，形成了「免疫複合物（Immune Complex）」，這些複合物像垃圾一樣到處亂塞，卡在血管、關節或腎臟引起發炎，這是經典的「第三型過敏反應」。\n(C) 重症肌無力：這是抗體直接跑去綁架神經肌肉接合處的「乙醯膽鹼受體」，阻礙訊號傳導，這是抗體直接搞鬼的「第二型過敏反應」。\n(D) 惡性貧血：這是自體抗體跑去攻擊胃壁細胞或內在因子，導致維生素 B12 沒辦法被吸收，一樣是抗體作祟的「第二型過敏反應」。\n\n所以，只有第一型糖尿病是 T 細胞親自下場的第四型喔！", "what": "區分四種過敏反應（Hypersensitivity）的致病機制（抗體媒介 vs. T細胞媒介）與經典臨床臨床疾病。", "trap": "千萬不要看到「第一型」糖尿病，大腦就自動導航去選「第一型」過敏反應！那是命名上的巧合，「第一型糖尿病」是 T 細胞去搞破壞的，屬於「第四型過敏反應」！而第一型過敏反應的代表是過敏性休克和氣喘（IgE媒介），差很多喔！", "level": 2}, {"no": 9, "source": "106-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何者非第二型過敏反應（Type II hypersensitivity）引起之疾病？", "options": {"A": "Rh 血型陰性的母體所製造的 IgG 抗體，透過胎盤進到 Rh 陽性胎兒造成紅血球破壞", "B": "將 AB 型血輸給 O 型血的人，引起溶血性輸血反應", "C": "小分子藥物或代謝產物引發自體免疫溶血性貧血", "D": "巨量免疫複合體沉積引發血清病（serum sickness）"}, "answer": "D", "ask": "免疫系統中的抗體如果像殺手一樣，直接瞄準並消滅特定的「單一細胞靶點」，這種反應不包含哪一種疾病？", "compare": "抗體直接黏在紅血球表面導致細胞被破壞，與抗原抗體結合後形成整坨複合體到處沉積，這兩種破壞機制有什麼本質上的不同？", "lock": "哪一個選項描述的是「免疫複合體」沉積所引起的全身性發炎，而非針對特定細胞的直接毒殺？", "explain": "哈囉各位同學！今天我們要來聊聊過敏反應中的「第二型過敏反應」（又叫抗體媒介型細胞毒殺）。簡單來說，這型過敏反應就像是「精準導彈誤炸事件」！我們的抗體（IgG 或 IgM）認錯了人，直接黏在「我們自己特定細胞」的表面（最常見的就是紅血球），然後引導補體或吞噬細胞去把這個無辜的細胞給炸了。來看看選項：選項 A，Rh 陰性的媽媽產生 IgG 穿過胎盤去攻擊 Rh 陽性寶寶的紅血球；選項 B，O 型血的人體內有抗 A 與抗 B 抗體，一看到輸入的 AB 型紅血球就立刻貼上去發動溶血攻擊；選項 C，藥物分子調皮地黏在紅血球表面，結果抗體為了打藥物，連帶把紅血球一起摧毀。這三個選項都是抗體「一對一」直接鎖定細胞表面抗原進行毒殺，通通屬於標準的第二型！那選項 D 呢？巨量免疫複合體沉積引起的血清病，是抗原和抗體在血液中結合，形成一坨一坨的「垃圾（免疫複合體）」到處亂飄，最後卡在血管壁、關節或腎臟引發發炎。這可是典型的「第三型過敏反應」喔！所以，非第二型的當然就是 D 啦！", "what": "區分不同類型過敏反應的致病機制，特別是第二型（抗體直接攻擊細胞表面）與第三型（免疫複合體沉積）的差別。", "trap": "很多同學一看到「血清病」或「新生兒溶血」都有個『血』字，就通通直覺歸類到同一型。請務必記住：只要關鍵字出現「免疫複合體沉積」，那就是第三型，千萬別跟直接咬住細胞膜的第二型搞混囉！", "level": 3}, {"no": 11, "source": "107-1", "cognitive": "理解/機轉", "difficulty": "易", "stem": "第一型過敏反應是因 IgE 與抗原結合後，造成肥大細胞的去顆粒化作用，下列何者是所釋出最重要 的原發性介質（primary mediator）？", "options": {"A": "肝素（heparin）", "B": "補體（complement）", "C": "組織胺（histamine）", "D": "前列腺素（prostaglandin）"}, "answer": "C", "ask": "當肥大細胞被 IgE 激活並瞬間「洩洪」時，哪一個早就預先合成好、封裝在顆粒裡的關鍵發炎物質會首當其衝地被釋放出來？", "compare": "組織胺與前列腺素雖然都會參與發炎反應，但誰是早就準備妥當的「現成兵力（原發性）」，誰又是接到警報才開始動工的「後備民兵（次發性）」？", "lock": "結合上述分類，在所有選項中，哪一個化學介質是臨床上最常使用抗過敏藥物去對抗、且屬於肥大細胞顆粒內最重要的原發性成分？", "explain": "想像一下，肥大細胞（mast cell）就像是一個裝滿「發炎物質水氣球」的防衛基地。當過敏原跑進身體跟肥大細胞表面的 IgE 結合時，等於拉開了手榴彈引信，肥大細胞立刻把倉庫裡「早就醃好、存貨最多」的「原發性介質（primary mediator）」一口氣倒出來！這之中最猛、名氣最大、讓你馬上流鼻水和皮膚紅腫癢的巨星，就是「組織胺（histamine）」啦！那其他選項呢？A 肝素（heparin）雖然也在顆粒裡，但它是抗凝血用的，並非造成過敏症狀的主角；B 補體（complement）是血漿裡的蛋白質，不是肥大細胞釋放的；D 前列腺素（prostaglandin）則是事情發生後才現炒現賣、當場合成的「次發性介質（secondary mediator）」。所以，要找第一時間衝出來的第一男主角，絕對非組織胺莫屬！", "what": "考第一型過敏反應中，肥大細胞去顆粒釋放的「預存/原發性介質」與「新合成/次發性介質」的區分與代表物質。", "trap": "很多考生容易把「原發性（已經做好存在顆粒中，隨時可發射）」跟「次發性（受到刺激才利用細胞膜脂質現場製造）」的介質搞混。前列腺素（prostaglandin）和白三烯素（leukotriene）都是現做的，只有組織胺才是預存好、一呼即出的最主要元老！", "level": 4}, {"no": 13, "source": "107-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何者不屬於第三型過敏反應（Type III hypersensitivity）引起之疾病或反應？", "options": {"A": "血清病（serum sickness）", "B": "亞都司氏現象（Arthus reaction）", "C": "肺出血－腎炎綜合症（Goodpasture's syndrome）", "D": "系統性紅斑狼瘡之腎絲球腎炎（glomerulonephritis of lupus erythematosus）"}, "answer": "C", "ask": "看到「不屬於第三型過敏反應」時，大腦要立刻聯想到哪一個疾病的致病機制並非源於「抗原抗體複合物到處流動並沈積」？", "compare": "血清病、亞都司氏現象與紅斑性狼瘡腎炎，和肺出血－腎炎綜合症相比，哪一個的抗體是直接去認特定組織（如基底膜）上的抗原，而不是在血液中先跟抗原結合才卡在血管壁上？", "lock": "結合上述線索，既然 Goodpasture's syndrome 的自體抗體是專門對抗肺泡與腎絲球的基底膜，這不就完美符合了第二型過敏反應的定點特異性特徵，讓我們能輕鬆秒殺這題嗎？", "explain": "哈囉同學們！今天我們來聊聊「過敏反應」這個國考大熱門。第三型過敏反應（Type III）的外號叫做「免疫複合物媒介型」。簡單來說，就是抗原和抗體在血液中「抱在一起」形成了分子垃圾（免疫複合物），但因為沒被清除乾淨而隨波逐流，最後卡在微血管壁、關節或腎絲球，引來補體和白血球一陣亂打，導致發炎。選項中的 (A) 血清病和 (B) 亞都司氏現象，是教科書上最經典的第三型過敏代表（一個全身性，一個局部性，必考！）。而 (D) 系統性紅斑狼瘡之腎絲球腎炎，也是自體抗體跟抗原結合後，像垃圾一樣卡在腎臟微血管造成的損傷。但 (C) 肺出血－腎炎綜合症（Goodpasture's syndrome）可就不一樣了，它是第二型（Type II）過敏反應！它的自體抗體像導彈一樣，精準瞄準肺泡和腎絲球的「基底膜」進行定點打擊，這不是垃圾卡住，而是精準刺殺，所以它不屬於第三型喔！", "what": "區分第二型（抗體直接攻擊細胞或組織表面）與第三型（免疫複合物沈積）過敏反應的臨床代表疾病。", "trap": "很多同學一看到「腎炎」或「腎絲球」就通通無腦歸類到第三型，但 Goodpasture's syndrome 攻擊的是基底膜上的特定膠原蛋白，屬於「定點攻擊」的第二型，千萬不要因為它影響到腎臟就跟紅斑性狼瘡腎炎混淆囉！", "level": 5}, {"no": 14, "source": "107-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "在治療過敏性氣喘（allergic asthma）的藥物中，生物製劑之抗體藥物 omalizumab 其主要作用為何？", "options": {"A": "結合免疫球蛋白 IgE", "B": "結合免疫球蛋白 IgG", "C": "結合淋巴激素 IL-2", "D": "結合腫瘤壞死因子 TNF-α"}, "answer": "A", "ask": "氣喘發作時，身體裡哪一種免疫球蛋白是引發肥大細胞釋放組織胺、導致支氣管收縮的幕後黑手？", "compare": "誘發第一型過敏反應的關鍵抗體，與引發全身性發炎反應的細胞激素（如 TNF-α）或促進 T 細胞增殖的 IL-2，在氣喘的致病機轉中扮演的角色有何本質上的不同？", "lock": "既然 omalizumab 是專門用來精準攔截、不讓過敏原啟動後續免疫風暴的生物製劑，哪一個選項的分子才是它最該「緊緊擁抱」並使其失效的目標？", "explain": "哈囉各位同學！這題其實是在考我們過敏界的大魔王是誰！當我們遇到過敏性氣喘時，身體裡那群容易激動的肥大細胞（Mast cells）之所以會大噴發（脫顆粒），釋放一堆組織胺害我們喘不過氣，就是因為它們表面吸附了滿滿的 IgE 抗體。而 Omalizumab 這個帥氣的生物製劑，就是專門設計來當「IgE 攔截機」的單株抗體。它會在 IgE 還沒黏上肥大細胞之前，就先在半路把 IgE 死死抱住，讓它無法作怪！至於其他選項：IgG 是一般免疫的主力，不是第一型過敏的元凶；IL-2 是 T 細胞的生長因子，跟氣喘直接關係較小；TNF-α 則是發炎反應的縱火狂，雖然很壞，但不是 Omalizumab 的標靶（抗 TNF-α 的代表是 Adalimumab 等藥物）。所以，看到 Omalizumab，大聲喊出「IgE 退散」就對啦！", "what": "考第一型立即型過敏反應的核心關鍵分子（IgE）以及針對該分子設計的標靶生物製劑（Omalizumab）之作用機轉。", "trap": "看到字尾是 -mab 的單株抗體藥物別慌張！可以用「O-mali-zumab」的「O」聯想到「喔！我的 IgE 被綁架了！」來記憶，千萬別跟治療自體免疫疾病（如類風濕性關節炎）的抗 TNF-α 藥物（如 Adalimumab）混淆囉！", "level": 6}, {"no": 15, "source": "107-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "IgE 抗體會與其高親和力受體 FcεRI 相結合來誘發過敏反應，而 FcεRI 受體不表現在下列何種細胞表面？", "options": {"A": "肥大細胞（mast cell）", "B": "嗜鹼性球（basophil）", "C": "T 細胞", "D": "活化的嗜酸性球（activated eosinophil）"}, "answer": "C", "ask": "當 IgE 想要找個好位置坐下來引發過敏時，哪一種免疫細胞根本沒有準備好專屬的 FcεRI 貴賓席給牠？", "compare": "肥大細胞、嗜鹼性球與活化後的嗜酸性球，在面對過敏原時，與 T 細胞在第一線釋放發炎介質的角色有何本質上的不同？", "lock": "哪一個細胞屬於適應性免疫的指揮官，不需要像顆粒球一樣透過 FcεRI 結合 IgE 來進行去顆粒作用？", "explain": "同學們，想像一下，IgE 抗體就像是個「過敏警報器」，而 FcεRI 就是警報器的「專屬底座」（高親和力受體）。當過敏原跑進身體，IgE 必須牢牢插在這些底座上，才能觸發細胞釋放組織胺等發炎物質，把身體搞得一把鼻涕一把眼淚。那麼，誰最需要這些底座呢？當然是第一線的「過敏特攻隊」！肥大細胞（A）和嗜鹼性球（B）一出生就自帶滿滿的底座，隨時準備大鬧一場。而嗜酸性球（D）雖然平時比較冷靜，但一旦被「活化」後，也會趕緊裝上底座來幫忙打寄生蟲。反觀我們大名鼎鼎的 T 細胞（C），人家可是免疫系統的「高階指揮官」，負責運籌帷幄、發號施令，才不屑跟這些小兵一樣親自去抓 IgE 來搞立即型過敏呢！所以，T 細胞表面是絕對找不到 FcεRI 底座的喔！", "what": "考驗在第一型過敏反應中，高親和力 IgE 受體（FcεRI）在不同免疫細胞上的分佈特異性。", "trap": "很多考生會卡在「嗜酸性球（eosinophil）」，記住，嗜酸性球在一般狀態下不一定表現此受體，但題目特別寫了「活化的（activated）」嗜酸性球，這時候牠確實是會表現 FcεRI 的，千萬別被牠騙了！", "level": 7}, {"no": 16, "source": "108-1", "cognitive": "應用", "difficulty": "中", "stem": "鏈球菌感染後腎小球腎炎（post-streptoccocal glomerulonephritis）是屬於那一型過敏反應（hypersensitivity reaction）？", "options": {"A": "第一型", "B": "第二型", "C": "第三型", "D": "第四型"}, "answer": "C", "ask": "鏈球菌感染過後，腎臟的小球濾網居然莫名其妙發炎受損，這背後到底是哪一種免疫病理機制在搗亂？", "compare": "游離的抗原抗體複合物流動並卡在血管壁造成發炎，與抗體直接鎖定並攻擊特定細胞表面的抗原，這兩者分別屬於哪一型的過敏反應？", "lock": "當我們看到「鏈球菌抗原與抗體在血中結合後，沉積於腎小球並引發補體活化」這個關鍵致病機轉時，可以直接聯想到哪一型經典的過敏反應？", "explain": "想像一下，鏈球菌入侵後，身體的免疫大軍（抗體）興奮地衝上去跟細菌抗原「抱在一起」，形成了一坨一坨的「抗原抗體複合物」（Immune complex）。這群複合物在血管裡隨波逐流，沒想到流到腎臟微血管網（腎小球）時，因為那裡的濾網太細，它們就被卡住卡死了！卡住就算了，它們還會在那裡呼叫補體系統和中性白血球來「大鬧天宮」，結果就是把無辜的腎小球給砸壞了，這就是經典的第三型（免疫複合物型）過敏反應！\n\n其餘選項：\n- 第一型是速發型（像是塵蟎過敏、氣喘，由 IgE 主導）。\n- 第二型是抗體直接去攻擊特定細胞表面的抗原（像敲錯門打自己人，如血型不合輸血）。\n- 第四型則是遲緩型（不靠抗體，而是由 T 細胞主導，像是接觸性皮膚炎）。\n\n所以腎臟被流動垃圾堵住的悲劇，非第三型莫屬啦！", "what": "考查常見臨床疾病與四種過敏反應（Hypersensitivity）分型的對應關係。", "trap": "考生最容易把第二型（Type II）和第三型（Type III）搞混。請記住最關鍵的差別：第二型的抗體是直接去黏在「固定細胞或組織表面」上發動攻擊；而第三型則是抗體與抗原在「血液中自由結合」形成流動複合物，最後像垃圾一樣「卡」在某些地方（如腎小球、關節）引起發炎。PSGN 是因為「卡住」才發炎的喔！", "level": 8}, {"no": 18, "source": "108-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "有關第一型過敏反應（Type I hypersensitivity），下列敘述何者錯誤？", "options": {"A": "肥大細胞（mast cell）被過敏原刺激後，釋出組織胺（histamine）、前列腺素（prostaglandins）、 白三烯素（leukotrienes）等物質造成氣管擴張，血管收縮", "B": "過敏性鼻炎以減敏療法（desensitization）治療可降低 IgE 但增加 IgG 的製造，以達到減少肥大 細胞被過敏原刺激，所需時間長達一至兩年", "C": "避免接觸過敏原是最直接避免發生第一型過敏反應最好的方法", "D": "皮膚敏感測試（skin test）及測量血中總 IgE 與各過敏原專一性 IgE 是常用之檢測病患是否有第 一型過敏疾病的方法"}, "answer": "A", "ask": "當氣喘或過敏性休克大暴走時，患者體內的氣管與血管會經歷怎樣的病理生理變化？", "compare": "肥大細胞釋放的組織胺與白三烯素，究竟會讓氣管像套了緊箍咒一樣死命收縮，還是會寬敞地大開大放？", "lock": "回想一下過敏性氣喘發作時，患者因為呼吸道阻塞而拼命喘氣的畫面，這代表他們的氣管此時到底是處於收縮還是擴張狀態？", "explain": "哈囉各位同學！今天我們來聊聊讓人狂包水餃、皮膚癢到不行的「第一型過敏反應」。這題的考點非常經典，就是在考你肥大細胞（mast cell）釋放的那堆「化學兵器」（組織胺、前列腺素、白三烯素）到底在身體裡幹了什麼壞事。當過敏原跟肥大細胞上的 IgE 結合後，細胞會大崩潰（脫顆粒），釋放出這些介質。這時，你的氣管平滑肌會劇烈「收縮」（讓你喘不過氣、氣喘發作），而微血管則會「擴張」且通透性增加（導致局部紅腫、水分滲出，嚴重時甚至血壓下降）。選項 A 居然說會造成「氣管擴張，血管收縮」，這完全寫反了！這其實是我們用來救命的「腎上腺素（epinephrine）」的作用，而不是過敏反應本身的慘況。至於其他選項：(B) 減敏療法就是要誘導身體產生 IgG（阻斷抗體）來搶走過敏原，不讓 IgE 有機會跟肥大細胞通風報信，這場持久戰確實要打一到兩年；(C) 惹不起還躲不起嗎？避開過敏原絕對是最直接的預防法；(D) 皮膚測試和驗血中總 IgE / 專一性 IgE 都是臨床超常見的抓過敏原武器。所以，錯得離譜的選項 A 就是我們要選的正確答案啦！", "what": "第一型過敏反應（Type I hypersensitivity）的病理生理機轉（肥大細胞介質的生理效應）與臨床診斷治療原則。", "trap": "最容易搞混的就是過敏反應「本身造成的生理變化」與「臨床搶救藥物（腎上腺素）的作用」！過敏發作時氣管是收縮的（呼吸困難）、血管是擴張的（血壓下降）；而搶救用的腎上腺素才是用來擴張氣管、收縮血管的喔！", "level": 9}, {"no": 22, "source": "110-1", "cognitive": "應用", "difficulty": "中", "stem": "病人突然發生呼吸短促、呼吸困難。顯微鏡下可見支氣管壁的平滑肌肥大，黏膜下腺體增生，伴有炎 症反應，特別是嗜酸性白血球（eosinophils）增多。上列敘述最可能是那一種病症的組織反應？", "options": {"A": "急性肺炎", "B": "支氣管擴大症", "C": "肺氣腫", "D": "過敏性氣喘"}, "answer": "D", "ask": "呼吸道裡出現了平滑肌變厚、黏液腺變多，還伴隨大批「嗜酸性白血球」聚集，這代表病人的肺部正因哪一種免疫機制在鬧脾氣？", "compare": "細菌入侵引發的急性肺炎，與過敏原誘發的第一型過敏反應，在現場召喚的白血球「主戰兵種」有何不同？", "lock": "哪一個病症會同時展現「支氣管強烈收縮（平滑肌肥大）」與「嗜酸性白血球大軍進駐」這兩個第一型過敏反應的標誌性病理特徵？", "explain": "哎呀，看到病理切片裡「支氣管平滑肌肥大」、「黏膜下腺體增生」（代表分泌了一堆痰），還有最關鍵的「嗜酸性白血球（eosinophils）大量進駐」，這根本就是第一型過敏反應（Type I hypersensitivity）在肺部鬧事的經典犯罪現場啊！當過敏原被吸入時，肥大細胞釋放的化學介質會召喚大批嗜酸性白血球前來開派對，搞得支氣管又腫又窄，這就是典型的「過敏性氣喘」（D）。我們來瞧瞧其他想魚目混珠的選項：(A) 急性肺炎主要是細菌或病毒感染，現場主角通常是清除細菌的「嗜中性白血球（neutrophils）」，而不是嗜酸性白血球；(B) 支氣管擴大症是支氣管壁結構被慢性發炎破壞，導致管腔永久性像爛水管一樣「擴張」；(C) 肺氣腫則是肺泡壁被破壞失去彈性，像吹太大的氣球回彈不來，這兩者都跟嗜酸性白血球的過敏反應無關。所以，認明嗜酸性白血球與氣道重塑特徵，答案絕對是過敏性氣喘！", "what": "考驗考生能否透過病理切片的微觀特徵（特別是嗜酸性白血球浸潤與氣道平滑肌肥大），精準診斷出第一型過敏反應引起的「過敏性氣喘」。", "trap": "看到「呼吸困難」和「發炎」時，千萬別衝動盲選肺炎或肺氣腫！本題的終極通關密碼在於「嗜酸性白血球（eosinophils）」，只要它在呼吸道大量現身，十之八九就是過敏反應或寄生蟲感染的訊號，這是與一般感染性肺炎最重要的區別！", "level": 10}, {"no": 24, "source": "111-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "因為 IgG 和可溶性抗原形成免疫複合物（immune complex）造成的過敏反應， 屬於那一型過敏反應？", "options": {"A": "第一型過敏反應", "B": "第二型過敏反應", "C": "第三型過敏反應", "D": "第四型過敏反應"}, "answer": "C", "ask": "當看到「IgG」、「可溶性抗原」和「免疫複合物」這三個關鍵字合體時，這是在描述哪一種由抗體引起的免疫災難現場？", "compare": "同樣有抗體參與，第二型針對固定靶點的攻擊，與第三型在血管中到處漂流並卡在組織的複合物，在抗原狀態上有何本質上的不同？", "lock": "哪一個過敏類型是以「免疫複合物沉積在組織」並激活補體系統造成發炎，作為其最具代表性的致病機制？", "explain": "嘿！各位同學，我們來聊聊這四個「過敏天王」。想像一下，抗體（IgG）和身體裡到處游蕩的「可溶性抗原」談戀愛，手拉手黏在一起，就變成了「免疫複合物（Immune Complex）」。這群小情侶在血管裡到處亂晃，最後卡在微血管壁、關節或腎臟。卡住就算了，他們還會揪補體系統和中性白血球來開派對，結果把周圍的無辜組織炸得面目全非！這就是標準的**第三型過敏反應**（又稱免疫複合物型）。那我們來看看其他落榜的選手：(A) 第一型是 IgE 主導的「即時型過敏」，像是氣喘、鼻子過敏，速度超快，就像閃電戰；(B) 第二型則是抗體去攻擊「細胞表面」或「組織上」的固定抗原，這叫細胞毒性型，是定點狙擊，不是這種到處游蕩的複合物；(D) 第四型是 T 細胞主導的「遲緩型過敏」，人家根本不靠抗體出來混。所以，只要看到「IgG + 可溶性抗原 = 免疫複合物沉積」，閉著眼睛都要選 (C) 第三型啦！", "what": "考驗 Coombs and Gell 四型過敏反應分類中，各型別免疫機制（特別是第三型免疫複合物）的辨識能力。", "trap": "考生最容易把第二型和第三型搞混！記住關鍵密碼：第二型抗衡的是「細胞表面固定不動」的抗原（像輸血反應）；而第三型則是抗體與「游離、可溶性」的抗原結合，形成會隨血流到處漂流並沉積的「免疫複合物」。", "level": 11}, {"no": 25, "source": "112-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "引發第一型過敏反應主要是那一種抗體？", "options": {"A": "IgD", "B": "IgE", "C": "IgG", "D": "IgA"}, "answer": "B", "ask": "當花粉吸進鼻腔讓你瞬間噴嚏連連時，是哪一個免疫球蛋白在背後搞鬼，啟動了這場急性的第一型過敏風暴？", "compare": "守護黏膜防線的 IgA、防禦感染的主力 IgG，以及專門與肥大細胞聯手釋放組織胺的 IgE，這三者在人體免疫戰場上的職責分工有何不同？", "lock": "哪一種抗體最喜歡與肥大細胞上的受體緊密結合，一旦偵測到過敏原就會引發細胞脫顆粒反應，從而指引我們找出正確的選項？", "explain": "嘿！各位未來的神醫們！說到過敏，大家腦海中是不是立刻浮現擤不完的鼻涕和癢到不行的蕁麻疹？這都要怪我們免疫界的「衝動派代表」—— IgE 抗體！第一型過敏反應（又叫立即型過敏反應）根本就是一場「美麗的誤會」。當你第一次遇到花粉或塵蟎時，B 細胞會偷偷做出 IgE。這些 IgE 就像瘋狂粉絲一樣，迫不及待地把自己黏在肥大細胞（Mast cells）和嗜鹼性球表面。等過敏原第二次上門，IgE 立刻拉響警報，讓肥大細胞大釋放組織胺，搞得你一把鼻涕一把眼淚！至於其他兄弟呢？IgG 是免疫界數量最多的「正義使者」；IgA 是駐守在黏膜表面的「守門員」；IgD 則是默默待在 B 細胞表面的「接收器」，存在感極低。所以，只要看到第一型過敏，直接指名「IgE」就對啦！", "what": "考驗你對五大類抗體中，誰才是引發急性過敏反應（第一型過敏）的幕後黑手。", "trap": "別把體內數量最多、負責二三型過敏的 IgG，跟專職引發第一型過敏的 IgE 搞混了！雖然 IgG 聽起來最威風，但講到氣喘和花粉過敏，只有 IgE 才是真正的「始作俑者」。", "level": 12}, {"no": 26, "source": "112-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種自體免疫疾病，病人體內會有 IgG 抗體對抗腎臟基底膜上第四型膠原蛋白，引起腎組織內的發炎 反應？", "options": {"A": "全身性紅斑狼瘡（Systemic Lupus Erythematosus, SLE）", "B": "古德帕斯丘氏症候群（Goodpasture’s syndrome）", "C": "類風溼關節炎（Rheumatoid arthritis）", "D": "多發性硬化症（Multiple sclerosis）"}, "answer": "B", "ask": "哪一種自體免疫疾病會產生針對腎絲球基底膜第四型膠原蛋白的 IgG 抗體，造成腎臟發炎？", "compare": "Goodpasture syndrome 是抗 GBM 抗體直接攻擊第四型膠原蛋白；SLE 腎炎則以免疫複合物沉積引起發炎為主要機轉。", "lock": "看到『抗腎絲球基底膜』與『第四型膠原蛋白』，應優先鎖定 Goodpasture syndrome。", "explain": "正確答案為 B，古德帕斯丘氏症候群（Goodpasture syndrome）。此病的 IgG 自體抗體主要針對腎絲球與肺泡基底膜第四型膠原蛋白的 α3 鏈非膠原區域，可造成快速進行性腎絲球腎炎，並可能合併肺出血。SLE 雖可造成狼瘡腎炎，但主要機轉是免疫複合物沉積，並非本題所描述的抗 GBM 抗體直接辨認第四型膠原蛋白。", "what": "辨認抗腎絲球基底膜抗體與第四型膠原蛋白的疾病配對，並區分 Goodpasture syndrome 與 SLE 腎炎機轉。", "trap": "不要因為 SLE 也會造成腎炎就選 SLE；題幹指定抗體直接對抗第四型膠原蛋白，這是 Goodpasture syndrome 的典型線索。", "level": 13}, {"no": 28, "source": "112-3", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種過敏反應主要是由 IgE 抗體所引起？", "options": {"A": "第一型過敏反應", "B": "第二型過敏反應", "C": "第三型過敏反應", "D": "第四型過敏反應"}, "answer": "A", "ask": "當我們的免疫系統派出 IgE 這種「一有風吹草動就大放煙火」的敏感抗體時，究竟會引發哪一種速度最快的過敏反應？", "compare": "靠 IgE 結合肥大細胞來釋放組織胺的立即反應，與利用 IgG/IgM 殺死細胞、形成複合物到處亂塞，或是慢吞吞由 T 細胞主導的機制，在抗體類型上有何本質上的差異？", "lock": "哪一個型別的過敏反應，在免疫學定義上就是以 IgE 介導肥大細胞去顆粒化為其最標誌性的啟動特徵？", "explain": "嗨，同學們！說到過敏，大家腦海中是不是立刻浮現「哈啾！流鼻水、眼睛癢」的畫面？沒錯，這就是最經典、發生速度像高鐵一樣快的「第一型過敏反應」（又叫立即型過敏）。這背後的幕後大黑手，就是我們免疫界最愛大驚小怪的「IgE 抗體」！IgE 平常沒事幹，就喜歡黏在肥大細胞（mast cells）和嗜鹼性白血球上。一旦你吸入花粉或吃了花生，IgE 一看到抗原就當場「起肖」，逼肥大細胞把肚子裡的組織胺通通倒出來，這就讓你開始流鼻水、皮膚癢啦！至於其他兄弟：第二型是 IgG 或 IgM 直接去找細胞算帳；第三型是抗原抗體抱成一團卡在血管壁引起發炎；第四型則是慢吞吞的 T 細胞個人秀，根本沒用抗體。所以，講到 IgE，毫不猶豫直接選第一型就對了！", "what": "考驗四種過敏反應（Gell & Coombs classification）的免疫媒介物質與分類機制。", "trap": "千萬不要把同樣有抗體參與的第二型、第三型與第一型混淆！記住，IgE 專職負責第一型（立即型），而第二、三型主要是 IgG 或 IgM 的地盤，第四型更是完全不靠抗體、只靠 T 細胞的「遲緩型」過敏！", "level": 14}, {"no": 29, "source": "113-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者屬於第二型過敏反應？", "options": {"A": "阿圖斯氏反應（Arthus reaction）", "B": "全身性過敏反應（systemic anaphylaxis）", "C": "結核菌素反應", "D": "ABO血型不合造成的溶血與輸血反應"}, "answer": "D", "ask": "當免疫系統的抗體直接對抗自體細胞表面抗原，導致細胞被無情摧毀時，這是屬於哪一型的過敏防衛機制？", "compare": "局部發炎的阿圖斯氏反應、驚心動魄的全身過敏性休克、慢郎中 T 細胞引起的結核菌素反應，以及抗體直接爆破紅血球的輸血溶血，這四種臨床症狀背後的致病主角分別是誰？", "lock": "哪一個選項完美符合了抗體與紅血球表面抗原結合，進而啟動補體系統將細胞直接溶血殺死（Cytotoxic）的病理特徵？", "explain": "嘿！各位未來的神醫們！過敏反應（Hypersensitivity）可是國考超愛考的送分題，我們用四個英文字母來秒記它：**ACID**！\n- **A** (Anaphylactic) -> 第一型：立即型/過敏性反應。像選項B的全身性過敏反應（休克），就是肥大細胞大釋放組織胺，跑太快了！\n- **C** (Cytotoxic) -> 第二型：細胞毒殺型。抗體（IgG/IgM）跑去黏在我們自己的細胞表面，然後叫補體或吞噬細胞去把這顆細胞給炸了！選項D的「ABO血型不合輸血反應」就是最典型的例子。你給A型的人輸B型的血，B抗體馬上黏上去「標記」它們，接著紅血球就被體內的補體「啪！沒了！」直接在血管裡溶血，這就是第二型！\n- **I** (Immune complex) -> 第三型：免疫複合物型。抗體和抗原在血液裡手拉手跳舞，形成一坨一坨的「抗原抗體複合物」，卡在微血管壁、腎臟、關節等地方引起發炎。選項A的「阿圖斯氏反應（Arthus reaction）」就是這種局部第三型反應喔！\n- **D** (Delayed) -> 第四型：遲緩型。這不關抗體的事，是 T 細胞（特別是 Th1）和巨噬細胞在搞鬼，通常要過24-72小時才慢吞吞出現。選項C的「結核菌素反應」就是經典的第四型！\n\n所以這題問第二型（C - Cytotoxic），當然就是找那個細胞直接被爆掉的「血型不合溶血反應」囉！", "what": "快速區分四種過敏反應（Type I 至 IV）的致病機制與經典臨床範例。", "trap": "很多人容易把「阿圖斯氏反應」和「全身性過敏反應」搞混。記住，阿圖斯氏反應是「第三型」（免疫複合物沉積），而全身性過敏反應是「第一型」（IgE 介導的休克），千萬別因為名字看起來很像就亂選喔！", "level": 15}, {"no": 30, "source": "113-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者與即發型過敏反應關聯性最小？", "options": {"A": "T 細胞", "B": "IgE 抗體", "C": "肥大細胞（mast cells）", "D": "嗜酸性球（eosinophils）"}, "answer": "A", "ask": "當過敏原一入侵，哪一個免疫角色最不需要在第一時間跳出來，端著化學武器直接引發急性紅腫癢的症狀？", "compare": "肥大細胞配上 IgE 是引爆急性過敏的完美搭檔，嗜酸性球則負責在後期為發炎反應火上加油，那主要負責細胞免疫、需要好幾天才能召集群眾的 T 細胞，在這種「幾分鐘內」就開火的戰場上是否顯得格格不入？", "lock": "結合對過敏分類的理解，哪一個細胞其實是第四型遲發型過敏反應的靈魂人物，因而在急性的第一型過敏中關聯性最低？", "explain": "嘿，各位同學！想像一下，你吸入了一口花粉，結果在短短幾分鐘之內就開始瘋狂打噴嚏、流鼻水，這就是大名鼎鼎的「第一型（即發型）過敏反應」！在這場過敏警報中，有三個角色是黃金鐵三角：首先是「IgE 抗體」負責通風報信，接著是「肥大細胞（Mast cells）」收到信號後立刻釋放組織胺等化學武器，最後是「嗜酸性球（Eosinophils）」在後期加入戰局擴大發炎。那 T 細胞呢？雖然 Th2 細胞在幕後幫忙促成 IgE 的產生，但它並不直接參與這場即時的現場作戰。更重要的是，T 細胞其實是「第四型（遲發型）過敏反應」的絕對主角（那個需要 24 到 72 小時才會慢吞吞發作的反應）。所以在這場要求「即時、快速」的過敏派對裡，T 細胞關聯性最小，只能在旁邊玩沙啦！", "what": "考驗第一型（即發型）過敏反應的核心參與分子與細胞，並區分其與第四型（細胞介導遲發型）過敏反應的差異。", "trap": "很多同學會卡在「T 細胞（Th2）會分泌細胞激素幫忙 B 細胞製造 IgE 啊，怎麼會無關？」這個死胡同裡。請記住，題目的重點在於「即發型（Immediate）」的直接關聯。比起直接釋放物質引發症狀的肥大細胞、嗜酸性球以及橋樑 IgE，T 細胞屬於上游的免疫調節者，更何況 T 細胞是第四型過敏反應的代言人，相較之下它與即發型的直接關聯性確實最小！", "level": 16}, {"no": 31, "source": "113-3", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "血液中何種白血球增多與過敏性疾病（allergic diseases）最相關？", "options": {"A": "嗜中性球（neutrophil）", "B": "嗜酸性球（eosinophil）", "C": "單核球（monocyte）", "D": "淋巴球（lymphocyte）"}, "answer": "B", "ask": "當人體不幸吸入花粉或接觸到過敏原時，哪一種免疫細胞會因為接到警報而大舉動員，導致我們在抽血報告中看到它的數量異常飆升？", "compare": "面對化膿性的細菌感染與慢性的過敏性氣喘，身體派出的先遣部隊（嗜中性球）與後續的特種作戰部隊（嗜酸性球），在功能與應對的病原體上有什麼根本的不同？", "lock": "臨床上醫生在診斷氣喘或過敏性鼻炎時，通常會特別關注血液報告中哪一類顆粒球的比例上升，進而將其作為過敏性疾病的指標？", "explain": "同學們，想像一下你的身體是一座城堡。當過敏原（比如花粉、塵蟎）來鬧事，或是寄生蟲大軍入侵時，誰會衝上第一線釋放強效的化學武器？就是我們的「嗜酸性球（eosinophil）」啦！這傢伙平常在血液裡低調得很，但只要過敏反應一被觸發，它就像追星的瘋狂粉絲一樣成群結隊出現，數量暴增。那我們來看看其他守衛：A選項「嗜中性球」是急性發炎的先鋒，專門對付細菌感染，像是城堡的巡邏憲兵；C選項「單核球」是巡邏兵，長大後會變成巨噬細胞來清理戰場；D選項「淋巴球」則是特種部隊（T、B細胞），負責更高級的專一性免疫。所以，看到「過敏」與「白血球增多」，閉著眼睛都要選我們粉紅粉紅的嗜酸性球啦！", "what": "考驗對各類白血球在免疫反應與過敏性疾病中主要分工的掌握度。", "trap": "很多同學會把「肥大細胞（mast cell）」和「嗜酸性球（eosinophil）」混淆。雖然肥大細胞是釋放組織胺、引發過敏的「始作俑者」，但題目問的是「血液中增多的白血球」，在臨床抽血檢查中，過敏患者最常被驗出顯著增加的白血球就是嗜酸性球喔！", "level": 17}, {"no": 32, "source": "114-3", "cognitive": "理解/機轉", "difficulty": "中", "stem": "全身性紅斑性狼瘡（systemic lupus erythematosus, SLE）所造成的血球數目低下（cytopenia）病變，主要與 下列何種過敏反應有關？", "options": {"A": "第一型過敏反應", "B": "第二型過敏反應", "C": "第三型過敏反應", "D": "第四型過敏反應"}, "answer": "B", "ask": "紅斑性狼瘡患者體內的血球無端被消滅而導致數量變少，這種直接針對細胞本體進行攻擊的免疫破壞，是由哪一種過敏機制所主導？", "compare": "抗體結合游離抗原形成複合物到處亂塞（第三型），與抗體直接黏在血球表面並呼叫補體來爆破（第二型），這兩種攻擊手段在抗原的位置上有何不同？", "lock": "既然病變是特定「血球細胞」被直接摧毀，那麼哪一種過敏反應的核心定義就是抗體與細胞表面抗原結合並導致該細胞死亡？", "explain": "嘿，同學們！這題可是個超經典的「披著狼皮的羊」陷阱題啊！一看到「全身性紅斑性狼瘡 (SLE)」，大家腦中是不是馬上反射性大喊：「第三型過敏反應（免疫複合物沉積）！」？逼逼——（吹哨子）先冷靜！這題問的不是腎炎，也不是關節炎，而是「血球數目低下（cytopenia）」。當 SLE 患者體內產生了直接針對自己紅血球、白血球或血小板表面抗原的自體抗體（IgG 或 IgM）時，這些抗體就像黏在血球上的「美味標籤」，會引來補體系統或巨噬細胞把血球吞掉、破壞掉。這種「抗體直接對準靶細胞表面抗原下手」的破壞方式，正是標準的「第二型過敏反應（抗體媒介型/細胞毒性型）」！所以千萬要看清楚，雖然 SLE 引起的腎絲球腎炎、血管炎屬於第三型，但只要提到「血球低下」，就是第二型在作怪喔！", "what": "區分全身性紅斑性狼瘡（SLE）在不同臨床病變（如血球低下與腎炎）中，所涉及的不同過敏反應機制。", "trap": "考生最容易看到「SLE」就反射性秒選「第三型過敏反應」。一定要記得區分：若是可溶性免疫複合物沉積在血管、腎臟是第三型；但若是抗體直接攻擊「特定細胞（如血球）表面」導致其死亡，則是第二型！", "level": 18}, {"no": 33, "source": "114-3", "cognitive": "理解/機轉", "difficulty": "易", "stem": "有關過敏反應，下列何者不是由抗體引起？", "options": {"A": "異位性皮膚炎", "B": "青黴素所引起的過敏反應", "C": "接觸常春藤植物葉片造成的皮膚炎", "D": "RhD 血型不同所造成的新生兒溶血"}, "answer": "C", "ask": "四種過敏反應的分類中，哪一種在發生的時候不需要派出抗體當兵器，而是直接靠細胞兵團進行攻擊？", "compare": "同樣都是皮膚發炎，異位性皮膚炎和接觸常春藤後的皮膚紅腫，兩者在免疫大軍的動員機制（抗體介導 vs. T細胞介導）上有何不同？", "lock": "哪一個選項屬於經典的第四型（遲發型）過敏反應，也就是不需要任何免疫球蛋白參與的細胞免疫過程？", "explain": "嘿，同學們！過敏反應可不是只有一種喔，我們在免疫學上將它分為四種類型。這題問的是「誰不需要抗體（Antibody）參與」？答案就是 (C) 接觸常春藤植物葉片造成的皮膚炎！這其實是「第四型過敏反應」（又稱遲發型過敏反應），它的主角是我們的「T細胞」（主要是 Th1 和胞毒 T 細胞），它們在接觸到常春藤的化學物質（漆酚）後會生氣地召集巨噬細胞來引發發炎，整個過程完全「不需要抗體」出來攪局。那其他選項呢？(A) 異位性皮膚炎是標準的第一型過敏反應，由 IgE 抗體主導；(B) 青黴素過敏可以引起第一型、第二型或第三型過敏，通通跟抗體脫不了關係；(D) RhD 新生兒溶血則是 IgG 抗體去攻擊寶寶紅血球的第二型過敏反應。所以啦，只有常春藤造成的接觸性皮膚炎是純純的「T細胞熱血群毆」，沒有抗體的事情！", "what": "區分四種過敏反應中，哪一種是由「T細胞（細胞免疫）」介導，而非「抗體（體液免疫）」介導。", "trap": "很多同學一看到「皮膚炎」就覺得是同一類！「異位性皮膚炎」（第一型，IgE抗體主導）和接觸常春藤的「接觸性皮膚炎」（第四型，T細胞主導）在免疫學上的機制完全不同，千萬別傻傻分不清！", "level": 19}]}, {"title": "第二區：移植與自體免疫", "stars": "★★★★", "intro": "這一區要抓「免疫系統認錯誰」：移植是把外來組織當外人，自體免疫是把自己人當敵人。", "cram": ["移植排斥重點是 MHC/HLA 差異與 T 細胞反應。", "自體免疫是免疫耐受失敗，把自己抗原當敵人。", "器官特異性多鎖定單一器官；全身性自體免疫常牽涉免疫複合物或多系統表現。"], "concepts": [{"title": "移植免疫", "plain": "移植免疫是受贈者免疫系統辨識移植物抗原後產生的免疫反應，可能導致移植排斥。", "analogy": "建議比喻：HLA 像細胞的身分證，身分證差越多越容易被免疫系統懷疑。", "mechanism": "移植依來源可分為自體移植、同系移植、同種異體移植與異種移植。移植抗原主要受 MHC/HLA 影響，HLA 配對越接近，排斥風險越低。多數移植排斥與 T 細胞辨識移植抗原有關，屬第四型過敏；若受贈者已有抗供者抗體，可能發生超急性排斥，機轉接近第二型。", "focus": "自體移植成功率最高；MHC/HLA 是移植抗原核心；一般排斥常歸第四型，超急性排斥可與抗體及補體相關。", "confusion": "自體移植不是自體免疫。\n免疫抑制能降低排斥，但不是只影響 T 細胞，也可能提高感染風險。", "table": {"title": "移植來源與排斥風險對照", "headers": ["項目", "自體移植", "同系移植", "同種異體移植", "異種移植"], "rows": [["來源關係", "自己移給自己", "同卵雙生或基因相同", "同種不同個體", "不同物種"], ["HLA 差異", "無", "極低", "依配對程度而定", "很高"], ["排斥風險", "最低", "很低", "常見臨床重點", "最高"], ["臨床例子", "自體皮膚移植", "同卵雙胞胎移植", "腎臟、肝臟移植", "動物來源組織"], ["國考文字陷阱", "自體移植不是自體免疫", "同系不是同種異體", "同種異體最常考 HLA", "異種排斥最強"]]}}, {"title": "自體免疫疾病", "plain": "自體免疫疾病是免疫系統失去區分自我與非自我的能力，對自身抗原產生免疫反應並造成組織傷害。", "analogy": "建議比喻：免疫系統本來要查外來者，失準時卻把自己人當敵人。", "mechanism": "正常免疫耐受會避免淋巴球攻擊自身組織；若耐受被破壞，可能產生自體抗體或自體反應性 T 細胞。疾病表現可侷限在特定器官，也可影響多個系統。", "focus": "常考自體免疫疾病屬於哪一型過敏、是器官特異性或全身性，以及代表疾病的抗原或受體機轉。", "confusion": "自體免疫不等於免疫缺陷；一個是錯打自己，一個是防禦不足。\n自體抗體存在不一定等於疾病，仍需看是否造成病理或臨床表現。"}, {"title": "自體免疫成因", "plain": "自體免疫成因是指破壞免疫耐受或干擾自我辨識的因素，使免疫系統開始攻擊自身組織。", "analogy": "建議比喻：免疫系統的辨識名單被改壞，或原本沒看過的自己抗原突然曝光。", "mechanism": "常見成因包括基因突變或遺傳易感性、感染造成的分子模仿與交叉反應、藥物或化學物質改變自身抗原、組織受傷使免疫特權部位抗原暴露，以及免疫耐受調控失敗。", "focus": "題目常用「交叉反應」、「分子模仿」、「隱蔽抗原暴露」、「藥物改變抗原」測驗自體免疫的啟動原因。", "confusion": "感染可誘發自體免疫，不代表病原仍持續存在才會造成疾病。\n藥物反應可能造成類似自體免疫的表現，但機轉需看題幹描述。", "table": {"title": "自體免疫常見成因對照", "headers": ["項目", "分子模仿", "隱蔽抗原暴露", "藥物改變抗原", "免疫調控失敗"], "rows": [["觸發來源", "感染後交叉反應", "免疫特權部位受傷", "藥物或化學物質結合自身蛋白", "Treg 或耐受機制不足"], ["核心問題", "外來抗原長得像自己", "原本沒見過的自己抗原曝光", "自身抗原被改造成新目標", "不該攻擊的反應被放行"], ["臨床聯想", "風濕熱、感染後自體免疫", "眼、睪丸、神經組織受傷", "藥物誘發溶血或類狼瘡反應", "多種自體免疫疾病"], ["國考文字陷阱", "感染消失後仍可自體免疫", "隱蔽抗原不是外來抗原", "藥物可能是半抗原", "失去耐受不等於免疫缺陷"]]}}, {"title": "器官特異性自體免疫疾病", "plain": "器官特異性自體免疫疾病是免疫反應主要針對單一器官或特定組織抗原所造成的疾病。", "analogy": "生活比喻：建議用「靶器官 + 抗體或 T 細胞作用」建立表格記憶。", "mechanism": "疾病可由自體抗體造成受體刺激、受體阻斷或細胞破壞，也可由 T 細胞攻擊特定組織。例如第一型糖尿病多與 T 細胞破壞胰島 beta 細胞有關；Graves disease 則與抗體刺激 TSH receptor 有關。", "focus": "Graves disease 常考「抗體模仿刺激受體」；重症肌無力常考「抗體阻斷 ACh receptor」；第一型糖尿病常歸第四型細胞媒介傷害。", "confusion": "器官特異性不代表只有一種症狀，而是主要抗原位在特定器官。\nGraves 與重症肌無力都可歸第二型，但一個刺激受體，一個阻斷受體。", "table": {"title": "器官特異性自體免疫疾病對照", "headers": ["項目", "Graves disease", "重症肌無力", "第一型糖尿病", "惡性貧血"], "rows": [["主要目標", "TSH 受體", "乙醯膽鹼受體", "胰島 beta 細胞", "胃壁細胞或內因子"], ["主要機轉", "抗體刺激受體", "抗體阻斷受體", "T 細胞破壞細胞", "抗體影響 B12 吸收"], ["臨床結果", "甲狀腺功能亢進", "肌肉無力", "胰島素不足", "巨球性貧血"], ["過敏分類聯想", "第二型刺激型", "第二型阻斷型", "第四型細胞媒介", "第二型或自體抗體相關"], ["國考文字陷阱", "Graves 不是受體被阻斷", "重症肌無力不是神經壞死", "第一型糖尿病不是胰島素阻抗", "惡性貧血重點是 B12"]]}}, {"title": "全身性自體免疫疾病", "plain": "全身性自體免疫疾病是免疫反應影響多個器官或系統的自體免疫疾病。", "analogy": "建議比喻：器官特異性像瞄準一個部位，全身性像免疫複合物或發炎訊號到處留下痕跡。", "mechanism": "全身性疾病常與廣泛存在的自體抗原或免疫複合物沉積有關。免疫複合物可沉積於腎臟、關節、皮膚與血管，導致多系統發炎傷害。", "focus": "SLE、RA、免疫複合物、腎炎與多器官表現常提示全身性自體免疫疾病。", "confusion": "全身性自體免疫疾病不一定每個器官都受影響，而是疾病範圍不侷限於單一器官抗原。\nRA 雖主要表現在關節，也常被歸入全身性自體免疫疾病。", "table": {"title": "全身性自體免疫疾病對照", "headers": ["項目", "SLE", "類風濕性關節炎", "全身性硬化症"], "rows": [["主要抗原或位置", "核酸與核內成分", "關節滑膜與免疫複合物", "皮膚與血管結締組織"], ["主要機轉", "自體抗體與免疫複合物", "慢性發炎、免疫複合物", "纖維化與血管異常"], ["常見表現", "蝴蝶斑、腎炎、多系統症狀", "對稱性關節炎", "皮膚硬化、雷諾現象"], ["過敏分類聯想", "第三型常見", "第三型與慢性發炎", "自體免疫與纖維化"], ["國考文字陷阱", "SLE 不只皮膚病", "RA 不是單純退化性關節炎", "硬化症重點不是感染"]]}}], "gameQuestions": [{"no": 1, "source": "105-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列自體免疫疾病，何者屬於非器官特異性（non organ-specific）？", "options": {"A": "全身性紅斑狼瘡（Systemic lupus erythematosus）", "B": "重症肌無力（Myasthenia gravis）", "C": "橋本氏甲狀腺炎（Hashimoto's thyroiditis）", "D": "胰島素依賴型糖尿病（Insulin-dependent diabetes mellitus）"}, "answer": "A", "ask": "當自體抗體決定展開無差別攻擊、不侷限於單一特定器官進行破壞時，這種疾病在醫學分類上稱為什麼？", "compare": "乙醯膽鹼受體、甲狀腺細胞和胰臟 β 細胞，與全身所有活細胞都擁有的「細胞核」相比，哪一個抗原目標的分布範圍最廣、最不具有器官專一性？", "lock": "哪個選項的疾病會產生對抗全身細胞核成分的抗體，導致患者從皮膚、關節到內臟全面發炎，呈現最典型全身性受波及的特徵？", "explain": "同學們，自體免疫疾病其實就是我們的免疫大軍「起肖」分不清敵我，開始瘋狂攻擊自己人！但攻擊也是有分「精準打擊」和「地毯式轟炸」喔。非器官特異性（non organ-specific）就像是瘋狂的地毯式轟炸，抗體不管三七二十一，看到全身細胞都有的物質就開打。這題答案選 (A) 全身性紅斑狼瘡（SLE），因為 SLE 患者體內會產生對抗雙股 DNA（dsDNA）或細胞核成分的抗體（ANA），你想想，我們全身哪個活細胞沒有細胞核？所以這根本是全身上下（關節、皮膚、腎臟、心臟）都會遭殃，是典型的全身性（非器官特異性）疾病！反過來看其他選項，全都是「精準打擊」的器官特異性代表：(B) 重症肌無力只專打肌肉神經接合處的乙醯膽鹼受體；(C) 橋本氏甲狀腺炎專打甲狀腺細胞；(D) 第一型糖尿病則只針對胰臟的 β 細胞痛下殺手。所以，只要分清是「打局部」還是「打全身」，這題就能秒殺啦！", "what": "區分自體免疫疾病是屬於局限於單一器官的「器官特異性」，還是波及全身系統的「非器官特異性」。", "trap": "很多同學會把「全身性紅斑狼瘡」的「紅斑」誤以為只是皮膚病，進而誤判它是器官特異性疾病，千萬別被名字騙了，它的抗原是全身細胞都有的細胞核成分！", "level": 1}, {"no": 3, "source": "105-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列有關自體免疫疾病的成因，何者錯誤？", "options": {"A": "全身性紅斑狼瘡（Systemic lupus erythematosus）起因於體內無法清除凋亡細胞，致使細胞核內成 分暴露誘發自體抗體的形成", "B": "微生物感染過程中，微生物抗原可能引發分子模擬（molecular mimicry）機制，致使抗微生物抗原 之抗體攻擊自體器官", "C": "葛瑞夫茲症（Graves' disease）乃自體抗體結合甲狀腺上皮細胞之甲狀腺刺激素受體（thyroid stimulating hormone receptor, TSHR），導致細胞活化增生", "D": "自體免疫引起之糖尿病（autoimmune diabetes）乃自體抗體對胰島 β 細胞的破壞，與 T 細胞無關"}, "answer": "D", "ask": "當我們身體的免疫大軍突然倒戈，開始攻打自家的組織器官時，那些大名鼎鼎的自體免疫疾病到底是怎麼發生的？", "compare": "究竟是哪一種疾病的背後元兇，其實是 T 細胞在拿著屠刀動手，而不是光靠抗體在旁邊搖旗吶喊？", "lock": "第一型糖尿病中，胰島 β 細胞遭到毀滅性破壞的關鍵，到底是誰扮演了直接執行死刑的劊子手？", "explain": "同學們，這題是要選「錯誤」的敘述喔！我們來一個個揪出幕後真相。首先，(A) 全身性紅斑狼瘡（SLE）真的是個「垃圾沒倒乾淨」的悲劇，患者清除凋亡細胞的功能偷懶，導致細胞核內的物質大咧咧地暴露出來，免疫系統驚呼「哇靠這是什麼怪物！」就產生了抗核抗體，所以 (A) 敘述完全正確。再看 (B) 的「分子模擬（molecular mimicry）」，這簡直是「撞臉引發的血案」，病原體跟我們自己器官長得太像，導致抗體認錯人而誤殺隊友，(B) 也沒錯。至於 (C) 葛瑞夫茲症，自體抗體就像「把門鈴黏死的惡霸」，瘋狂刺激甲狀腺素受體，讓甲狀腺狂工作，這也是真的。最後，(D) 踢到鐵板了！自體免疫引起的糖尿病（第一型糖尿病）確實是胰島 β 細胞被揍扁了，但這場慘劇的主謀其實是「T細胞」（尤其是毒殺型 T 細胞），抗體在這裡只是跑龍套的，所以說「與 T 細胞無關」簡直是睜眼說瞎話呀！", "what": "考你四大常見自體免疫疾病（SLE、風濕熱分子模擬、甲亢、第一型糖尿病）的背後致病機制與關鍵免疫細胞。", "trap": "看到第一型糖尿病患者體內有抗胰島素抗體，就很容易誤以為它是靠抗體搞破壞，千萬別忘了，真正執行死刑、把胰島 β 細胞大卸八塊的幕後黑手其實是 T 細胞！", "level": 2}, {"no": 5, "source": "106-1", "cognitive": "應用", "difficulty": "中", "stem": "近年來，由於醫學發達，器官移植的可行性大為提高。下列何種病毒是可藉由輸血感染，尤其是在 腎臟、骨髓移植後，接受免疫抑制治療時，更易再度活化？", "options": {"A": "單純疱疹病毒（Herpes simplex virus）", "B": "巨細胞病毒（cytomegarovirus）", "C": "人類乳頭瘤病毒（Human papillomavirus）", "D": "腸病毒（enterovirus）"}, "answer": "B", "ask": "哪一種病毒最喜歡躲在血液與器官細胞裡，並專挑病人剛動完移植手術、免疫力降到谷底時，從睡夢中醒來興風作浪？", "compare": "同樣是會潛伏的疱疹病毒，躲在神經節裡引發口唇疱疹的病毒，與藉由輸血與移植器官傳輸並在全身作亂的病毒，在傳播途徑與潛伏位置上有何不同？", "lock": "結合「輸血與器官移植途徑」以及「免疫抑制後的致命活化」這兩大關鍵線索，哪一個選項的病毒是器官移植病房中防範機會性感染的頭號大敵？", "explain": "嘿，各位同學！想像一下，當病人剛做完腎臟或骨髓移植，為了怕身體排斥新器官，醫生會用藥物把免疫系統「打倒在地、動彈不得」。這時候，躲在暗處的小壞蛋們就要作亂啦！「巨細胞病毒（CMV）」就是那個最愛趁虛而入的頭號通緝犯。它平時最喜歡潛伏在單核球跟淋巴球裡，所以不管是輸血還是移植器官，它都很容易跟著「偷渡」進去。當免疫系統被壓制時，它就會瘋狂複製、再度活化，造成致命的肺炎或腸胃炎。那其他選項呢？單純疱疹病毒（HSV）雖然也會潛伏，但人家主要是躲在神經節裡引起嘴唇泡疹，不是輸血和移植後最指標性的致命威脅；人類乳頭瘤病毒（HPV）是走接觸傳染路線、讓人長椰子菜或引發子宮頸癌，跟輸血沒關係；腸病毒（Enterovirus）則是走糞口傳染，根本不是會乖乖「潛伏」等著再度活化的那一類。所以，這題毫無疑問，就是那個讓移植科醫生天天提心吊膽的巨細胞病毒（CMV）啦！", "what": "器官移植與輸血後，因免疫抑制而最容易再度活化的機會性感染病毒（巨細胞病毒 CMV）。", "trap": "很多同學看到「再度活化」就興奮地選了常聽到的單純疱疹病毒（HSV）。記住，雖然兩者都是疱疹病毒家族，但「經由輸血或器官移植」傳播，且「在免疫抑制時最常出來大鬧」的絕對是巨細胞病毒（CMV），HSV主要是引起皮膚粘膜的局部疱疹，兩者的傳播途徑與臨床威脅程度完全不同喔！", "level": 3}, {"no": 12, "source": "107-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "器官移植所引發的急性排斥作用，可運用 cyclosporine 以緩解免疫性組織損壞，其藥理作用機制為 何？", "options": {"A": "降低淋巴激素（IL-2）產生", "B": "降低淋巴激素（IL-10）產生", "C": "抑制 purine 生合成", "D": "螯合 DNA 的作用"}, "answer": "A", "ask": "當移植器官被患者自身的 T 細胞判定為外來敵軍時，Cyclosporine 這位救兵是透過阻斷哪一個關鍵信號來阻止 T 細胞大軍集結？", "compare": "同樣是阻止免疫細胞增殖，Cyclosporine 是像化療藥一樣直接去破壞 DNA 和普林的原料，還是精準地關閉促使 T 細胞活化複製的細胞激素開關？", "lock": "哪一個淋巴激素被公認為 T 細胞自我複製與活化的「最強燃料」，一旦被 Cyclosporine 斷了水源，排斥反應就會隨之平息？", "explain": "嗨，各位同學！今天我們來聊聊器官移植時最怕遇到的「豬隊友」——急性排斥作用！當你把別人的心肝寶貝（物理意義上的器官）移植進患者體內時，患者體內的 T 細胞會立刻拉響警報，大喊「有外敵入侵！」接著開始瘋狂分泌一種叫做 IL-2（白介素-2）的生長因子，這就像是 T 細胞的「蠻牛提神飲料」，會讓 T 細胞集體暴走、瘋狂複製，進而把新器官打個稀巴爛。這時候，神主牌級的免疫抑制劑 Cyclosporine（環孢黴素）就要登場啦！它的工作就是化身為「斷電大師」，精準阻斷 calcineurin（鈣調磷酸酶）的活性，讓轉錄因子 NFAT 沒辦法進入細胞核。這樣一來，T 細胞就無法製造出「蠻牛」IL-2。沒有了 IL-2，T 細胞就只能癱軟在旁邊睡大覺，排斥反應自然就緩解啦！所以選 (A) 是完全沒毛病的。至於其他選項，(B) IL-10 其實是個負責踩煞車的「和事佬」抑制性細胞激素；(C) 抑制 purine 生合成則是像 Mycophenolate (MMF) 或 Azathioprine 這些防禦性藥物的招式；(D) 螯合或干擾 DNA 通常是抗癌化療藥物的手段，對 T 細胞來說太過粗暴且副作用巨大。", "what": "考器官移植常用免疫抑制劑 Cyclosporine 阻斷 T 細胞活化的關鍵分子藥理機制。", "trap": "同學常把 Cyclosporine、Tacrolimus（同樣抑制 calcineurin 阻斷 IL-2 產生）與 Rapamycin（阻斷下游的 mTOR 以阻止 IL-2 信號傳遞）混淆。請記住，Cyclosporine 是「源頭管制」不讓 IL-2 產生，而 Rapamycin 則是「末端攔截」不讓 T 細胞接收信號，千萬別記反了！", "level": 4}, {"no": 17, "source": "108-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列自體免疫疾病中，何者為自體抗體模擬特定分子結合在受體上導致細胞活化及增生，而非造成該細胞的破壞及死亡？", "options": {"A": "全身性紅斑性狼瘡（Systemic lupus erythematosus）", "B": "重症肌無力（Myasthenia gravis）", "C": "葛瑞夫茲症（Graves’ disease）", "D": "風濕性關節炎（Rheumatoid arthritis）"}, "answer": "C", "ask": "哪一種自體免疫疾病的抗體居然不當「拆除大隊」，反而當起「興奮劑」，跑去瘋狂按細胞的啟動按鈕？", "compare": "重症肌無力阻斷了神經訊號，而紅斑性狼瘡與風濕性關節炎則到處放火破壞組織，那麼剩下哪一個疾病的抗體反而像冒牌的促甲狀腺素一樣拼命刺激細胞？", "lock": "當我們需要尋找一個因為「抗體模擬激素」而導致甲狀腺功能亢進、腺體增生的經典疾病時，哪一個選項完美符合這個「越刺激越興奮」的機制？", "explain": "同學們，這題其實在考一個超有趣的觀念：誰說自體抗體只會搞破壞？大部分的自體免疫疾病，抗體就像「拆除大隊」，例如選項 A 的全身性紅斑性狼瘡（SLE）會到處形成免疫複合物，引發全身性發炎，把細胞打得稀巴爛；選項 D 的風濕性關節炎則是抗體與免疫細胞聯手，把關節軟骨給拆了。再看看選項 B 的重症肌無力，抗體跑去霸佔乙醯膽鹼受體，讓神經訊號傳不過去，導致肌肉無力、受體被破壞。但是！選項 C 的葛瑞夫茲症（Graves’ disease）就不一樣了，它的抗體（LATS）是個「冒牌代言人」，它結合到甲狀腺刺激素（TSH）受體上之後，不但不破壞它，反而瘋狂地「按開關」刺激甲狀腺細胞，狂喊：『給我開工！狂產甲狀腺素！』這就導致了細胞活化與增生，造成甲狀腺功能亢進。所以，這是一個『不搞破壞、只會拼命催油門』的特例喔！", "what": "考驗你是否分得清哪一種自體免疫疾病是由「刺激型自體抗體」引起，進而活化細胞而非破壞細胞。", "trap": "很多同學一看到「自體免疫疾病」，就直覺以為細胞一定會被「殺死」或「破壞」。別忘了葛瑞夫茲症的抗體是個「過動兒」，它不拆房子，它只是拼命按鈴逼細胞加班！", "level": 5}, {"no": 20, "source": "109-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "關於自體免疫性胃炎（autoimmune gastritis）之敘述，下列何者錯誤？", "options": {"A": "最好發於胃竇部（antrum）", "B": "胃液中可檢查出對抗壁細胞（parietal cells）及內在因子（intrinsic factor）的抗體", "C": "胃黏膜萎縮，胃酸分泌減少", "D": "嚴重時會導致惡性貧血（pernicious anemia）"}, "answer": "A", "ask": "自體免疫系統在挑選胃部攻擊目標時，會專門挑選哪一種細胞，而這種細胞又分布在胃的哪個特定防區呢？", "compare": "胃壁細胞所產生的「胃酸」與「內在因子」一旦因免疫攻擊而消失，對胃內酸度、維生素 B12 吸收以及造血功能會分別帶來什麼致命的連鎖反應？", "lock": "既然免疫大軍鎖定的「壁細胞」主要聚居在胃體和胃底，那麼聲稱這種胃炎最好發於缺乏壁細胞的「胃竇部」，是否合乎病理學的邏輯？", "explain": "嗨，同學們！今天我們來聊聊一場發生在胃部的「同室操戈」慘劇——自體免疫性胃炎！想像一下，你的免疫系統突然叛變，把胃裡辛勤工作的「壁細胞（parietal cells）」當成了壞人，並製造出抗體對付它們和它們分泌的「內在因子」（這就是選項B的狀況）。壁細胞被打得落花流水後，胃黏膜就會萎縮，胃酸也分泌不出來了（也就是選項C）。沒有了內在因子，小腸就無法吸收維生素 B12，導致紅血球沒辦法正常製造，最後就會演變成可怕的「惡性貧血」（也就是選項D）。那選項A錯在哪呢？這場免疫大戰的主戰場是在壁細胞的大本營——「胃體（body）」和「胃底（fundus）」，胃竇部（antrum）反而幾乎不受影響。所以說最好發於胃竇部，根本就是指鹿為馬、走錯棚啦！", "what": "考查自體免疫性胃炎的病理機制、臨床表現（惡性貧血）以及其在胃部的特異性病變位置。", "trap": "考生最容易把「幽門螺旋桿菌（H. pylori）胃炎」與「自體免疫性胃炎」搞混。幽門螺旋桿菌愛住在「胃竇部」，但自體免疫性胃炎則是專攻壁細胞聚集的「胃體與胃底」，兩者的主戰場完全相反，千萬別記反囉！", "level": 6}, {"no": 21, "source": "109-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列疾病何者不屬於自體免疫疾病（autoimmune disease）？", "options": {"A": "猩紅熱（scarlet fever）", "B": "尋常天疱瘡（pemphigus vulgaris）", "C": "重症肌無力（myasthenia gravis）", "D": "第一型糖尿病"}, "answer": "A", "ask": "四個選項排排站，哪一個疾病的根本病因其實是「外來細菌入侵」，而不是我們自己體內的免疫大軍倒戈反叛？", "compare": "攻擊胰臟 β 細胞、破壞皮膚黏著蛋白，或是搶占肌肉接收器的抗體，與 A 群鏈球菌釋放的外毒素相比，哪一個的劇本寫的是外敵入侵而非內亂？", "lock": "誰能靠抗生素殺死病原體就能痊癒，而不需要使用免疫抑制劑來安撫暴走的免疫系統？", "explain": "嗨，各位同學！這題其實是要我們當「偵探」，找出混在自體免疫疾病俱樂部裡的「外來入侵者」！自體免疫疾病簡單來說，就是「免疫系統發瘋，自己人打自己人」。我們來看看選項：選項 B「尋常天疱瘡」是抗體跑去攻擊皮膚細胞之間的「黏液」（橋粒），讓皮膚起大水泡，妥妥的內戰；選項 C「重症肌無力」是抗體霸佔了肌肉上的接收器（乙醯膽鹼受體），讓神經訊號傳不過去，肌肉累到動彈不得，也是自體抗體在搗亂；選項 D「第一型糖尿病」則是免疫 T 細胞化身為豬隊友，把胰臟裡製造胰島素的 β 細胞全部炸毀，這也是不折不扣的自體免疫。那「猩紅熱」是何方神聖？它其實是「A 群鏈球菌」這個外來細菌感染引起的！細菌釋放了外毒素，讓我們發燒、全身起紅疹（像草莓舌一樣），這完全是外敵入侵的「感染症」，而不是免疫系統自己起內鬨。所以，它根本拿錯門票了，不屬於自體免疫疾病！", "what": "區分常見的自體免疫疾病與細菌感染引起的外源性疾病。", "trap": "很多同學會把「猩紅熱」和「風濕熱」搞混！A 群鏈球菌感染後，如果沒好好治療，後來誘發的「風濕熱」確實會因為分子模擬而導致自體免疫心臟病；但「猩紅熱」本身就只是個單純的細菌感染急性期症狀，千萬別被名字裡都有個「熱」字給騙去當成自體免疫了！", "level": 7}, {"no": 23, "source": "111-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者是影響自體免疫疾病易感性的主要遺傳因子？", "options": {"A": "CTLA-4（cytotoxic T lymphocyte-associated antigen 4）", "B": "FOXP3（forkhead box P3）", "C": "HLA（human leukocyte antigen）", "D": "AIRE（Autoimmune regulator）"}, "answer": "C", "ask": "哪一個基因家族的變異，是科學家在研究各類常見自體免疫疾病時，公認關聯性最廣、影響力最大的遺傳背景？", "compare": "雖然控制免疫煞車的 CTLA-4、維安指揮官 FOXP3 與胸腺監考官 AIRE 異常都會導致自體免疫，但它們引起的罕見單基因缺陷，能與決定個體抗原呈現特性、影響最廣泛的 HLA 相提並論嗎？", "lock": "哪一個分子負責向 T 細胞展示抗原，且其基因型直接決定了免疫系統會不會誤判「自己人」，因而成為自體免疫疾病中最強烈關聯的遺傳標記？", "explain": "同學們，想像一下我們的免疫細胞（特別是 T 細胞）是手持武器的巡邏警察，而 HLA（人類白血球抗原）就是他們手上的『嫌犯特徵資料庫』！如果你的 HLA 基因型剛好會把我們自家人（自體抗原）的特徵畫得太像外來侵入者，警察不就會天天衝動打自己人嗎？這就是自體免疫疾病的由來啦！在所有的遺傳因子中，HLA 的多型性與自體免疫疾病的關聯性最強、影響也最廣，穩坐頭號交椅。至於其他選項呢？CTLA-4 是免疫煞車；FOXP3 是 Treg（維安部隊）的指揮官；AIRE 則是負責在胸腺裡幫 T 細胞做考前模擬考的監考官。雖然它們罷工也會出大事，但論及最普遍、最主要的易感性遺傳因子，大家還是得臣服於 HLA 的威嚴之下喔！", "what": "自體免疫疾病的頭號遺傳推手是誰？考的就是 HLA 系統與疾病易感性的超強連結！", "trap": "千萬別看到 AIRE 或 FOXP3 這種『一壞掉就引發自體免疫風暴』的神級基因就興奮地選下去！它們雖然致命，但那屬於罕見的單基因缺陷疾病；而我們平常說的多基因、常見自體免疫疾病（如僵直性脊椎炎、類風濕性關節炎），最大且最普遍的遺傳易感因子依然是 HLA！", "level": 8}], "questions": [{"no": 1, "source": "105-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列自體免疫疾病，何者屬於非器官特異性（non organ-specific）？", "options": {"A": "全身性紅斑狼瘡（Systemic lupus erythematosus）", "B": "重症肌無力（Myasthenia gravis）", "C": "橋本氏甲狀腺炎（Hashimoto's thyroiditis）", "D": "胰島素依賴型糖尿病（Insulin-dependent diabetes mellitus）"}, "answer": "A", "ask": "當自體抗體決定展開無差別攻擊、不侷限於單一特定器官進行破壞時，這種疾病在醫學分類上稱為什麼？", "compare": "乙醯膽鹼受體、甲狀腺細胞和胰臟 β 細胞，與全身所有活細胞都擁有的「細胞核」相比，哪一個抗原目標的分布範圍最廣、最不具有器官專一性？", "lock": "哪個選項的疾病會產生對抗全身細胞核成分的抗體，導致患者從皮膚、關節到內臟全面發炎，呈現最典型全身性受波及的特徵？", "explain": "同學們，自體免疫疾病其實就是我們的免疫大軍「起肖」分不清敵我，開始瘋狂攻擊自己人！但攻擊也是有分「精準打擊」和「地毯式轟炸」喔。非器官特異性（non organ-specific）就像是瘋狂的地毯式轟炸，抗體不管三七二十一，看到全身細胞都有的物質就開打。這題答案選 (A) 全身性紅斑狼瘡（SLE），因為 SLE 患者體內會產生對抗雙股 DNA（dsDNA）或細胞核成分的抗體（ANA），你想想，我們全身哪個活細胞沒有細胞核？所以這根本是全身上下（關節、皮膚、腎臟、心臟）都會遭殃，是典型的全身性（非器官特異性）疾病！反過來看其他選項，全都是「精準打擊」的器官特異性代表：(B) 重症肌無力只專打肌肉神經接合處的乙醯膽鹼受體；(C) 橋本氏甲狀腺炎專打甲狀腺細胞；(D) 第一型糖尿病則只針對胰臟的 β 細胞痛下殺手。所以，只要分清是「打局部」還是「打全身」，這題就能秒殺啦！", "what": "區分自體免疫疾病是屬於局限於單一器官的「器官特異性」，還是波及全身系統的「非器官特異性」。", "trap": "很多同學會把「全身性紅斑狼瘡」的「紅斑」誤以為只是皮膚病，進而誤判它是器官特異性疾病，千萬別被名字騙了，它的抗原是全身細胞都有的細胞核成分！", "level": 1}, {"no": 3, "source": "105-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列有關自體免疫疾病的成因，何者錯誤？", "options": {"A": "全身性紅斑狼瘡（Systemic lupus erythematosus）起因於體內無法清除凋亡細胞，致使細胞核內成 分暴露誘發自體抗體的形成", "B": "微生物感染過程中，微生物抗原可能引發分子模擬（molecular mimicry）機制，致使抗微生物抗原 之抗體攻擊自體器官", "C": "葛瑞夫茲症（Graves' disease）乃自體抗體結合甲狀腺上皮細胞之甲狀腺刺激素受體（thyroid stimulating hormone receptor, TSHR），導致細胞活化增生", "D": "自體免疫引起之糖尿病（autoimmune diabetes）乃自體抗體對胰島 β 細胞的破壞，與 T 細胞無關"}, "answer": "D", "ask": "當我們身體的免疫大軍突然倒戈，開始攻打自家的組織器官時，那些大名鼎鼎的自體免疫疾病到底是怎麼發生的？", "compare": "究竟是哪一種疾病的背後元兇，其實是 T 細胞在拿著屠刀動手，而不是光靠抗體在旁邊搖旗吶喊？", "lock": "第一型糖尿病中，胰島 β 細胞遭到毀滅性破壞的關鍵，到底是誰扮演了直接執行死刑的劊子手？", "explain": "同學們，這題是要選「錯誤」的敘述喔！我們來一個個揪出幕後真相。首先，(A) 全身性紅斑狼瘡（SLE）真的是個「垃圾沒倒乾淨」的悲劇，患者清除凋亡細胞的功能偷懶，導致細胞核內的物質大咧咧地暴露出來，免疫系統驚呼「哇靠這是什麼怪物！」就產生了抗核抗體，所以 (A) 敘述完全正確。再看 (B) 的「分子模擬（molecular mimicry）」，這簡直是「撞臉引發的血案」，病原體跟我們自己器官長得太像，導致抗體認錯人而誤殺隊友，(B) 也沒錯。至於 (C) 葛瑞夫茲症，自體抗體就像「把門鈴黏死的惡霸」，瘋狂刺激甲狀腺素受體，讓甲狀腺狂工作，這也是真的。最後，(D) 踢到鐵板了！自體免疫引起的糖尿病（第一型糖尿病）確實是胰島 β 細胞被揍扁了，但這場慘劇的主謀其實是「T細胞」（尤其是毒殺型 T 細胞），抗體在這裡只是跑龍套的，所以說「與 T 細胞無關」簡直是睜眼說瞎話呀！", "what": "考你四大常見自體免疫疾病（SLE、風濕熱分子模擬、甲亢、第一型糖尿病）的背後致病機制與關鍵免疫細胞。", "trap": "看到第一型糖尿病患者體內有抗胰島素抗體，就很容易誤以為它是靠抗體搞破壞，千萬別忘了，真正執行死刑、把胰島 β 細胞大卸八塊的幕後黑手其實是 T 細胞！", "level": 2}, {"no": 5, "source": "106-1", "cognitive": "應用", "difficulty": "中", "stem": "近年來，由於醫學發達，器官移植的可行性大為提高。下列何種病毒是可藉由輸血感染，尤其是在 腎臟、骨髓移植後，接受免疫抑制治療時，更易再度活化？", "options": {"A": "單純疱疹病毒（Herpes simplex virus）", "B": "巨細胞病毒（cytomegarovirus）", "C": "人類乳頭瘤病毒（Human papillomavirus）", "D": "腸病毒（enterovirus）"}, "answer": "B", "ask": "哪一種病毒最喜歡躲在血液與器官細胞裡，並專挑病人剛動完移植手術、免疫力降到谷底時，從睡夢中醒來興風作浪？", "compare": "同樣是會潛伏的疱疹病毒，躲在神經節裡引發口唇疱疹的病毒，與藉由輸血與移植器官傳輸並在全身作亂的病毒，在傳播途徑與潛伏位置上有何不同？", "lock": "結合「輸血與器官移植途徑」以及「免疫抑制後的致命活化」這兩大關鍵線索，哪一個選項的病毒是器官移植病房中防範機會性感染的頭號大敵？", "explain": "嘿，各位同學！想像一下，當病人剛做完腎臟或骨髓移植，為了怕身體排斥新器官，醫生會用藥物把免疫系統「打倒在地、動彈不得」。這時候，躲在暗處的小壞蛋們就要作亂啦！「巨細胞病毒（CMV）」就是那個最愛趁虛而入的頭號通緝犯。它平時最喜歡潛伏在單核球跟淋巴球裡，所以不管是輸血還是移植器官，它都很容易跟著「偷渡」進去。當免疫系統被壓制時，它就會瘋狂複製、再度活化，造成致命的肺炎或腸胃炎。那其他選項呢？單純疱疹病毒（HSV）雖然也會潛伏，但人家主要是躲在神經節裡引起嘴唇泡疹，不是輸血和移植後最指標性的致命威脅；人類乳頭瘤病毒（HPV）是走接觸傳染路線、讓人長椰子菜或引發子宮頸癌，跟輸血沒關係；腸病毒（Enterovirus）則是走糞口傳染，根本不是會乖乖「潛伏」等著再度活化的那一類。所以，這題毫無疑問，就是那個讓移植科醫生天天提心吊膽的巨細胞病毒（CMV）啦！", "what": "器官移植與輸血後，因免疫抑制而最容易再度活化的機會性感染病毒（巨細胞病毒 CMV）。", "trap": "很多同學看到「再度活化」就興奮地選了常聽到的單純疱疹病毒（HSV）。記住，雖然兩者都是疱疹病毒家族，但「經由輸血或器官移植」傳播，且「在免疫抑制時最常出來大鬧」的絕對是巨細胞病毒（CMV），HSV主要是引起皮膚粘膜的局部疱疹，兩者的傳播途徑與臨床威脅程度完全不同喔！", "level": 3}, {"no": 12, "source": "107-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "器官移植所引發的急性排斥作用，可運用 cyclosporine 以緩解免疫性組織損壞，其藥理作用機制為 何？", "options": {"A": "降低淋巴激素（IL-2）產生", "B": "降低淋巴激素（IL-10）產生", "C": "抑制 purine 生合成", "D": "螯合 DNA 的作用"}, "answer": "A", "ask": "當移植器官被患者自身的 T 細胞判定為外來敵軍時，Cyclosporine 這位救兵是透過阻斷哪一個關鍵信號來阻止 T 細胞大軍集結？", "compare": "同樣是阻止免疫細胞增殖，Cyclosporine 是像化療藥一樣直接去破壞 DNA 和普林的原料，還是精準地關閉促使 T 細胞活化複製的細胞激素開關？", "lock": "哪一個淋巴激素被公認為 T 細胞自我複製與活化的「最強燃料」，一旦被 Cyclosporine 斷了水源，排斥反應就會隨之平息？", "explain": "嗨，各位同學！今天我們來聊聊器官移植時最怕遇到的「豬隊友」——急性排斥作用！當你把別人的心肝寶貝（物理意義上的器官）移植進患者體內時，患者體內的 T 細胞會立刻拉響警報，大喊「有外敵入侵！」接著開始瘋狂分泌一種叫做 IL-2（白介素-2）的生長因子，這就像是 T 細胞的「蠻牛提神飲料」，會讓 T 細胞集體暴走、瘋狂複製，進而把新器官打個稀巴爛。這時候，神主牌級的免疫抑制劑 Cyclosporine（環孢黴素）就要登場啦！它的工作就是化身為「斷電大師」，精準阻斷 calcineurin（鈣調磷酸酶）的活性，讓轉錄因子 NFAT 沒辦法進入細胞核。這樣一來，T 細胞就無法製造出「蠻牛」IL-2。沒有了 IL-2，T 細胞就只能癱軟在旁邊睡大覺，排斥反應自然就緩解啦！所以選 (A) 是完全沒毛病的。至於其他選項，(B) IL-10 其實是個負責踩煞車的「和事佬」抑制性細胞激素；(C) 抑制 purine 生合成則是像 Mycophenolate (MMF) 或 Azathioprine 這些防禦性藥物的招式；(D) 螯合或干擾 DNA 通常是抗癌化療藥物的手段，對 T 細胞來說太過粗暴且副作用巨大。", "what": "考器官移植常用免疫抑制劑 Cyclosporine 阻斷 T 細胞活化的關鍵分子藥理機制。", "trap": "同學常把 Cyclosporine、Tacrolimus（同樣抑制 calcineurin 阻斷 IL-2 產生）與 Rapamycin（阻斷下游的 mTOR 以阻止 IL-2 信號傳遞）混淆。請記住，Cyclosporine 是「源頭管制」不讓 IL-2 產生，而 Rapamycin 則是「末端攔截」不讓 T 細胞接收信號，千萬別記反了！", "level": 4}, {"no": 17, "source": "108-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列自體免疫疾病中，何者為自體抗體模擬特定分子結合在受體上導致細胞活化及增生，而非造成該細胞的破壞及死亡？", "options": {"A": "全身性紅斑性狼瘡（Systemic lupus erythematosus）", "B": "重症肌無力（Myasthenia gravis）", "C": "葛瑞夫茲症（Graves’ disease）", "D": "風濕性關節炎（Rheumatoid arthritis）"}, "answer": "C", "ask": "哪一種自體免疫疾病的抗體居然不當「拆除大隊」，反而當起「興奮劑」，跑去瘋狂按細胞的啟動按鈕？", "compare": "重症肌無力阻斷了神經訊號，而紅斑性狼瘡與風濕性關節炎則到處放火破壞組織，那麼剩下哪一個疾病的抗體反而像冒牌的促甲狀腺素一樣拼命刺激細胞？", "lock": "當我們需要尋找一個因為「抗體模擬激素」而導致甲狀腺功能亢進、腺體增生的經典疾病時，哪一個選項完美符合這個「越刺激越興奮」的機制？", "explain": "同學們，這題其實在考一個超有趣的觀念：誰說自體抗體只會搞破壞？大部分的自體免疫疾病，抗體就像「拆除大隊」，例如選項 A 的全身性紅斑性狼瘡（SLE）會到處形成免疫複合物，引發全身性發炎，把細胞打得稀巴爛；選項 D 的風濕性關節炎則是抗體與免疫細胞聯手，把關節軟骨給拆了。再看看選項 B 的重症肌無力，抗體跑去霸佔乙醯膽鹼受體，讓神經訊號傳不過去，導致肌肉無力、受體被破壞。但是！選項 C 的葛瑞夫茲症（Graves’ disease）就不一樣了，它的抗體（LATS）是個「冒牌代言人」，它結合到甲狀腺刺激素（TSH）受體上之後，不但不破壞它，反而瘋狂地「按開關」刺激甲狀腺細胞，狂喊：『給我開工！狂產甲狀腺素！』這就導致了細胞活化與增生，造成甲狀腺功能亢進。所以，這是一個『不搞破壞、只會拼命催油門』的特例喔！", "what": "考驗你是否分得清哪一種自體免疫疾病是由「刺激型自體抗體」引起，進而活化細胞而非破壞細胞。", "trap": "很多同學一看到「自體免疫疾病」，就直覺以為細胞一定會被「殺死」或「破壞」。別忘了葛瑞夫茲症的抗體是個「過動兒」，它不拆房子，它只是拼命按鈴逼細胞加班！", "level": 5}, {"no": 20, "source": "109-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "關於自體免疫性胃炎（autoimmune gastritis）之敘述，下列何者錯誤？", "options": {"A": "最好發於胃竇部（antrum）", "B": "胃液中可檢查出對抗壁細胞（parietal cells）及內在因子（intrinsic factor）的抗體", "C": "胃黏膜萎縮，胃酸分泌減少", "D": "嚴重時會導致惡性貧血（pernicious anemia）"}, "answer": "A", "ask": "自體免疫系統在挑選胃部攻擊目標時，會專門挑選哪一種細胞，而這種細胞又分布在胃的哪個特定防區呢？", "compare": "胃壁細胞所產生的「胃酸」與「內在因子」一旦因免疫攻擊而消失，對胃內酸度、維生素 B12 吸收以及造血功能會分別帶來什麼致命的連鎖反應？", "lock": "既然免疫大軍鎖定的「壁細胞」主要聚居在胃體和胃底，那麼聲稱這種胃炎最好發於缺乏壁細胞的「胃竇部」，是否合乎病理學的邏輯？", "explain": "嗨，同學們！今天我們來聊聊一場發生在胃部的「同室操戈」慘劇——自體免疫性胃炎！想像一下，你的免疫系統突然叛變，把胃裡辛勤工作的「壁細胞（parietal cells）」當成了壞人，並製造出抗體對付它們和它們分泌的「內在因子」（這就是選項B的狀況）。壁細胞被打得落花流水後，胃黏膜就會萎縮，胃酸也分泌不出來了（也就是選項C）。沒有了內在因子，小腸就無法吸收維生素 B12，導致紅血球沒辦法正常製造，最後就會演變成可怕的「惡性貧血」（也就是選項D）。那選項A錯在哪呢？這場免疫大戰的主戰場是在壁細胞的大本營——「胃體（body）」和「胃底（fundus）」，胃竇部（antrum）反而幾乎不受影響。所以說最好發於胃竇部，根本就是指鹿為馬、走錯棚啦！", "what": "考查自體免疫性胃炎的病理機制、臨床表現（惡性貧血）以及其在胃部的特異性病變位置。", "trap": "考生最容易把「幽門螺旋桿菌（H. pylori）胃炎」與「自體免疫性胃炎」搞混。幽門螺旋桿菌愛住在「胃竇部」，但自體免疫性胃炎則是專攻壁細胞聚集的「胃體與胃底」，兩者的主戰場完全相反，千萬別記反囉！", "level": 6}, {"no": 21, "source": "109-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列疾病何者不屬於自體免疫疾病（autoimmune disease）？", "options": {"A": "猩紅熱（scarlet fever）", "B": "尋常天疱瘡（pemphigus vulgaris）", "C": "重症肌無力（myasthenia gravis）", "D": "第一型糖尿病"}, "answer": "A", "ask": "四個選項排排站，哪一個疾病的根本病因其實是「外來細菌入侵」，而不是我們自己體內的免疫大軍倒戈反叛？", "compare": "攻擊胰臟 β 細胞、破壞皮膚黏著蛋白，或是搶占肌肉接收器的抗體，與 A 群鏈球菌釋放的外毒素相比，哪一個的劇本寫的是外敵入侵而非內亂？", "lock": "誰能靠抗生素殺死病原體就能痊癒，而不需要使用免疫抑制劑來安撫暴走的免疫系統？", "explain": "嗨，各位同學！這題其實是要我們當「偵探」，找出混在自體免疫疾病俱樂部裡的「外來入侵者」！自體免疫疾病簡單來說，就是「免疫系統發瘋，自己人打自己人」。我們來看看選項：選項 B「尋常天疱瘡」是抗體跑去攻擊皮膚細胞之間的「黏液」（橋粒），讓皮膚起大水泡，妥妥的內戰；選項 C「重症肌無力」是抗體霸佔了肌肉上的接收器（乙醯膽鹼受體），讓神經訊號傳不過去，肌肉累到動彈不得，也是自體抗體在搗亂；選項 D「第一型糖尿病」則是免疫 T 細胞化身為豬隊友，把胰臟裡製造胰島素的 β 細胞全部炸毀，這也是不折不扣的自體免疫。那「猩紅熱」是何方神聖？它其實是「A 群鏈球菌」這個外來細菌感染引起的！細菌釋放了外毒素，讓我們發燒、全身起紅疹（像草莓舌一樣），這完全是外敵入侵的「感染症」，而不是免疫系統自己起內鬨。所以，它根本拿錯門票了，不屬於自體免疫疾病！", "what": "區分常見的自體免疫疾病與細菌感染引起的外源性疾病。", "trap": "很多同學會把「猩紅熱」和「風濕熱」搞混！A 群鏈球菌感染後，如果沒好好治療，後來誘發的「風濕熱」確實會因為分子模擬而導致自體免疫心臟病；但「猩紅熱」本身就只是個單純的細菌感染急性期症狀，千萬別被名字裡都有個「熱」字給騙去當成自體免疫了！", "level": 7}, {"no": 23, "source": "111-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者是影響自體免疫疾病易感性的主要遺傳因子？", "options": {"A": "CTLA-4（cytotoxic T lymphocyte-associated antigen 4）", "B": "FOXP3（forkhead box P3）", "C": "HLA（human leukocyte antigen）", "D": "AIRE（Autoimmune regulator）"}, "answer": "C", "ask": "哪一個基因家族的變異，是科學家在研究各類常見自體免疫疾病時，公認關聯性最廣、影響力最大的遺傳背景？", "compare": "雖然控制免疫煞車的 CTLA-4、維安指揮官 FOXP3 與胸腺監考官 AIRE 異常都會導致自體免疫，但它們引起的罕見單基因缺陷，能與決定個體抗原呈現特性、影響最廣泛的 HLA 相提並論嗎？", "lock": "哪一個分子負責向 T 細胞展示抗原，且其基因型直接決定了免疫系統會不會誤判「自己人」，因而成為自體免疫疾病中最強烈關聯的遺傳標記？", "explain": "同學們，想像一下我們的免疫細胞（特別是 T 細胞）是手持武器的巡邏警察，而 HLA（人類白血球抗原）就是他們手上的『嫌犯特徵資料庫』！如果你的 HLA 基因型剛好會把我們自家人（自體抗原）的特徵畫得太像外來侵入者，警察不就會天天衝動打自己人嗎？這就是自體免疫疾病的由來啦！在所有的遺傳因子中，HLA 的多型性與自體免疫疾病的關聯性最強、影響也最廣，穩坐頭號交椅。至於其他選項呢？CTLA-4 是免疫煞車；FOXP3 是 Treg（維安部隊）的指揮官；AIRE 則是負責在胸腺裡幫 T 細胞做考前模擬考的監考官。雖然它們罷工也會出大事，但論及最普遍、最主要的易感性遺傳因子，大家還是得臣服於 HLA 的威嚴之下喔！", "what": "自體免疫疾病的頭號遺傳推手是誰？考的就是 HLA 系統與疾病易感性的超強連結！", "trap": "千萬別看到 AIRE 或 FOXP3 這種『一壞掉就引發自體免疫風暴』的神級基因就興奮地選下去！它們雖然致命，但那屬於罕見的單基因缺陷疾病；而我們平常說的多基因、常見自體免疫疾病（如僵直性脊椎炎、類風濕性關節炎），最大且最普遍的遺傳易感因子依然是 HLA！", "level": 8}]}, {"title": "第三區：免疫缺陷", "stars": "★★★", "intro": "免疫缺陷的讀法不是背病名，而是問哪一道防線壞掉：B 細胞、T 細胞、吞噬細胞或補體。", "cram": ["讀免疫缺陷先問哪一段壞掉：B 細胞、T 細胞、吞噬細胞或補體。", "免疫抑制病人常見機會性感染與病毒再活化。"], "concepts": [{"title": "免疫缺陷疾病", "plain": "免疫缺陷疾病是免疫系統某些組成或功能不足，導致感染風險增加或感染控制能力下降。", "analogy": "生活比喻：建議用「壞掉的防線」分類：抗體、T 細胞、吞噬、補體。", "mechanism": "原發性免疫缺陷多與遺傳或發育異常有關，可影響 B 細胞、T 細胞、吞噬細胞或補體。次發性免疫缺陷則可由 HIV/AIDS、癌症、營養不良、懷孕、壓力、老化或免疫抑制治療引起。", "focus": "國考常考原發性與次發性分類，以及 B 細胞、T 細胞、吞噬細胞、補體缺陷各自容易造成的感染型態。", "confusion": "免疫缺陷不是免疫反應過強，而是防禦功能不足。\n使用免疫抑制藥後感染風險增加，屬臨床上常見的次發性免疫缺陷情境。", "table": {"title": "免疫缺陷類型與感染風險對照", "headers": ["項目", "B 細胞或抗體缺陷", "T 細胞缺陷", "吞噬細胞缺陷", "補體缺陷"], "rows": [["主要問題", "抗體不足", "細胞性免疫不足", "吞噬與殺菌不足", "調理、溶菌或發炎放大不足"], ["常見感染", "莢膜細菌、化膿性感染", "病毒、黴菌、胞內病原", "化膿菌、深部感染", "Neisseria 或莢膜菌風險"], ["臨床線索", "反覆呼吸道細菌感染", "伺機性感染、活疫苗風險", "膿瘍、傷口癒合差", "反覆特定細菌感染"], ["典型聯想", "免疫球蛋白低下", "HIV/AIDS、胸腺發育異常", "慢性肉芽腫病", "C5-C9 MAC 缺陷"], ["國考文字陷阱", "抗體缺陷不等於 T 細胞缺陷", "T 細胞缺陷最怕胞內病原", "吞噬缺陷會有膿瘍", "補體缺陷常考 Neisseria"]]}}], "gameQuestions": [], "questions": []}, {"title": "第四區：腫瘤免疫", "stars": "★★★", "intro": "腫瘤免疫要串成三問：癌細胞怎麼變、免疫怎麼抓、腫瘤怎麼躲。", "cram": ["腫瘤免疫可用三問整理：怎麼變癌、免疫怎麼辨認、腫瘤怎麼逃脫。", "腫瘤抗原、免疫監督與致癌微生物是同一條臨床理解線。"], "concepts": [{"title": "腫瘤免疫學", "plain": "腫瘤免疫學探討腫瘤細胞如何產生抗原、如何被宿主免疫系統辨識，以及如何逃避免疫監督。", "analogy": "生活比喻：建議先把腫瘤免疫分成三問：癌細胞怎麼變、免疫怎麼抓、腫瘤怎麼躲。", "mechanism": "癌細胞可能因基因突變、病毒感染或調控異常產生不同於正常細胞的抗原。免疫系統可藉由抗體、補體、T 細胞、NK 細胞與巨噬細胞辨識並清除部分腫瘤細胞，但腫瘤也可能降低抗原表現或抑制免疫反應以逃脫。", "focus": "常考腫瘤抗原、致癌微生物、腫瘤免疫監督與腫瘤逃避免疫的方式。", "confusion": "良性與惡性腫瘤差異不只在大小，還包括侵襲與轉移能力。\n腫瘤抗原可作為診斷輔助，但通常不等於單獨確診。", "table": {"title": "腫瘤免疫三大核心對照", "headers": ["項目", "腫瘤抗原", "免疫監督", "免疫逃脫"], "rows": [["核心問題", "免疫系統看見什麼", "免疫系統如何清除", "腫瘤如何躲避"], ["主要成員", "TAA、突變蛋白、病毒抗原", "CD8 T 細胞、NK 細胞、巨噬細胞", "抗原降低、MHC 降低、免疫抑制"], ["臨床用途", "診斷輔助、追蹤病程", "理解抗腫瘤免疫", "理解復發與免疫治療"], ["代表例子", "AFP、CEA、病毒相關抗原", "清除早期異常細胞", "PD-L1、免疫抑制微環境"], ["國考文字陷阱", "腫瘤抗原不是一定能確診", "免疫監督不是百分百防癌", "逃脫不是免疫系統完全不存在"]]}}, {"title": "致癌機轉", "plain": "致癌機轉是正常細胞逐步變成癌細胞的分子與細胞變化過程。", "analogy": "建議比喻：癌化像油門卡住、煞車失靈、修車系統壞掉，還拒絕報廢。", "mechanism": "癌化常涉及原致癌基因活化、腫瘤抑制基因失去功能、DNA 修復基因異常與凋亡調控失衡。這些改變會讓細胞增生失控、累積突變、逃避死亡，並可能取得侵襲與轉移能力。", "focus": "原致癌基因、腫瘤抑制基因、DNA 修復、細胞凋亡與致癌微生物是常見考點。", "confusion": "原致癌基因本來是正常基因，異常活化後才促進癌化。\n腫瘤抑制基因通常是失去功能後增加癌症風險。"}, {"title": "腫瘤相關微生物", "plain": "腫瘤相關微生物是與特定癌症發生風險增加有關的病毒、細菌或寄生蟲。", "analogy": "生活比喻：建議讓學生用「病原-癌症配對表」記憶，並標出最常考配對。", "mechanism": "微生物可透過整合或干擾宿主基因、促進慢性發炎、影響細胞增生或降低免疫監督而促進癌化。此關聯表示風險增加，不代表每次感染都會直接導致癌症。", "focus": "最常考的是 HPV-子宮頸癌、HBV/HCV-肝癌、EBV-Burkitt lymphoma/鼻咽癌、HTLV-I-成人 T 細胞白血病、HHV-8-Kaposi sarcoma。", "confusion": "H. pylori 是細菌，不是病毒。\nHTLV-I 與 HIV 都是反轉錄病毒，但腫瘤連結與免疫缺陷重點不同。", "table": {"title": "腫瘤相關微生物與癌症對照", "headers": ["項目", "HPV", "EBV", "HBV 與 HCV", "Helicobacter pylori"], "rows": [["病原類型", "DNA 病毒", "DNA 病毒", "肝炎病毒", "細菌"], ["主要相關癌症", "子宮頸癌、肛門癌", "鼻咽癌、Burkitt lymphoma", "肝細胞癌", "胃癌、MALT lymphoma"], ["致癌線索", "E6/E7 影響 p53/Rb", "B 細胞轉化、潛伏感染", "慢性肝炎與肝硬化", "慢性胃炎與黏膜病變"], ["預防或臨床聯想", "HPV 疫苗、篩檢", "EBV 血清與地區流行", "HBV 疫苗、抗病毒治療", "根除治療可降低風險"], ["國考文字陷阱", "HPV 不是只造成菜花", "EBV 不只單核球增多症", "HBV/HCV 致癌靠慢性肝病", "H. pylori 是細菌不是病毒"]]}}, {"title": "腫瘤抗原", "plain": "腫瘤抗原是腫瘤細胞表現、可被免疫系統辨識，或可作為臨床偵測參考的抗原。", "analogy": "建議比喻：腫瘤抗原像癌細胞露出的異常名牌，但名牌有時不夠專一。", "mechanism": "腫瘤抗原可能來自突變蛋白、病毒蛋白、胚胎期抗原再表現，或正常細胞低量表現但在腫瘤中增加的分子。腫瘤相關抗原可引發免疫反應，也可作為疾病追蹤指標。", "focus": "TAA、AFP、CEA、病毒相關腫瘤抗原與胚胎抗原再表現是常見考點。", "confusion": "腫瘤相關抗原不一定只存在於癌細胞。\n腫瘤標記上升通常不是單獨確診依據。"}, {"title": "腫瘤免疫監督", "plain": "腫瘤免疫監督是免疫系統辨識並清除新生腫瘤細胞的過程；腫瘤免疫逃脫則是腫瘤避開此監督的能力。", "analogy": "建議比喻：免疫監督像巡邏，腫瘤逃脫像換裝、關燈或干擾通訊。", "mechanism": "體液性反應可透過抗體、補體與調理作用協助清除腫瘤細胞。細胞性反應包括 CD8 毒殺型 T 細胞、NK 細胞、巨噬細胞與 ADCC。腫瘤可透過降低抗原表現、分泌免疫抑制物質、阻斷免疫訊號或誘導免疫細胞凋亡等方式逃脫。", "focus": "NK 細胞、CD8 T 細胞、ADCC、補體、腫瘤抗原下降與免疫抑制分子是高頻考點。", "confusion": "NK 細胞偏先天免疫，CD8 T 細胞偏後天細胞免疫，兩者都可參與抗腫瘤。\n腫瘤逃脫不是免疫系統完全沒有反應，而是腫瘤逐步避開或壓低反應。", "table": {"title": "腫瘤免疫監督效應細胞對照", "headers": ["項目", "CD8 T 細胞", "NK 細胞", "巨噬細胞", "抗體與補體"], "rows": [["辨識方式", "MHC I 呈現腫瘤抗原", "MHC I 降低或壓力訊號", "吞噬與發炎訊號", "腫瘤表面抗原"], ["主要作用", "特異性殺傷", "快速非特異性殺傷", "吞噬、分泌 TNF 等", "補體或 ADCC"], ["優勢", "精準、具抗原專一性", "可處理 MHC 下降腫瘤", "放大局部反應", "連接體液免疫"], ["腫瘤逃脫點", "抗原或 MHC 改變", "抑制 NK 活性", "形成免疫抑制微環境", "抗原表現不足"], ["國考文字陷阱", "CD8 需要抗原呈現", "NK 不需要先辨識特定抗原", "巨噬細胞不只吞噬細菌", "抗體可參與但不是唯一主角"]]}}], "gameQuestions": [], "questions": []}], "questionCount": 27, "gameCount": 27}</script>
