<script id="data" type="application/json">{"title": "第十六章 真菌學", "subtitle": "真菌結構 × 感染深度 × 28 題題庫闖關", "route": ["總論與檢驗", "表淺與皮膚", "皮下與系統性", "伺機性重症"], "sections": [{"title": "第一區：真菌總論、結構與檢驗", "stars": "★★★★★", "intro": "先抓真菌為真核生物、細胞壁與細胞膜和人類細胞的差異，再連到常用培養、染色與抗黴菌藥物作用目標。", "cram": ["真菌是真核生物：有細胞核、粒線體；細胞壁主要含幾丁質/葡聚醣，不是胜肽聚糖。", "真菌細胞膜含 ergosterol，是 amphotericin B、azole 類常考作用線索。", "常見檢體染色可考 PAS；黴菌觀察常見 lactophenol cotton blue。"], "concepts": [{"title": "真菌總論", "plain": "真菌是真核微生物，可為酵母菌、黴菌或雙形性真菌。國考最愛拿它和細菌、人類細胞比較：真菌有細胞核與胞器，細胞壁不是胜肽聚糖，而是以幾丁質、葡聚醣等成分為主。", "analogy": "生活比喻：建議用「病原特性 -> 傳播途徑 -> 臨床表現 -> 診斷/防治」四欄整理。", "mechanism": "真菌和人體細胞都是真核，所以抗真菌藥的選擇性較難；可利用真菌細胞膜的 ergosterol 或細胞壁成分作為治療目標。", "focus": "真核、有細胞壁、細胞膜含 ergosterol、不能行光合作用、化合異營，是本章總論的高頻考點。", "confusion": "不要把真菌細胞壁背成細菌的 peptidoglycan；也不要把真菌當成原核生物。", "table": {"title": "真菌、細菌與人體細胞比較", "headers": ["項目", "真菌", "細菌", "人體細胞"], "rows": [["細胞類型", "真核", "原核", "真核"], ["細胞壁", "幾丁質/葡聚醣", "胜肽聚糖", "無細胞壁"], ["細胞膜固醇", "ergosterol", "通常無典型固醇", "cholesterol"], ["藥物靶點", "ergosterol/細胞壁", "細胞壁/核糖體等", "需避開宿主毒性"], ["國考文字陷阱", "不是 peptidoglycan", "不是有核細胞", "不是抗真菌藥主要靶點"]]}}, {"title": "乳酸酚棉子藍液", "plain": "乳酸酚棉子藍液常用於黴菌形態觀察，可幫助看菌絲與孢子構造。", "analogy": "像替真菌病原做名牌：名字、住在哪裡、常找誰麻煩、用什麼線索抓到它。", "mechanism": "它不是治療藥物，而是實驗室觀察黴菌形態的染色/封片工具。", "focus": "題目若問真菌檢體常用染色或形態觀察，要和 acid-fast、Gram stain 區分。", "confusion": "抗酸染色是分枝桿菌線索；看到黴菌形態觀察不要直覺選 acid-fast。"}, {"title": "沙保羅氏葡萄糖培 養基", "plain": "Sabouraud dextrose agar（SDA）是培養真菌常用的培養基。", "analogy": "像替真菌病原做名牌：名字、住在哪裡、常找誰麻煩、用什麼線索抓到它。", "mechanism": "酸性環境與配方有利於真菌生長，常搭配抑制細菌的條件。", "focus": "SDA 常和真菌培養配對出題。", "confusion": "不要把 SDA 當成一般細菌選擇培養基；它是黴菌/酵母菌常用培養線索。"}, {"title": "馬鈴薯葡萄培養基", "plain": "馬鈴薯葡萄培養基是第十六章真菌學需要能辨認的名詞；讀它時請先抓病原類別、感染位置、宿主條件與代表考點。", "analogy": "像替真菌病原做名牌：名字、住在哪裡、常找誰麻煩、用什麼線索抓到它。", "mechanism": "先判斷它屬於真菌結構、檢驗工具、表淺/皮下/系統性/伺機性感染，並連到題幹給的臨床線索。", "focus": "國考常以英文名、感染部位、宿主條件、檢驗或治療靶點來考辨認。", "confusion": "馬鈴薯葡萄培養基不要只背中文名；要和英文名、感染位置與代表題眼一起記。"}], "gameQuestions": [{"no": 4, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "Amphotericin B 破壞真菌細胞的主要標的是下列那一項？", "options": {"A": "細胞壁", "B": "細胞膜", "C": "核酸", "D": "粒線體"}, "answer": "B", "ask": "當我們把大名鼎鼎的抗真菌神藥 Amphotericin B 投放到戰場時，它最主要會鎖定並摧毀真菌的哪一個防線構造？", "compare": "真菌最外層堅硬的細胞壁，與內部富含麥角固醇的細胞膜，哪一個才是這類多烯類（polyene）抗真菌藥物展現「打洞神技」的舞台？", "lock": "既然我們知道該藥物是透過與麥角固醇結合來造成細胞通透性改變與內容物外漏，這項關鍵機制直接指向了哪一個生理構造？", "explain": "同學們！想像一下，Amphotericin B（兩性黴素B）就像是真菌界的「穿甲彈」！真菌的細胞膜上有一種我們人類沒有的特殊成分叫做「麥角固醇 (ergosterol)」。Amphotericin B 一看到它，就會像磁鐵一樣黏上去，然後在真菌的細胞膜上瘋狂「開洞」！當細胞膜被戳得千瘡百孔，裡面的鉀離子和重要營養成分就會像洩洪一樣漏光光，真菌就這樣活活脫水而死啦！所以，它的主要攻擊標的就是「細胞膜（選項B）」。至於（選項A）細胞壁，那是 Caspofungin 那些藥物的防區；（選項C）核酸則是 Flucytosine 的地盤，別認錯對手囉！", "what": "考抗真菌藥物 Amphotericin B 的作用機轉與攻擊靶點。", "trap": "千萬別因為真菌「有細胞壁」就反射性選 A！雖然細胞壁是真菌的特色結構，但 Amphotericin B 非常挑食，它只對細胞膜上的「麥角固醇 (ergosterol)」情有獨鍾，看到它才會有反應並進行打洞！", "level": 1}, {"no": 5, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者為真菌性檢體標本常用的染色法？", "options": {"A": "periodic acid-Schiff 染色", "B": "acid-fast 染色", "C": "Gram's 染色", "D": "Hematoxylin and eosin 染色"}, "answer": "A", "ask": "真菌在顯微鏡下想要大方現形，我們需要利用哪種最經典、最常被用來針對牠特殊細胞壁結構的染色技術？", "compare": "細菌常用的革蘭氏染色，與專門揪出結核菌的抗酸性染色，哪一個能比得上專攻多醣體化學反應的 PAS 染色更能讓真菌的細胞壁無所遁形？", "lock": "既然真菌的細胞壁塞滿了大量的幾丁質與多醣類，哪一種染色法能利用過碘酸把這些醣類氧化、並用 Schiff 試劑染出最閃耀的洋紅色？", "explain": "同學們，想像一下真菌（黴菌）平常是多麼低調地藏在我們身邊！但牠們有一個致命的特徵，那就是擁有厚實的「細胞壁」，而這個細胞壁裡塞滿了各種「多醣體」（像是幾丁質、葡聚醣等）。在實驗室裡，想要讓這些真菌現形，最愛用的武器就是 periodic acid-Schiff 染色（簡稱 PAS 染色）！PAS 染色原理超簡單，就是用過碘酸把真菌細胞壁上的醣類氧化，再用 Schiff 試劑跟牠們手牽手，把真菌染成非常騷包、超級顯眼的亮紅色或洋紅色，簡直像在走紅毯一樣！ 那其他選項呢？選項 B 的 acid-fast 染色（抗酸性染色）是專門用來對付結核分枝桿菌這種「蠟質外衣」的，跟真菌不搭嘎；選項 C 的 Gram's 染色是細菌界的老大，雖然真菌偶爾會順便被染成紫色，但這絕對不是牠的專屬舞台；選項 D 的 H&E 染色是病理科看組織結構的萬用底色，但要專門看清真菌的細節，PAS 還是厲害得多喔！", "what": "考驗考生是否知道真菌細胞壁富含多醣體，以及最常用來染出多醣體的特殊染色法（PAS 染色）。", "trap": "很多同學會因為在實驗室看過真菌被革蘭氏染色（Gram's stain）染成紫色，就誤選了 C。請記住，真菌會變紫色只是因為牠皮太厚，並不是真菌「專用」的鑑定染色！要認準真菌細胞壁的多醣體，PAS 才是正牌女友！", "level": 2}, {"no": 7, "source": "107-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關細菌與黴菌之比較，下列何者錯誤？", "options": {"A": "細菌為原核細胞，黴菌為真核細胞", "B": "細菌皆單一細胞，黴菌皆多細胞", "C": "細菌為無性生殖，黴菌可有性生殖", "D": "細菌細胞壁含肽聚醣，黴菌細胞壁含葡聚醣和幾丁質"}, "answer": "B", "ask": "當我們把顯微鏡下的細菌與黴菌放在一起對決時，這兩者在細胞的基本架構、生活方式與構造上，有哪一個描述出現了明顯的漏洞？", "compare": "細菌與黴菌的細胞壁成分各是什麼，而黴菌在生殖方式上，是不是比只能分裂生殖的細菌多了更多繁衍後代的選擇？", "lock": "想想看，真菌家族裡那位負責釀酒和做麵包、只有單一細胞的『酵母菌』，是不是直接打破了某個選項宣稱『皆為多細胞』的絕對說法？", "explain": "同學們，這題根本是送分題，但也是超級基本功！我們天天在講細菌和黴菌，它們在演化上的地位可是差了十萬八千里。首先，細菌是個『原核生物』，構造簡單，沒有被核膜包覆的細胞核，而黴菌（真菌的一種）可是高檔的『真核生物』，有精緻的胞器，所以選項A對到不能再對！再看選項D的防護罩（細胞壁），細菌拿的是『肽聚醣』，黴菌戴的是『葡聚醣和幾丁質』盾牌，這也是經典考點，完全正確。生殖方面，選項C提到細菌通常就是簡單粗暴地分裂生殖（無性），但黴菌厲害了，它不僅能無性生殖，環境差時還能來個有性生殖交換基因。那選項B錯在哪裡？黴菌屬於真菌界，難道真菌全都是多細胞嗎？別忘了我們做麵包、釀酒最愛的『酵母菌』，它可是不折不扣的『單細胞』真菌喔！所以一竿子打翻一船人說真菌皆多細胞，就太以偏概全啦！", "what": "原核生物（細菌）與真核生物（真菌/黴菌）在細胞構造與生活史上的本質差異。", "trap": "容易把『真菌』一律等同於肉眼可見的多細胞黴菌或菇菇，而忘了單細胞的酵母菌也是真菌家族的重要成員！", "level": 3}, {"no": 10, "source": "108-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列有關白色念珠菌（Candida albicans）之敘述何者錯誤？", "options": {"A": "通常是單倍體（haploid）", "B": "萌芽管（germ tubes）測試中，一般會形成萌芽管", "C": "在念珠菌呈色培養基（CHROMagar Candida）通常呈現綠色菌落", "D": "是常見的伺機性致病菌"}, "answer": "A", "ask": "當白色念珠菌不小心在體內作怪時，它有哪些生理特徵與鑑定方法是符合科學事實的，而又是哪一個選項在胡說八道？", "compare": "平常我們熟悉的白色念珠菌，在染色體套數上到底與一般的單細胞真菌有何不同？", "lock": "結合它在 CHROMagar 上的翠綠色表現、萌芽管測試的陽性反應，哪一個關於它基因體套數的敘述明顯與事實不符？", "explain": "同學們！今天我們要聊聊這位住在我們身上、平常乖巧但免疫力低下時就會造反的「白色念珠菌」（Candida albicans）。首先，這傢伙是個不折不扣的「二倍體（diploid）」生物喔！雖然它一輩子幾乎都不進行有性生殖，但人家細胞核裡的染色體可是成雙成對的，所以說它是「單倍體」完全是抹黑它，選項A一臉就是來找碴的，因此選它！那其他選項呢？選項B：把這隻菌放到血清裡溫育，它就會像雨後春筍一樣長出一根根「萌芽管（germ tube）」，這是鑑定它的經典招式；選項C：如果把它種在呈色培養基（CHROMagar）上，它會呈現超亮眼的「翠綠色」菌落；選項D：它本來就是我們皮膚黏膜上的常在菌，當宿主免疫力變差時就會趁虛而入（伺機性感染）。所以，只有選項A是錯的喔！", "what": "考驗白色念珠菌（Candida albicans）的基因體倍數（二倍體）、鑑定特徵（萌芽管、呈色培養基顏色）及臨床定位。", "trap": "很多同學會把「真菌」跟「單倍體」畫上等號，以為酵母菌生活史都是單倍體。但白色念珠菌很特別，它在自然界中主要以「二倍體」形式存在，且極少進行典型減數分裂，這點非常容易被當成陷阱考出來！", "level": 4}, {"no": 11, "source": "108-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "黴菌與人類細胞在結構上最大的差別為何？", "options": {"A": "細胞壁", "B": "細胞膜", "C": "細胞核", "D": "粒線體"}, "answer": "A", "ask": "我們要怎麼在顯微鏡下，一眼認出誰是穿了特製防彈外衣的真菌，誰是裸奔的人類細胞？這兩種真核生物在結構上有哪一個「你有我卻絕對沒有」的硬殼防線？", "compare": "同樣是真核生物，大家都有大腦（細胞核）也有發電機（粒線體），而那層包裹細胞的膜雖然成分有些微不同，但到底哪一個構造是直接從「有無」的層面上就把兩者徹底劃清界線？", "lock": "想想看，哪一個厚實的防禦性外殼是真菌和植物的專利，而我們動物細胞卻一輩子都不可能擁有的？", "explain": "嘿，各位同學！想像一下，如果我們想給黴菌（真菌）致命一擊，卻又不想傷到人類自己，我們要瞄準哪裡？沒錯，就是「細胞壁」！人類的細胞是軟綿綿、沒有外牆保護的；但真菌就像蓋了城堡一樣，最外圍有一層由幾丁質（chitin）和葡聚糖（glucan）組成的堅硬細胞壁。這就是為什麼許多抗真菌藥物都專門攻擊細胞壁的合成，因為人類根本沒有這玩意兒，打了安全又有效！至於選項 B 的細胞膜，真菌是用麥角固醇（ergosterol），人類是用膽固醇（cholesterol），雖然成分不同，但大家「都有」膜；而選項 C 細胞核和選項 D 粒線體，大家都是真核生物家族的成員，這些構造當然大家都有囉！", "what": "真菌與哺乳類動物細胞在結構上的根本差異（真菌有細胞壁，而人類沒有）。", "trap": "很多同學會把「細胞膜（真菌含有獨特的麥角固醇）」跟「細胞壁」混淆，雖然兩者都是抗真菌藥物的靶點，但人類是「完全沒有細胞壁」的，這才是最巨大的「有無」之差！", "level": 5}, {"no": 14, "source": "108-2", "cognitive": "應用", "difficulty": "中", "stem": "下列何種真菌感染，不建議以氟康唑（fluconazole）來治療？", "options": {"A": "白色念珠菌（Candida albicans）", "B": "杜氏假絲念珠菌（Candida dubliniensis）", "C": "克魯斯念珠菌（Candida krusei）", "D": "近平滑假絲念珠菌（Candida parapsilosis）"}, "answer": "C", "ask": "哪一種念珠菌天生骨骼奇特，根本不怕我們最常用的抗真菌一線藥物氟康唑？", "compare": "白色念珠菌、杜氏和近平滑念珠菌通常對氟康唑還算聽話，但選項中哪一個惡名昭彰的異類打從出生起就把氟康唑當開水喝？", "lock": "當你在檢驗報告上看到哪一隻念珠菌時，必須立刻把氟康唑丟進垃圾桶、改換其他後線抗真菌藥？", "explain": "同學們，這題可是臨床微生物學的超級常考題！我們要認識的抗真菌藥叫做氟康唑（fluconazole），它就像是醫學界對付念珠菌（Candida）的「平民神油」，便宜、好用、副作用少，絕大多數的念珠菌（像是 A 的白色念珠菌、B 的杜氏念珠菌、D 的近平滑念珠菌）碰到它，基本上都會乖乖束手就擒。但是！念珠菌家族裡偏偏出了一個超級大叛逆，那就是克魯斯念珠菌（Candida krusei）！這傢伙天生骨骼奇特，對氟康唑有「天生的（intrinsic）抗藥性」，氟康唑對它來說就像含糖飲料一樣毫無殺傷力。所以如果病患感染了克魯斯念珠菌，你還傻傻地開氟康唑，那就等於是請它喝下午茶，完全沒效果喔！這時候我們得趕快請出棘白菌素類（echinocandins）或兩性黴素B（amphotericin B）來救場才行！", "what": "考驗考生是否清楚念珠菌屬（Candida）中，哪一個特定菌種對常用抗真菌藥氟康唑（fluconazole）具有天生的抗藥性。", "trap": "很多同學會覺得「反正都是念珠菌，應該用同一種藥都會有效吧？」這種偷懶的想法在國考最容易踩雷！一定要特別記住，克魯斯念珠菌（C. krusei）是天生的氟康唑終結者，絕對不能用它來治療！", "level": 6}, {"no": 15, "source": "109-1", "cognitive": "應用", "difficulty": "易", "stem": "有關以念珠菌呈色培養基（CHROMagar Candida）做鑑別培養上的敘述何者錯誤？", "options": {"A": "通常可以鑑定出混合菌種感染", "B": "利用菌種代謝能力不同，產生不同顏色來鑑別", "C": "可以測試出菌種對藥物的感受性", "D": "通常含有抗細菌抗生素"}, "answer": "C", "ask": "念珠菌呈色培養基（CHROMagar）在臨床檢驗實驗室中，主要被設計來發揮什麼神奇功能？", "compare": "培養皿上長出五顏六色的菌落，這種「顯色」的化學反應是反映了菌種本身的代謝特性，還是揭示了它對藥物的耐受性？", "lock": "哪一個選項誤把「區分菌種身分（鑑別）」的能力，無限放大到連「能不能被藥物殺死（藥敏）」都能看出來的神奇地步？", "explain": "同學們，想像一下你開了一家專門給念珠菌（Candida）去的彩色派對！這個「CHROMagar Candida」就是一張超神奇的彩色地毯。不同的念珠菌因為體內擁有的酵素、代謝醣類的能力不同，吃飽喝足後就會吐出不同顏色的色素！像是大名鼎鼎的白色念珠菌（C. albicans）會呈現翠綠色，熱帶念珠菌（C. tropicalis）會呈現鋼藍色，而克柔念珠菌（C. krusei）則會呈現粉紅且毛茸茸的樣子。這就是選項B說的「利用代謝能力產生不同顏色來鑑別」。既然大家都變成了不同顏色，如果病人的檢體裡同時有兩種以上的念珠菌，我們一眼就能在培養皿上看到綠色和藍色混在一起，這不就輕易「鑑定出混合菌種感染」了嗎？（選項A蓋章通過）。為了不讓隔壁棚討厭的細菌跑來派對亂入，我們在培養基裡放點「抗細菌抗生素」也是非常合情合理的（選項D正確）。但是！這個培養基只能幫你「化妝認人」，它可沒有特異功能告訴你這隻菌抗不抗藥！要測藥物敏感性，我們得乖乖做 Etest 或微量稀釋法。所以選項C說它可以測藥物感受性，簡直是把它的功能捧得太高啦，這題錯得最離譜的就是它！", "what": "考念珠菌呈色培養基（CHROMagar Candida）的原理、功能及其在臨床微生物鑑定上的限制。", "trap": "考生常把「鑑別培養基（Differential medium）」與「藥敏測試（Susceptibility test）」混淆。呈色培養基是利用酵素與受質反應顯色來『辨識菌種』，完全無法用來評估病原菌對抗真菌藥物的感受性或抗藥性！", "level": 7}, {"no": 16, "source": "109-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "Azole 類抗黴菌劑的作用機轉是：", "options": {"A": "抑制細胞膜生成", "B": "抑制蛋白質合成", "C": "抑制細胞壁生成", "D": "抑制核酸合成"}, "answer": "A", "ask": "當我們把 Azole 類這顆藥彈投向真菌時，它在真菌體內引爆並摧毀的究竟是哪一個維生構造？", "compare": "真菌細胞外圍的『細胞壁』與內側的『細胞膜』，分別是用什麼獨特的化學成分搭建起來的？", "lock": "既然已知 Azole 類藥物是透過阻斷『麥角固醇』的生合成來搞破壞，那麼這會直接導致哪一個構造無法順利組裝？", "explain": "同學們，想像一下真菌這隻小壞蛋要蓋它的防護罩——細胞膜。對真菌來說，『麥角固醇』（ergosterol）就像是它們細胞膜上的核心鋼筋，沒有它，細胞膜就會軟趴趴。而我們的 Azole 類藥物，就像是個狡猾的『斷供大師』，專門去抑制合成麥角固醇的關鍵酵素。沒有了麥角固醇，真菌的細胞膜就像豆腐渣工程一樣瞬間瓦解，裡面的東西漏光光，真菌就只能跟世界說拜拜了！至於其他選項，抑制細胞壁的是棘白菌素類（Echinocandins）；抑制核酸合成的則是 Flucytosine。所以，記住 Azole 就是專門給細胞膜斷糧的冷血殺手！", "what": "考抗真菌藥物（Antifungals）的分類與其作用靶點，特別是 Azole 類藥物的機轉。", "trap": "考生最常把『細胞膜』和『細胞壁』這兩道防線搞混！真菌兩者都有，但 Azole 類對付的是細胞膜（麥角固醇），而 Echinocandins 類（如 Caspofungin）對付的才是細胞壁（β-glucan），進考場前一定要把這兩大主力藥物分清楚！", "level": 8}, {"no": 17, "source": "109-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "Caspofungin用於治療黴菌感染，下列何者為其作用機轉？", "options": {"A": "抑制核酸合成", "B": "改變細胞膜的滲透性", "C": "抑制麥角固醇（ergosterol）的合成", "D": "抑制細胞壁生成"}, "answer": "D", "ask": "Caspofungin 這種藥物，究竟是攻擊真菌的哪一個特定構造，才能達到殺死病原菌的效果？", "compare": "破壞真菌最外層用來抵擋外界壓力、維持形狀的堅硬外殼，跟干擾控制物質進出的細胞膜屏障，這兩者在藥物設計的靶點上該如何區分？", "lock": "既然 Caspofungin 作為棘白菌素類藥物，其臨床機轉是阻斷 β-1,3-D-葡聚醣的合成，而這項核心成分正是組成真菌哪一個保護結構的關鍵鋼筋？", "explain": "哈囉同學們！今天我們來聊聊抗真菌藥界的「拆牆大師」——Caspofungin（卡泊芬淨）！這傢伙屬於 Echinocandins（棘白菌素類）家族。你知道真菌跟我們人類細胞最大的差別是什麼嗎？就是它們多了一層厚厚的「細胞壁」來保護自己！Caspofungin 聰明的地方，就在於它專門去抑制真菌細胞壁上的重要成分 β-1,3-D-glucan（β-1,3-D-葡聚醣）的合成。沒有了牆壁保護，真菌就像沒穿盔甲一樣，經不起滲透壓的變化就直接爆開死掉了！至於其他落選者：(A) 抑制核酸合成是 Flucytosine 的拿手好戲；(B) 改變細胞膜滲透性是 Amphotericin B 這種多烯類藥物在細胞膜上打洞的傑作；(C) 抑制麥角固醇合成則是 Azoles 類（如 Fluconazole）的主場。所以，看到 Caspofungin，就要立刻聯想到「拆牆（細胞壁）」喔！", "what": "考驗常用抗真菌藥物（特別是棘白菌素類 Echinocandins）的分子作用機轉與攻擊靶點。", "trap": "考生最常把「抑制細胞膜上的麥角固醇合成（C）」與「抑制細胞壁合成（D）」搞混！請牢記，細胞膜（Membrane）與細胞壁（Wall）是真菌兩道完全不同的防線，Caspofungin 是專門拆「牆」而不是破壞「膜」的！", "level": 9}, {"no": 20, "source": "110-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列何種酵素與麴菌屬（Aspergillus）之毒性無關？", "options": {"A": "彈性蛋白酶", "B": "葉酸酶", "C": "磷脂酶", "D": "過氧化氫酶"}, "answer": "B", "ask": "麴菌在入侵人體並對抗宿主免疫系統時，需要派出哪些酵素作為主動攻擊的化學武器或防護盾牌？", "compare": "破壞肺部彈性纖維、溶解細胞膜以及分解白血球釋放的雙氧水殺手，分別對應到選項中的哪些酵素？", "lock": "哪一個酵素主要參與真菌內部的維生素代謝，而非被釋放到胞外去撕裂人體組織或阻擋免疫細胞的致命攻擊？", "explain": "嘿，同學們！今天我們來聊聊「麴菌（Aspergillus）」這個大壞蛋。它要入侵我們的身體，手裡沒帶點「破壞性武器」怎麼行？選項中的 A、C、D 就是它最得意的三大神兵利器！首先，肺部組織充滿了彈性纖維，麴菌分泌「彈性蛋白酶（Elastase）」（選項 A）就像拿著電鋸，能輕鬆鋸開肺部組織，方便它開疆闢土；而細胞膜的主要成分是磷脂質，它分泌「磷脂酶（Phospholipase）」（選項 C）就像強酸一樣，能直接融化宿主的細胞膜；當我們的免疫細胞（如嗜中性白血球）吐出過氧化氫（也就是雙氧水）想殺死它時，它還配備了「過氧化氫酶（Catalase）」（選項 D）這面防彈盾牌，把雙氧水分解成無害的水和氧氣！至於選項 B 的「葉酸酶」呢？葉酸是細胞生長的基本營養素，參與真菌自身的基礎代謝，並不是用來攻擊宿主或抵禦免疫攻擊的「毒性/致病酵素」。所以，這題跟毒性無關的當然就是 B 啦！", "what": "考驗你對麴菌（Aspergillus）致病機轉中，各種「分泌型毒性酵素（Virulence enzymes）」生理功能的掌握度。", "trap": "很多同學會把「維持生存所需的代謝酶」和「主動攻擊的毒性酶」混為一談。葉酸代謝雖然對真菌活下去很重要，但它屬於細胞內的基本營養合成，跟主動撕裂宿主組織或對抗免疫系統的「武器」是兩碼子事喔！", "level": 10}, {"no": 21, "source": "110-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關真菌的敘述，下列何者錯誤？", "options": {"A": "化合異營生物（chemoheterotroph），且不含葉綠素", "B": "單細胞或多細胞生物", "C": "可行無性或有性生殖", "D": "沒細胞核，但有細胞壁"}, "answer": "D", "ask": "我們該如何從真菌的細胞結構、營養方式和繁殖特徵中，抓出哪一個敘述悄悄抹殺了它身為「真核生物」的尊嚴？", "compare": "單細胞的酵母菌與多細胞的黴菌在生殖方式上，與體內有沒有葉綠素、能不能行光合作用有什麼關聯？", "lock": "既然真菌的名字裡有個「真」字，代表它是真核生物，那麼它到底有沒有攜帶遺傳物質的細胞核呢？", "explain": "同學們，大家千萬別把「真菌」跟「細菌」搞混囉！真菌（像是我們常吃的香菇、麵包上的黴菌、甚至是釀酒的酵母菌）可是非常高級的「真核生物」。既然叫做「真」核，就代表人家發育完全，擁有一個被核膜包裹得漂漂亮亮的「真細胞核」！選項 D 居然說真菌「沒細胞核」，這簡直是太看不起真菌了，那是細菌（原核生物）才有的特徵啦！至於其他選項：選項 A，真菌沒有葉綠素，不能像植物一樣行光合作用，只能靠吸收現成的有機物維生，這就叫化合異營；選項 B，酵母菌是單細胞，黴菌和菇菇是多細胞，這完全沒錯；選項 C，真菌在環境好時喜歡無性生殖快速複製，環境不好時就來個有性生殖增加基因多樣性，也是對的。所以，錯誤的選項就是 D 囉！", "what": "辨識真菌（真核生物）與細菌（原核生物）在細胞結構與生理特徵上的根本差異。", "trap": "考生常因為真菌和細菌一樣「都有細胞壁」，就直覺地把真菌當成原核生物。請牢記：真菌是「真核生物」，它不僅有細胞核，它的細胞壁成分還是「幾丁質」（Chitin），跟細菌的肽聚醣完全不同！", "level": 11}, {"no": 22, "source": "110-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "主要抑制麥角固醇（ergosterol）合成有關之抗真菌藥物為何？", "options": {"A": "Polyenes 及 Azoles", "B": "Echinocandins", "C": "Azoles 及 Fluorocytosine", "D": "Polyenes 及 Echinocandins"}, "answer": "A", "ask": "真菌細胞膜上最核心的防禦成分是什麼，而哪些藥物又是專門針對這個成分來進行打擊的？", "compare": "專門在真菌細胞膜上搞破壞的藥物，與專門阻斷「細胞壁」合成的藥物，在作用靶點上有著什麼樣的根本差異？", "lock": "當我們排除掉影響細胞壁合成的 Echinocandins，以及干擾核酸合成的 Fluorocytosine 後，剩下哪一組藥物組合才是完完全全衝著麥角固醇而來的？", "explain": "哈囉各位同學！今天我們來聊聊怎麼把真菌的家給抄了！真菌這傢伙跟我們人類最不一樣的地方，就是牠們的細胞膜上有一種獨特的靈魂成分叫「麥角固醇（ergosterol）」，這簡直就是牠們維持生命力的護身符。我們聰明的科學家當然不會放過這個弱點，開發出了兩大殺手：第一位是 Azoles（唑類），牠們像斷糧官一樣，直接「抑制合成」讓真菌做不出麥角固醇；第二位是 Polyenes（多烯類，如 Amphotericin B），牠們更粗暴，直接黏上去在膜上「開洞」讓真菌洩氣。雖然一個是攔截合成、一個是破壞成品，但牠們兩位都與麥角固醇的生老病死密不可分！至於 Echinocandins 則是去拆外牆（真菌細胞壁）的，而 Fluorocytosine 是潛入內部干擾核酸（DNA）合成的，兩者都跟麥角固醇沒關係。所以看到麥角固醇相關的藥物，鎖定 Polyenes 和 Azoles 的黃金組合就對啦！", "what": "抗真菌藥物（Antifungal drugs）的作用機制分類，特別是針對真菌細胞膜特有成分麥角固醇（ergosterol）的藥物類型。", "trap": "很多考生會把 Polyenes（多烯類）和 Azoles（唑類）的作用機轉混為一談。請記住：Azoles 是阻斷「合成」的幕後黑手，而 Polyenes 是直接「結合」並在細胞膜上開洞的暴力分子，兩者手段不同，但靶點都跟麥角固醇有關！另外，千萬別把針對「細胞壁」的 Echinocandins 也算進來喔！", "level": 12}, {"no": 25, "source": "112-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "黴菌結構及生理特性的敘述，下列何者正確？", "options": {"A": "原核生物", "B": "不能行光合作用", "C": "具胜糖（peptidoglycan）細胞壁", "D": "具 penicillin 感受性"}, "answer": "B", "ask": "黴菌在生物界的分類中，到底屬於哪一個大家族，又有哪些與生俱來的獨特生理特徵呢？", "compare": "植物、細菌與真菌在細胞壁成分和獲取能量的方式上，有著怎樣的分水嶺？青黴素（penicillin）的攻擊標靶在真菌身上找得到嗎？", "lock": "哪一個生理特性是真菌既不屬於植物（沒葉綠體），又不屬於細菌（不是原核生物、無肽聚醣）的終極鐵證？", "explain": "同學們好！一講到「黴菌（真菌）」，很多人一看到名字裡有個「菌」字，就把它跟細菌搞混，這可是大錯特錯啊！真菌其實比細菌高級多了，它們跟我們人類一樣，都是擁有完整細胞核的「真核生物」，所以選項 A 直接淘汰！既然它是真核生物，它的細胞壁總該跟細菌不一樣吧？沒錯！細菌的細胞壁是用「肽聚醣（peptidoglycan）」做的，但真菌的細胞壁主要是「幾丁質（chitin）」和「葡聚醣」，所以選項 C 也錯了。既然真菌沒有肽聚醣，那專門破壞肽聚醣的抗生素——盤尼西林（penicillin），對真菌來說根本就是不痛不癢，選項 D 也是錯的。最後，真菌雖然長得有點像植物，但它們「沒有葉綠體」，絕對「不能行光合作用」，只能當個默默吸收別人營養的異營生物，因此選項 B 是無庸置疑的正確答案啦！", "what": "真菌（黴菌）的基本生理結構與細菌、植物在細胞分類學上的本質差異。", "trap": "千萬不要因為「菌」字就把真菌當成原核生物！真菌是真核生物，其細胞壁成分（幾丁質）與藥物感受性（對細菌抗生素不敏感）都與細菌完全不同。", "level": 13}, {"no": 30, "source": "114-3", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "有關真菌分類以及其細胞結構，下列敘述何者最不適當？", "options": {"A": "真菌屬於真核生物，具有粒線體等胞器", "B": "真菌細胞膜含有固醇成份，並為部份抗真菌劑的作用標的", "C": "真菌具有細胞壁結構，其主要成份為胜肽聚糖", "D": "真菌具有細胞核"}, "answer": "C", "ask": "真菌作為一個真核生物，它在演化分類上的定位以及細胞膜、細胞壁等結構，具有哪些獨特的生物學特徵？", "compare": "胜肽聚糖（peptidoglycan）與幾丁質（chitin）分別是哪兩大類不同微生物用來建造細胞壁的專屬材料？", "lock": "既然真菌是高等的真核生物，而胜肽聚糖是原核細菌防護罩的專利，哪一個選項把這兩個井水不犯河水的構造強行綁在一起了？", "explain": "嗨，各位同學！今天我們來聊聊「真菌」這個大家族。很多人常把真菌跟細菌搞混，但其實真菌跟我們人類還比較算親戚呢！因為真菌跟我們一樣，都是「真核生物」，擁有完整的細胞核（選項D正確），細胞內也有粒線體等胞器幫忙發電（選項A正確）。再來看看它們的細胞膜，我們哺乳動物的細胞膜含有膽固醇，而真菌則含有「麥角固醇（ergosterol）」，這可是許多抗真菌藥物（例如：Amphotericin B、Azole類）專門攻擊的標靶喔（選項B正確）。那最不適當的選項C錯在哪裡呢？真菌雖然也有細胞壁，但它們的防護衣成分是「幾丁質（chitin）」和「葡聚糖（glucan）」，絕對不是「胜肽聚糖」！「胜肽聚糖」是隔壁棚「細菌（原核生物）」的專屬招牌。真菌要是聽到你說它身上有胜肽聚糖，可是會氣到直搖頭的呀！", "what": "真菌（真核生物）與細菌（原核生物）在細胞結構與細胞壁化學成分上的本質差異。", "trap": "考生最常把「有細胞壁」的生物通通混為一談！請務必記住黃金公式：細菌細胞壁＝「胜肽聚糖」；真菌細胞壁＝「幾丁質、葡聚糖」；植物細胞壁＝「纖維素」，千萬別跨界亂點鴛鴦譜喔！", "level": 14}], "questions": [{"no": 4, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "Amphotericin B 破壞真菌細胞的主要標的是下列那一項？", "options": {"A": "細胞壁", "B": "細胞膜", "C": "核酸", "D": "粒線體"}, "answer": "B", "ask": "當我們把大名鼎鼎的抗真菌神藥 Amphotericin B 投放到戰場時，它最主要會鎖定並摧毀真菌的哪一個防線構造？", "compare": "真菌最外層堅硬的細胞壁，與內部富含麥角固醇的細胞膜，哪一個才是這類多烯類（polyene）抗真菌藥物展現「打洞神技」的舞台？", "lock": "既然我們知道該藥物是透過與麥角固醇結合來造成細胞通透性改變與內容物外漏，這項關鍵機制直接指向了哪一個生理構造？", "explain": "同學們！想像一下，Amphotericin B（兩性黴素B）就像是真菌界的「穿甲彈」！真菌的細胞膜上有一種我們人類沒有的特殊成分叫做「麥角固醇 (ergosterol)」。Amphotericin B 一看到它，就會像磁鐵一樣黏上去，然後在真菌的細胞膜上瘋狂「開洞」！當細胞膜被戳得千瘡百孔，裡面的鉀離子和重要營養成分就會像洩洪一樣漏光光，真菌就這樣活活脫水而死啦！所以，它的主要攻擊標的就是「細胞膜（選項B）」。至於（選項A）細胞壁，那是 Caspofungin 那些藥物的防區；（選項C）核酸則是 Flucytosine 的地盤，別認錯對手囉！", "what": "考抗真菌藥物 Amphotericin B 的作用機轉與攻擊靶點。", "trap": "千萬別因為真菌「有細胞壁」就反射性選 A！雖然細胞壁是真菌的特色結構，但 Amphotericin B 非常挑食，它只對細胞膜上的「麥角固醇 (ergosterol)」情有獨鍾，看到它才會有反應並進行打洞！", "level": 1}, {"no": 5, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列何者為真菌性檢體標本常用的染色法？", "options": {"A": "periodic acid-Schiff 染色", "B": "acid-fast 染色", "C": "Gram's 染色", "D": "Hematoxylin and eosin 染色"}, "answer": "A", "ask": "真菌在顯微鏡下想要大方現形，我們需要利用哪種最經典、最常被用來針對牠特殊細胞壁結構的染色技術？", "compare": "細菌常用的革蘭氏染色，與專門揪出結核菌的抗酸性染色，哪一個能比得上專攻多醣體化學反應的 PAS 染色更能讓真菌的細胞壁無所遁形？", "lock": "既然真菌的細胞壁塞滿了大量的幾丁質與多醣類，哪一種染色法能利用過碘酸把這些醣類氧化、並用 Schiff 試劑染出最閃耀的洋紅色？", "explain": "同學們，想像一下真菌（黴菌）平常是多麼低調地藏在我們身邊！但牠們有一個致命的特徵，那就是擁有厚實的「細胞壁」，而這個細胞壁裡塞滿了各種「多醣體」（像是幾丁質、葡聚醣等）。在實驗室裡，想要讓這些真菌現形，最愛用的武器就是 periodic acid-Schiff 染色（簡稱 PAS 染色）！PAS 染色原理超簡單，就是用過碘酸把真菌細胞壁上的醣類氧化，再用 Schiff 試劑跟牠們手牽手，把真菌染成非常騷包、超級顯眼的亮紅色或洋紅色，簡直像在走紅毯一樣！ 那其他選項呢？選項 B 的 acid-fast 染色（抗酸性染色）是專門用來對付結核分枝桿菌這種「蠟質外衣」的，跟真菌不搭嘎；選項 C 的 Gram's 染色是細菌界的老大，雖然真菌偶爾會順便被染成紫色，但這絕對不是牠的專屬舞台；選項 D 的 H&E 染色是病理科看組織結構的萬用底色，但要專門看清真菌的細節，PAS 還是厲害得多喔！", "what": "考驗考生是否知道真菌細胞壁富含多醣體，以及最常用來染出多醣體的特殊染色法（PAS 染色）。", "trap": "很多同學會因為在實驗室看過真菌被革蘭氏染色（Gram's stain）染成紫色，就誤選了 C。請記住，真菌會變紫色只是因為牠皮太厚，並不是真菌「專用」的鑑定染色！要認準真菌細胞壁的多醣體，PAS 才是正牌女友！", "level": 2}, {"no": 7, "source": "107-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關細菌與黴菌之比較，下列何者錯誤？", "options": {"A": "細菌為原核細胞，黴菌為真核細胞", "B": "細菌皆單一細胞，黴菌皆多細胞", "C": "細菌為無性生殖，黴菌可有性生殖", "D": "細菌細胞壁含肽聚醣，黴菌細胞壁含葡聚醣和幾丁質"}, "answer": "B", "ask": "當我們把顯微鏡下的細菌與黴菌放在一起對決時，這兩者在細胞的基本架構、生活方式與構造上，有哪一個描述出現了明顯的漏洞？", "compare": "細菌與黴菌的細胞壁成分各是什麼，而黴菌在生殖方式上，是不是比只能分裂生殖的細菌多了更多繁衍後代的選擇？", "lock": "想想看，真菌家族裡那位負責釀酒和做麵包、只有單一細胞的『酵母菌』，是不是直接打破了某個選項宣稱『皆為多細胞』的絕對說法？", "explain": "同學們，這題根本是送分題，但也是超級基本功！我們天天在講細菌和黴菌，它們在演化上的地位可是差了十萬八千里。首先，細菌是個『原核生物』，構造簡單，沒有被核膜包覆的細胞核，而黴菌（真菌的一種）可是高檔的『真核生物』，有精緻的胞器，所以選項A對到不能再對！再看選項D的防護罩（細胞壁），細菌拿的是『肽聚醣』，黴菌戴的是『葡聚醣和幾丁質』盾牌，這也是經典考點，完全正確。生殖方面，選項C提到細菌通常就是簡單粗暴地分裂生殖（無性），但黴菌厲害了，它不僅能無性生殖，環境差時還能來個有性生殖交換基因。那選項B錯在哪裡？黴菌屬於真菌界，難道真菌全都是多細胞嗎？別忘了我們做麵包、釀酒最愛的『酵母菌』，它可是不折不扣的『單細胞』真菌喔！所以一竿子打翻一船人說真菌皆多細胞，就太以偏概全啦！", "what": "原核生物（細菌）與真核生物（真菌/黴菌）在細胞構造與生活史上的本質差異。", "trap": "容易把『真菌』一律等同於肉眼可見的多細胞黴菌或菇菇，而忘了單細胞的酵母菌也是真菌家族的重要成員！", "level": 3}, {"no": 10, "source": "108-1", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "下列有關白色念珠菌（Candida albicans）之敘述何者錯誤？", "options": {"A": "通常是單倍體（haploid）", "B": "萌芽管（germ tubes）測試中，一般會形成萌芽管", "C": "在念珠菌呈色培養基（CHROMagar Candida）通常呈現綠色菌落", "D": "是常見的伺機性致病菌"}, "answer": "A", "ask": "當白色念珠菌不小心在體內作怪時，它有哪些生理特徵與鑑定方法是符合科學事實的，而又是哪一個選項在胡說八道？", "compare": "平常我們熟悉的白色念珠菌，在染色體套數上到底與一般的單細胞真菌有何不同？", "lock": "結合它在 CHROMagar 上的翠綠色表現、萌芽管測試的陽性反應，哪一個關於它基因體套數的敘述明顯與事實不符？", "explain": "同學們！今天我們要聊聊這位住在我們身上、平常乖巧但免疫力低下時就會造反的「白色念珠菌」（Candida albicans）。首先，這傢伙是個不折不扣的「二倍體（diploid）」生物喔！雖然它一輩子幾乎都不進行有性生殖，但人家細胞核裡的染色體可是成雙成對的，所以說它是「單倍體」完全是抹黑它，選項A一臉就是來找碴的，因此選它！那其他選項呢？選項B：把這隻菌放到血清裡溫育，它就會像雨後春筍一樣長出一根根「萌芽管（germ tube）」，這是鑑定它的經典招式；選項C：如果把它種在呈色培養基（CHROMagar）上，它會呈現超亮眼的「翠綠色」菌落；選項D：它本來就是我們皮膚黏膜上的常在菌，當宿主免疫力變差時就會趁虛而入（伺機性感染）。所以，只有選項A是錯的喔！", "what": "考驗白色念珠菌（Candida albicans）的基因體倍數（二倍體）、鑑定特徵（萌芽管、呈色培養基顏色）及臨床定位。", "trap": "很多同學會把「真菌」跟「單倍體」畫上等號，以為酵母菌生活史都是單倍體。但白色念珠菌很特別，它在自然界中主要以「二倍體」形式存在，且極少進行典型減數分裂，這點非常容易被當成陷阱考出來！", "level": 4}, {"no": 11, "source": "108-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "黴菌與人類細胞在結構上最大的差別為何？", "options": {"A": "細胞壁", "B": "細胞膜", "C": "細胞核", "D": "粒線體"}, "answer": "A", "ask": "我們要怎麼在顯微鏡下，一眼認出誰是穿了特製防彈外衣的真菌，誰是裸奔的人類細胞？這兩種真核生物在結構上有哪一個「你有我卻絕對沒有」的硬殼防線？", "compare": "同樣是真核生物，大家都有大腦（細胞核）也有發電機（粒線體），而那層包裹細胞的膜雖然成分有些微不同，但到底哪一個構造是直接從「有無」的層面上就把兩者徹底劃清界線？", "lock": "想想看，哪一個厚實的防禦性外殼是真菌和植物的專利，而我們動物細胞卻一輩子都不可能擁有的？", "explain": "嘿，各位同學！想像一下，如果我們想給黴菌（真菌）致命一擊，卻又不想傷到人類自己，我們要瞄準哪裡？沒錯，就是「細胞壁」！人類的細胞是軟綿綿、沒有外牆保護的；但真菌就像蓋了城堡一樣，最外圍有一層由幾丁質（chitin）和葡聚糖（glucan）組成的堅硬細胞壁。這就是為什麼許多抗真菌藥物都專門攻擊細胞壁的合成，因為人類根本沒有這玩意兒，打了安全又有效！至於選項 B 的細胞膜，真菌是用麥角固醇（ergosterol），人類是用膽固醇（cholesterol），雖然成分不同，但大家「都有」膜；而選項 C 細胞核和選項 D 粒線體，大家都是真核生物家族的成員，這些構造當然大家都有囉！", "what": "真菌與哺乳類動物細胞在結構上的根本差異（真菌有細胞壁，而人類沒有）。", "trap": "很多同學會把「細胞膜（真菌含有獨特的麥角固醇）」跟「細胞壁」混淆，雖然兩者都是抗真菌藥物的靶點，但人類是「完全沒有細胞壁」的，這才是最巨大的「有無」之差！", "level": 5}, {"no": 14, "source": "108-2", "cognitive": "應用", "difficulty": "中", "stem": "下列何種真菌感染，不建議以氟康唑（fluconazole）來治療？", "options": {"A": "白色念珠菌（Candida albicans）", "B": "杜氏假絲念珠菌（Candida dubliniensis）", "C": "克魯斯念珠菌（Candida krusei）", "D": "近平滑假絲念珠菌（Candida parapsilosis）"}, "answer": "C", "ask": "哪一種念珠菌天生骨骼奇特，根本不怕我們最常用的抗真菌一線藥物氟康唑？", "compare": "白色念珠菌、杜氏和近平滑念珠菌通常對氟康唑還算聽話，但選項中哪一個惡名昭彰的異類打從出生起就把氟康唑當開水喝？", "lock": "當你在檢驗報告上看到哪一隻念珠菌時，必須立刻把氟康唑丟進垃圾桶、改換其他後線抗真菌藥？", "explain": "同學們，這題可是臨床微生物學的超級常考題！我們要認識的抗真菌藥叫做氟康唑（fluconazole），它就像是醫學界對付念珠菌（Candida）的「平民神油」，便宜、好用、副作用少，絕大多數的念珠菌（像是 A 的白色念珠菌、B 的杜氏念珠菌、D 的近平滑念珠菌）碰到它，基本上都會乖乖束手就擒。但是！念珠菌家族裡偏偏出了一個超級大叛逆，那就是克魯斯念珠菌（Candida krusei）！這傢伙天生骨骼奇特，對氟康唑有「天生的（intrinsic）抗藥性」，氟康唑對它來說就像含糖飲料一樣毫無殺傷力。所以如果病患感染了克魯斯念珠菌，你還傻傻地開氟康唑，那就等於是請它喝下午茶，完全沒效果喔！這時候我們得趕快請出棘白菌素類（echinocandins）或兩性黴素B（amphotericin B）來救場才行！", "what": "考驗考生是否清楚念珠菌屬（Candida）中，哪一個特定菌種對常用抗真菌藥氟康唑（fluconazole）具有天生的抗藥性。", "trap": "很多同學會覺得「反正都是念珠菌，應該用同一種藥都會有效吧？」這種偷懶的想法在國考最容易踩雷！一定要特別記住，克魯斯念珠菌（C. krusei）是天生的氟康唑終結者，絕對不能用它來治療！", "level": 6}, {"no": 15, "source": "109-1", "cognitive": "應用", "difficulty": "易", "stem": "有關以念珠菌呈色培養基（CHROMagar Candida）做鑑別培養上的敘述何者錯誤？", "options": {"A": "通常可以鑑定出混合菌種感染", "B": "利用菌種代謝能力不同，產生不同顏色來鑑別", "C": "可以測試出菌種對藥物的感受性", "D": "通常含有抗細菌抗生素"}, "answer": "C", "ask": "念珠菌呈色培養基（CHROMagar）在臨床檢驗實驗室中，主要被設計來發揮什麼神奇功能？", "compare": "培養皿上長出五顏六色的菌落，這種「顯色」的化學反應是反映了菌種本身的代謝特性，還是揭示了它對藥物的耐受性？", "lock": "哪一個選項誤把「區分菌種身分（鑑別）」的能力，無限放大到連「能不能被藥物殺死（藥敏）」都能看出來的神奇地步？", "explain": "同學們，想像一下你開了一家專門給念珠菌（Candida）去的彩色派對！這個「CHROMagar Candida」就是一張超神奇的彩色地毯。不同的念珠菌因為體內擁有的酵素、代謝醣類的能力不同，吃飽喝足後就會吐出不同顏色的色素！像是大名鼎鼎的白色念珠菌（C. albicans）會呈現翠綠色，熱帶念珠菌（C. tropicalis）會呈現鋼藍色，而克柔念珠菌（C. krusei）則會呈現粉紅且毛茸茸的樣子。這就是選項B說的「利用代謝能力產生不同顏色來鑑別」。既然大家都變成了不同顏色，如果病人的檢體裡同時有兩種以上的念珠菌，我們一眼就能在培養皿上看到綠色和藍色混在一起，這不就輕易「鑑定出混合菌種感染」了嗎？（選項A蓋章通過）。為了不讓隔壁棚討厭的細菌跑來派對亂入，我們在培養基裡放點「抗細菌抗生素」也是非常合情合理的（選項D正確）。但是！這個培養基只能幫你「化妝認人」，它可沒有特異功能告訴你這隻菌抗不抗藥！要測藥物敏感性，我們得乖乖做 Etest 或微量稀釋法。所以選項C說它可以測藥物感受性，簡直是把它的功能捧得太高啦，這題錯得最離譜的就是它！", "what": "考念珠菌呈色培養基（CHROMagar Candida）的原理、功能及其在臨床微生物鑑定上的限制。", "trap": "考生常把「鑑別培養基（Differential medium）」與「藥敏測試（Susceptibility test）」混淆。呈色培養基是利用酵素與受質反應顯色來『辨識菌種』，完全無法用來評估病原菌對抗真菌藥物的感受性或抗藥性！", "level": 7}, {"no": 16, "source": "109-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "Azole 類抗黴菌劑的作用機轉是：", "options": {"A": "抑制細胞膜生成", "B": "抑制蛋白質合成", "C": "抑制細胞壁生成", "D": "抑制核酸合成"}, "answer": "A", "ask": "當我們把 Azole 類這顆藥彈投向真菌時，它在真菌體內引爆並摧毀的究竟是哪一個維生構造？", "compare": "真菌細胞外圍的『細胞壁』與內側的『細胞膜』，分別是用什麼獨特的化學成分搭建起來的？", "lock": "既然已知 Azole 類藥物是透過阻斷『麥角固醇』的生合成來搞破壞，那麼這會直接導致哪一個構造無法順利組裝？", "explain": "同學們，想像一下真菌這隻小壞蛋要蓋它的防護罩——細胞膜。對真菌來說，『麥角固醇』（ergosterol）就像是它們細胞膜上的核心鋼筋，沒有它，細胞膜就會軟趴趴。而我們的 Azole 類藥物，就像是個狡猾的『斷供大師』，專門去抑制合成麥角固醇的關鍵酵素。沒有了麥角固醇，真菌的細胞膜就像豆腐渣工程一樣瞬間瓦解，裡面的東西漏光光，真菌就只能跟世界說拜拜了！至於其他選項，抑制細胞壁的是棘白菌素類（Echinocandins）；抑制核酸合成的則是 Flucytosine。所以，記住 Azole 就是專門給細胞膜斷糧的冷血殺手！", "what": "考抗真菌藥物（Antifungals）的分類與其作用靶點，特別是 Azole 類藥物的機轉。", "trap": "考生最常把『細胞膜』和『細胞壁』這兩道防線搞混！真菌兩者都有，但 Azole 類對付的是細胞膜（麥角固醇），而 Echinocandins 類（如 Caspofungin）對付的才是細胞壁（β-glucan），進考場前一定要把這兩大主力藥物分清楚！", "level": 8}, {"no": 17, "source": "109-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "Caspofungin用於治療黴菌感染，下列何者為其作用機轉？", "options": {"A": "抑制核酸合成", "B": "改變細胞膜的滲透性", "C": "抑制麥角固醇（ergosterol）的合成", "D": "抑制細胞壁生成"}, "answer": "D", "ask": "Caspofungin 這種藥物，究竟是攻擊真菌的哪一個特定構造，才能達到殺死病原菌的效果？", "compare": "破壞真菌最外層用來抵擋外界壓力、維持形狀的堅硬外殼，跟干擾控制物質進出的細胞膜屏障，這兩者在藥物設計的靶點上該如何區分？", "lock": "既然 Caspofungin 作為棘白菌素類藥物，其臨床機轉是阻斷 β-1,3-D-葡聚醣的合成，而這項核心成分正是組成真菌哪一個保護結構的關鍵鋼筋？", "explain": "哈囉同學們！今天我們來聊聊抗真菌藥界的「拆牆大師」——Caspofungin（卡泊芬淨）！這傢伙屬於 Echinocandins（棘白菌素類）家族。你知道真菌跟我們人類細胞最大的差別是什麼嗎？就是它們多了一層厚厚的「細胞壁」來保護自己！Caspofungin 聰明的地方，就在於它專門去抑制真菌細胞壁上的重要成分 β-1,3-D-glucan（β-1,3-D-葡聚醣）的合成。沒有了牆壁保護，真菌就像沒穿盔甲一樣，經不起滲透壓的變化就直接爆開死掉了！至於其他落選者：(A) 抑制核酸合成是 Flucytosine 的拿手好戲；(B) 改變細胞膜滲透性是 Amphotericin B 這種多烯類藥物在細胞膜上打洞的傑作；(C) 抑制麥角固醇合成則是 Azoles 類（如 Fluconazole）的主場。所以，看到 Caspofungin，就要立刻聯想到「拆牆（細胞壁）」喔！", "what": "考驗常用抗真菌藥物（特別是棘白菌素類 Echinocandins）的分子作用機轉與攻擊靶點。", "trap": "考生最常把「抑制細胞膜上的麥角固醇合成（C）」與「抑制細胞壁合成（D）」搞混！請牢記，細胞膜（Membrane）與細胞壁（Wall）是真菌兩道完全不同的防線，Caspofungin 是專門拆「牆」而不是破壞「膜」的！", "level": 9}, {"no": 20, "source": "110-1", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "下列何種酵素與麴菌屬（Aspergillus）之毒性無關？", "options": {"A": "彈性蛋白酶", "B": "葉酸酶", "C": "磷脂酶", "D": "過氧化氫酶"}, "answer": "B", "ask": "麴菌在入侵人體並對抗宿主免疫系統時，需要派出哪些酵素作為主動攻擊的化學武器或防護盾牌？", "compare": "破壞肺部彈性纖維、溶解細胞膜以及分解白血球釋放的雙氧水殺手，分別對應到選項中的哪些酵素？", "lock": "哪一個酵素主要參與真菌內部的維生素代謝，而非被釋放到胞外去撕裂人體組織或阻擋免疫細胞的致命攻擊？", "explain": "嘿，同學們！今天我們來聊聊「麴菌（Aspergillus）」這個大壞蛋。它要入侵我們的身體，手裡沒帶點「破壞性武器」怎麼行？選項中的 A、C、D 就是它最得意的三大神兵利器！首先，肺部組織充滿了彈性纖維，麴菌分泌「彈性蛋白酶（Elastase）」（選項 A）就像拿著電鋸，能輕鬆鋸開肺部組織，方便它開疆闢土；而細胞膜的主要成分是磷脂質，它分泌「磷脂酶（Phospholipase）」（選項 C）就像強酸一樣，能直接融化宿主的細胞膜；當我們的免疫細胞（如嗜中性白血球）吐出過氧化氫（也就是雙氧水）想殺死它時，它還配備了「過氧化氫酶（Catalase）」（選項 D）這面防彈盾牌，把雙氧水分解成無害的水和氧氣！至於選項 B 的「葉酸酶」呢？葉酸是細胞生長的基本營養素，參與真菌自身的基礎代謝，並不是用來攻擊宿主或抵禦免疫攻擊的「毒性/致病酵素」。所以，這題跟毒性無關的當然就是 B 啦！", "what": "考驗你對麴菌（Aspergillus）致病機轉中，各種「分泌型毒性酵素（Virulence enzymes）」生理功能的掌握度。", "trap": "很多同學會把「維持生存所需的代謝酶」和「主動攻擊的毒性酶」混為一談。葉酸代謝雖然對真菌活下去很重要，但它屬於細胞內的基本營養合成，跟主動撕裂宿主組織或對抗免疫系統的「武器」是兩碼子事喔！", "level": 10}, {"no": 21, "source": "110-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "有關真菌的敘述，下列何者錯誤？", "options": {"A": "化合異營生物（chemoheterotroph），且不含葉綠素", "B": "單細胞或多細胞生物", "C": "可行無性或有性生殖", "D": "沒細胞核，但有細胞壁"}, "answer": "D", "ask": "我們該如何從真菌的細胞結構、營養方式和繁殖特徵中，抓出哪一個敘述悄悄抹殺了它身為「真核生物」的尊嚴？", "compare": "單細胞的酵母菌與多細胞的黴菌在生殖方式上，與體內有沒有葉綠素、能不能行光合作用有什麼關聯？", "lock": "既然真菌的名字裡有個「真」字，代表它是真核生物，那麼它到底有沒有攜帶遺傳物質的細胞核呢？", "explain": "同學們，大家千萬別把「真菌」跟「細菌」搞混囉！真菌（像是我們常吃的香菇、麵包上的黴菌、甚至是釀酒的酵母菌）可是非常高級的「真核生物」。既然叫做「真」核，就代表人家發育完全，擁有一個被核膜包裹得漂漂亮亮的「真細胞核」！選項 D 居然說真菌「沒細胞核」，這簡直是太看不起真菌了，那是細菌（原核生物）才有的特徵啦！至於其他選項：選項 A，真菌沒有葉綠素，不能像植物一樣行光合作用，只能靠吸收現成的有機物維生，這就叫化合異營；選項 B，酵母菌是單細胞，黴菌和菇菇是多細胞，這完全沒錯；選項 C，真菌在環境好時喜歡無性生殖快速複製，環境不好時就來個有性生殖增加基因多樣性，也是對的。所以，錯誤的選項就是 D 囉！", "what": "辨識真菌（真核生物）與細菌（原核生物）在細胞結構與生理特徵上的根本差異。", "trap": "考生常因為真菌和細菌一樣「都有細胞壁」，就直覺地把真菌當成原核生物。請牢記：真菌是「真核生物」，它不僅有細胞核，它的細胞壁成分還是「幾丁質」（Chitin），跟細菌的肽聚醣完全不同！", "level": 11}, {"no": 22, "source": "110-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "主要抑制麥角固醇（ergosterol）合成有關之抗真菌藥物為何？", "options": {"A": "Polyenes 及 Azoles", "B": "Echinocandins", "C": "Azoles 及 Fluorocytosine", "D": "Polyenes 及 Echinocandins"}, "answer": "A", "ask": "真菌細胞膜上最核心的防禦成分是什麼，而哪些藥物又是專門針對這個成分來進行打擊的？", "compare": "專門在真菌細胞膜上搞破壞的藥物，與專門阻斷「細胞壁」合成的藥物，在作用靶點上有著什麼樣的根本差異？", "lock": "當我們排除掉影響細胞壁合成的 Echinocandins，以及干擾核酸合成的 Fluorocytosine 後，剩下哪一組藥物組合才是完完全全衝著麥角固醇而來的？", "explain": "哈囉各位同學！今天我們來聊聊怎麼把真菌的家給抄了！真菌這傢伙跟我們人類最不一樣的地方，就是牠們的細胞膜上有一種獨特的靈魂成分叫「麥角固醇（ergosterol）」，這簡直就是牠們維持生命力的護身符。我們聰明的科學家當然不會放過這個弱點，開發出了兩大殺手：第一位是 Azoles（唑類），牠們像斷糧官一樣，直接「抑制合成」讓真菌做不出麥角固醇；第二位是 Polyenes（多烯類，如 Amphotericin B），牠們更粗暴，直接黏上去在膜上「開洞」讓真菌洩氣。雖然一個是攔截合成、一個是破壞成品，但牠們兩位都與麥角固醇的生老病死密不可分！至於 Echinocandins 則是去拆外牆（真菌細胞壁）的，而 Fluorocytosine 是潛入內部干擾核酸（DNA）合成的，兩者都跟麥角固醇沒關係。所以看到麥角固醇相關的藥物，鎖定 Polyenes 和 Azoles 的黃金組合就對啦！", "what": "抗真菌藥物（Antifungal drugs）的作用機制分類，特別是針對真菌細胞膜特有成分麥角固醇（ergosterol）的藥物類型。", "trap": "很多考生會把 Polyenes（多烯類）和 Azoles（唑類）的作用機轉混為一談。請記住：Azoles 是阻斷「合成」的幕後黑手，而 Polyenes 是直接「結合」並在細胞膜上開洞的暴力分子，兩者手段不同，但靶點都跟麥角固醇有關！另外，千萬別把針對「細胞壁」的 Echinocandins 也算進來喔！", "level": 12}, {"no": 25, "source": "112-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "黴菌結構及生理特性的敘述，下列何者正確？", "options": {"A": "原核生物", "B": "不能行光合作用", "C": "具胜糖（peptidoglycan）細胞壁", "D": "具 penicillin 感受性"}, "answer": "B", "ask": "黴菌在生物界的分類中，到底屬於哪一個大家族，又有哪些與生俱來的獨特生理特徵呢？", "compare": "植物、細菌與真菌在細胞壁成分和獲取能量的方式上，有著怎樣的分水嶺？青黴素（penicillin）的攻擊標靶在真菌身上找得到嗎？", "lock": "哪一個生理特性是真菌既不屬於植物（沒葉綠體），又不屬於細菌（不是原核生物、無肽聚醣）的終極鐵證？", "explain": "同學們好！一講到「黴菌（真菌）」，很多人一看到名字裡有個「菌」字，就把它跟細菌搞混，這可是大錯特錯啊！真菌其實比細菌高級多了，它們跟我們人類一樣，都是擁有完整細胞核的「真核生物」，所以選項 A 直接淘汰！既然它是真核生物，它的細胞壁總該跟細菌不一樣吧？沒錯！細菌的細胞壁是用「肽聚醣（peptidoglycan）」做的，但真菌的細胞壁主要是「幾丁質（chitin）」和「葡聚醣」，所以選項 C 也錯了。既然真菌沒有肽聚醣，那專門破壞肽聚醣的抗生素——盤尼西林（penicillin），對真菌來說根本就是不痛不癢，選項 D 也是錯的。最後，真菌雖然長得有點像植物，但它們「沒有葉綠體」，絕對「不能行光合作用」，只能當個默默吸收別人營養的異營生物，因此選項 B 是無庸置疑的正確答案啦！", "what": "真菌（黴菌）的基本生理結構與細菌、植物在細胞分類學上的本質差異。", "trap": "千萬不要因為「菌」字就把真菌當成原核生物！真菌是真核生物，其細胞壁成分（幾丁質）與藥物感受性（對細菌抗生素不敏感）都與細菌完全不同。", "level": 13}, {"no": 30, "source": "114-3", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "有關真菌分類以及其細胞結構，下列敘述何者最不適當？", "options": {"A": "真菌屬於真核生物，具有粒線體等胞器", "B": "真菌細胞膜含有固醇成份，並為部份抗真菌劑的作用標的", "C": "真菌具有細胞壁結構，其主要成份為胜肽聚糖", "D": "真菌具有細胞核"}, "answer": "C", "ask": "真菌作為一個真核生物，它在演化分類上的定位以及細胞膜、細胞壁等結構，具有哪些獨特的生物學特徵？", "compare": "胜肽聚糖（peptidoglycan）與幾丁質（chitin）分別是哪兩大類不同微生物用來建造細胞壁的專屬材料？", "lock": "既然真菌是高等的真核生物，而胜肽聚糖是原核細菌防護罩的專利，哪一個選項把這兩個井水不犯河水的構造強行綁在一起了？", "explain": "嗨，各位同學！今天我們來聊聊「真菌」這個大家族。很多人常把真菌跟細菌搞混，但其實真菌跟我們人類還比較算親戚呢！因為真菌跟我們一樣，都是「真核生物」，擁有完整的細胞核（選項D正確），細胞內也有粒線體等胞器幫忙發電（選項A正確）。再來看看它們的細胞膜，我們哺乳動物的細胞膜含有膽固醇，而真菌則含有「麥角固醇（ergosterol）」，這可是許多抗真菌藥物（例如：Amphotericin B、Azole類）專門攻擊的標靶喔（選項B正確）。那最不適當的選項C錯在哪裡呢？真菌雖然也有細胞壁，但它們的防護衣成分是「幾丁質（chitin）」和「葡聚糖（glucan）」，絕對不是「胜肽聚糖」！「胜肽聚糖」是隔壁棚「細菌（原核生物）」的專屬招牌。真菌要是聽到你說它身上有胜肽聚糖，可是會氣到直搖頭的呀！", "what": "真菌（真核生物）與細菌（原核生物）在細胞結構與細胞壁化學成分上的本質差異。", "trap": "考生最常把「有細胞壁」的生物通通混為一談！請務必記住黃金公式：細菌細胞壁＝「胜肽聚糖」；真菌細胞壁＝「幾丁質、葡聚糖」；植物細胞壁＝「纖維素」，千萬別跨界亂點鴛鴦譜喔！", "level": 14}]}, {"title": "第二區：表淺與皮膚黴菌病", "stars": "★★★★★", "intro": "這一區重點是感染位置：角質層、毛髮、指甲。題目常用 tinea、皮癬菌三屬與黑癬/花斑癬來設陷阱。", "cram": ["表淺/皮膚黴菌病多在角質層、毛髮、指甲，不是深部器官感染。", "皮癬菌三大屬：Trichophyton、Microsporum、Epidermophyton。", "tinea pedis 是足癬；tinea capitis 是頭癬；tinea unguium 是甲癬。"], "concepts": [{"title": "表淺與皮膚黴菌病", "plain": "表淺與皮膚黴菌病主要侵犯角質層、毛髮、指甲，通常不深入活組織。", "analogy": "生活比喻：建議用「病原特性 -> 傳播途徑 -> 臨床表現 -> 診斷/防治」四欄整理。", "mechanism": "皮癬菌利用角質蛋白生長，因此常造成足癬、頭癬、體癬、甲癬等。", "focus": "看到 tinea、皮膚毛髮指甲、dermatophytes，要先想到表淺/皮膚黴菌病。", "confusion": "表淺性黴菌病與皮膚黴菌病位置接近，但分類上仍要注意題目問的是 superficial 還是 cutaneous。", "table": {"title": "表淺、皮膚、皮下、系統性黴菌病比較", "headers": ["項目", "表淺/皮膚", "皮下", "系統性", "伺機性"], "rows": [["主要位置", "角質層、毛髮、指甲", "皮下組織", "肺部與全身", "依宿主弱點"], ["入口線索", "接觸/角質", "外傷接種", "吸入孢子", "免疫低下/屏障破壞"], ["代表病原", "皮癬菌", "Sporothrix 等", "Histoplasma 等", "Candida/Aspergillus/Cryptococcus/Mucor"], ["國考文字陷阱", "tinea 不等於深部感染", "外傷慢性病灶", "吸入分生孢子", "宿主條件是關鍵"]]}}, {"title": "表淺性黴菌病", "plain": "表淺性黴菌病是第十六章真菌學需要能辨認的名詞；讀它時請先抓病原類別、感染位置、宿主條件與代表考點。", "analogy": "像替真菌病原做名牌：名 真菌學需要能辨認的名詞；讀它時請先抓病原類別、感染位置、宿主條件與代表考點。", "analogy": "像替真菌病原做名牌：名字、住在哪裡、常找誰麻煩、用什麼線索抓到它。", "mechanism": "先判斷它屬於真菌結構、檢驗工具、表淺/皮下/系統性/伺機性感染，並連到題幹給的臨床線索。", "focus": "國考常以英文名、感染部位、宿主條件、檢驗或治療靶點來考辨認。", "confusion": "黃麴菌不要只背中文名；要和英文名、感染位置與代表題眼一起記。"}, {"title": "黃麴毒素", "plain": "黃麴毒素是第十六章真菌學需要能辨認的名詞；讀它時請先抓病原類別、感染位置、宿主條件與代表考點。", "analogy": "像替真菌病原做名牌：名字、住在哪裡、常找誰麻煩、用什麼線索抓到它。", "mechanism": "先判斷它屬於真菌結構、檢驗工具、表淺/皮下/系統性/伺機性感染，並連到題幹給的臨床線索。", "focus": "國考常以英文名、感染部位、宿主條件、檢驗或治療靶點來考辨認。", "confusion": "黃麴毒素不要只背中文名；要和英文名、感染位置與代表題眼一起記。"}, {"title": "新形隱球菌", "plain": "新形隱球菌常和鴿糞、莢膜、黴菌性腦膜炎連在一起。", "analogy": "像替真菌病原做名牌：名字、住在哪裡、常找誰麻煩、用什麼線索抓到它。", "mechanism": "吸入後可造成肺部感染，也可播散至中樞神經，免疫低下者風險更高。", "focus": "鴿糞＋腦膜炎＋capsule，是鎖定 Cryptococcus neoformans 的三連線索。", "confusion": "雖然免疫低下者高風險，但題目若說只會感染免疫缺失者，通常太絕對。"}, {"title": "白黴菌病", "plain": "白黴菌病是第十六章真菌學需要能辨認的名詞；讀它時請先抓病原類別、感染位置、宿主條件與代表考點。", "analogy": "像替真菌病原做名牌：名字、住在哪裡、常找誰麻煩、用什麼線索抓到它。", "mechanism": "先判斷它屬於真菌結構、檢驗工具、表淺/皮下/系統性/伺機性感染，並連到題幹給的臨床線索。", "focus": "國考常以英文名、感染部位、宿主條件、檢驗或治療靶點來考辨認。", "confusion": "白黴菌病不要只背中文名；要和英文名、感染位置與代表題眼一起記。"}, {"title": "鼻腦接合菌症", "plain": "鼻腦接合菌症是重症伺機性黴菌感染，常見於糖尿病，特別是控制不佳或酮酸中毒情境。", "analogy": "像替真菌病原做名牌：名字、住在哪裡、常找誰麻煩、用什麼線索抓到它。", "mechanism": "接合菌可侵犯血管造成組織壞死，病程可快速且危險。", "focus": "Rhinocerebral zygomycosis 最常考糖尿病病人。", "confusion": "不要看到伺機感染就只想到 AIDS；鼻腦接合菌症的典型線索是糖尿病。"}, {"title": "接合子菌門", "plain": "接合子菌門是第十六章真菌學需要能辨認的名詞；讀它時請先抓病原類別、感染位置、宿主條件與代表考點。", "analogy": "像替真菌病原做名牌：名字、住在哪裡、常找誰麻煩、用什麼線索抓到它。", "mechanism": "先判斷它屬於真菌結構、檢驗工具、表淺/皮下/系統性/伺機性感染，並連到題幹給的臨床線索。", "focus": "國考常以英文名、感染部位、宿主條件、檢驗或治療靶點來考辨認。", "confusion": "接合子菌門不要只背中文名；要和英文名、感染位置與代表題眼一起記。"}], "gameQuestions": [{"no": 1, "source": "105-1", "cognitive": "應用", "difficulty": "中", "stem": "一位已治癒的肺結核病人因咳血住院，胸部 X 光顯示有一可改變位置的真菌球（Fungus ball），開刀病理 標本最可能是：", "options": {"A": "Candidisis（念珠菌症）", "B": "Aspergillosis（麴黴菌症）", "C": "Zycomycosis（接合菌症）", "D": "Cryptococcosis（隱球菌症）"}, "answer": "B", "ask": "肺結核治癒後在肺部留下的空洞，最容易吸引哪種真菌搬進去定居，並揉成一顆會隨體位滾動的球狀物？", "compare": "同樣是肺部真菌感染，哪一種是以侵襲血管、造成組織快速壞死為主，而哪一種則偏好在現成的空腔裡安靜地聚集成團、形成能自由移動的球體？", "lock": "結合「既往肺結核空洞」與「胸部 X 光下會滾動的真菌球」這兩個黃金臨床特徵，哪一個病原體是這類臨床表現的絕對代言人？", "explain": "同學們，這題根本是臨床上的「經典大戲」啊！想像一下，這位病人以前得過肺結核，雖然治好了，但結核桿菌在肺部留下了空空的「舊公寓」（也就是空洞 Cavity）。這時候，空氣中飄呀飄的麴黴菌（Aspergillus）孢子被吸入肺部，發現「哇！這裡有現成的豪宅，還免房租！」於是就在裡面安營紮寨，把菌絲、細胞碎屑和血塊揉在一起，做成一顆紮實的「真菌球（Fungus ball / Aspergilloma）」。因為這顆球只是「寄居」在空洞裡，沒有跟周邊組織黏死，所以當病人翻身或換姿勢時，這顆球就會像碗裡的貢丸一樣滾來滾去！它在空洞裡不斷摩擦、刺激血管，就會導致病人咳血。至於其他壞傢伙：A選項念珠菌（Candida）通常是黏膜表淺感染（像鵝口瘡），不會在肺裡揉貢丸；C選項接合菌（Zygomycetes）是個暴力的血管侵襲狂，專門造成組織壞死，沒這閒情逸致在空洞裡滾動；D選項隱球菌（Cryptococcus）則以厚厚莢膜聞名，最愛去腦膜鬧事。因此，愛住舊空洞又愛滾動的真菌球，絕對是麴黴菌症（Aspergillosis）的傑作！", "what": "考麴黴菌（Aspergillus）在既有肺部空洞中形成「真菌球（Aspergilloma）」的臨床與影像學特徵。", "trap": "考生容易看到「咳血」和「空洞」就誤以為是結核菌復發，或者是把所有真菌感染都混為一談；請務必記住，「可改變位置的真菌球」是麴黴菌專屬的超級考點！", "level": 1}, {"no": 2, "source": "105-2", "cognitive": "應用", "difficulty": "中", "stem": "鼻腦接合菌症（Rhinocerebral zygomycosis）主要發生在何種病人？", "options": {"A": "愛滋病", "B": "糖尿病", "C": "毒癮患者", "D": "早產兒"}, "answer": "B", "ask": "哪一種特定疾病的病理生理環境，會剛好提供接合菌最愛的高糖、酸性且富含游離鐵的完美生長溫床？", "compare": "愛滋病、糖尿病、毒癮與早產兒雖然都屬於免疫力較弱的族群，但哪一個族群的血液中會特有「高血糖」與「酮酸中毒」的化學特性，從而強烈吸引接合菌的入侵？", "lock": "結合臨床醫學常識，哪一種代謝性疾病的急性併發症會導致酸中毒，並使病患成為鼻腦接合菌症最典型、最常被拿來考的危險群？", "explain": "各位同學！想像一下，如果有一種黴菌，牠平常乖乖的，但只要看到「高糖分、酸性環境加鐵質滿滿」的自助餐，就會像餓死鬼投胎一樣瘋狂暴走，這就是我們的「接合菌（Zygomycetes，如毛黴菌 Mucor 或根黴菌 Rhizopus）」。而糖尿病患——特別是控制不好、發生酮酸中毒（DKA）的病人，他們的身體剛好就是這家頂級自助餐的所在地！這群菌菌會從鼻腔黏膜一路往上吃到大腦，造成進展極快、致死率極高的「鼻腦接合菌症」。至於愛滋病（A選項）比較常遇到的是新型隱球菌或肺囊蟲；毒癮患者（C選項）和早產兒（D選項）雖然免疫力也差，但他們體內沒有那種「又酸又甜」的特殊環境，不是接合菌的最愛。記住，接合菌就是個「高血糖、酸性控」，所以答案非糖尿病莫屬啦！", "what": "考驗接合菌（Zygomycetes）的易感宿主，特別是其與「糖尿病酮酸中毒（DKA）」的高度臨床相關性。", "trap": "很多同學一看到「伺機性真菌感染」或「免疫低下」，就會不由自主地反射性去選愛滋病（AIDS）。千萬別掉入這個直覺陷阱！雖然愛滋病患免疫力很差，但「鼻腦接合菌症」在醫學界是公認跟「糖尿病（酸中毒）」死死綁定在一起的超經典明星考點！", "level": 2}, {"no": 3, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "白色念珠菌（", "options": {"A": "口腔", "B": "腸胃道", "C": "albicans）為正常菌群，但若在下列何處發現時，表示已受感染？", "D": "尿道"}, "answer": "D", "ask": "白色念珠菌平時在我們身體哪些地方當個安分守己的乖乖牌，而一旦溜進哪個平常不該有它的神聖領域，就代表它已經越界作亂了？", "compare": "口腔、腸胃道和陰道這三個常與外界接觸的黏膜管道，跟平時應該保持高度潔淨的泌尿系統相比，誰才是不該出現真菌的防守禁區？", "lock": "結合上述黏膜定殖的特性，在臨床檢驗上，哪一個部位只要被驗出大量念珠菌，就必須直接判定為病理性的伺機性感染？", "explain": "哈囉，各位同學！今天我們要來聊聊「白色念珠菌（Candida albicans）」這隻平時看似溫和，但一逮到機會就想作怪的真菌。白色念珠菌其實是我們體內的「常駐居民」（正常菌群），它平常最喜歡待在我們的口腔（選項A）、腸胃道（選項B）還有女性的陰道（原本選項C的設計）裡面，跟大家和平共處。只要宿主免疫力正常，它們就只是安分守己的小房客。但是！「尿道」（選項D）可不是它們的合法遊樂場。泌尿系統在正常情況下應該是高度清潔、近乎無菌的。一旦在尿道或尿液中發現白色念珠菌的蹤跡，這絕對不是什麼『和平共處』，而是代表它已經越界、發起伺機性感染了！因此，在尿道發現它，就是已經受到感染的紅色警戒喔！", "what": "考驗白色念珠菌（Candida albicans）在人體內的正常定殖部位（正常菌群）與異常感染部位的區分。", "trap": "很多同學會因為聽過「陰道念珠菌感染」，就誤以為陰道不應該有念珠菌。其實，它平時就少量存在於陰道和口腔等黏膜中，屬於正常菌群的一部分，只有在菌相失衡時才會爆發成疾病；相反地，尿道平時是不容許它定殖的，驗出即代表感染，這點最容易被混淆！", "level": 3}, {"no": 6, "source": "107-1", "cognitive": "應用", "difficulty": "中", "stem": "威脅生命的擴散性念珠菌症（disseminated candidiasis）主要發生在何種病人？", "options": {"A": "愛滋病", "B": "糖尿病", "C": "接受類固醇治療的成人", "D": "惡性血液疾病並持續使用免疫抑制劑"}, "answer": "D", "ask": "哪一種免疫防線的崩潰，會讓原本乖乖待在黏膜的念珠菌直接殺進血液，引發最致命的全身性大造反？", "compare": "愛滋病毒攻擊的 T 細胞防線，與惡性血液疾病化療毀掉的嗜中性球防線，哪一個才是阻止黴菌入侵血液循環的關鍵終極大門神？", "lock": "結合臨床現場，哪一種病患會因為骨髓被惡性細胞佔據、加上化療與免疫抑制劑雙重打擊，面臨體內幾乎完全沒有「嗜中性球」可以抵禦黴菌的慘境？", "explain": "來，同學們！我們把「念珠菌（Candida）」想像成住在我們身體黏膜表面的「小流氓」。平常牠們不敢作亂，是因為我們體內有強大的「警衛隊」——其中最會對付黴菌的，就是「嗜中性球（Neutrophil）」。當惡性血液疾病（像是白血病）的病人接受了強烈的化療和免疫抑制劑治療時，他們的骨髓造血功能會被狠狠壓制，導致嗜中性球數量「斷崖式下跌」（Neutropenia）。沒有了這群第一線的警衛，念珠菌就會直接穿透黏膜屏障，大搖大擺地溜進血液，演變成致命的全身擴散性念珠菌症！至於選項 A（愛滋病），他們壞掉的是 T 細胞，這會讓他們容易得黏膜級的「鵝口瘡」，但因為嗜中性球還在，所以很少發生致命的血行擴散；選項 B（糖尿病）和選項 C（用類固醇）雖然也會降低免疫力，但都不會像選項 D 那樣把嗜中性球徹底「抄家」，因此風險遠低於選項 D！", "what": "考念珠菌在不同免疫低下狀態下的致病機轉，特別是「嗜中性球低下」與「致命性深部擴散感染」的因果關係。", "trap": "很多同學一看到「免疫力低下」和「威脅生命」，腦袋就反射性地選了最有名氣的「愛滋病（AIDS）」。但要記住：T 細胞缺陷（AIDS）主要導致「黏膜」感染；只有「嗜中性球嚴重低下」（惡性血癌化療後）才是黴菌「全身血管擴散」的超速通關密碼！", "level": 4}, {"no": 8, "source": "107-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "白色念珠菌（", "options": {"A": "菌絲型（mold form）", "B": "會出芽", "C": "albicans）的結構及生理特性，下列何者錯誤？", "D": "真核生物"}, "answer": "C", "ask": "白色念珠菌這個在我們身邊伺機而動的百變真菌，到底具備哪些不容妥協的生理與形態特徵？", "compare": "一般雙相性真菌在室溫與體溫下的變身規則，跟白色念珠菌這位「反向操作」的叛逆角色有何本質上的差異？", "lock": "當我們把這株菌放在 37°C 的溫暖人體環境中，它究竟會維持圓滾滾的酵母菌樣，還是會伸出具有侵略性的菌絲？", "explain": "哈囉各位同學！今天我們來聊聊真菌界的百變女王——白色念珠菌（Candida albicans）。首先，真菌是不折不扣的「真核生物」，所以選項 D 絕對沒錯；而她最常見的繁殖方式就是像吹氣球一樣「出芽生殖」，所以選項 B 也是對的。重點來了！一般我們背的「雙相性真菌」公式是「冷模熱酵」（25°C 呈菌絲/Mold 型、37°C 呈酵母菌/Yeast 型），但白色念珠菌偏偏是個「大反骨」！她在常溫（25°C）下是溫和的酵母菌型，一旦進到人體（37°C）或遇到血清，為了展現侵略性，反而會伸出長長的芽管與菌絲（Mold form）來鑽入組織！因此，說她在 25°C 是菌絲型、37°C 是酵母菌型的描述完全顛倒了，這就是我們要揪出來的錯誤選項 C！", "what": "考查白色念珠菌與眾不同的雙相性（冷酵熱絲）特徵及其基本生物學屬性。", "trap": "考生最容易把「一般雙相性真菌（25°C 菌絲、37°C 酵母）」的公式無腦套用。請務必記住，白色念珠菌是個例外，她是「熱的時候（37°C）才長菌絲」去搞破壞！", "level": 5}, {"no": 13, "source": "108-2", "cognitive": "應用", "difficulty": "中", "stem": "下列何種不是常見感染皮膚、毛髮及指甲（cutaneous mycoses）的黴菌？", "options": {"A": "隱球菌屬（Cryptococcus）", "B": "表皮癬菌屬（Epidermophyton）", "C": "小芽胞菌屬（Microsporum）", "D": "毛髮癬菌屬（Trichophyton）"}, "answer": "A", "ask": "哪些黴菌是專門啃食我們身上的角質、造成香港腳或灰指甲的「表皮部隊」，而哪一個又是走「深入內臟」路線的異類？", "compare": "啃食毛髮與皮膚的「表皮癬菌、小芽胞菌、毛髮癬菌」三劍客，和擁有厚厚莢膜、最愛侵犯腦部的「隱球菌」，在感染部位與生理特性上有何本質上的不同？", "lock": "哪一個選項的黴菌是以引起新型隱球菌腦膜炎聞名，而不是在皮膚表面作怪的皮癬菌？", "explain": "各位同學，這題其實是在考「皮膚癬菌三劍客」！我們皮膚、毛髮、指甲最怕的三種真菌就是：表皮癬菌（Epidermophyton）、小芽胞菌（Microsporum）和毛髮癬菌（Trichophyton）。這三位老兄專門分泌角質酶，把我們身上的角質（Keratin）當成美味的下午茶來啃。但是選項A的「隱球菌屬（Cryptococcus）」可就不是省油的燈了，它根本看不上粗糙的皮膚表面！它最愛坐著空氣溜滑梯吸入肺部，再一路衝向腦袋引起嚴重的腦膜炎，是一個有莢膜、走「內科重症路線」的酵母樣真菌。所以，隱球菌根本不是常見的表淺性皮膚感染黴菌啦！", "what": "區分皮膚癬菌（Dermatophytes）的三大常見屬與其他系統性感染真菌（如隱球菌）的臨床表現與致病部位差異。", "trap": "很多同學看到「毛髮癬菌」名字裡有毛髮就覺得很陌生，或者容易把「毛髮癬菌屬（Trichophyton）」與會造成嚴重免疫不全感染的「毛黴菌（Mucor）」搞混；請記住，會啃食皮毛角質的三劍客名字都非常直白（表皮、小芽胞、毛髮），而隱球菌則是走吸入性、系統性感染腦部的路線！", "level": 6}, {"no": 18, "source": "109-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種真菌會產生萌芽管（germ tube）？", "options": {"A": "白色念珠菌（Candida albicans）", "B": "光滑念珠菌（Candida glabrata）", "C": "克魯斯念珠菌（Candida krusei）", "D": "熱帶念珠菌 （Candida tropicalis）"}, "answer": "A", "ask": "當我們把真菌丟進溫暖的血清中培養時，哪一隻病原菌會最先伸出細長像尾巴一樣的結構來向我們打招呼？", "compare": "同樣是念珠菌家族的成員，白色念珠菌在形態轉換的能力上，跟光滑、克魯斯或熱帶念珠菌相比，有什麼獨一無二的快速變身特技？", "lock": "在臨床微生物鑑定中，哪一種念珠菌會因為在 37°C 血清中快速形成沒有縊縮的起始管狀突出物，而成為萌芽管試驗唯一的黃金陽性代表？", "explain": "嗨，同學們！今天我們要來聊聊念珠菌家族的「變身特技」！大家最熟悉的「白色念珠菌（Candida albicans）」就像是真菌界的百變怪，當我們把牠丟進血清裡、用 37°C 溫暖孵育 2 到 3 個小時之後，牠就會迫不及待地伸出一條細細長長、像尾巴一樣的「萌芽管（germ tube）」，這可是牠要轉化成具有侵襲性菌絲的前驅階段喔！這個「萌芽管試驗」在臨床上超級好用，因為它是白色念珠菌最具代表性的身分證。至於其他親戚呢？像是光滑念珠菌（C. glabrata）、克魯斯念珠菌（C. krusei）和熱帶念珠菌（C. tropicalis），牠們在血清裡泡再久也伸不出這種獨特的萌芽管，因此看到萌芽管，秒選白色念珠菌準沒錯！", "what": "白色念珠菌（Candida albicans）的關鍵鑑定特徵——萌芽管試驗（Germ tube test）。", "trap": "同學最常把「萌芽管（germ tube）」和一般的「假菌絲（pseudohyphae）」搞混。記住，萌芽管在與母細胞相連的基部是「完全沒有縊縮（no constriction）」的平滑管狀結構，而且只需要 2 到 3 小時就能快速形成，這是白色念珠菌獨步江湖的特徵！", "level": 7}, {"no": 19, "source": "110-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種特性不是白色念珠菌（Candida albicans）之主要致病因子？", "options": {"A": "能黏附組織", "B": "能合成黑色素", "C": "能分泌蛋白酶", "D": "能轉換表現型"}, "answer": "B", "ask": "白色念珠菌平時在我們體內作亂時，到底是靠哪些神兵利器來突破重圍、造成感染的？", "compare": "在黏附、變形、分泌酵素和製造黑色素這四個技能中，哪一個其實是新型隱球菌用來防禦宿主免疫細胞與氧化壓力的專屬黑科技？", "lock": "聯想一下，名字裡有「白色」的念珠菌，與哪一個聽起來黑漆漆、屬於隱球菌專利的化學物質最不搭嘎？", "explain": "同學們，這題考的是我們身體裡的常客——白色念珠菌（Candida albicans）！它可是個厲害的「變形金剛」兼「破壞王」。首先，它要成功感染，必須先黏在我們的上皮細胞上（選項A「黏附組織」），不然一下就被沖走了；接著，它會使出「化骨綿掌」，分泌蛋白酶（選項C）把我們的組織融化、破壞掉，好讓它能攻堂入室；最酷的是，它還會「七十二變」，在酵母型與菌絲型之間切換，甚至進行白/不透明表現型的轉換（選項D「轉換表現型」），來逃避我們免疫大軍的追捕！那「合成黑色素」是誰的招牌呢？那是「新型隱球菌」（Cryptococcus neoformans）的秘密武器，就像是它的抗UV防曬乳兼抗氧化盾牌。你想想，它都叫「白色」念珠菌了，怎麼會去合成「黑色」素來砸自己的招牌呢？所以答案選B！", "what": "白色念珠菌的核心致病機轉（毒力因子），以及它與新型隱球菌致病特徵的鑑別。", "trap": "考生容易把「所有真菌都有的防禦機制」混為一談。請牢記，「黑色素（Melanin）」是新型隱球菌（Cryptococcus neoformans）極具代表性的毒力因子，白色念珠菌是不會合成黑色素的喔！", "level": 8}, {"no": 23, "source": "110-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "關於新型隱球菌（Cryptococcus neoformans）的敘述，下列何者錯誤？", "options": {"A": "常在鴿子的糞便中被發現", "B": "會形成莢膜（capsule）", "C": "會引發黴菌性腦膜炎（fungal meningitis）", "D": "只會在免疫缺失的病患身上造成感染"}, "answer": "D", "ask": "當我們走在公園看到鴿子飛舞時，呼吸道可能會吸入什麼具有厚厚糖蛋白外衣、甚至一不小心就侵犯腦部的神經性真菌？這隻真菌在哪些人群中會展現牠的破壞力？", "compare": "鴿糞、巨大的莢膜、腦膜炎，這三個鮮明的特徵是哪隻真菌的專屬名片？難道身體強壯、免疫力正常的人類，就真的能拍胸脯保證絕對不會被這隻病原菌入侵嗎？", "lock": "哪些臨床案例顯示，即使是免疫功能健全的正常人，也可能因為暴露在污染環境中而發病？找出那個把感染範圍限制得太過絕對、忽略了健康人群感染可能性的選項吧！", "explain": "嗨，各位同學！今天我們要聊聊真菌界的「隱形殺手」——新型隱球菌。這傢伙最喜歡躲在哪裡呢？答案是：鴿子的糞便！廣場上的鴿子雖然可愛，但牠們的乾便便可是隱球菌的溫床，所以選項 A 完全正確。這隻真菌還有一個超級厚、像穿了羽絨衣一樣的「莢膜（capsule）」，這層莢膜就像是牠的防彈衣，能躲避我們免疫細胞的吞噬，所以選項 B 也是對的。一旦這隻菌從呼吸道被吸入，牠可不安分，最喜歡一路往上衝，穿過血腦屏障（BBB）跑到大腦去開派對，引起可怕的「黴菌性腦膜炎」，所以選項 C 也是對的。那為什麼 D 錯了呢？因為隱球菌雖然特別喜歡欺負免疫力低下的病人（如 HIV 患者），但牠其實是個「不挑食」的壞蛋，如果一般健康的人不小心吸入大量孢子，同樣也有可能會被感染喔！所以說「只會」在免疫缺失的人身上造成感染，就太小看牠了！", "what": "新型隱球菌（Cryptococcus neoformans）的關鍵病原特徵（莢膜、鴿糞傳播、腦膜炎）與臨床感染對象的廣泛性。", "trap": "看到「只會...」這種絕對性的字眼就要提高警覺！雖然隱球菌確實是愛滋病患等免疫低下者的常見伺機性感染源，但絕對不是正常人就完全免疫，健康人吸入高劑量依然可能發病。", "level": 9}, {"no": 24, "source": "111-2", "cognitive": "應用", "difficulty": "中", "stem": "下列何種黴菌常經由呼吸道感染？", "options": {"A": "麴菌屬（Aspergillus）", "B": "念珠菌屬（Candida）", "C": "著色芽生屬（Fonsecaea）", "D": "小芽胞菌屬（Microsporum）"}, "answer": "A", "ask": "當我們深吸一口氣時，空氣中飄散著哪一種黴菌的孢子，最容易順著氣管長驅直入我們溫暖的肺部？", "compare": "寄生在皮膚表層吃角質的小芽胞菌、需要靠針刺傷口才能鑽進皮下的著色芽生屬，與黏在黏膜上原地作亂的念珠菌，哪一個能像麴菌一樣在空氣中御風飛行、伺機被吸入體內？", "lock": "哪一個選項的黴菌以產生大量可在空氣中飄散的分生孢子聞名，且是造成免疫低下患者嚴重肺部伺機性感染的頭號嫌疑犯？", "explain": "同學們，這題其實是在考黴菌的「侵入路線」啦！想像一下，黴菌界也有不同的「交通工具」。首先，第一名得主【麴菌屬（Aspergillus）】，牠們最擅長的就是在空氣中釋放成千上萬的微小孢子，只要你深吸一口氣，這些孢子就會像沙塵暴一樣順著你的鼻腔、氣管，一路直達肺部。對於免疫力低下的病人來說，這簡直是致命的呼吸道殺手！那其他選項呢？【念珠菌屬（Candida）】其實是我們身體的常在菌（就像黏在身上的房客），牠們是在你免疫力變差時「原地作亂」，不需要靠呼吸道吸入。而【著色芽生屬（Fonsecaea）】則是土裡的隱士，通常是要靠園藝刺傷、皮膚傷口等「物理穿刺」才能混進皮下組織。最後，【小芽胞菌屬（Microsporum）】則是皮膚寄生蟲，專門在皮膚表面和毛髮上「吃角質」引起香港腳或頭癬，根本進不去呼吸道。所以，會隨風飄進呼吸道的，絕對非麴菌莫屬啦！", "what": "常見致病黴菌的傳播途徑與感染部位區分。", "trap": "別因為念珠菌（Candida）會引起口腔鵝口瘡，就直覺地把它歸類為呼吸道吸入感染。念珠菌是內源性機會感染源，而麴菌才是典型經由吸入環境孢子致病的黴菌！", "level": 10}, {"no": 26, "source": "112-3", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種黴菌較常存在於鴿糞中，且會造成腦膜炎？", "options": {"A": "白色念珠菌（Candida albicans）", "B": "申克氏孢子絲菌（Sporothrix schenckii）", "C": "黃色麴菌（Aspergillus flavus）", "D": "新型隱球菌（Cryptococcus neoformans）"}, "answer": "D", "ask": "當我們在大街上看到成群的鴿子拍打翅膀時，空氣中可能散播著哪種會一路鑽進人類腦袋、引起嚴重發炎的致命真菌？", "compare": "同樣都是會引起感染的真菌，哪一個是以植物刺傷為皮膚感染途徑，而哪一個又是以厚實的莢膜結構聞名並特別鍾愛中樞神經系統？", "lock": "結合「鴿子排泄物」與「腦膜炎」這兩個極具指標性的臨床特徵，哪一種真菌才是符合這兩項條件的唯一嫌疑犯？", "explain": "同學們，這題根本是國考送分題，看到「鴿糞」跟「腦膜炎」這兩個關鍵字，就像看到牛郎與織女一樣，絕對要立刻聯想到「新型隱球菌（Cryptococcus neoformans）」！新型隱球菌最喜歡躲在鴿子糞便裡，當乾燥的鴿糞隨風飄散時，我們一旦吸入這些帶有厚厚莢膜的孢子，它們就會在肺部落腳，甚至在免疫力差的人身上，跟著血液一路衝進大腦，造成嚴重的隱球菌腦膜炎。我們來看看其他陪榜的選手：(A) 白色念珠菌是我們身上的常駐菌，通常在免疫力低落時造成鵝口瘡或陰道炎，不是靠鴿糞傳播的；(B) 申克氏孢子絲菌則是「園丁的噩夢」，常躲在玫瑰花刺或土壤中，刺傷皮膚引發局部淋巴結病變，跟鴿子完全沒交集；(C) 黃色麴菌最愛在花生或堅果裡製造致癌的黃麴毒素，跟腦膜炎扯不上直接關係。所以，記住這個黃金三角公式：鴿子大便＝隱球菌＝腦膜炎！", "what": "考驗新型隱球菌（Cryptococcus neoformans）的傳播媒介（鴿糞）與其最典型致命的臨床疾病（腦膜炎）。", "trap": "千萬不要看到「黴菌」就混淆了它們的傳染途徑！只有具備肥厚莢膜、能躲過免疫細胞並跨越血腦屏障（BBB）的新型隱球菌，才是真菌界中與「鴿糞」及「腦膜炎」強烈掛鉤的頭號殺手。", "level": 11}], "questions": [{"no": 1, "source": "105-1", "cognitive": "應用", "difficulty": "中", "stem": "一位已治癒的肺結核病人因咳血住院，胸部 X 光顯示有一可改變位置的真菌球（Fungus ball），開刀病理 標本最可能是：", "options": {"A": "Candidisis（念珠菌症）", "B": "Aspergillosis（麴黴菌症）", "C": "Zycomycosis（接合菌症）", "D": "Cryptococcosis（隱球菌症）"}, "answer": "B", "ask": "肺結核治癒後在肺部留下的空洞，最容易吸引哪種真菌搬進去定居，並揉成一顆會隨體位滾動的球狀物？", "compare": "同樣是肺部真菌感染，哪一種是以侵襲血管、造成組織快速壞死為主，而哪一種則偏好在現成的空腔裡安靜地聚集成團、形成能自由移動的球體？", "lock": "結合「既往肺結核空洞」與「胸部 X 光下會滾動的真菌球」這兩個黃金臨床特徵，哪一個病原體是這類臨床表現的絕對代言人？", "explain": "同學們，這題根本是臨床上的「經典大戲」啊！想像一下，這位病人以前得過肺結核，雖然治好了，但結核桿菌在肺部留下了空空的「舊公寓」（也就是空洞 Cavity）。這時候，空氣中飄呀飄的麴黴菌（Aspergillus）孢子被吸入肺部，發現「哇！這裡有現成的豪宅，還免房租！」於是就在裡面安營紮寨，把菌絲、細胞碎屑和血塊揉在一起，做成一顆紮實的「真菌球（Fungus ball / Aspergilloma）」。因為這顆球只是「寄居」在空洞裡，沒有跟周邊組織黏死，所以當病人翻身或換姿勢時，這顆球就會像碗裡的貢丸一樣滾來滾去！它在空洞裡不斷摩擦、刺激血管，就會導致病人咳血。至於其他壞傢伙：A選項念珠菌（Candida）通常是黏膜表淺感染（像鵝口瘡），不會在肺裡揉貢丸；C選項接合菌（Zygomycetes）是個暴力的血管侵襲狂，專門造成組織壞死，沒這閒情逸致在空洞裡滾動；D選項隱球菌（Cryptococcus）則以厚厚莢膜聞名，最愛去腦膜鬧事。因此，愛住舊空洞又愛滾動的真菌球，絕對是麴黴菌症（Aspergillosis）的傑作！", "what": "考麴黴菌（Aspergillus）在既有肺部空洞中形成「真菌球（Aspergilloma）」的臨床與影像學特徵。", "trap": "考生容易看到「咳血」和「空洞」就誤以為是結核菌復發，或者是把所有真菌感染都混為一談；請務必記住，「可改變位置的真菌球」是麴黴菌專屬的超級考點！", "level": 1}, {"no": 2, "source": "105-2", "cognitive": "應用", "difficulty": "中", "stem": "鼻腦接合菌症（Rhinocerebral zygomycosis）主要發生在何種病人？", "options": {"A": "愛滋病", "B": "糖尿病", "C": "毒癮患者", "D": "早產兒"}, "answer": "B", "ask": "哪一種特定疾病的病理生理環境，會剛好提供接合菌最愛的高糖、酸性且富含游離鐵的完美生長溫床？", "compare": "愛滋病、糖尿病、毒癮與早產兒雖然都屬於免疫力較弱的族群，但哪一個族群的血液中會特有「高血糖」與「酮酸中毒」的化學特性，從而強烈吸引接合菌的入侵？", "lock": "結合臨床醫學常識，哪一種代謝性疾病的急性併發症會導致酸中毒，並使病患成為鼻腦接合菌症最典型、最常被拿來考的危險群？", "explain": "各位同學！想像一下，如果有一種黴菌，牠平常乖乖的，但只要看到「高糖分、酸性環境加鐵質滿滿」的自助餐，就會像餓死鬼投胎一樣瘋狂暴走，這就是我們的「接合菌（Zygomycetes，如毛黴菌 Mucor 或根黴菌 Rhizopus）」。而糖尿病患——特別是控制不好、發生酮酸中毒（DKA）的病人，他們的身體剛好就是這家頂級自助餐的所在地！這群菌菌會從鼻腔黏膜一路往上吃到大腦，造成進展極快、致死率極高的「鼻腦接合菌症」。至於愛滋病（A選項）比較常遇到的是新型隱球菌或肺囊蟲；毒癮患者（C選項）和早產兒（D選項）雖然免疫力也差，但他們體內沒有那種「又酸又甜」的特殊環境，不是接合菌的最愛。記住，接合菌就是個「高血糖、酸性控」，所以答案非糖尿病莫屬啦！", "what": "考驗接合菌（Zygomycetes）的易感宿主，特別是其與「糖尿病酮酸中毒（DKA）」的高度臨床相關性。", "trap": "很多同學一看到「伺機性真菌感染」或「免疫低下」，就會不由自主地反射性去選愛滋病（AIDS）。千萬別掉入這個直覺陷阱！雖然愛滋病患免疫力很差，但「鼻腦接合菌症」在醫學界是公認跟「糖尿病（酸中毒）」死死綁定在一起的超經典明星考點！", "level": 2}, {"no": 3, "source": "106-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "白色念珠菌（", "options": {"A": "口腔", "B": "腸胃道", "C": "albicans）為正常菌群，但若在下列何處發現時，表示已受感染？", "D": "尿道"}, "answer": "D", "ask": "白色念珠菌平時在我們身體哪些地方當個安分守己的乖乖牌，而一旦溜進哪個平常不該有它的神聖領域，就代表它已經越界作亂了？", "compare": "口腔、腸胃道和陰道這三個常與外界接觸的黏膜管道，跟平時應該保持高度潔淨的泌尿系統相比，誰才是不該出現真菌的防守禁區？", "lock": "結合上述黏膜定殖的特性，在臨床檢驗上，哪一個部位只要被驗出大量念珠菌，就必須直接判定為病理性的伺機性感染？", "explain": "哈囉，各位同學！今天我們要來聊聊「白色念珠菌（Candida albicans）」這隻平時看似溫和，但一逮到機會就想作怪的真菌。白色念珠菌其實是我們體內的「常駐居民」（正常菌群），它平常最喜歡待在我們的口腔（選項A）、腸胃道（選項B）還有女性的陰道（原本選項C的設計）裡面，跟大家和平共處。只要宿主免疫力正常，它們就只是安分守己的小房客。但是！「尿道」（選項D）可不是它們的合法遊樂場。泌尿系統在正常情況下應該是高度清潔、近乎無菌的。一旦在尿道或尿液中發現白色念珠菌的蹤跡，這絕對不是什麼『和平共處』，而是代表它已經越界、發起伺機性感染了！因此，在尿道發現它，就是已經受到感染的紅色警戒喔！", "what": "考驗白色念珠菌（Candida albicans）在人體內的正常定殖部位（正常菌群）與異常感染部位的區分。", "trap": "很多同學會因為聽過「陰道念珠菌感染」，就誤以為陰道不應該有念珠菌。其實，它平時就少量存在於陰道和口腔等黏膜中，屬於正常菌群的一部分，只有在菌相失衡時才會爆發成疾病；相反地，尿道平時是不容許它定殖的，驗出即代表感染，這點最容易被混淆！", "level": 3}, {"no": 6, "source": "107-1", "cognitive": "應用", "difficulty": "中", "stem": "威脅生命的擴散性念珠菌症（disseminated candidiasis）主要發生在何種病人？", "options": {"A": "愛滋病", "B": "糖尿病", "C": "接受類固醇治療的成人", "D": "惡性血液疾病並持續使用免疫抑制劑"}, "answer": "D", "ask": "哪一種免疫防線的崩潰，會讓原本乖乖待在黏膜的念珠菌直接殺進血液，引發最致命的全身性大造反？", "compare": "愛滋病毒攻擊的 T 細胞防線，與惡性血液疾病化療毀掉的嗜中性球防線，哪一個才是阻止黴菌入侵血液循環的關鍵終極大門神？", "lock": "結合臨床現場，哪一種病患會因為骨髓被惡性細胞佔據、加上化療與免疫抑制劑雙重打擊，面臨體內幾乎完全沒有「嗜中性球」可以抵禦黴菌的慘境？", "explain": "來，同學們！我們把「念珠菌（Candida）」想像成住在我們身體黏膜表面的「小流氓」。平常牠們不敢作亂，是因為我們體內有強大的「警衛隊」——其中最會對付黴菌的，就是「嗜中性球（Neutrophil）」。當惡性血液疾病（像是白血病）的病人接受了強烈的化療和免疫抑制劑治療時，他們的骨髓造血功能會被狠狠壓制，導致嗜中性球數量「斷崖式下跌」（Neutropenia）。沒有了這群第一線的警衛，念珠菌就會直接穿透黏膜屏障，大搖大擺地溜進血液，演變成致命的全身擴散性念珠菌症！至於選項 A（愛滋病），他們壞掉的是 T 細胞，這會讓他們容易得黏膜級的「鵝口瘡」，但因為嗜中性球還在，所以很少發生致命的血行擴散；選項 B（糖尿病）和選項 C（用類固醇）雖然也會降低免疫力，但都不會像選項 D 那樣把嗜中性球徹底「抄家」，因此風險遠低於選項 D！", "what": "考念珠菌在不同免疫低下狀態下的致病機轉，特別是「嗜中性球低下」與「致命性深部擴散感染」的因果關係。", "trap": "很多同學一看到「免疫力低下」和「威脅生命」，腦袋就反射性地選了最有名氣的「愛滋病（AIDS）」。但要記住：T 細胞缺陷（AIDS）主要導致「黏膜」感染；只有「嗜中性球嚴重低下」（惡性血癌化療後）才是黴菌「全身血管擴散」的超速通關密碼！", "level": 4}, {"no": 8, "source": "107-2", "cognitive": "記憶/辨識", "difficulty": "中", "stem": "白色念珠菌（", "options": {"A": "菌絲型（mold form）", "B": "會出芽", "C": "albicans）的結構及生理特性，下列何者錯誤？", "D": "真核生物"}, "answer": "C", "ask": "白色念珠菌這個在我們身邊伺機而動的百變真菌，到底具備哪些不容妥協的生理與形態特徵？", "compare": "一般雙相性真菌在室溫與體溫下的變身規則，跟白色念珠菌這位「反向操作」的叛逆角色有何本質上的差異？", "lock": "當我們把這株菌放在 37°C 的溫暖人體環境中，它究竟會維持圓滾滾的酵母菌樣，還是會伸出具有侵略性的菌絲？", "explain": "哈囉各位同學！今天我們來聊聊真菌界的百變女王——白色念珠菌（Candida albicans）。首先，真菌是不折不扣的「真核生物」，所以選項 D 絕對沒錯；而她最常見的繁殖方式就是像吹氣球一樣「出芽生殖」，所以選項 B 也是對的。重點來了！一般我們背的「雙相性真菌」公式是「冷模熱酵」（25°C 呈菌絲/Mold 型、37°C 呈酵母菌/Yeast 型），但白色念珠菌偏偏是個「大反骨」！她在常溫（25°C）下是溫和的酵母菌型，一旦進到人體（37°C）或遇到血清，為了展現侵略性，反而會伸出長長的芽管與菌絲（Mold form）來鑽入組織！因此，說她在 25°C 是菌絲型、37°C 是酵母菌型的描述完全顛倒了，這就是我們要揪出來的錯誤選項 C！", "what": "考查白色念珠菌與眾不同的雙相性（冷酵熱絲）特徵及其基本生物學屬性。", "trap": "考生最容易把「一般雙相性真菌（25°C 菌絲、37°C 酵母）」的公式無腦套用。請務必記住，白色念珠菌是個例外，她是「熱的時候（37°C）才長菌絲」去搞破壞！", "level": 5}, {"no": 13, "source": "108-2", "cognitive": "應用", "difficulty": "中", "stem": "下列何種不是常見感染皮膚、毛髮及指甲（cutaneous mycoses）的黴菌？", "options": {"A": "隱球菌屬（Cryptococcus）", "B": "表皮癬菌屬（Epidermophyton）", "C": "小芽胞菌屬（Microsporum）", "D": "毛髮癬菌屬（Trichophyton）"}, "answer": "A", "ask": "哪些黴菌是專門啃食我們身上的角質、造成香港腳或灰指甲的「表皮部隊」，而哪一個又是走「深入內臟」路線的異類？", "compare": "啃食毛髮與皮膚的「表皮癬菌、小芽胞菌、毛髮癬菌」三劍客，和擁有厚厚莢膜、最愛侵犯腦部的「隱球菌」，在感染部位與生理特性上有何本質上的不同？", "lock": "哪一個選項的黴菌是以引起新型隱球菌腦膜炎聞名，而不是在皮膚表面作怪的皮癬菌？", "explain": "各位同學，這題其實是在考「皮膚癬菌三劍客」！我們皮膚、毛髮、指甲最怕的三種真菌就是：表皮癬菌（Epidermophyton）、小芽胞菌（Microsporum）和毛髮癬菌（Trichophyton）。這三位老兄專門分泌角質酶，把我們身上的角質（Keratin）當成美味的下午茶來啃。但是選項A的「隱球菌屬（Cryptococcus）」可就不是省油的燈了，它根本看不上粗糙的皮膚表面！它最愛坐著空氣溜滑梯吸入肺部，再一路衝向腦袋引起嚴重的腦膜炎，是一個有莢膜、走「內科重症路線」的酵母樣真菌。所以，隱球菌根本不是常見的表淺性皮膚感染黴菌啦！", "what": "區分皮膚癬菌（Dermatophytes）的三大常見屬與其他系統性感染真菌（如隱球菌）的臨床表現與致病部位差異。", "trap": "很多同學看到「毛髮癬菌」名字裡有毛髮就覺得很陌生，或者容易把「毛髮癬菌屬（Trichophyton）」與會造成嚴重免疫不全感染的「毛黴菌（Mucor）」搞混；請記住，會啃食皮毛角質的三劍客名字都非常直白（表皮、小芽胞、毛髮），而隱球菌則是走吸入性、系統性感染腦部的路線！", "level": 6}, {"no": 18, "source": "109-2", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種真菌會產生萌芽管（germ tube）？", "options": {"A": "白色念珠菌（Candida albicans）", "B": "光滑念珠菌（Candida glabrata）", "C": "克魯斯念珠菌（Candida krusei）", "D": "熱帶念珠菌 （Candida tropicalis）"}, "answer": "A", "ask": "當我們把真菌丟進溫暖的血清中培養時，哪一隻病原菌會最先伸出細長像尾巴一樣的結構來向我們打招呼？", "compare": "同樣是念珠菌家族的成員，白色念珠菌在形態轉換的能力上，跟光滑、克魯斯或熱帶念珠菌相比，有什麼獨一無二的快速變身特技？", "lock": "在臨床微生物鑑定中，哪一種念珠菌會因為在 37°C 血清中快速形成沒有縊縮的起始管狀突出物，而成為萌芽管試驗唯一的黃金陽性代表？", "explain": "嗨，同學們！今天我們要來聊聊念珠菌家族的「變身特技」！大家最熟悉的「白色念珠菌（Candida albicans）」就像是真菌界的百變怪，當我們把牠丟進血清裡、用 37°C 溫暖孵育 2 到 3 個小時之後，牠就會迫不及待地伸出一條細細長長、像尾巴一樣的「萌芽管（germ tube）」，這可是牠要轉化成具有侵襲性菌絲的前驅階段喔！這個「萌芽管試驗」在臨床上超級好用，因為它是白色念珠菌最具代表性的身分證。至於其他親戚呢？像是光滑念珠菌（C. glabrata）、克魯斯念珠菌（C. krusei）和熱帶念珠菌（C. tropicalis），牠們在血清裡泡再久也伸不出這種獨特的萌芽管，因此看到萌芽管，秒選白色念珠菌準沒錯！", "what": "白色念珠菌（Candida albicans）的關鍵鑑定特徵——萌芽管試驗（Germ tube test）。", "trap": "同學最常把「萌芽管（germ tube）」和一般的「假菌絲（pseudohyphae）」搞混。記住，萌芽管在與母細胞相連的基部是「完全沒有縊縮（no constriction）」的平滑管狀結構，而且只需要 2 到 3 小時就能快速形成，這是白色念珠菌獨步江湖的特徵！", "level": 7}, {"no": 19, "source": "110-1", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種特性不是白色念珠菌（Candida albicans）之主要致病因子？", "options": {"A": "能黏附組織", "B": "能合成黑色素", "C": "能分泌蛋白酶", "D": "能轉換表現型"}, "answer": "B", "ask": "白色念珠菌平時在我們體內作亂時，到底是靠哪些神兵利器來突破重圍、造成感染的？", "compare": "在黏附、變形、分泌酵素和製造黑色素這四個技能中，哪一個其實是新型隱球菌用來防禦宿主免疫細胞與氧化壓力的專屬黑科技？", "lock": "聯想一下，名字裡有「白色」的念珠菌，與哪一個聽起來黑漆漆、屬於隱球菌專利的化學物質最不搭嘎？", "explain": "同學們，這題考的是我們身體裡的常客——白色念珠菌（Candida albicans）！它可是個厲害的「變形金剛」兼「破壞王」。首先，它要成功感染，必須先黏在我們的上皮細胞上（選項A「黏附組織」），不然一下就被沖走了；接著，它會使出「化骨綿掌」，分泌蛋白酶（選項C）把我們的組織融化、破壞掉，好讓它能攻堂入室；最酷的是，它還會「七十二變」，在酵母型與菌絲型之間切換，甚至進行白/不透明表現型的轉換（選項D「轉換表現型」），來逃避我們免疫大軍的追捕！那「合成黑色素」是誰的招牌呢？那是「新型隱球菌」（Cryptococcus neoformans）的秘密武器，就像是它的抗UV防曬乳兼抗氧化盾牌。你想想，它都叫「白色」念珠菌了，怎麼會去合成「黑色」素來砸自己的招牌呢？所以答案選B！", "what": "白色念珠菌的核心致病機轉（毒力因子），以及它與新型隱球菌致病特徵的鑑別。", "trap": "考生容易把「所有真菌都有的防禦機制」混為一談。請牢記，「黑色素（Melanin）」是新型隱球菌（Cryptococcus neoformans）極具代表性的毒力因子，白色念珠菌是不會合成黑色素的喔！", "level": 8}, {"no": 23, "source": "110-2", "cognitive": "記憶/辨識", "difficulty": "易", "stem": "關於新型隱球菌（Cryptococcus neoformans）的敘述，下列何者錯誤？", "options": {"A": "常在鴿子的糞便中被發現", "B": "會形成莢膜（capsule）", "C": "會引發黴菌性腦膜炎（fungal meningitis）", "D": "只會在免疫缺失的病患身上造成感染"}, "answer": "D", "ask": "當我們走在公園看到鴿子飛舞時，呼吸道可能會吸入什麼具有厚厚糖蛋白外衣、甚至一不小心就侵犯腦部的神經性真菌？這隻真菌在哪些人群中會展現牠的破壞力？", "compare": "鴿糞、巨大的莢膜、腦膜炎，這三個鮮明的特徵是哪隻真菌的專屬名片？難道身體強壯、免疫力正常的人類，就真的能拍胸脯保證絕對不會被這隻病原菌入侵嗎？", "lock": "哪些臨床案例顯示，即使是免疫功能健全的正常人，也可能因為暴露在污染環境中而發病？找出那個把感染範圍限制得太過絕對、忽略了健康人群感染可能性的選項吧！", "explain": "嗨，各位同學！今天我們要聊聊真菌界的「隱形殺手」——新型隱球菌。這傢伙最喜歡躲在哪裡呢？答案是：鴿子的糞便！廣場上的鴿子雖然可愛，但牠們的乾便便可是隱球菌的溫床，所以選項 A 完全正確。這隻真菌還有一個超級厚、像穿了羽絨衣一樣的「莢膜（capsule）」，這層莢膜就像是牠的防彈衣，能躲避我們免疫細胞的吞噬，所以選項 B 也是對的。一旦這隻菌從呼吸道被吸入，牠可不安分，最喜歡一路往上衝，穿過血腦屏障（BBB）跑到大腦去開派對，引起可怕的「黴菌性腦膜炎」，所以選項 C 也是對的。那為什麼 D 錯了呢？因為隱球菌雖然特別喜歡欺負免疫力低下的病人（如 HIV 患者），但牠其實是個「不挑食」的壞蛋，如果一般健康的人不小心吸入大量孢子，同樣也有可能會被感染喔！所以說「只會」在免疫缺失的人身上造成感染，就太小看牠了！", "what": "新型隱球菌（Cryptococcus neoformans）的關鍵病原特徵（莢膜、鴿糞傳播、腦膜炎）與臨床感染對象的廣泛性。", "trap": "看到「只會...」這種絕對性的字眼就要提高警覺！雖然隱球菌確實是愛滋病患等免疫低下者的常見伺機性感染源，但絕對不是正常人就完全免疫，健康人吸入高劑量依然可能發病。", "level": 9}, {"no": 24, "source": "111-2", "cognitive": "應用", "difficulty": "中", "stem": "下列何種黴菌常經由呼吸道感染？", "options": {"A": "麴菌屬（Aspergillus）", "B": "念珠菌屬（Candida）", "C": "著色芽生屬（Fonsecaea）", "D": "小芽胞菌屬（Microsporum）"}, "answer": "A", "ask": "當我們深吸一口氣時，空氣中飄散著哪一種黴菌的孢子，最容易順著氣管長驅直入我們溫暖的肺部？", "compare": "寄生在皮膚表層吃角質的小芽胞菌、需要靠針刺傷口才能鑽進皮下的著色芽生屬，與黏在黏膜上原地作亂的念珠菌，哪一個能像麴菌一樣在空氣中御風飛行、伺機被吸入體內？", "lock": "哪一個選項的黴菌以產生大量可在空氣中飄散的分生孢子聞名，且是造成免疫低下患者嚴重肺部伺機性感染的頭號嫌疑犯？", "explain": "同學們，這題其實是在考黴菌的「侵入路線」啦！想像一下，黴菌界也有不同的「交通工具」。首先，第一名得主【麴菌屬（Aspergillus）】，牠們最擅長的就是在空氣中釋放成千上萬的微小孢子，只要你深吸一口氣，這些孢子就會像沙塵暴一樣順著你的鼻腔、氣管，一路直達肺部。對於免疫力低下的病人來說，這簡直是致命的呼吸道殺手！那其他選項呢？【念珠菌屬（Candida）】其實是我們身體的常在菌（就像黏在身上的房客），牠們是在你免疫力變差時「原地作亂」，不需要靠呼吸道吸入。而【著色芽生屬（Fonsecaea）】則是土裡的隱士，通常是要靠園藝刺傷、皮膚傷口等「物理穿刺」才能混進皮下組織。最後，【小芽胞菌屬（Microsporum）】則是皮膚寄生蟲，專門在皮膚表面和毛髮上「吃角質」引起香港腳或頭癬，根本進不去呼吸道。所以，會隨風飄進呼吸道的，絕對非麴菌莫屬啦！", "what": "常見致病黴菌的傳播途徑與感染部位區分。", "trap": "別因為念珠菌（Candida）會引起口腔鵝口瘡，就直覺地把它歸類為呼吸道吸入感染。念珠菌是內源性機會感染源，而麴菌才是典型經由吸入環境孢子致病的黴菌！", "level": 10}, {"no": 26, "source": "112-3", "cognitive": "理解/機轉", "difficulty": "中", "stem": "下列何種黴菌較常存在於鴿糞中，且會造成腦膜炎？", "options": {"A": "白色念珠菌（Candida albicans）", "B": "申克氏孢子絲菌（Sporothrix schenckii）", "C": "黃色麴菌（Aspergillus flavus）", "D": "新型隱球菌（Cryptococcus neoformans）"}, "answer": "D", "ask": "當我們在大街上看到成群的鴿子拍打翅膀時，空氣中可能散播著哪種會一路鑽進人類腦袋、引起嚴重發炎的致命真菌？", "compare": "同樣都是會引起感染的真菌，哪一個是以植物刺傷為皮膚感染途徑，而哪一個又是以厚實的莢膜結構聞名並特別鍾愛中樞神經系統？", "lock": "結合「鴿子排泄物」與「腦膜炎」這兩個極具指標性的臨床特徵，哪一種真菌才是符合這兩項條件的唯一嫌疑犯？", "explain": "同學們，這題根本是國考送分題，看到「鴿糞」跟「腦膜炎」這兩個關鍵字，就像看到牛郎與織女一樣，絕對要立刻聯想到「新型隱球菌（Cryptococcus neoformans）」！新型隱球菌最喜歡躲在鴿子糞便裡，當乾燥的鴿糞隨風飄散時，我們一旦吸入這些帶有厚厚莢膜的孢子，它們就會在肺部落腳，甚至在免疫力差的人身上，跟著血液一路衝進大腦，造成嚴重的隱球菌腦膜炎。我們來看看其他陪榜的選手：(A) 白色念珠菌是我們身上的常駐菌，通常在免疫力低落時造成鵝口瘡或陰道炎，不是靠鴿糞傳播的；(B) 申克氏孢子絲菌則是「園丁的噩夢」，常躲在玫瑰花刺或土壤中，刺傷皮膚引發局部淋巴結病變，跟鴿子完全沒交集；(C) 黃色麴菌最愛在花生或堅果裡製造致癌的黃麴毒素，跟腦膜炎扯不上直接關係。所以，記住這個黃金三角公式：鴿子大便＝隱球菌＝腦膜炎！", "what": "考驗新型隱球菌（Cryptococcus neoformans）的傳播媒介（鴿糞）與其最典型致命的臨床疾病（腦膜炎）。", "trap": "千萬不要看到「黴菌」就混淆了它們的傳染途徑！只有具備肥厚莢膜、能躲過免疫細胞並跨越血腦屏障（BBB）的新型隱球菌，才是真菌界中與「鴿糞」及「腦膜炎」強烈掛鉤的頭號殺手。", "level": 11}]}], "questionCount": 28, "gameCount": 28}</script>
<script>
const data=JSON.parse(document.getElementById('data').textContent);const analyticsMeta={chapter:'CHP16',chapter_name:'真菌學'};const $=s=>document.querySelector(s);const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const track=(name,params={})=>{if(typeof gtag==='function')gtag('event',name,{chapter:analyticsMeta.chapter,chapter_name:analyticsMeta.chapter_name,...params})};const storeKey='chp16_mycology_game_v1';let star=0;let activeTabs={};let gameState=loadState();

function saveState(){localStorage.setItem(storeKey,JSON.stringify(gameState))}

function table(t){if(!t)return'';return `<div class="table-wrap"><table><caption>${esc(t.title)}</caption><thead><tr>${t.headers.map(x=>`<th>${esc(x)}</th>`).join('')}</tr></thead><tbody>${t.rows.map(r=>`<tr>${t.headers.map((_,i)=>`<td>${esc(r[i]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function question(q){return `<details class="q"><summary>第 ${q.no} 題（${esc(q.source)}）</summary><div class="qbody" data-answer="${esc(q.answer)}" data-qno="${q.no}" data-source="${esc(q.source)}" data-qtype="quiz"><p>${esc(q.stem)}</p><div class="options">${Object.entries(q.options).map(([k,v])=>`<button class="option" type="button" data-choice="${k}"><b>${k}.</b> ${esc(v)}</button>`).join('')}</div><button class="submit" type="button" disabled>送出答案</button><div class="feedback" role="status"></div><div class="guide"><div class="hint"><b>🔍 題目在問啥？</b><br>${esc(q.ask)}</div><div class="hint"><b>⚖️ 概念 PK</b><br>${esc(q.compare)}</div><div class="hint"><b>🎯 鎖定答案</b><br>${esc(q.lock)}</div></div><button class="reveal" type="button" disabled>顯示引導與解析</button><div class="answer"><p><b>答案：</b>${esc(q.answer)}. ${esc(q.options[q.answer]||'')}</p><p><b>解析：</b>${esc(q.explain)}</p><p><b>這題考什麼：</b>${esc(q.what)}</p><div class="trap"><b>小心踩雷：</b>${esc(q.trap)}</div><button class="reset" type="button">重新作答</button></div></div></details>`}
function gamePanel(s){const st=stateFor(s.title),idx=Math.min(st.level||0,s.gameQuestions.length-1),q=s.gameQuestions[idx],pct=Math.round(((st.done||[]).length/s.gameQuestions.length)*100),finished=(st.done||[]).length>=s.gameQuestions.length;return `<div class="game-card" data-section="${esc(s.title)}"><div class="game-top"><div><b>🎮 ${esc(s.title)} 題庫闖關</b><div>每題先作答，看完解析即可解鎖下一關。</div></div><div class="progress" aria-label="闖關進度 ${pct}%"><div class="bar" style="width:${pct}%"></div></div></div><div class="badges">${s.gameQuestions.map((g,i)=>`<span class="badge ${(st.done||[]).includes(g.no)?'done':''} ${i===idx&&!finished?'current':''}">第 ${g.level} 關</span>`).join('')}</div>${finished?`<div class="win" style="display:block"><b>🏆 本區完成！</b><br>得分 ${st.score||0}/${s.gameQuestions.length}，累計答錯 ${st.wrong||0} 次。</div><button class="retry" type="button" data-game-reset="1">重設本區</button>`:`<div class="qbody game-q" data-answer="${esc(q.answer)}" data-qno="${q.no}" data-level="${q.level}" data-source="${esc(q.source)}" data-qtype="game"><p><b>第 ${q.level} 關｜第 ${q.no} 題（${esc(q.source)}）</b></p><p>${esc(q.stem)}</p><div class="options">${Object.entries(q.options).map(([k,v])=>`<button class="option" type="button" data-choice="${k}"><b>${k}.</b> ${esc(v)}</button>`).join('')}</div><button class="submit" type="button" disabled>送出答案</button><div class="feedback" role="status"></div><div class="guide"><div class="hint"><b>🔍 題目在問啥？</b><br>${esc(q.ask)}</div><div class="hint"><b>⚖️ 概念 PK</b><br>${esc(q.compare)}</div><div class="hint"><b>🎯 鎖定答案</b><br>${esc(q.lock)}</div></div><button class="reveal" type="button" disabled>看解析並解鎖下一關</button><div class="answer"><p><b>答案：</b>${esc(q.answer)}. ${esc(q.options[q.answer]||'')}</p><p><b>解析：</b>${esc(q.explain)}</p><p><b>這題考什麼：</b>${esc(q.what)}</p><div class="trap"><b>小心踩雷：</b>${esc(q.trap)}</div><button class="next" type="button" data-next-level="1">下一關</button><button class="retry" type="button" data-game-retry="1">本關重答</button><button class="retry" type="button" data-game-reset="1">重設本區</button></div></div>`}</div>`}
function render(){const key=$('#search').value.trim().toLowerCase();const list=data.sections.filter(s=>(!star||s.stars.length===star)&&(!key||JSON.stringify(s).toLowerCase().includes(key)));$('#sections').innerHTML=list.map(s=>{const active=activeTabs[s.title]||'concepts';return `<section class="section" id="sec-${data.sections.indexOf(s)}"><div class="section-head"><h2>${esc(s.title)} <span class="stars">${esc(s.stars)}</span></h2><p class="intro">${esc(s.intro)}</p></div><div class="tabs"><button class="tab ${active==='concepts'?'active':''}" data-tab="concepts">概念圖卡（${s.concepts.length}）</button><button class="tab ${active==='game'?'active':''}" data-tab="game">題庫闖關（${s.gameQuestions.length} 關）</button><button class="tab ${active==='questions'?'active':''}" data-tab="questions">完整題庫（${s.questions.length}）</button></div><div class="panel concepts" ${active==='concepts'?'':'hidden'}><div class="cram"><b>🏁 考前只背這幾句</b><ul>${s.cram.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div><div class="concept-grid">${s.concepts.map(c=>`<article class="concept"><h3>${esc(c.title)}</h3><div class="label">⭐ 核心概念</div><p>${esc(c.plain)}</p><div class="label">🔍 機轉</div><p>${esc(c.mechanism)}</p>${c.analogy?`<div class="label">🧠 生活比喻</div><p>${esc(c.analogy)}</p>`:''}<div class="label">🎯 國考重點</div><p>${esc(c.focus)}</p><div class="trap"><b>⚠️ 易錯：</b>${esc(c.confusion)}</div>${table(c.table)}</article>`).join('')}</div></div><div class="panel game" ${active==='game'?'':'hidden'}>${gamePanel(s)}</div><div class="panel questions" ${active==='questions'?'':'hidden'}>${s.questions.map(question).join('')}</div></section>`}).join('')||'<div class="empty">沒有符合條件的內容</div>'}
function finishGameLevel(body,correct){const card=body.closest('.game-card');if(!card)return;const section=card.dataset.section,st=stateFor(section),qno=Number(body.dataset.qno),level=Number(body.dataset.level),picked=body.querySelector('.selected'),ans=body.dataset.answer;if(correct&&!st._counted){st.score=(st.score||0)+1;st._counted=true}else if(!correct){st.wrong=(st.wrong||0)+1}track('game_answer',{section_name:section,level,question_no:qno,question_source:body.dataset.source||'',question_type:body.dataset.qtype||'game',selected_answer:picked?.dataset.choice||'',correct_answer:ans,is_correct:correct});saveState()}
document.addEventListener('click',e=>{const tab=e.target.closest('.tab');if(tab){const sec=tab.closest('.section'),sectionName=sec.querySelector('h2')?.textContent.replace(/[★☆]/g,'').trim()||'';activeTabs[sectionName]=tab.dataset.tab;sec.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===tab));sec.querySelectorAll(':scope > .panel').forEach(x=>x.hidden=!x.classList.contains(tab.dataset.tab));track('content_tab_open',{tab_name:tab.dataset.tab,section_name:sectionName});if(tab.dataset.tab==='game')track('game_start',{section_name:sectionName})}const opt=e.target.closest('.option');if(opt){const body=opt.closest('.qbody');body.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));opt.classList.add('selected');body.querySelector('.submit').disabled=false}const submit=e.target.closest('.submit');if(submit){const body=submit.closest('.qbody'),picked=body.querySelector('.selected'),ans=body.dataset.answer;if(!picked)return;body.querySelectorAll('.option').forEach(x=>{x.disabled=true;x.classList.toggle('correct',x.dataset.choice===ans);x.classList.toggle('wrong',x===picked&&x.dataset.choice!==ans)});const fb=body.querySelector('.feedback');const correct=picked.dataset.choice===ans;fb.textContent=correct?`答對！答案是 ${ans}。`:`答錯了；你選 ${picked.dataset.choice}，正確答案是 ${ans}。`;fb.classList.add('show');submit.disabled=true;body.querySelector('.reveal').disabled=false;if(body.classList.contains('game-q'))finishGameLevel(body,correct);else{const q=body.closest('.q'),sectionName=body.closest('.section')?.querySelector('h2')?.textContent.replace(/[★☆]/g,'').trim()||'';track('quiz_answer',{section_name:sectionName,question_no:Number(body.dataset.qno),question_source:body.dataset.source||'',question_type:body.dataset.qtype||'quiz',selected_answer:picked.dataset.choice,correct_answer:ans,is_correct:correct,question_label:q?.querySelector('summary')?.textContent.trim()||''})}}const reveal=e.target.closest('.reveal');if(reveal&&!reveal.disabled){const body=reveal.closest('.qbody');body.classList.add('revealed');if(body.classList.contains('game-q'))track('game_level_complete',{section_name:body.closest('.game-card')?.dataset.section||'',level:Number(body.dataset.level),question_no:Number(body.dataset.qno),question_source:body.dataset.source||''});else{const q=body.closest('.q'),sectionName=body.closest('.section')?.querySelector('h2')?.textContent.replace(/[★☆]/g,'').trim()||'';track('answer_reveal',{section_name:sectionName,question_no:Number(body.dataset.qno),question_source:body.dataset.source||'',question_type:body.dataset.qtype||'quiz',question_label:q?.querySelector('summary')?.textContent.trim()||''})}}const next=e.target.closest('[data-next-level]');if(next){const card=next.closest('.game-card'),section=card.dataset.section,st=stateFor(section),body=next.closest('.qbody'),qno=Number(body.dataset.qno);activeTabs[section]='game';st.done=Array.from(new Set([...(st.done||[]),qno]));st.level=Math.min((st.level||0)+1,card.querySelectorAll('.badge').length);delete st._counted;saveState();if(st.done.length>=card.querySelectorAll('.badge').length)track('game_section_complete',{section_name:section,score:st.score||0,wrong:st.wrong||0});render()}const retry=e.target.closest('[data-game-retry]');if(retry){const section=retry.closest('.game-card').dataset.section;activeTabs[section]='game';delete stateFor(section)._counted;saveState();track('game_retry_wrong',{section_name:section,level:stateFor(section).level||0,question_no:Number(retry.closest('.game-card')?.querySelector('.game-q')?.dataset.qno||0)});render()}const resetGame=e.target.closest('[data-game-reset]');if(resetGame){const section=resetGame.closest('.game-card').dataset.section,body=resetGame.closest('.game-card')?.querySelector('.game-q'),st=stateFor(section);track('game_retry_wrong',{section_name:section,level:Number(body?.dataset.level||st.level||0),question_no:Number(body?.dataset.qno||0)});activeTabs[section]='game';delete gameState[section];saveState();render()}const reset=e.target.closest('.reset');if(reset){const body=reset.closest('.qbody');body.classList.remove('revealed');body.querySelectorAll('.option').forEach(x=>{x.disabled=false;x.classList.remove('selected','correct','wrong')});body.querySelector('.submit').disabled=true;body.querySelector('.reveal').disabled=true;body.querySelector('.feedback').classList.remove('show')}})
let searchTimer;$('#search').addEventListener('input',()=>{render();clearTimeout(searchTimer);searchTimer=setTimeout(()=>{const term=$('#search').value.trim();if(term)track('search',{search_term:term})},700)});document.querySelectorAll('[data-star]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-star]').forEach(x=>x.classList.remove('active'));b.classList.add('active');star=+b.dataset.star;track('star_filter',{star_level:star||'all'});render()}));
$('#title').textContent=data.title;$('#subtitle').textContent=data.subtitle;$('#metrics').innerHTML=`<span class="metric">${data.sections.length} 大段落</span><span class="metric">${data.questionCount} 題完整題庫</span><span class="metric">${data.gameCount} 關題庫闖關</span>`;$('#route').innerHTML=data.route.map((x,i)=>`<button type="button" data-route="${i}"><b>${i+1}</b>${esc(x)}</button>`).join('');$('#route').addEventListener('click',e=>{const b=e.target.closest('[data-route]');if(b){track('section_jump',{section_name:data.route[+b.dataset.route]});document.getElementById(`sec-${b.dataset.route}`)?.scrollIntoView()}});render();
</script>
</body></html>
